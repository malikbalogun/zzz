/* ===== TOAST SYSTEM ===== */
let _toastSetFn = null;
function showToast(type, title, msg) {
  if (_toastSetFn) _toastSetFn(function(prev) { return [...prev, {id: Date.now()+Math.random(), type: type, title: title, msg: msg}]; });
}

function ToastContainer() {
  const [toasts, setToasts] = React.useState([]);
  _toastSetFn = setToasts;
  const remove = function(id) { setToasts(function(p) { return p.filter(function(t) { return t.id !== id; }); }); };
  React.useEffect(function() {
    if (!toasts.length) return;
    const t = toasts[0];
    const timer = setTimeout(function() { remove(t.id); }, 5000);
    return function() { clearTimeout(timer); };
  }, [toasts]);
  const icons = {ok:"[OK]", err:"[!]", w:"[~]", i:"[i]"};
  return (
    <div id="st-toasts">
      {toasts.map(function(t) { return (
        <div key={t.id} className={"st-toast t-"+t.type}>
          <span className="st-toast-ic">{icons[t.type]||"[i]"}</span>
          <div className="st-toast-body">
            {t.title && <div className="st-toast-title">{t.title}</div>}
            {t.msg && <div className="st-toast-msg">{t.msg}</div>}
          </div>
          <button className="st-toast-close" onClick={function(){remove(t.id);}}>x</button>
        </div>
      ); })}
    </div>
  );
}

/* ===== ISP PANEL ===== */
function DeployResult({msg, rdp}) {
  // msg may be JSON {status, message, log} or legacy plain text
  var parsed = null;
  try { parsed = JSON.parse(msg); } catch(e) {}

  var status  = parsed ? parsed.status  : (msg.indexOf("DEPLOY_OK") !== -1 ? "ok" : "error");
  var message = parsed ? parsed.message : msg;
  var log     = parsed ? parsed.log     : "";

  if (status === "deploying") {
    return (
      <div style={{marginTop:12, borderRadius:10, border:"1px solid #3b82f640", background:"#0f1e38",
        padding:"14px 16px", display:"flex", alignItems:"center", gap:12}}>
        <div style={{width:16, height:16, border:"2px solid #3b82f6", borderTopColor:"transparent",
          borderRadius:"50%", animation:"spin 0.8s linear infinite", flexShrink:0}}></div>
        <div>
          <div style={{fontSize:13, fontWeight:600, color:"#60a5fa"}}>Deploying...</div>
          <div style={{fontSize:11, color:"#94a3b8", marginTop:2}}>{message}</div>
        </div>
      </div>
    );
  }

  var isFirewallErr = message && (
    message.indexOf("Cannot reach") !== -1 ||
    message.indexOf("All remote ports") !== -1 ||
    message.indexOf("OpenSSH") !== -1 ||
    message.indexOf("timed out") !== -1
  );

  var opensshCmd = [
    "# Run ONE TIME in PowerShell as Administrator on the RDP:",
    "Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0",
    "Start-Service sshd",
    "Set-Service -Name sshd -StartupType Automatic",
    'netsh advfirewall firewall add rule name="SSH-In" dir=in action=allow protocol=tcp localport=22',
    "",
    "# Also enable WinRM as backup:",
    "winrm quickconfig -q",
    'netsh advfirewall firewall add rule name="WinRM-In" dir=in action=allow protocol=tcp localport=5985'
  ].join("\n");

  var [copied, setCopied] = React.useState(false);
  var [showLog, setShowLog] = React.useState(false);

  function copyCmd() {
    var text = isFirewallErr ? opensshCmd : (log || message);
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() {
        setCopied(true); setTimeout(function() { setCopied(false); }, 2000);
      });
    } else {
      var ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
      setCopied(true); setTimeout(function() { setCopied(false); }, 2000);
    }
  }

  var borderCol = status === "ok" ? "#22c55e30" : "#ef444430";
  var bgHeader  = status === "ok" ? "#0f2718"   : "#2a0f0f";
  var textCol   = status === "ok" ? "#4ade80"   : "#f87171";
  var subCol    = status === "ok" ? "#86efac"   : "#fca5a5";
  var icon      = status === "ok" ? "v" : "x";

  if (status === "ok") {
    return (
      <div style={{marginTop:12, borderRadius:10, border:"1px solid "+borderCol, overflow:"hidden"}}>
        <div style={{background:bgHeader, padding:"12px 14px", display:"flex", alignItems:"center", gap:10}}>
          <span style={{fontSize:18, color:textCol, flexShrink:0}}>{icon}</span>
          <div style={{flex:1, fontSize:13, color:subCol, fontWeight:600}}>{message}</div>
        </div>
        {log && (
          <div style={{background:"#0a1a0a", borderTop:"1px solid #22c55e20"}}>
            <button onClick={function(){setShowLog(function(v){return !v;});}}
              style={{width:"100%", background:"none", border:"none", color:"#4ade8099", fontSize:11,
                padding:"6px 14px", cursor:"pointer", textAlign:"left"}}>
              {showLog ? "Hide" : "Show"} deploy log
            </button>
            {showLog && (
              <pre style={{margin:0, padding:"0 14px 10px", fontSize:11, color:"#86efac",
                fontFamily:"monospace", whiteSpace:"pre-wrap", wordBreak:"break-all", maxHeight:200, overflowY:"auto"}}>
                {log}
              </pre>
            )}
          </div>
        )}
      </div>
    );
  }

  if (isFirewallErr) {
    return (
      <div style={{marginTop:12, borderRadius:10, overflow:"hidden", border:"1px solid #ef444430"}}>
        <div style={{background:"#2a0f0f", padding:"12px 14px", display:"flex", alignItems:"flex-start", gap:10}}>
          <span style={{fontSize:18, flexShrink:0}}>x</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:700, color:"#f87171", fontSize:13, marginBottom:4}}>All remote ports blocked</div>
            <div style={{fontSize:12, color:"#fca5a5", lineHeight:1.6}}>
              SSH (22), WinRM (5985), and SMB (445) are all unreachable on {rdp.host}.
              Run the commands below on the RDP, then click Auto-Deploy again.
            </div>
          </div>
        </div>
        <div style={{background:"#1a0a0a", padding:"10px 14px", borderTop:"1px solid #ef444422"}}>
          <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8}}>
            <div style={{fontSize:11, fontWeight:700, color:"#f87171", textTransform:"uppercase", letterSpacing:.5}}>
              Run in PowerShell as Admin on the RDP
            </div>
            <button onClick={copyCmd} style={{
              background: copied ? "#166534" : "#1e3a5f",
              border: "1px solid " + (copied ? "#22c55e" : "#3b82f6"),
              color: copied ? "#4ade80" : "#60a5fa",
              borderRadius:6, padding:"4px 12px", fontSize:11, cursor:"pointer",
              fontWeight:600, whiteSpace:"nowrap"}}>
              {copied ? "Copied!" : "Copy Command"}
            </button>
          </div>
          <pre style={{margin:0, background:"#0d1117", borderRadius:8, padding:"10px 12px",
            fontSize:11, lineHeight:1.7, color:"#e2e8f0", overflowX:"auto",
            border:"1px solid #30363d", fontFamily:"monospace"}}>{opensshCmd}</pre>
          <div style={{marginTop:8, fontSize:11, color:"#6b7280"}}>
            After running, click Auto-Deploy again.
          </div>
        </div>
      </div>
    );
  }

  // Generic error with real log
  return (
    <div style={{marginTop:12, borderRadius:10, border:"1px solid #ef444430", overflow:"hidden"}}>
      <div style={{background:"#2a0f0f", padding:"12px 14px", display:"flex", alignItems:"flex-start", gap:10}}>
        <span style={{fontSize:16, flexShrink:0}}>x</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:700, color:"#f87171", fontSize:13, marginBottom:4}}>Deploy Failed</div>
          <div style={{fontSize:12, color:"#fca5a5", lineHeight:1.6}}>{message}</div>
        </div>
      </div>
      {log && (
        <div style={{background:"#1a0808", borderTop:"1px solid #ef444422"}}>
          <button onClick={function(){setShowLog(function(v){return !v;});}}
            style={{width:"100%", background:"none", border:"none", color:"#f8717199", fontSize:11,
              padding:"6px 14px", cursor:"pointer", textAlign:"left", display:"flex", justifyContent:"space-between"}}>
            <span>{showLog ? "Hide" : "Show"} full log ({log.split("\n").length} lines)</span>
            <span style={{fontSize:10}}>{showLog ? "^" : "v"}</span>
          </button>
          {showLog && (
            <pre style={{margin:0, padding:"0 14px 10px", fontSize:11, color:"#fca5a5",
              fontFamily:"monospace", whiteSpace:"pre-wrap", wordBreak:"break-all", maxHeight:240, overflowY:"auto"}}>
              {log}
            </pre>
          )}
        </div>
      )}
    </div>
  );
}


function IspProxySMTPPanel() {
  const [proxies, setProxies] = React.useState(function() { try { return JSON.parse(localStorage.getItem("isp_proxies")||"[]"); } catch(e) { return []; } });
  const [pxDraft, setPxDraft] = React.useState({label:"",host:"",port:"17521",user:"",pass:"",type:"socks5",ispSmtpHost:"",ispSmtpPort:"25",fromDomain:"",smtpFromEmail:""});
  const [probing, setProbing] = React.useState(false);
  const [probeRes, setProbeRes] = React.useState(null);
  const [bulkImportOpen, setBulkImportOpen] = React.useState(false);
  const [bulkText, setBulkText] = React.useState("");
  const [bulkSmtpHost, setBulkSmtpHost] = React.useState("");
  const [bulkSmtpPort, setBulkSmtpPort] = React.useState("25");
  const [bulkEnvFrom, setBulkEnvFrom] = React.useState("");
  const [bulkImportResult, setBulkImportResult] = React.useState(null);
  const [testingPx, setTestingPx] = React.useState({});

  const saveProxies = function(v) { setProxies(v); try { localStorage.setItem("isp_proxies", JSON.stringify(v)); } catch(e) {} try { apiCall("/api/isp/sync", {method:"POST", body:JSON.stringify({rdps:[], proxies:v, assignments:{}})}).catch(()=>{}); } catch(e) {} };

  const addProxy = function() {
    if (!pxDraft.host || !pxDraft.ispSmtpHost) { showToast("err","Missing Fields","Enter proxy host and ISP SMTP host."); return; }
    const e = Object.assign({}, pxDraft, {id: Date.now(), status:"untested"});
    if (!e.label) e.label = (e.user||e.host)+" -> "+e.ispSmtpHost;
    saveProxies([...proxies, e]);
    setPxDraft({label:"",host:"",port:"17521",user:"",pass:"",type:"socks5",ispSmtpHost:"",ispSmtpPort:"25",fromDomain:"",smtpFromEmail:""});
    setProbeRes(null);
  };

  const bulkImportProxies = function() {
    if (!bulkText.trim()) { showToast("err","Empty","Paste proxy lines first."); return; }
    if (!bulkSmtpHost.trim()) { showToast("err","Missing","Enter the ISP SMTP host for these proxies."); return; }
    var lines = bulkText.trim().split(/\r?\n/).map(function(l){return l.trim();}).filter(Boolean);
    var added = 0, skipped = 0, newProxies = [];
    lines.forEach(function(line) {
      // Supported formats:
      // user:pass:host:port
      // host:port:user:pass  (standard socks format)
      // user:pass@host:port
      var parts;
      if (line.includes("@")) {
        // user:pass@host:port
        var atIdx = line.lastIndexOf("@");
        var creds = line.slice(0, atIdx).split(":");
        var hostport = line.slice(atIdx+1).split(":");
        parts = [creds[0]||"", creds[1]||"", hostport[0]||"", hostport[1]||"17521"];
      } else {
        parts = line.split(":");
      }
      if (parts.length < 2) { skipped++; return; }
      // Detect format: if part[0] looks like a hostname (contains dot and no spaces), host:port:user:pass
      // Otherwise assume user:pass:host:port (9proxy/niceproxy format)
      var host, port, user, pass;
      var p0HasDot = parts[0].includes(".");
      var p2HasDot = parts.length >= 3 && parts[2].includes(".");
      if (p2HasDot && !p0HasDot) {
        // user:pass:host:port
        user = parts[0]; pass = parts[1]; host = parts[2]; port = parts[3]||"17521";
      } else if (p0HasDot) {
        // host:port:user:pass
        host = parts[0]; port = parts[1]||"17521"; user = parts[2]||""; pass = parts[3]||"";
      } else {
        // fallback: user:pass:host:port
        user = parts[0]; pass = parts[1]; host = parts[2]||""; port = parts[3]||"17521";
      }
      if (!host) { skipped++; return; }
      var ehlo = bulkSmtpHost.split(".").slice(-2).join(".");
      var label = (user||host).split("-ssid-")[0].slice(-20) + " → " + bulkSmtpHost;
      newProxies.push({
        id: Date.now() + Math.random(),
        label: label,
        host: host,
        port: port,
        user: user,
        pass: pass,
        type: "socks5",
        ispSmtpHost: bulkSmtpHost,
        ispSmtpPort: bulkSmtpPort,
        fromDomain: ehlo,
        smtpFromEmail: bulkEnvFrom.trim(),
        status: "untested"
      });
      added++;
    });
    if (newProxies.length > 0) {
      saveProxies([...proxies, ...newProxies]);
      setBulkImportResult({added: added, skipped: skipped});
      setBulkText("");
      showToast("ok","Imported", added+" proxies added" + (skipped?" ("+skipped+" skipped)":""));
    } else {
      showToast("err","Nothing imported","Could not parse any valid proxy lines. Check format.");
      setBulkImportResult({added: 0, skipped: skipped});
    }
  };

  const probeSmtp = async function(smtpHost) {
    if (!smtpHost) { showToast("err","No Host","Enter an ISP SMTP host first."); return; }
    setProbing(true); setProbeRes(null);
    try {
      const r = await apiCall("/api/isp/probe-smtp", {method:"POST", body:JSON.stringify({host:smtpHost})});
      const d = await r.json();
      if (d.status === "ok") {
        setProbeRes(d);
        if (d.best) {
          setPxDraft(function(p) { return Object.assign({}, p, {ispSmtpPort: String(d.best.port), fromDomain: d.ehlo||p.fromDomain}); });
          showToast("ok","Port Detected","Best: "+d.best.port+" | "+d.open_count+" open | EHLO: "+d.ehlo);
        } else {
          showToast("w","No Open Ports","Could not find an open SMTP port. Try manually.");
        }
      } else {
        showToast("err","Probe Failed", d.message||"Could not reach host");
      }
    } catch(e) { showToast("err","Probe Error", e.message); }
    setProbing(false);
  };

  const testProxy = async function(px) {
    setTestingPx(function(p) { return Object.assign({}, p, {[px.id]:true}); });
    showToast("i","Testing proxy…","Routing through "+px.host+" → "+px.ispSmtpHost);
    try {
      // Build proxy string — backend smart parser handles all formats
      var proxyStr = "socks5://"+px.user+":"+px.pass+"@"+px.host+":"+px.port;
      var payload = {
        proxy: proxyStr,
        ispSmtpHost: px.ispSmtpHost || "smtp.shaw.ca",
        ispSmtpPort: parseInt(px.ispSmtpPort) || 25,
      };
      const r = await apiCall("/api/test-proxy", {method:"POST", body:JSON.stringify(payload)});
      const d = await r.json();
      if (d.status==="ok") {
        var portStr = d.open_ports ? " ports: "+d.open_ports.join(",") : "";
        showToast("ok","Proxy OK","Connected via "+px.host+portStr);
        saveProxies(proxies.map(function(x) { return x.id===px.id ? Object.assign({},x,{status:"ok",testResult:d.message,openPorts:d.open_ports,bestPort:d.best_port,portResults:d.port_results}) : x; }));
      } else {
        var msg = d.message || "Proxy test failed";
        showToast("err","Proxy Failed", msg.slice(0,120));
        saveProxies(proxies.map(function(x) { return x.id===px.id ? Object.assign({},x,{status:"error",testResult:msg,portResults:d.port_results}) : x; }));
      }
    } catch(e) { showToast("err","Test Error", e.message); }
    setTestingPx(function(p) { return Object.assign({}, p, {[px.id]:false}); });
  };

  const inpStyle = {width:"100%",padding:"9px 10px",background:"var(--bg2)",border:"1px solid var(--bdr)",borderRadius:8,color:"var(--tx)",fontSize:13,boxSizing:"border-box"};
  const selStyle = Object.assign({},inpStyle,{cursor:"pointer"});

  return (
    <div>
      <div className="card mb16">
        <div className="card-title">ISP Proxy SMTP Fleet</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginTop:10}}>
          {[
            {n:proxies.length, l:"Proxies"},
            {n:proxies.filter(function(p){return p.status==="ok";}).length, l:"Tested OK"},
            {n:proxies.filter(function(p){return p.status==="error";}).length, l:"Failed"},
          ].map(function(s){return(
            <div key={s.l} className="card" style={{textAlign:"center",padding:"12px 8px"}}>
              <div style={{fontSize:20,fontWeight:700}}>{s.n}</div>
              <div style={{fontSize:11,color:"var(--t2)"}}>{s.l}</div>
            </div>
          );})}
        </div>
      </div>

      <>
          <div className="card mb14">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div className="card-title" style={{margin:0}}>Bulk Import Proxies</div>
              <button className="btn btn-g btn-sm" onClick={function(){setBulkImportOpen(function(v){return !v;}); setBulkImportResult(null);}}>
                {bulkImportOpen ? "▲ Hide" : "▼ Paste & Import"}
              </button>
            </div>
            {bulkImportOpen && (
              <div style={{marginTop:12}}>
                <div style={{fontSize:12,color:"var(--t2)",marginBottom:10}}>
                  Paste one proxy per line. Supported formats:<br/>

              <div><label className="lbl">Type</label><select style={selStyle} value={pxDraft.type} onChange={function(e){setPxDraft(function(p){return Object.assign({},p,{type:e.target.value});});}}><option value="socks5">SOCKS5</option><option value="http">HTTP</option></select></div>
              <div><label className="lbl">Proxy Host</label><input style={inpStyle} value={pxDraft.host} onChange={function(e){setPxDraft(function(p){return Object.assign({},p,{host:e.target.value});});}} placeholder="niceproxy.io"/></div>
              <div><label className="lbl">Proxy Port</label><input style={inpStyle} value={pxDraft.port} onChange={function(e){setPxDraft(function(p){return Object.assign({},p,{port:e.target.value});});}} placeholder="17521"/></div>
              <div style={{gridColumn:"1 / -1"}}><label className="lbl">Proxy Username</label><input style={Object.assign({},inpStyle,{fontFamily:"monospace",fontSize:12})} value={pxDraft.user} onChange={function(e){setPxDraft(function(p){return Object.assign({},p,{user:e.target.value});});}} placeholder="proxybullet_TOKEN-country-CA-isp-..."/></div>
              <div><label className="lbl">Proxy Password</label><input style={inpStyle} type="password" value={pxDraft.pass} onChange={function(e){setPxDraft(function(p){return Object.assign({},p,{pass:e.target.value});});}} placeholder="Admin123"/></div>

                <label className="lbl">ISP SMTP Host</label>

                  const v = e.target.value;
                  const parts = v.split(".");
                  const ehlo = parts.length >= 2 ? parts.slice(-2).join(".") : v;
                  setPxDraft(function(p){return Object.assign({},p,{ispSmtpHost:v, fromDomain:ehlo});});
                  setProbeRes(null);
                }} placeholder="smtp.eastlink.ca"/>
              </div>
              <button className="btn btn-g" disabled={probing} style={{whiteSpace:"nowrap",height:38}} onClick={function(){probeSmtp(pxDraft.ispSmtpHost);}}>{probing?"Probing...":"Detect Port"}</button>
            </div>
            {probeRes && (
              <div style={{marginBottom:12,padding:"10px 12px",background:"var(--bg0)",borderRadius:8,fontSize:12}}>
                <div style={{fontWeight:600,marginBottom:6,color:"var(--t2)"}}>Ports for {pxDraft.ispSmtpHost}:</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {probeRes.results.map(function(r){return(
                    <button key={r.port} className={"btn btn-sm "+(pxDraft.ispSmtpPort===String(r.port)?"btn-p":"btn-g")}
                      style={{opacity:r.open?1:0.4}} disabled={!r.open}
                      onClick={function(){if(r.open)setPxDraft(function(p){return Object.assign({},p,{ispSmtpPort:String(r.port)});});}}>
                      {r.open?"v":"x"} {r.port}
                    </button>
                  );})}
                </div>
              </div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
              <div>
                <label className="lbl">SMTP Port</label>
                <div style={{display:"flex",gap:6}}>
                  <input style={Object.assign({},inpStyle,{flex:1,minWidth:0})} value={pxDraft.ispSmtpPort} onChange={function(e){setPxDraft(function(p){return Object.assign({},p,{ispSmtpPort:e.target.value});});}} placeholder="25"/>
                  <select style={Object.assign({},selStyle,{width:70,padding:"9px 4px"})} value={pxDraft.ispSmtpPort} onChange={function(e){setPxDraft(function(p){return Object.assign({},p,{ispSmtpPort:e.target.value});});}}>
                    <option value="25">25</option><option value="587">587</option><option value="465">465</option><option value="2525">2525</option><option value="26">26</option>
                  </select>
                </div>
              </div>
              <div style={{gridColumn:"span 2"}}><label className="lbl">EHLO Domain (auto-filled)</label><input style={inpStyle} value={pxDraft.fromDomain} onChange={function(e){setPxDraft(function(p){return Object.assign({},p,{fromDomain:e.target.value});});}} placeholder="eastlink.ca"/></div>
              <div style={{gridColumn:"span 2"}}><label className="lbl"><span title="A verified ISP email address to use as MAIL FROM envelope sender. Must be an account on this ISP (e.g. clive@shaw.ca). Fixes SPF and removes Unverified tag. Leave blank to use campaign From address.">Envelope From (SPF Fix)</span></label><input style={inpStyle} value={pxDraft.smtpFromEmail} onChange={function(e){setPxDraft(function(p){return Object.assign({},p,{smtpFromEmail:e.target.value});});}} placeholder="youraccount@shaw.ca"/></div>
            </div>
            <button className="btn btn-p mt12" onClick={addProxy}>+ Add Proxy</button>
          </div>
          {proxies.length===0 ? (
            <div className="card" style={{padding:20,textAlign:"center",color:"var(--t2)",fontSize:13}}>No proxies yet.</div>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 2px"}}>
                <span style={{fontSize:13,fontWeight:600,color:"var(--t2)"}}>Proxy Pool ({proxies.length})</span>
                <div style={{display:"flex",gap:8}}>
                  <button className="btn btn-g btn-sm" onClick={async function(){for(var i=0;i<proxies.length;i++)await testProxy(proxies[i]);}}>🔍 Test All</button>
                  <button className="btn btn-g btn-sm" onClick={function(){saveProxies(proxies.filter(function(p){return p.status!=="error";}));}}>Remove Dead</button>
                  <button className="btn btn-d btn-sm" onClick={function(){saveProxies([]);}}>Clear All</button>
                </div>
              </div>
              {proxies.map(function(px){return(
                <div key={px.id} className="card card-sm">
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,fontWeight:600}}>
                        <span>{px.status==="ok"?"✅":px.status==="error"?"❌":"⚪"}</span>
                        {px.label}
                      </div>
                      <div style={{fontSize:11,color:"var(--t2)",wordBreak:"break-all"}}>{px.type}://{px.host}:{px.port} → {px.ispSmtpHost}:{px.ispSmtpPort}</div>
                      {px.fromDomain && <div style={{fontSize:11,color:"var(--t2)"}}>EHLO: {px.fromDomain}</div>}
                      {px.portResults && (
                        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:4}}>
                          {px.portResults.map(function(pr){return(
                            <span key={pr.port} style={{fontSize:10,padding:"1px 6px",borderRadius:3,fontFamily:"monospace",
                              background:pr.ok?"rgba(34,197,94,.15)":"rgba(239,68,68,.12)",
                              color:pr.ok?"var(--ok)":"var(--err)",
                              border:"1px solid "+(pr.ok?"rgba(34,197,94,.3)":"rgba(239,68,68,.2)")}}>
                              {pr.ok?"✓":"✗"} :{pr.port}{pr.ok&&pr.latency_ms?" "+pr.latency_ms+"ms":""}
                            </span>
                          );})}
                        </div>
                      )}
                      {px.testResult && !px.portResults && <div style={{fontSize:11,color:px.status==="ok"?"var(--ok)":"var(--err)",marginTop:2,wordBreak:"break-all"}}>{px.testResult}</div>}
                    </div>
                    <div style={{display:"flex",gap:6,flexShrink:0}}>
                      <button className="btn btn-g btn-sm" disabled={!!testingPx[px.id]} onClick={function(){testProxy(px);}}>{testingPx[px.id]?"Testing...":"Test"}</button>
                      <button className="btn btn-sm" style={{background:"#ef4444",color:"#fff",border:"none"}} onClick={function(){saveProxies(proxies.filter(function(x){return x.id!==px.id;}));}}>Remove</button>
                    </div>
                  </div>
                </div>
              );})}
            </div>
          )}
      </>
    </div>
  );
}


function TabProxies({proxies, setProxies, proxyDraft, setProxyDraft, proxyType, setProxyType}) {
  const [pTab, setPTab] = useState("list");
  const [testR, setTestR] = useState({});
  const [testL, setTestL] = useState({});
  const [testSmtpHost, setTestSmtpHost] = useState("");
  const [testSmtpPort, setTestSmtpPort] = useState("");
  const [serverIp, setServerIp] = React.useState("");

  // ── 9Proxy state ──
  const [npApiKey, setNpApiKey] = useState(localStorage.getItem("9proxy_key")||"");
  const [npKeyOk, setNpKeyOk] = useState(!!localStorage.getItem("9proxy_key"));
  const [npVerifying, setNpVerifying] = useState(false);
  const [npNeedsLogin, setNpNeedsLogin] = useState(false);
  const [npUser, setNpUser] = useState("");
  const [npPass, setNpPass] = useState("");
  const [npPlan, setNpPlan] = useState("ip");
  const [npCountry, setNpCountry] = useState("CA");
  const [npIsp, setNpIsp] = useState("");
  const [npCount, setNpCount] = useState("10");
  const [npSmtpHost, setNpSmtpHost] = useState("");
  const [npFetching, setNpFetching] = useState(false);
  const [npError, setNpError] = useState("");
  const [npResult, setNpResult] = useState(null);

  const NP_ISPS = {
    CA: [
      {name:"Any ISP",                    value:"",          smtp:""},
      {name:"Shaw Communications (AS6327)",value:"as6327",   smtp:"smtp.shaw.ca"},
      {name:"Bell Canada (AS577)",         value:"as577",    smtp:"smtp.bell.net"},
      {name:"Rogers Communications (AS812)",value:"as812",   smtp:"smtp.rogers.com"},
      {name:"Telus (AS852)",               value:"as852",    smtp:"smtp.telus.net"},
      {name:"Eastlink (AS11260)",          value:"as11260",  smtp:"smtp.eastlink.ca"},
      {name:"SaskTel (AS803)",             value:"as803",    smtp:"smtp.sasktel.net"},
      {name:"Cogeco (AS15290)",            value:"as15290",  smtp:"smtp.cogeco.ca"},
      {name:"Videotron (AS5769)",          value:"as5769",   smtp:"smtp.videotron.ca"},
      {name:"TekSavvy (AS5645)",           value:"as5645",   smtp:"mail.teksavvy.com"},
      {name:"Bell MTS (AS7122)",           value:"as7122",   smtp:"smtp.mts.net"},
      {name:"Northwestel (AS7865)",        value:"as7865",   smtp:"smtp.northwestel.net"},
      {name:"Tbaytel (AS11814)",           value:"as11814",  smtp:"smtp.tbaytel.net"},
    ],
    US: [
      {name:"Any ISP",                    value:"",          smtp:""},
      {name:"Comcast / Xfinity (AS7922)", value:"as7922",    smtp:"smtp.comcast.net"},
      {name:"AT&T (AS7018)",              value:"as7018",    smtp:"outbound.att.net"},
      {name:"Charter / Spectrum (AS20115)",value:"as20115",  smtp:"smtp.charter.net"},
      {name:"Cox Communications (AS22773)",value:"as22773",  smtp:"smtp.cox.net"},
      {name:"Verizon (AS701)",            value:"as701",     smtp:"outgoing.verizon.net"},
      {name:"CenturyLink / Lumen (AS209)",value:"as209",    smtp:"smtp.centurylink.net"},
      {name:"Frontier (AS5650)",          value:"as5650",    smtp:"smtp.frontier.com"},
      {name:"Windstream (AS7029)",        value:"as7029",    smtp:"smtp.windstream.net"},
      {name:"Mediacom (AS30036)",         value:"as30036",   smtp:"smtp.mediacombb.net"},
      {name:"Consolidated (AS382)",       value:"as382",     smtp:"smtp.consolidated.net"},
      {name:"Suddenlink / Altice (AS19108)",value:"as19108", smtp:"smtp.suddenlink.net"},
      {name:"WOW! Internet (AS12083)",    value:"as12083",   smtp:"smtp.wowway.com"},
      {name:"Atlantic Broadband (AS6128)",value:"as6128",    smtp:"smtp.atlanticbb.net"},
      {name:"Midcontinent (AS11232)",     value:"as11232",   smtp:"smtp.midco.net"},
      {name:"RCN (AS6079)",              value:"as6079",     smtp:"smtp.rcn.com"},
    ]
  };

  const npIspList = NP_ISPS[npCountry] || NP_ISPS.CA;

  // Auto-fill SMTP host when ISP changes
  React.useEffect(()=>{
    const found = npIspList.find(i=>i.value===npIsp);
    if(found && found.smtp) setNpSmtpHost(found.smtp);
    else if(!npIsp) setNpSmtpHost("");
  },[npIsp, npCountry]);

  // Reset ISP when country changes
  React.useEffect(()=>{ setNpIsp(""); },[npCountry]);

  async function npVerifyKey(){
    setNpVerifying(true); setNpError("");
    try {
      const payload = {};
      if(npApiKey.trim()) payload.key = npApiKey.trim();
      if(npUser.trim()) payload.username = npUser.trim();
      if(npPass.trim()) payload.password = npPass.trim();
      const r = await apiCall("/api/9proxy/verify",{method:"POST",body:JSON.stringify(payload)});
      const d = await r.json();
      if(d.status==="ok"){
        localStorage.setItem("9proxy_key", npApiKey.trim());
        setNpKeyOk(true); setNpNeedsLogin(false); setNpUser(""); setNpPass("");
        showToast("ok","Connected", d.message||"9Proxy is ready.");
      } else if(d.status==="needs_login"){
        setNpNeedsLogin(true);
        setNpError(d.message);
        showToast("warn","Login Required", d.message);
      } else {
        setNpKeyOk(false);
        setNpError(d.message||"Verification failed");
        showToast("err","Error", d.message||"Could not connect to 9proxy.");
      }
    } catch(e){ setNpError(e.message); showToast("err","Error",e.message); }
    setNpVerifying(false);
  }

  function npRemoveKey(){
    localStorage.removeItem("9proxy_key");
    setNpApiKey(""); setNpKeyOk(false); setNpError(""); setNpNeedsLogin(false);
  }

  async function npFetchProxies(){
    if(!npApiKey){ showToast("err","No Key","Add your 9Proxy API key first."); return; }
    setNpFetching(true); setNpError(""); setNpResult(null);
    try {
      const r = await apiCall("/api/9proxy/fetch",{method:"POST",body:JSON.stringify({
        key:npApiKey.trim(),
        country:npCountry, isp:npIsp, count:parseInt(npCount)||10,
        planType: npPlan==="ip"?"premium":"free"
      })});
      const d = await r.json();
      if(d.status==="ok" && d.data){
        const items = Array.isArray(d.data) ? d.data : (d.data.data || []);
        if(items.length===0){ setNpError("No proxies returned — try different filters or check balance."); setNpFetching(false); return; }
        // Import as ISP proxies
        const smtpHost = npSmtpHost || "smtp.shaw.ca";
        const ehlo = smtpHost.split(".").slice(-2).join(".");
        const newProxies = items.map(function(px, idx){
          const host = px.address || px.host || px.ip || "127.0.0.1";
          const port = String(px.port || px.proxy_port || "17521");
          return {
            raw: "socks5://" + (px.username||"") + (px.password?":"+px.password:"") + (px.username?"@":"") + host + ":" + port,
            type: "socks5",
            status: px.online !== false ? "untested" : "failed",
            ispSmtpHost: smtpHost,
            ispSmtpPort: "25",
            fromDomain: ehlo,
            host: host,
            port: port,
            publicIp: px.public_ip || "",
            city: px.city || "",
          };
        });
        setProxies(prev=>[...prev, ...newProxies]);
        setNpResult({count: newProxies.length, port: newProxies[0]?.port || "auto"});
        showToast("ok","Fetched", newProxies.length+" proxies imported with SMTP "+smtpHost+":25");
      } else {
        setNpError(d.message || "API error — check your key and balance");
      }
    } catch(e){ setNpError(e.message); }
    setNpFetching(false);
  }
  React.useEffect(()=>{
    apiCall("/api/server-ip").then(r=>r.json()).then(d=>{if(d.ip) setServerIp(d.ip);}).catch(()=>{});
  },[]);

  async function testOne(p, i) {
    setTestL(prev=>({...prev,[i]:true})); setTestR(prev=>({...prev,[i]:null}));
    try {
      // Use the global test target if set, otherwise fall back to per-proxy stored host
      const payload = {
        proxy: p.raw || p,
        ispSmtpHost: testSmtpHost.trim() || p.ispSmtpHost || p.smtpHost || "",
        ispSmtpPort: parseInt(testSmtpPort) || p.ispSmtpPort || p.smtpPort || 0,
      };
      const r = await apiCall("/api/test-proxy",{method:"POST",body:JSON.stringify(payload)});
      const d = await r.json();
      setTestR(prev=>({...prev,[i]:d}));
      const statusLabel = d.status==="ok" ? "ok" : (d.http_works ? "smtp_blocked" : "failed");
      setProxies(prev=>prev.map((px,j)=>j===i?{...px,status:statusLabel,testResult:d.message,openPorts:d.open_ports,bestPort:d.best_port,portResults:d.port_results,httpWorks:d.http_works}:px));
    } catch(e) { setTestR(prev=>({...prev,[i]:{status:"error",message:e.message}})); }
    setTestL(prev=>({...prev,[i]:false}));
  }

  return (
    <div>
      <div className="ph">
        <div className="ph-title">🌐 Proxies</div>
        <div className="ph-sub">Route traffic through proxies for IP rotation and anonymity</div>
      </div>

      <div className="tab-bar">
        {[["list","ISP Proxies"],["9proxy","9Proxy"],["builder","Builder"],["deploy","Deploy VPS"]].map(([k,l])=>(
          <button key={k} className={`tb ${pTab===k?"on":""}`} onClick={()=>setPTab(k)}>{l}</button>
        ))}
      </div>

      {pTab==="list" && (
        <div className="g2" style={{alignItems:"start"}}>
          <div className="card">
            {serverIp && <div style={{background:"var(--bg2)",border:"1px solid var(--bdr)",borderRadius:6,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10,fontSize:13}}>
              <span style={{color:"var(--t2)"}}>🖥️ Your server IP (whitelist this in proxy dashboards):</span>
              <code style={{fontFamily:"var(--font-mono)",fontWeight:700,color:"var(--ok)",fontSize:14}}>{serverIp}</code>
              <button className="btn btn-g btn-xs" onClick={()=>copyToClipboard(serverIp)}>📋 Copy</button>
            </div>}
            <div className="card-title">
              <Tip text="Supported formats: socks5://user:pass@host:port, http://host:port, or just host:port. One proxy per line.">
                Add Proxies
              </Tip>
            </div>
            <div className="mb10">
              <label className="lbl">Proxy Type</label>
              <select value={proxyType} onChange={e=>setProxyType(e.target.value)} style={{width:180,fontSize:14,padding:"10px 12px"}}>
                <option value="socks5">SOCKS5</option>
                <option value="socks4">SOCKS4</option>
                <option value="http">HTTP</option>
                <option value="https">HTTPS</option>
              </select>
            </div>
            <textarea value={proxyDraft} onChange={e=>setProxyDraft(e.target.value)}
              placeholder={"socks5://user:pass@1.2.3.4:1080\nhttp://proxy.host:8080"}
              style={{minHeight:200, fontFamily:"var(--font-mono)", fontSize:12}}/>
            <button className="btn btn-p btn-sm mt8" onClick={()=>{
              const newP = proxyDraft.split("\n").map(s=>s.trim()).filter(Boolean).map(raw=>({raw,type:proxyType,status:"untested"}));
              setProxies(p=>[...p,...newP]); setProxyDraft("");
            }}>+ Add Proxies</button>
          </div>

          <div className="card">
            <div className="row jb ac-center mb12">
              <div className="card-title" style={{marginBottom:0}}>Proxy Pool ({proxies.length})</div>
              <div className="row g8">
                <button className="btn btn-g btn-sm" onClick={async()=>{for(let i=0;i<proxies.length;i++)await testOne(proxies[i],i);}}>🔍 Test All</button>
                <button className="btn btn-w btn-sm" onClick={()=>setProxies(p=>p.filter((_,i)=>p[i].status!=="failed"))}>Remove Dead</button>
                <button className="btn btn-d btn-sm" onClick={()=>setProxies([])}>Clear All</button>
              </div>
            </div>
            <div className="row g8 mb12" style={{alignItems:"center"}}>
              <div style={{flex:2,minWidth:0}}>
                <label className="lbl" style={{marginBottom:4}}>Test SMTP Target (host to reach through proxy)</label>
                <input value={testSmtpHost} onChange={e=>setTestSmtpHost(e.target.value)}

                  style={{width:"100%",padding:"7px 10px",background:"var(--bg2)",border:"1px solid var(--bdr)",borderRadius:6,color:"var(--tx)",fontSize:12,fontFamily:"var(--font-mono)",boxSizing:"border-box"}}/>
              </div>
              <div style={{width:80}}>
                <label className="lbl" style={{marginBottom:4}}>Port</label>
                <input value={testSmtpPort} onChange={e=>setTestSmtpPort(e.target.value)}
                  placeholder="auto"
                  style={{width:"100%",padding:"7px 10px",background:"var(--bg2)",border:"1px solid var(--bdr)",borderRadius:6,color:"var(--tx)",fontSize:12,fontFamily:"var(--font-mono)",boxSizing:"border-box"}}/>

              <div style={{fontSize:11,color:"var(--t2)",paddingTop:16,flexShrink:0}}>Leave blank = auto-probe all ports</div>

              ? <div className="dim2 sm" style={{padding:"40px 0",textAlign:"center"}}>No proxies added yet.<br/>Add some from the left panel.</div>

                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead>
                    <tr style={{background:"var(--bg2)",position:"sticky",top:0}}>
                      <th style={{padding:"6px 10px",textAlign:"left",fontWeight:600,color:"var(--dim)",fontSize:11,borderBottom:"1px solid var(--border)"}}>STATUS</th>
                      <th style={{padding:"6px 10px",textAlign:"left",fontWeight:600,color:"var(--dim)",fontSize:11,borderBottom:"1px solid var(--border)"}}>PROXY</th>
                      <th style={{padding:"6px 10px",textAlign:"left",fontWeight:600,color:"var(--dim)",fontSize:11,borderBottom:"1px solid var(--border)"}}>TYPE</th>
                      <th style={{padding:"6px 10px",textAlign:"left",fontWeight:600,color:"var(--dim)",fontSize:11,borderBottom:"1px solid var(--border)"}}>RESULT</th>
                      <th style={{padding:"6px 10px",borderBottom:"1px solid var(--border)"}}></th>
                    </tr>
                  </thead>
                  <tbody>
                    {proxies.map((p,i)=>(
                      <tr key={i} style={{borderBottom:"1px solid var(--border)",background:i%2===0?"var(--bg)":"var(--bg2)"}}>
                        <td style={{padding:"7px 10px"}}>
                          <span title={p.status==="smtp_blocked"?"HTTP works but SMTP blocked":""}>
                            {p.status==="ok"?"✅":p.status==="failed"?"❌":p.status==="smtp_blocked"?"🟡":"⚪"}
                          </span>
                        </td>
                        <td style={{padding:"7px 10px",fontFamily:"var(--font-mono)",color:"var(--tx)",maxWidth:260,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.raw}</td>
                        <td style={{padding:"7px 10px"}}><span style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:3,padding:"1px 6px",fontSize:11,fontFamily:"var(--font-mono)"}}>{p.type||"socks5"}</span></td>
                        <td style={{padding:"7px 10px",maxWidth:220}}>
                          {testL[i] && <span className="dim xs">Testing…</span>}
                          {testR[i] && !testL[i] && (
                            testR[i].port_results
                              ? <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                                  {testR[i].port_results.map(pr=>(
                                    <span key={pr.port} style={{fontSize:10,padding:"1px 5px",borderRadius:3,fontFamily:"monospace",
                                      background:pr.ok?"rgba(34,197,94,.15)":"rgba(239,68,68,.12)",
                                      color:pr.ok?"var(--ok)":"var(--err)",
                                      border:"1px solid "+(pr.ok?"rgba(34,197,94,.3)":"rgba(239,68,68,.2)")}}>
                                      {pr.ok?"✓":"✗"}:{pr.port}{pr.ok&&pr.latency_ms?" "+pr.latency_ms+"ms":""}
                                    </span>
                                  ))}
                                </div>
                              : <span className={`xs ${testR[i].status==="ok"?"c-ok":"c-e"}`} style={{wordBreak:"break-word"}}>{testR[i].message||""}</span>
                          )}
                        </td>
                        <td style={{padding:"7px 10px"}}>
                          <div className="row g6">
                            <button className="btn btn-g btn-xs" onClick={()=>testOne(p,i)} disabled={testL[i]}>Test</button>
                            <button className="btn btn-d btn-xs" onClick={()=>setProxies(p=>p.filter((_,j)=>j!==i))}>✕</button>
                          </div>
                        </td>
                      </tr>
                    ))}

                </table>
              </div>
            }
          </div>
        </div>
      )}

      {pTab==="9proxy" && (
        <div>
          {/* API Key Card */}
          <div className="card mb14">
            <div className="card-title">9Proxy API Key</div>
            {npKeyOk ? (
              <div>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{color:"var(--ok)",fontWeight:600}}>API key configured</span>
                  <button className="btn btn-d btn-xs" onClick={npRemoveKey}>Remove</button>
                </div>
                <div className="dim2 xs mt4">Find your API key in the 9proxy dashboard → API section</div>
              </div>
            ) : (
              <div>
                <div className="dim2 xs mb8">Find your API key in the 9proxy dashboard → API section</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:8,alignItems:"flex-end"}}>
                  <div>
                    <label className="lbl">API Key</label>
                    <input type="password" value={npApiKey} onChange={e=>setNpApiKey(e.target.value)}
                      placeholder="Paste your 9Proxy API key"
                      style={{width:"100%",fontSize:14,padding:"10px 12px",boxSizing:"border-box"}}
                      onKeyDown={e=>{if(e.key==="Enter")npVerifyKey();}}/>
                  </div>
                  <button className="btn btn-p" style={{height:42,whiteSpace:"nowrap"}} onClick={npVerifyKey} disabled={npVerifying}>
                    {npVerifying ? "Connecting..." : "Save & Connect"}
                  </button>
                </div>
                {npNeedsLogin && (
                  <div className="card mt10" style={{padding:14,background:"var(--bg3)"}}>
                    <div style={{fontWeight:600,fontSize:13,marginBottom:8}}>🔐 9Proxy Login Required</div>
                    <div className="dim2 xs mb8">Your 9proxy app needs to be logged in. Enter your 9proxy.com email and password.</div>
                    <div className="g2 mb8">
                      <div>
                        <label className="lbl">Email</label>
                        <input value={npUser} onChange={e=>setNpUser(e.target.value)} placeholder="you@email.com"
                          style={{width:"100%",padding:"8px 10px",boxSizing:"border-box"}}/>
                      </div>
                      <div>
                        <label className="lbl">Password</label>
                        <input type="password" value={npPass} onChange={e=>setNpPass(e.target.value)} placeholder="9proxy password"
                          style={{width:"100%",padding:"8px 10px",boxSizing:"border-box"}}
                          onKeyDown={e=>{if(e.key==="Enter")npVerifyKey();}}/>
                      </div>
                    </div>
                    <button className="btn btn-p btn-sm" onClick={npVerifyKey} disabled={npVerifying}>
                      {npVerifying ? "Logging in..." : "Login & Connect"}
                    </button>
                    <div className="dim2 xs mt6">If you signed up with Google, set a password at 9proxy.com → Account Settings</div>
                  </div>
                )}
                {!npNeedsLogin && <div className="dim2 xs mt6">The server auto-detects your 9proxy installation.</div>}
                {npError && !npNeedsLogin && <div style={{color:"var(--err)",fontSize:12,marginTop:8}}>{npError}</div>}
              </div>
            )}
          </div>

          {/* Fetch Proxies Card */}
          <div className="card mb14">
            <div className="card-title">Fetch Proxies</div>

            {/* Plan Type */}
            <div style={{marginBottom:14}}>
              <label className="lbl">PLAN TYPE</label>
              <div style={{display:"flex",gap:0}}>
                <button className={"btn btn-sm "+(npPlan==="ip"?"btn-p":"btn-g")}
                  style={{borderRadius:"6px 0 0 6px",minWidth:120}}
                  onClick={()=>setNpPlan("ip")}>IP-based</button>
                <button className={"btn btn-sm "+(npPlan==="gb"?"btn-p":"btn-g")}
                  style={{borderRadius:"0 6px 6px 0",minWidth:120}}
                  onClick={()=>setNpPlan("gb")}>GB-based</button>
              </div>
            </div>

            {/* Country + ISP */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              <div>
                <label className="lbl">COUNTRY</label>
                <select value={npCountry} onChange={e=>setNpCountry(e.target.value)}
                  style={{width:"100%",fontSize:14,padding:"10px 12px"}}>
                  <option value="CA">Canada</option>
                  <option value="US">United States</option>
                </select>
              </div>
              <div>
                <label className="lbl">ISP</label>
                <select value={npIsp} onChange={e=>setNpIsp(e.target.value)}
                  style={{width:"100%",fontSize:14,padding:"10px 12px"}}>
                  {npIspList.map(i=>(
                    <option key={i.value} value={i.value}>{i.name}</option>
                  ))}
                </select>
              </div>
            </div>

            {/* Count + ISP SMTP Host */}
            <div style={{display:"grid",gridTemplateColumns:"120px 1fr 100px",gap:10,marginBottom:14}}>
              <div>
                <label className="lbl">COUNT</label>
                <input type="number" min="1" max="100" value={npCount} onChange={e=>setNpCount(e.target.value)}
                  style={{width:"100%",fontSize:14,padding:"10px 12px",boxSizing:"border-box"}}/>
              </div>
              <div>
                <label className="lbl">ISP SMTP HOST</label>
                <select value={npSmtpHost} onChange={e=>setNpSmtpHost(e.target.value)}
                  style={{width:"100%",fontSize:14,padding:"10px 12px"}}>
                  <option value="">-- Select ISP SMTP --</option>
                  {npIspList.filter(i=>i.smtp).map(i=>(
                    <option key={i.smtp} value={i.smtp}>{i.smtp}</option>
                  ))}
                </select>
              </div>
              <div>
                <label className="lbl">SMTP PORT</label>
                <input value="25" disabled
                  style={{width:"100%",fontSize:14,padding:"10px 12px",boxSizing:"border-box",opacity:0.7,background:"var(--bg2)",fontWeight:700}}/>
              </div>
            </div>

            {/* Proxy Port (auto) */}
            {npResult && (
              <div style={{marginBottom:14,padding:"10px 14px",background:"var(--bg2)",borderRadius:8,fontSize:13}}>
                <span style={{color:"var(--t2)"}}>PROXY PORT (SOCKS5):</span>{" "}
                <span style={{fontWeight:700,fontFamily:"var(--font-mono)",color:"var(--ok)"}}>{npResult.port}</span>
                <span style={{color:"var(--t2)",marginLeft:12}}>|</span>
                <span style={{color:"var(--ok)",marginLeft:12}}>{npResult.count} proxies imported</span>
              </div>
            )}

            {/* Fetch button */}
            <button className="btn btn-p" style={{width:"100%",padding:"12px",fontSize:15}} onClick={npFetchProxies} disabled={npFetching || !npKeyOk}>
              {npFetching ? "Fetching..." : "Fetch Proxies"}
            </button>
            {!npKeyOk && <div className="dim2 xs mt4" style={{textAlign:"center"}}>Add and verify your API key first</div>}
            {npError && <div style={{color:"var(--err)",fontSize:12,marginTop:10,padding:"8px 12px",background:"rgba(239,68,68,.1)",borderRadius:6}}>{npError}</div>}
          </div>
        </div>
      )}

      {pTab==="builder" && (
        <div className="g2" style={{alignItems:"start"}}>
          <div className="card">
            <div className="card-title">Proxy URL Builder</div>
            <Info type="i">Build proxy URLs from separate credential fields from your proxy provider.</Info>
            <div className="g2 mt12">
              {["host","port","username","password"].map(f=>(
                <div key={f}><label className="lbl">{f.charAt(0).toUpperCase()+f.slice(1)}</label><input id={`pb_${f}`} placeholder={f} style={{fontSize:14,padding:"10px 12px"}}/></div>
              ))}
            </div>
            <button className="btn btn-p btn-sm mt12" onClick={()=>{
              const h=(document.getElementById("pb_host")||{}).value;
              const p=(document.getElementById("pb_port")||{}).value;
              const u=(document.getElementById("pb_username")||{}).value;
              const pw=(document.getElementById("pb_password")||{}).value;
              if(!h||!p) return;
              const url=u?`${proxyType}://${u}:${pw}@${h}:${p}`:`${proxyType}://${h}:${p}`;
              setProxies(prev=>[...prev,{raw:url,type:proxyType,status:"untested"}]);
            }}>{"Build & Add"}</button>
          </div>
          <div className="card">
            <div className="card-title">Format Guide</div>
            <div className="col g12">
              {[["SOCKS5 with auth","socks5://user:pass@host:port"],["SOCKS5 bare","socks5://host:port"],["HTTP with auth","http://user:pass@host:port"],["HTTP bare","http://host:port"]].map(([lbl,ex])=>(
                <div key={lbl}>
                  <div className="dim2 xs bold mb4">{lbl}</div>
                  <div className="code" style={{fontSize:12,padding:"8px 12px"}}>{ex}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {pTab==="deploy" && (
        <div className="g2" style={{alignItems:"start"}}>
          <div className="card">
            <div className="card-title">Deploy SOCKS5 Proxy via SSH</div>
            <Info type="i">Automatically deploy a lightweight SOCKS5 proxy on any VPS you have SSH access to.</Info>
            <div className="g2 mt12">
              <div><label className="lbl">VPS Host</label><input id="dh" placeholder="1.2.3.4" style={{fontSize:14,padding:"10px 12px"}}/></div>
              <div><label className="lbl">SSH Password</label><input type="password" id="dp" style={{fontSize:14,padding:"10px 12px"}}/></div>
            </div>
            <button className="btn btn-p btn-sm mt12" onClick={async()=>{
              const host=(document.getElementById("dh")||{}).value;
              const pass=(document.getElementById("dp")||{}).value;
              if(!host) return;
              const r=await apiCall("/api/deploy-proxy",{method:"POST",body:JSON.stringify({host,pass})});
              const d=await r.json();
              showPopup({title:"ISP Test",msg:d.message||JSON.stringify(d),ico:"🌐",type:"alert"});
            }}>🚀 Deploy Proxy</button>
          </div>
          <div className="card">
            <div className="card-title">What This Does</div>
            <div className="col g12 dim2 sm">
              <div>🔐 Connects via SSH to your VPS</div>
              <div>📦 Installs <span className="mono">dante-server</span> (SOCKS5 daemon)</div>
              <div>⚙️ Configures it with username/password auth</div>
              <div>✅ Adds the new proxy to your proxy pool automatically</div>
              <div className="mt8"><Info type="i">Root SSH access required. Works on Ubuntu/Debian VPS.</Info></div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function TabAttachments({filesList, uploadFile, deleteFile, renameFile, selectedType, setSelectedType, attachConfig, setAttachConfig}) {
  const attachFiles = filesList.filter(f=>f.category==="attachments");

  return (
    <div>
      <div className="ph">
        <div className="ph-title">📎 Attachments</div>
        <div className="ph-sub">Upload attachments saved to your account, then select them in Compose</div>
      </div>

      <div className="g2" style={{alignItems:"start"}}>
        <div>
          {/* Upload */}
          <div className="card mb16">
            <div className="card-title">Upload Attachments</div>
            <div className="drop mb12" style={{padding:"40px 24px"}} onClick={()=>(document.getElementById("att-up")||{}).click()}>
              <div className="drop-ic">📎</div>
              <div className="drop-t">Drop files here or click to upload</div>
              <div className="drop-s">Any file type — saved securely to your account only</div>
            </div>
            <input id="att-up" type="file" multiple style={{display:"none"}}
              onChange={async e=>{for(const f of e.target.files) await uploadFile(f,"attachment");}}/>
          </div>

          {/* Uploaded list */}
          {attachFiles.length>0 && (
            <div className="card">
              <div className="card-title">Your Uploaded Attachments ({attachFiles.length})</div>
              <div className="col g8">
                {attachFiles.map(file=>{
                  const ti = ATTACH_TYPES.find(t=>(file.mime||"").includes(t.id))||ATTACH_TYPES[13];
                  return (
                    <div key={file.id} className="fi">
                      <div className="fi-ic" style={{background:ti.col+"22"}}>{ti.ico}</div>
                      <div style={{flex:1}}>
                        <div className="fi-name">{file.display_name||file.name}</div>
                        <div className="fi-meta">{fmtBytes(file.size)} · {file.mime}</div>
                      </div>
                      <Bdg t="n">{(file.mime||"").split("/")[1]||"file"}</Bdg>
                      <div className="row g6">
                        <button className="btn btn-g btn-xs" onClick={async()=>{
                          const n=prompt("Rename attachment:",file.display_name||file.name);
                          if(n) await renameFile(file.id,n);
                        }}>✏️</button>
                        <button className="btn btn-d btn-xs" onClick={()=>deleteFile(file.id)}>🗑</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>

        {/* Type picker (for dynamic generation) */}
        <div className="card">
        <div className="card-title">Attachment Type (for dynamic generation)</div>
        <div className="dim sm mb12">For auto-generated attachment types like ICS calendar events. Select a type to configure options below.</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:12,marginBottom:16}}>
          {ATTACH_TYPES.map(t=>(
            <div key={t.id} className={`ac ${selectedType===t.id?"sel":""}`} onClick={()=>setSelectedType(t.id===selectedType?null:t.id)}>
              <div className="ac-ic" style={{background:t.col+"22",fontSize:34}}>{t.ico}</div>
              <div className="ac-lbl">{t.lbl}</div>
            </div>
          ))}
        </div>

        {selectedType==="ics" && (
          <div className="card card-sm">
            <div className="card-title">📅 Calendar Event Settings</div>
            <div className="col g10">
              <div><label className="lbl">Event Title (supports tags)</label><input value={attachConfig.title||""} onChange={e=>setAttachConfig({...attachConfig,title:e.target.value})} placeholder="Team Meeting — #DATE" style={{fontSize:14,padding:"10px 12px"}}/></div>
              <div className="g2">
                <div><label className="lbl">Start Date/Time</label><input type="datetime-local" value={attachConfig.dtStart||""} onChange={e=>setAttachConfig({...attachConfig,dtStart:e.target.value})} style={{fontSize:14,padding:"10px 12px"}}/></div>
                <div><label className="lbl">Duration (minutes)</label><input type="number" value={attachConfig.duration||60} onChange={e=>setAttachConfig({...attachConfig,duration:e.target.value})} style={{fontSize:15,padding:"10px 12px"}}/></div>
              </div>
              <div><label className="lbl">Location / Meeting URL</label><input value={attachConfig.location||""} onChange={e=>setAttachConfig({...attachConfig,location:e.target.value})} placeholder="Zoom / Microsoft Teams / Office" style={{fontSize:14,padding:"10px 12px"}}/></div>
            </div>
          </div>
        )}

        {["pdf","docx","xlsx","pptx"].includes(selectedType) && (
          <div className="card card-sm">
            <div className="card-title">Document Settings</div>
            <div className="col g10">
              <div>
                <label className="lbl">File Name (supports tags)</label>
                <input value={attachConfig.fileName||""} onChange={e=>setAttachConfig({...attachConfig,fileName:e.target.value})} placeholder={`Invoice_#COMPANY.${selectedType}`} style={{fontSize:14,padding:"10px 12px"}}/>
              </div>
              <div>
                <label className="lbl">Content</label>
                <textarea value={attachConfig.content||""} onChange={e=>setAttachConfig({...attachConfig,content:e.target.value})} placeholder="Document body (supports tags)" style={{minHeight:80}}/>
              </div>
            </div>
          </div>
        )}

        {selectedType==="ghost_pdf" && (
          <div className="card card-sm">
            <div className="card-title">👻 Ghost PDF Settings</div>
            <Info type="i">Creates a professional-looking PDF with an invisible full-page clickable link overlay. Recipients see a clean document — clicking anywhere opens your URL. Bypasses link scanners since the URL is embedded in PDF metadata, not the email body.</Info>
            <div className="col g10 mt10">
              <div><label className="lbl">Link URL (required)</label>
                <input value={attachConfig.ghostLink||""} onChange={e=>setAttachConfig({...attachConfig,ghostLink:e.target.value})} placeholder="https://your-link.com" style={{fontSize:14,padding:"10px 12px"}}/></div>
              <div><label className="lbl">Document Title</label>
                <input value={attachConfig.ghostTitle||""} onChange={e=>setAttachConfig({...attachConfig,ghostTitle:e.target.value})} placeholder="Important Document" style={{fontSize:14,padding:"10px 12px"}}/></div>
              <div><label className="lbl">File Name</label>
                <input value={attachConfig.ghostName||""} onChange={e=>setAttachConfig({...attachConfig,ghostName:e.target.value})} placeholder="document.pdf" style={{fontSize:14,padding:"10px 12px"}}/></div>
              <div><label className="lbl">Visible Body Text (optional)</label>
                <textarea value={attachConfig.ghostText||""} onChange={e=>setAttachConfig({...attachConfig,ghostText:e.target.value})} placeholder="Leave blank for auto-generated professional text" style={{minHeight:70,fontSize:12}}/></div>
            </div>
          </div>
        )}

        {selectedType==="html_image" && (
          <div className="card card-sm">
            <div className="card-title">🖼 HTML → Image Settings</div>
            <Info type="i">Converts your HTML email body to a PNG/JPEG image. The email contains an image instead of text — bypasses all text-based content filters. Requires playwright, imgkit (wkhtmltoimage), or html2image installed on the server.</Info>
            <div className="col g10 mt10">
              <div className="g2">
                <div><label className="lbl">Width (px)</label>
                  <input type="number" value={attachConfig.imgWidth||650} onChange={e=>setAttachConfig({...attachConfig,imgWidth:e.target.value})} style={{fontSize:14,padding:"10px 12px"}}/></div>
                <div><label className="lbl">Height (px)</label>
                  <input type="number" value={attachConfig.imgHeight||800} onChange={e=>setAttachConfig({...attachConfig,imgHeight:e.target.value})} style={{fontSize:14,padding:"10px 12px"}}/></div>
              </div>
              <div className="g2">
                <div><label className="lbl">Format</label>
                  <select value={attachConfig.imgFormat||"png"} onChange={e=>setAttachConfig({...attachConfig,imgFormat:e.target.value})} style={{fontSize:14,padding:"10px 12px"}}>
                    <option value="png">PNG (lossless)</option>
                    <option value="jpg">JPEG (smaller)</option>
                  </select></div>
                <div><label className="lbl">File Name</label>
                  <input value={attachConfig.imgName||""} onChange={e=>setAttachConfig({...attachConfig,imgName:e.target.value})} placeholder="email.png" style={{fontSize:14,padding:"10px 12px"}}/></div>
              </div>
              <Tog checked={attachConfig.imgInlineReplace||false} onChange={v=>setAttachConfig({...attachConfig,imgInlineReplace:v})}
                label="Replace email body with image"
                desc="Embed image inline and replace HTML body — recipients see only the image"/>
            </div>
          </div>
        )}
        </div>
      </div>
    </div>
  );
}
