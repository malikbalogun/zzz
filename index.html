function TabTagsTemplates({setHtmlBody, setTab}) {
  const [tTab, setTTab] = useState("tags");
  const [tagSearch, setTagSearch] = useState("");
  const [tagCat, setTagCat] = useState("all");
  const [tplSearch, setTplSearch] = useState("");
  const [customTpls, setCustomTpls] = useState([]);
  const [editing, setEditing] = useState(null);

  const allTpls = [...BUILTIN_TEMPLATES, ...customTpls];
  const filtered = tplSearch ? allTpls.filter(t=>t.name.toLowerCase().includes(tplSearch.toLowerCase())||t.cat.toLowerCase().includes(tplSearch.toLowerCase())) : allTpls;
  const filteredTags = TAGS.filter(t=>(tagCat==="all"||t.cat===tagCat)&&(!tagSearch||t.tag.includes(tagSearch.toUpperCase())||t.desc.toLowerCase().includes(tagSearch.toLowerCase())));

  return (
    <div>
      <div className="ph"><div className="ph-title">🏷️ Tags & Templates</div></div>
      <div className="tab-bar">
        <button className={`tb ${tTab==="tags"?"on":""}`} onClick={()=>setTTab("tags")}>Tag Reference</button>
        <button className={`tb ${tTab==="tpls"?"on":""}`} onClick={()=>setTTab("tpls")}>Templates ({allTpls.length})</button>
      </div>

      {tTab==="tags" && (
        <div>
          <div className="row g8 mb16" style={{flexWrap:"wrap"}}>
            <input value={tagSearch} onChange={e=>setTagSearch(e.target.value)} placeholder="Search tags…" style={{width:220}}/>
            <div className="row g4" style={{flexWrap:"wrap"}}>
              {TAG_CATS.map(c=>(
                <button key={c} className={`btn btn-sm ${tagCat===c?"btn-p":"btn-g"}`} onClick={()=>setTagCat(c)}>
                  {c.charAt(0).toUpperCase()+c.slice(1)}
                </button>
              ))}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:12}}>
            {filteredTags.map(t=>(
              <div key={t.tag} className="card card-sm" style={{cursor:"pointer"}} onClick={()=>copyToClipboard(t.tag)}>
                <div className="row jb ac-center mb6">
                  <code style={{fontSize:15,fontWeight:700,color:"var(--accent)",fontFamily:"var(--font-mono)"}}>{t.tag}</code>
                  <Bdg t="n">{t.cat}</Bdg>
                </div>
                <div className="sm mb4">{t.desc}</div>
                <div className="xs dim2 mb6" style={{lineHeight:1.5}}>{t.long}</div>
                <div className="row ac-center g6">
                  <span className="dim2 xs">Example:</span>
                  <code style={{fontSize:11,color:"var(--ok)",fontFamily:"var(--font-mono)"}}>{t.ex}</code>
                  <span className="dim2 xs ml-auto">Click to copy</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {tTab==="tpls" && (
        <div>
          <div className="row g8 ac-center mb16">
            <input value={tplSearch} onChange={e=>setTplSearch(e.target.value)} placeholder="Search templates…" style={{flex:1}}/>
            <button className="btn btn-g btn-sm" onClick={()=>{
              const n=prompt("Template name:");
              if(!n) return;
              setCustomTpls(p=>[...p,{id:"c_"+Date.now(),name:n,cat:"Custom",col:"#f9f9f9",html:""}]);
            }}>+ New Template</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:16}}>
            {filtered.map(t=>(
              <div key={t.id} className="tplc">
                <div className="tplc-prev" style={{background:t.col||"#fff"}}>
                  {t.html
                    ? <iframe srcDoc={t.html} sandbox="allow-same-origin" title={t.name} style={{width:"200%",height:"200%",transform:"scale(.5)",transformOrigin:"top left",border:"none",pointerEvents:"none"}}/>
                    : <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:"#ccc",fontSize:13}}>No preview</div>
                  }
                </div>
                <div className="tplc-info">
                  <div className="tplc-name">{t.name}</div>
                  <div className="tplc-cat">{t.cat}</div>
                  <div className="row g6 mt8">
                    <button className="btn btn-p btn-xs" onClick={()=>{setHtmlBody(t.html);setTab("compose");}}>Use</button>
                    <button className="btn btn-g btn-xs" onClick={()=>setEditing({...t})}>Edit</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {editing && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}}
          onClick={()=>setEditing(null)}>
          <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"var(--radius)",padding:24,width:"82vw",maxHeight:"82vh",overflow:"auto"}}
            onClick={e=>e.stopPropagation()}>
            <div className="card-title">Editing: {editing.name}</div>
            <div className="mb10"><label className="lbl">Name</label><input value={editing.name} onChange={e=>setEditing({...editing,name:e.target.value})}/></div>
            <div><label className="lbl">HTML</label><textarea value={editing.html} onChange={e=>setEditing({...editing,html:e.target.value})} style={{minHeight:320,fontFamily:"var(--font-mono)",fontSize:12}}/></div>
            <div className="row g8 mt12">
              <button className="btn btn-p btn-sm" onClick={()=>{
                const isBuiltin = BUILTIN_TEMPLATES.find(t=>t.id===editing.id);
                if(isBuiltin) {
                  setCustomTpls(p=>{const ex=p.find(t=>t.id===editing.id);return ex?p.map(t=>t.id===editing.id?editing:t):[...p,{...editing,id:"c_"+editing.id}];});
                } else {
                  setCustomTpls(p=>p.map(t=>t.id===editing.id?editing:t));
                }
                setEditing(null);
              }}>Save</button>
              <button className="btn btn-g btn-sm" onClick={()=>setEditing(null)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════
   TAB: B2B
════════════════════════════════════════ */
function TabB2B({setLeadsRaw, setLeads, setTab}) {
  const isMobile = useIsMobile();
  const [step, setStep] = useState(0);
  const [email, setEmail] = useState("");
  const [provider, setProvider] = useState("");
  const [providerInfo, setProviderInfo] = useState(null);
  const [authMode, setAuthMode] = useState("password");
  const [password, setPassword] = useState("");
  const [token, setToken] = useState("");
  const [session, setSession] = useState(null);
  const [extracted, setExtracted] = useState([]);
  const [limit, setLimit] = useState(500);
  const [filterG, setFilterG] = useState(true);
  const [daysBack, setDaysBack] = useState(90);
  const [loading, setLoading] = useState(false);
  const [msg, setMsg] = useState({text:"",type:"i"});
  const [extractLog, setExtractLog] = useState([]);

  const PROVIDERS = {
    microsoft365:  {ico:"🪟", label:"Microsoft 365",  authHints:["Regular password or App Password if MFA enabled","OAuth token from Azure portal","Device code flow for conditional access"]},
    google:        {ico:"🔵", label:"Google Workspace",authHints:["App Password required (myaccount.google.com/apppasswords)","OAuth token via Google Cloud Console","Must have IMAP enabled in Gmail settings"]},
    exchange:      {ico:"📮", label:"Exchange / OWA",  authHints:["Domain credentials (user@domain.com)","EWS endpoint auto-detected","NTLM/Basic auth supported"]},
    imap:          {ico:"📬", label:"IMAP (Generic)",  authHints:["Direct IMAP SSL (port 993)","App Password if provider requires it","Port 143 STARTTLS as fallback"]},
    generic:       {ico:"📧", label:"Unknown Provider",authHints:["Try password authentication","Check provider docs for app passwords","IMAP access may need to be enabled"]},
  };

  const steps=["Detect","Authenticate","Extract","Send"];

  function setInfo(text,type="i"){setMsg({text,type});}

  async function detect() {
    if(!email||!email.includes("@")){setInfo("Enter a valid email address first.","e");return;}
    setLoading(true); setInfo("","i");
    try {
      const r=await apiCall("/api/b2b/detect",{method:"POST",body:JSON.stringify({email})});
      if(r.ok){
        const d=await r.json();
        const prov=d.provider||"generic";
        setProvider(prov); setProviderInfo(d);
        const pi=PROVIDERS[prov]||PROVIDERS.generic;
        setInfo(`✓ Detected: ${pi.label}${d.mx?" — MX: "+d.mx:""}${d.autodiscover?" — Exchange autodiscovery found":""}${d.imap_host?" — IMAP: "+d.imap_host:""}`, "ok");
        setStep(1);
      } else {
        const d=await r.json().catch(()=>({}));
        setInfo("Detection failed: "+(d.error||"Could not identify provider. Will attempt generic IMAP."),"w");
        setProvider("generic"); setProviderInfo(null); setStep(1);
      }
    } catch(e){setInfo("Network error: "+e.message,"e");}
    setLoading(false);
  }

  async function auth() {
    setLoading(true); setInfo("","i");
    try {
      const ep=authMode==="password"?"/api/b2b/auth/password":"/api/b2b/auth/token";
      const body=authMode==="password"?{email,password,provider,providerInfo}:{email,token,provider};
      const r=await apiCall(ep,{method:"POST",body:JSON.stringify(body)});
      const d=await r.json();
      if(d.session||d.status==="ok"){
        setSession(d.session||d);setStep(2);
        setInfo("✓ Authenticated successfully — ready to extract","ok");
      } else {
        setInfo("Authentication failed: "+(d.error||"Check your credentials and try again"),"e");
      }
    } catch(e){setInfo("Auth error: "+e.message,"e");}
    setLoading(false);
  }

  async function extract() {
    setLoading(true); setInfo("Extracting leads…","i"); setExtracted([]); setExtractLog([]);
    try {
      const r=await apiCall("/api/b2b/extract",{method:"POST",body:JSON.stringify({email,session,limit,filterGeneric:filterG,daysBack})});
      const reader=r.body.getReader(),dec=new TextDecoder(); let buf="",all=[];
      while(true){
        const{done,value}=await reader.read();if(done)break;
        buf+=dec.decode(value,{stream:true});
        const lines=buf.split("\n");buf=lines.pop();
        for(const l of lines){
          if(!l.trim())continue;
          try{
            const ev=JSON.parse(l);
            if(ev.type==="lead"){all.push(ev.email);setExtracted([...all]);}
            else if(ev.type==="progress"){setExtractLog(p=>[...p.slice(-20),ev.msg]);}
            else if(ev.type==="done"){setInfo(`✓ Extracted ${all.length} leads from ${daysBack} days of email`,"ok");setStep(3);}
            else if(ev.type==="error"){setInfo("Error: "+ev.msg,"e");}
          }catch(e){}
        }
      }
    } catch(e){setInfo("Extraction error: "+e.message,"e");}
    setLoading(false);
  }

  const pi = PROVIDERS[provider]||PROVIDERS.generic;

  return (
    <div>
      <div className="ph"><div className="ph-title">🔒 B2B Sender</div><div className="ph-sub">Authenticate to inboxes, extract leads, and send directly</div></div>

      {/* Wizard steps */}
      <div className="wiz mb20">
        {steps.map((s,i)=>(
          <div key={s} className={`wiz-step ${step>i?"done":step===i?"cur":""}`} onClick={()=>step>i&&setStep(i)} style={{cursor:step>i?"pointer":"default"}}>
            <div className="wiz-n">{step>i?"✓":i+1}</div>
            <div className="wiz-l">{s}</div>
          </div>
        ))}
      </div>

      {msg.text && <div className="mb14"><Info type={msg.type}>{msg.text}</Info></div>}

      {/* ── Step 0: Detect ── */}
      {step===0 && (
        <div style={{display:"flex",gap:16,alignItems:"start",flexDirection:isMobile?"column":"row"}}>
          <div className="card" style={{flex:isMobile?"1 1 100%":"0 0 420px"}}>
            <div className="card-title">Step 1 — Detect Provider</div>
            <label className="lbl">Email Address</label>
            <input value={email} onChange={e=>setEmail(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&detect()}
              placeholder="user@company.com" style={{fontSize:15,padding:"12px 14px"}}/>
            <div className="mt14 row g8">
              <button className="btn btn-p" onClick={detect} disabled={loading||!email}>
                {loading?<span>🔍 Detecting…</span>:<span>Detect Provider →</span>}
              </button>
            </div>
            <div className="mt16" style={{borderTop:"1px solid var(--border)",paddingTop:14}}>
              <div className="dim2 xs mb10">Supported providers:</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {Object.values(PROVIDERS).filter(p=>p.label!=="Unknown Provider").map(p=>(
                  <span key={p.label} style={{fontSize:12,padding:"3px 10px",background:"var(--bg3)",borderRadius:20,border:"1px solid var(--border)"}}>{p.ico} {p.label}</span>
                ))}
              </div>
            </div>
          </div>
          <div className="card" style={{flex:1}}>
            <div className="card-title">How B2B Sender Works</div>
            <div className="col g14 sm">
              {[["🔍","Detect","We identify the email provider (Microsoft 365, Google, Exchange, IMAP) from the domain MX records and autodiscovery."],
                ["🔑","Authenticate","Log in with your password or OAuth token. App passwords work for MFA-protected accounts."],
                ["📥","Extract","Pull unique contact emails from inbox headers — people who emailed this inbox."],
                ["📤","Send","Load extracted leads directly into the campaign tab, or send directly from this authenticated inbox."]
              ].map(([ico,name,desc])=>(
                <div key={name} style={{display:"flex",gap:10}}>
                  <span style={{fontSize:18,flexShrink:0}}>{ico}</span>
                  <div><div style={{fontWeight:600,marginBottom:2}}>{name}</div><div className="dim2 xs">{desc}</div></div>
                </div>
              ))}
            </div>
            <div className="mt12"><Info type="i">This sends from a real authenticated business inbox — highest deliverability, bypasses spam filters, no SMTP credentials needed.</Info></div>
          </div>
        </div>
      )}

      {/* ── Step 1: Auth ── */}
      {step===1 && (
        <div style={{display:"flex",gap:16,alignItems:"start",flexDirection:isMobile?"column":"row"}}>
          <div className="card" style={{flex:isMobile?"1 1 100%":"0 0 420px"}}>
            <div className="card-title">Step 2 — Authenticate</div>
            <div className="row ac-center g10 mb14" style={{padding:"12px 14px",background:"var(--bg3)",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)"}}>
              <span style={{fontSize:22}}>{pi.ico}</span>
              <div>
                <div style={{fontWeight:600,fontSize:14}}>{pi.label}</div>
                <div className="dim2 xs">{email}</div>
              </div>
              <button className="btn btn-g btn-xs ml-auto" onClick={()=>setStep(0)}>← Change</button>
            </div>
            <div className="tab-bar mb12">
              {[["password","🔐 Password"],["token","🪙 OAuth Token"]].map(([k,l])=>(
                <button key={k} className={`tb ${authMode===k?"on":""}`} onClick={()=>setAuthMode(k)}>{l}</button>
              ))}
            </div>
            {authMode==="password" ? (
              <div>
                <label className="lbl">Password / App Password</label>
                <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&auth()}
                  placeholder="Your password or app-specific password" style={{fontSize:14,padding:"10px 12px"}}/>
              </div>
            ) : (
              <div>
                <label className="lbl">Access / Bearer Token</label>
                <textarea value={token} onChange={e=>setToken(e.target.value)}
                  placeholder="Paste OAuth bearer token here…"
                  style={{minHeight:90,fontFamily:"var(--font-mono)",fontSize:11}}/>
              </div>
            )}
            <div className="row g8 mt14">
              <button className="btn btn-p" onClick={auth} disabled={loading}>{loading?"Authenticating…":"Authenticate →"}</button>
            </div>
          </div>
          <div className="card" style={{flex:1}}>
            <div className="card-title">{pi.ico} {pi.label} — Auth Tips</div>
            <div className="col g10">
              {pi.authHints.map((h,i)=>(
                <div key={i} style={{display:"flex",gap:8,fontSize:13}}>
                  <span style={{color:"var(--accent)",flexShrink:0}}>→</span>
                  <span className="dim">{h}</span>
                </div>
              ))}
            </div>
            {(provider==="microsoft365"||provider==="exchange") && (
              <div className="mt14">
                <Info type="i">If standard auth fails, try the <strong>OAuth Device Code</strong> flow — works with MFA, SSO, and Conditional Access policies without needing app passwords.</Info>
                <button className="btn btn-g btn-sm mt8" onClick={async()=>{
                  setInfo("Starting device code flow…","i");setLoading(true);
                  try{
                    const r=await apiCall("/api/oauth/device-code",{method:"POST",body:JSON.stringify({email})});
                    const d=await r.json();
                    if(d.user_code&&d.verification_uri){
                      setInfo(`Open ${d.verification_uri} and enter code: ${d.user_code}. Then click Poll below.`,"w");
                      window.open(d.verification_uri,"_blank");
                    }
                  }catch(e){setInfo("Device code error: "+e.message,"e");}
                  setLoading(false);
                }}>🔗 Start Device Code Flow</button>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── Step 2: Extract ── */}
      {step===2 && (
        <div style={{display:"flex",gap:16,alignItems:"start",flexDirection:isMobile?"column":"row"}}>
          <div className="card" style={{flex:isMobile?"1 1 100%":"0 0 420px"}}>
            <div className="card-title">Step 3 — Extract Leads</div>
            <div style={{padding:"10px 14px",background:"var(--ok)11",border:"1px solid var(--ok)44",borderRadius:"var(--radius-sm)",marginBottom:14,fontSize:13}}>
              <span className="c-ok">✓ Authenticated</span> as <strong>{email}</strong> via {pi.label}
            </div>
            <div className="g2 mb12">
              <div>
                <label className="lbl">Email Limit</label>
                <input type="number" value={limit} onChange={e=>setLimit(parseInt(e.target.value))} min="10" max="10000" style={{fontSize:15,padding:"10px 12px"}}/>
              </div>
              <div>
                <label className="lbl">Days Back</label>
                <input type="number" value={daysBack} onChange={e=>setDaysBack(parseInt(e.target.value))} min="7" max="365" style={{fontSize:15,padding:"10px 12px"}}/>
              </div>
            </div>
            <div className="mb14"><Tog checked={filterG} onChange={setFilterG} label="Filter generic addresses" desc="Skip noreply@, info@, admin@, postmaster@ etc."/></div>
            <div className="row g8">
              <button className="btn btn-g btn-sm" onClick={()=>setStep(1)}>← Back</button>
              <button className="btn btn-p" onClick={extract} disabled={loading}>{loading?"Extracting…":"🔍 Extract Leads"}</button>
            </div>
          </div>
          <div className="card" style={{flex:1}}>
            <div className="row jb ac-center mb8">
              <div className="card-title" style={{marginBottom:0}}>Live Results</div>
              {extracted.length>0&&<Bdg t="ok">{extracted.length} found</Bdg>}
            </div>
            {loading && extractLog.length>0 && (
              <div className="flog mb10" style={{height:120}}>{extractLog.map((l,i)=><div key={i} className="dim2 xs">{l}</div>)}</div>
            )}
            {extracted.length>0 ? (
              <div className="code" style={{maxHeight:280,overflowY:"auto",fontSize:12,lineHeight:1.8}}>
                {extracted.slice(0,100).join("\n")}{extracted.length>100?`\n…and ${extracted.length-100} more`:""}
              </div>
            ) : (
              <div className="dim2 sm" style={{padding:"30px 0",textAlign:"center"}}>
                {loading?"⏳ Scanning inbox for contacts…":"Results will appear here"}
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── Step 3: Use leads ── */}
      {step===3 && (
        <div style={{display:"flex",gap:16,alignItems:"start",flexDirection:isMobile?"column":"row"}}>
          <div className="card" style={{flex:isMobile?"1 1 100%":"0 0 420px"}}>
            <div className="card-title">Step 4 — Use Leads</div>
            <Info type="ok">{extracted.length} unique leads extracted from {email}</Info>
            <div className="col g8 mt14">
              <button className="btn btn-p" onClick={()=>{setLeadsRaw(extracted.join("\n"));setLeads(parseLeads(extracted.join("\n")));setTab("leads");}}>
                📋 Load into Leads Tab
              </button>
              <button className="btn btn-g btn-sm" onClick={()=>{
                const a=document.createElement("a");
                a.href="data:text/plain;charset=utf-8,"+encodeURIComponent(extracted.join("\n"));
                a.download=`leads_${email.split("@")[0]}_${Date.now()}.txt`;a.click();
              }}>⬇ Download as TXT</button>
              <button className="btn btn-g btn-sm" onClick={()=>setStep(2)}>← Extract More</button>
            </div>
          </div>
          <div className="card" style={{flex:1}}>
            <div className="row jb ac-center mb10">
              <div className="card-title" style={{marginBottom:0}}>All Extracted ({extracted.length})</div>
              <Bdg t="ok">{extracted.length} leads</Bdg>
            </div>
            <div className="code" style={{maxHeight:340,overflowY:"auto",fontSize:12,lineHeight:1.8}}>
              {extracted.join("\n")}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function TabFiles({filesList, uploadFile, deleteFile, renameFile, fileUploadLoading}) {
  const isMobile = useIsMobile();
  const [cat, setCat] = useState("all");
  const cats=["all","attachments","leads","letters","templates","senders","misc"];
  const catIco={attachments:"📎",leads:"👥",letters:"✉️",templates:"📋",senders:"📤",misc:"📦"};

  const [selCat, setSelCat] = useState("attachment");

  return (
    <div>
      <div className="ph"><div className="ph-title">📁 Files</div><div className="ph-sub">All uploaded files organised by category</div></div>

      <div style={{display:"flex",gap:16,alignItems:"flex-start",flexDirection:isMobile?"column":"row"}}>
        {/* Sidebar — horizontal scrolling tabs on mobile, vertical list on desktop */}

          <div style={{display:"flex",gap:6,overflowX:"auto",width:"100%",paddingBottom:4,WebkitOverflowScrolling:"touch"}}>

                padding:"6px 12px",borderRadius:20,border:"1px solid var(--border)",

                fontSize:12,fontWeight:600,whiteSpace:"nowrap",cursor:"pointer",flexShrink:0
              }}>
                {catIco[c]||"📁"} {c.charAt(0).toUpperCase()+c.slice(1)} ({c==="all"?filesList.length:filesList.filter(f=>f.category===c).length})
              </button>
            ))}
          </div>
        ) : (
          <div style={{width:170,flexShrink:0,minWidth:170}}>
            <div className="card">
              <div className="dim2 xs bold mb8">CATEGORIES</div>
              {cats.map(c=>(
                <div key={c} className={`sb-item ${cat===c?"active":""}`} style={{borderRadius:"var(--radius-sm)",padding:"7px 12px",fontSize:13}} onClick={()=>setCat(c)}>
                  <span>{catIco[c]||"📁"}</span>
                  <span>{c.charAt(0).toUpperCase()+c.slice(1)}</span>
                  <span className="ml-auto xs dim2">{c==="all"?filesList.length:filesList.filter(f=>f.category===c).length}</span>
                </div>
              ))}
            </div>
          </div>

        {/* File list */}

          <div className="card">

              <div className="card-title" style={{marginBottom:0}}>{cat.charAt(0).toUpperCase()+cat.slice(1)} ({filtered.length})</div>

                  <option value="leads">Leads</option>
                  <option value="letter">Letter</option>
                  <option value="template">Template</option>
                  <option value="senders">Senders</option>
                  <option value="misc">Misc</option>
                </select>
                <button className="btn btn-g btn-sm" onClick={()=>(document.getElementById("files-up")||{}).click()} disabled={fileUploadLoading}>
                  {fileUploadLoading?"Uploading…":"⬆ Upload"}
                </button>
              </div>
              <input id="files-up" type="file" multiple style={{display:"none"}}
                onChange={async e=>{for(const f of e.target.files) await uploadFile(f,selCat);}}/>
            </div>

            {filtered.length===0
              ? <Info type="i">No files here. Upload using the button above.</Info>
              : (
                <div className="col g8">
                  {filtered.map(file=>{
                    const ti=ATTACH_TYPES.find(t=>(file.mime||"").includes(t.id))||ATTACH_TYPES[13];
                    return (
                      <div key={file.id} className="fi">
                        <div className="fi-ic" style={{background:ti.col+"22"}}>{ti.ico}</div>
                        <div style={{flex:1}}>
                          <div className="fi-name">{file.display_name||file.name}</div>
                          <div className="fi-meta">{file.category} · {fmtBytes(file.size)} · {(file.created_at||"").split("T")[0]}</div>
                        </div>
                        <Bdg t="n">{(file.mime||"").split("/")[1]||"file"}</Bdg>
                        <div className="row g6">
                          <button className="btn btn-g btn-xs" onClick={async()=>{const n=await showPopup({title:"Rename File",msg:"Enter new name:",ico:"✏️",type:"prompt",defaultValue:file.display_name||file.name});if(n)await renameFile(file.id,n);}}>✏️</button>
                          <button className="btn btn-d btn-xs" onClick={()=>deleteFile(file.id)}>🗑</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )
            }
          </div>
        </div>
      </div>
    </div>
  );
}

                    <div><label className="lbl">IMAP Port</label><input type="number" value={seedDraft.imapPort} onChange={e=>setSeedDraft({...seedDraft,imapPort:parseInt(e.target.value)})} style={{fontSize:14,padding:"10px 12px"}}/></div>
                  </div>
                )}
              </div>
              <div className="row g8 mt12">
                <button className="btn btn-p btn-sm" onClick={addSeedAccount} disabled={seedLoading}>➕ Add Account</button>
                {seedMsg&&<span className={seedMsg.startsWith("✓")?"dim":"err"}>{seedMsg}</span>}
              </div>
            </div>
            <div className="card">
              <div className="card-title">Seed Accounts <Bdg t="n">{seedAccounts.length}</Bdg></div>
              {seedAccounts.length===0 ? (
                <div className="dim2 sm" style={{padding:"20px 0",textAlign:"center"}}>No seed accounts yet. Add one above.</div>
              ) : (
                <div className="tw">
                  <table>
                    <thead><tr><th>Email</th><th>Provider</th><th>Status</th><th></th></tr></thead>
                    <tbody>
                      {seedAccounts.map((a,i)=>(
                        <tr key={i}>
                          <td className="mono" style={{fontSize:12}}>{a.email}</td>
                          <td><Bdg t="i">{a.provider||"auto"}</Bdg></td>
                          <td><Bdg t={a.status==="ok"?"ok":a.status==="error"?"e":"n"}>{a.status||"unchecked"}</Bdg></td>
                          <td><button className="btn btn-g btn-sm" style={{padding:"2px 8px"}} onClick={()=>removeSeedAccount(a.email)}>✕</button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {/* ─── AI CONFIG ─── */}
      {tTool==="aiconfig" && (
        <div className="g2" style={{alignItems:"start"}}>
          <div className="card">
            <div className="card-title">✨ AI Configuration</div>
            <Info type="i">Connect to an AI provider to enable AI-powered subject generation, email rewriting, and spam analysis.</Info>
            <div className="col g14 mt16">
              <div>
                <label className="lbl">Provider</label>
                <select value={aiProvider} onChange={e=>setAiProvider(e.target.value)} style={{fontSize:14,padding:"10px 12px",width:"100%",borderRadius:6,border:"1px solid var(--border)",background:"var(--inp)",color:"var(--text)"}}>
                  <option value="openai">OpenAI</option>
                  <option value="anthropic">Anthropic Claude</option>
                  <option value="xai">xAI Grok</option>
                  <option value="custom">Custom (OpenAI-compatible)</option>
                </select>
              </div>
              <div>
                <label className="lbl">API Key</label>
                <input type="password" value={aiKey} onChange={e=>setAiKey(e.target.value)}
                  placeholder={aiProvider==="anthropic"?"sk-ant-...":"sk-..."}
                  style={{fontSize:14,padding:"10px 12px"}}/>
              </div>
              <div>
                <label className="lbl">Model</label>
                <select value={aiModel} onChange={e=>setAiModel(e.target.value)} style={{fontSize:14,padding:"10px 12px",width:"100%",borderRadius:6,border:"1px solid var(--border)",background:"var(--inp)",color:"var(--text)"}}>
                  {aiProvider==="openai"&&<>
                    <option value="gpt-4o-mini">GPT-4o Mini (Fast, Cheap)</option>
                    <option value="gpt-4o">GPT-4o</option>
                    <option value="gpt-4-turbo">GPT-4 Turbo</option>
                  </>}
                  {aiProvider==="anthropic"&&<>
                    <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
                    <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
                  </>}
                  {aiProvider==="xai"&&<>
                    <option value="grok-2-latest">Grok 2</option>
                    <option value="grok-beta">Grok Beta</option>
                  </>}
                  {aiProvider==="custom"&&<option value={aiModel}>{aiModel||"custom-model"}</option>}
                </select>
                {aiProvider==="custom"&&<input value={aiModel} onChange={e=>setAiModel(e.target.value)} placeholder="model-name" style={{fontSize:13,padding:"8px 10px",marginTop:6}}/>}
              </div>
              {(aiProvider==="custom"||aiProvider==="xai")&&(
                <div>
                  <label className="lbl">Base URL</label>
                  <input value={aiBaseUrl} onChange={e=>setAiBaseUrl(e.target.value)}
                    placeholder={aiProvider==="xai"?"https://api.x.ai/v1":"https://api.openai.com/v1 (default)"}
                    style={{fontSize:14,padding:"10px 12px"}}/>
                  <div className="dim2 xs mt4">Leave empty for OpenAI default endpoint.</div>
                </div>
              )}
            </div>
            <div className="row g8 mt16">
              <button className="btn btn-p btn-sm" onClick={saveAiConfig}>💾 Save</button>
              <button className="btn btn-g btn-sm" onClick={testAiConnection} disabled={aiTestLoading||!aiKey}>
                {aiTestLoading?"Testing…":"✨ Test Connection"}
              </button>
              {aiTestMsg&&<span className={aiTestMsg.startsWith("✓")?"dim ok":"err"}>{aiTestMsg}</span>}
            </div>
          </div>
          <div className="card">
            <div className="card-title">What AI Unlocks</div>
            <div className="col g10 sm dim2">
              <div>✨ <strong>Subject line generator</strong> — generate subject variations from your email body</div>
              <div>✏️ <strong>Email rewriter</strong> — rewrite HTML body to sound more natural</div>
              <div>🛡️ <strong>Spam score analysis</strong> — AI reviews content for spam signals before send</div>
              <div>🏷️ <strong>Tag autocomplete</strong> — AI suggests relevant tags for your template</div>
            </div>
            <Info type="w" style={{marginTop:12}}>API keys stored in browser localStorage only — never sent to the SynthTel server.</Info>
          </div>
        </div>
      )}

      {/* ─── ESP / API ACCOUNT CHECKER ─── */}
      {tTool==="espcheck" && (
        <div className="g2" style={{alignItems:"start"}}>
          <div className="card">
            <div className="card-title">🔌 ESP Account Checker</div>
            <Info type="i">Auto-detects your provider from the key format. Shows send limits, quota used, verified domains, and from-email addresses. Supports SendGrid, AWS SES, Mailgun, Postmark, Mailjet, Brevo, and SparkPost.</Info>
            <div className="col g12 mt16">
              <div>
                <label className="lbl">API Key</label>
                <input type="password" value={espKey} onChange={e=>setEspKey(e.target.value)}
                  placeholder="SG.xxx  /  AKIA...  /  key-...  /  server_..."
                  style={{fontSize:14,padding:"10px 12px",fontFamily:"var(--font-mono)"}}/>
                <div className="dim2 xs mt4">Provider is auto-detected from the key format.</div>
              </div>
              <div className="g2">
                <div>
                  <label className="lbl">Secret Key <span className="dim2 xs">(AWS SES / Mailjet only)</span></label>
                  <input type="password" value={espSecret} onChange={e=>setEspSecret(e.target.value)}
                    placeholder="AWS Secret or Mailjet Private Key"
                    style={{fontSize:14,padding:"10px 12px"}}/>
                </div>
                <div>
                  <label className="lbl">AWS Region <span className="dim2 xs">(SES only)</span></label>
                  <select value={espRegion} onChange={e=>setEspRegion(e.target.value)}
                    style={{fontSize:14,padding:"10px 12px",width:"100%",borderRadius:6,border:"1px solid var(--border)",background:"var(--inp)",color:"var(--text)"}}>
                    {["us-east-1","us-east-2","us-west-1","us-west-2","eu-west-1","eu-west-2","eu-central-1","ap-southeast-1","ap-northeast-1","ap-south-1","ca-central-1","sa-east-1"].map(r=>(
                      <option key={r} value={r}>{r}</option>
                    ))}
                  </select>
                </div>
              </div>
              <div>
                <label className="lbl">Domain <span className="dim2 xs">(Mailgun only — optional)</span></label>
                <input value={espDomain} onChange={e=>setEspDomain(e.target.value)}
                  placeholder="mg.yourdomain.com"
                  style={{fontSize:14,padding:"10px 12px"}}/>
              </div>
            </div>
            <div className="mt16">
              <button className="btn btn-p" onClick={runEspCheck} disabled={espLoading||!espKey.trim()}>
                {espLoading?"🔍 Checking…":"🔍 Check Account"}
              </button>
            </div>
          </div>

          <div className="card">
            <div className="card-title">Results</div>
            {!espResult?(
              <div className="dim2 sm" style={{padding:"20px 0",textAlign:"center"}}>Enter an API key and click Check Account.</div>
            ):espResult.error?(
              <Info type="e">{espResult.error}</Info>
            ):(()=>{
              const r=espResult;
              const pct = r.daily_limit&&r.sent_last_24h!=null ? Math.round(r.sent_last_24h/r.daily_limit*100) : null;
              const pctM = r.monthly_limit&&r.sent_this_month!=null ? Math.round(r.sent_this_month/r.monthly_limit*100) : null;
              // Derive can-send: account active + has quota remaining
              const isActive = (()=>{const s=(r.account_status||"").toLowerCase();return s.includes("active")||s.includes("enabled")||s.includes("healthy")||s==="ok";})();
              const hasQuota = r.remaining_today==null||r.remaining_today>0;
              const hasMonthQuota = r.remaining_this_month==null||r.remaining_this_month>0;
              const canSend = isActive && hasQuota && hasMonthQuota;
              return (
                <div className="col g16">
                  {/* Header with can-send indicator */}
                  <div className="row g12 ac-center" style={{flexWrap:"wrap"}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:16}}>{r.provider}</div>
                      <div className="dim2 xs">{r.plan&&r.plan!=="Unknown"?r.plan:""}</div>
                    </div>
                    <Bdg t={isActive?"ok":"e"}>{r.account_status||"Unknown"}</Bdg>
                    <Bdg t={canSend?"ok":"e"} style={{fontSize:13,padding:"4px 10px"}}>
                      {canSend?"✅ Can Send":"🚫 Cannot Send"}
                    </Bdg>
                  </div>

                  {/* Send limits */}
                  <div>
                    <div className="div-lbl mb8">SENDING LIMITS & QUOTA</div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:8}}>
                      {r.daily_limit!=null&&<div className="card" style={{background:"var(--inset)",padding:"10px 14px"}}>
                        <div className="dim2 xs">Daily Limit</div>
                        <div style={{fontWeight:700,fontSize:18}}>{r.daily_limit.toLocaleString()}</div>
                      </div>}
                      {r.sent_last_24h!=null&&<div className="card" style={{background:"var(--inset)",padding:"10px 14px"}}>
                        <div className="dim2 xs">Sent (24h)</div>
                        <div style={{fontWeight:700,fontSize:18,color:pct>80?"var(--err)":pct>50?"var(--warn)":"var(--ok)"}}>{r.sent_last_24h.toLocaleString()}</div>
                      </div>}
                      {r.remaining_today!=null&&<div className="card" style={{background:"var(--inset)",padding:"10px 14px"}}>
                        <div className="dim2 xs">Remaining Today</div>
                        <div style={{fontWeight:700,fontSize:18,color:"var(--ok)"}}>{r.remaining_today.toLocaleString()}</div>
                      </div>}
                      {r.monthly_limit!=null&&<div className="card" style={{background:"var(--inset)",padding:"10px 14px"}}>
                        <div className="dim2 xs">Monthly Limit</div>
                        <div style={{fontWeight:700,fontSize:18}}>{r.monthly_limit.toLocaleString()}</div>
                      </div>}
                      {r.sent_this_month!=null&&<div className="card" style={{background:"var(--inset)",padding:"10px 14px"}}>
                        <div className="dim2 xs">Sent This Month</div>
                        <div style={{fontWeight:700,fontSize:18,color:pctM>80?"var(--err)":pctM>50?"var(--warn)":"var(--ok)"}}>{r.sent_this_month.toLocaleString()}</div>
                      </div>}
                      {r.remaining_this_month!=null&&<div className="card" style={{background:"var(--inset)",padding:"10px 14px"}}>
                        <div className="dim2 xs">Remaining Month</div>
                        <div style={{fontWeight:700,fontSize:18,color:"var(--ok)"}}>{r.remaining_this_month.toLocaleString()}</div>
                      </div>}
                      {r.rate_limit!=null&&<div className="card" style={{background:"var(--inset)",padding:"10px 14px"}}>
                        <div className="dim2 xs">Rate Limit</div>
                        <div style={{fontWeight:700,fontSize:18}}>{r.rate_limit}/sec</div>
                      </div>}
                    </div>
                    {pct!=null&&(
                      <div className="mt8">
                        <div className="row jb xs dim mb4">
                          <span>24h usage</span>
                          <span style={{color:pct>80?"var(--err)":pct>50?"var(--warn)":"var(--ok)",fontWeight:600}}>{pct}%</span>
                        </div>
                        <div style={{height:6,borderRadius:3,background:"var(--bg3)",overflow:"hidden"}}>
                          <div style={{width:pct+"%",height:"100%",borderRadius:3,background:pct>80?"var(--err)":pct>50?"var(--warn)":"var(--ok)",transition:"width .4s"}}/>
                        </div>
                      </div>
                    )}
                  </div>

                  {/* Domains */}
                  {r.domains&&r.domains.length>0&&(
                    <div>
                      <div className="div-lbl mb8">VERIFIED DOMAINS ({r.domains.length})</div>
                      <div className="tw">
                        <table>
                          <thead><tr><th>Domain</th><th>Status</th><th>DKIM</th></tr></thead>
                          <tbody>
                            {r.domains.map((d,i)=>{
                              // verified can be bool (SendGrid) or string ("Success"/"Pending") (SES/others)
                              const verOk = d.verified===true||d.verified==="Success"||d.verified==="active";
                              const verPending = d.verified==="Pending"||d.state==="unverified";
                              const verLabel = d.verified===true?"Verified":d.verified===false?"Unverified":d.verified||d.state||"—";
                              // DKIM: bool or status string
                              const dkimOk = d.dkim_enabled===true||d.dkim_verified===true||d.dkim_status==="Success";
                              const dkimLabel = d.dkim_status||(d.dkim_enabled===true?"✓":d.dkim_enabled===false?"✗":"—");
                              return (
                                <tr key={i}>
                                  <td className="mono xs">{d.domain}</td>
                                  <td><Bdg t={verOk?"ok":verPending?"w":"n"}>{verLabel}</Bdg></td>
                                  <td><Bdg t={dkimOk?"ok":"n"}>{dkimLabel}</Bdg></td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  )}

                  {/* Verified from-emails */}
                  {r.verified_emails&&r.verified_emails.length>0&&(
                    <div>
                      <div className="div-lbl mb8">VERIFIED FROM-EMAILS ({r.verified_emails.length})</div>
                      <div className="col g4">
                        {r.verified_emails.map((e,i)=>(
                          <div key={i} className="pi" style={{padding:"6px 12px",gap:8}}>
                            <span style={{color:"var(--ok)"}}>✓</span>
                            <span className="mono xs">{e}</span>
                            <button className="btn btn-g btn-sm ml-auto" style={{padding:"2px 8px",flexShrink:0}}
                              onClick={()=>copyToClipboard(e)}>📋</button>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Extra info */}
                  {r.extra_info&&Object.keys(r.extra_info).length>0&&(
                    <div>
                      <div className="div-lbl mb8">ACCOUNT DETAILS</div>
                      <div className="col g6">
                        {Object.entries(r.extra_info).filter(([,v])=>v!=null&&v!=="").map(([k,v],i)=>(
                          <div key={i} className="row jb xs" style={{padding:"4px 0",borderBottom:"1px solid var(--border)"}}>
                            <span className="dim2">{k.replace(/_/g," ").replace(/\b\w/g,c=>c.toUpperCase())}</span>
                            <span style={{fontWeight:500}}>{String(v)}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Errors */}
                  {r.errors&&r.errors.length>0&&(
                    <Info type="w">{r.errors.join(" | ")}</Info>
                  )}

                  {/* Billing link */}
                  {(()=>{
                    const billingUrls={sendgrid:"https://app.sendgrid.com/settings/billing",mailgun:"https://app.mailgun.com/app/billing/overview",brevo:"https://app.brevo.com/account/billing",postmark:"https://account.postmarkapp.com/billing",sparkpost:"https://app.sparkpost.com/account/billing",ses:"https://console.aws.amazon.com/ses/home","aws ses":"https://console.aws.amazon.com/ses/home",mailjet:"https://app.mailjet.com/account/billing-and-offers",resend:"https://resend.com/settings/billing"};
                    const prov=(r.provider||"").toLowerCase();
                    const url=billingUrls[prov]||billingUrls[prov.split(" ")[0]];
                    return url?(
                      <a href={url} target="_blank" rel="noreferrer" className="btn btn-g btn-sm" style={{textDecoration:"none",display:"inline-flex",alignItems:"center",gap:6}}>
                        💳 Buy More Sends / Manage Billing ↗
                      </a>
                    ):null;
                  })()}

                  {/* Domain Management — SendGrid, Mailgun, Brevo only */}
                  {(()=>{
                    const espKeyLower=espKey.trim().toLowerCase();
                    const prov2=(r.provider||"").toLowerCase();
                    const supportsDomMgmt=espKeyLower.startsWith("sg.")||espKeyLower.startsWith("key-")||espKeyLower.startsWith("xkeysib-")||espKeyLower.startsWith("xsmtpsib-")||prov2.includes("ses")||prov2.includes("aws")||prov2.includes("postmark")||prov2.includes("sparkpost");
                    if(!supportsDomMgmt) return null;
                    return (
                      <div>
                        <div className="row ac-center jb mb8">
                          <div className="div-lbl" style={{margin:0}}>DOMAIN MANAGEMENT</div>
                          <button className="btn btn-g btn-xs" onClick={()=>{setEspDomMgmt(p=>!p);setEspDomResult(null);setEspVerifyResult(null);}}>
                            {espDomMgmt?"▲ Hide":"▼ Add / Verify Domain"}
                          </button>
                        </div>
                        {espDomMgmt&&(
                          <div className="col g10">
                            <div className="row g8">
                              <input value={espNewDomain} onChange={e=>setEspNewDomain(e.target.value)}
                                placeholder="yourdomain.com" style={{flex:1,fontSize:13,padding:"8px 12px"}}/>
                              <button className="btn btn-p btn-sm" disabled={espDomLoading||!espNewDomain.trim()} onClick={async()=>{
                                setEspDomLoading(true); setEspDomResult(null); setEspVerifyResult(null);
                                try{
                                  const r2=await apiCall("/api/tools/add-domain",{method:"POST",body:JSON.stringify({
                                    key:espKey.trim(), secret:espSecret||null,
                                    region:espRegion||"us-east-1", domain:espNewDomain.trim()
                                  })});
                                  setEspDomResult(await r2.json());
                                }catch(e){setEspDomResult({error:e.message});}
                                setEspDomLoading(false);
                              }}>{espDomLoading?"Adding…":"+ Add Domain"}</button>
                              <button className="btn btn-g btn-sm" disabled={espDomLoading||!espNewDomain.trim()} onClick={async()=>{
                                setEspDomLoading(true); setEspVerifyResult(null);
                                try{
                                  const r2=await apiCall("/api/tools/verify-domain",{method:"POST",body:JSON.stringify({
                                    key:espKey.trim(), secret:espSecret||null,
                                    region:espRegion||"us-east-1", domain:espNewDomain.trim(),
                                    domain_id:espDomResult?.domain_id||null
                                  })});
                                  setEspVerifyResult(await r2.json());
                                }catch(e){setEspVerifyResult({error:e.message});}
                                setEspDomLoading(false);
                              }}>{espDomLoading?"Checking…":"🔍 Verify"}</button>
                            </div>

                            {/* DNS Records to add */}
                            {espDomResult&&!espDomResult.error&&espDomResult.dns_records?.length>0&&(
                              <div style={{background:"#0f1f2a",border:"1px solid #1e4a6e",borderRadius:8,padding:"12px 14px"}}>
                                <div style={{color:"#60a5fa",fontWeight:700,fontSize:12,marginBottom:8}}>
                                  📋 Add these DNS records to <strong>{espDomResult.domain}</strong>:
                                </div>
                                <Info type="i" style={{marginBottom:8}}>{espDomResult.note||"Add these records then click Verify. DNS propagation can take up to 48h."}</Info>
                                <div className="tw">
                                  <table style={{fontSize:11}}>
                                    <thead><tr><th>Type</th><th>Host / Name</th><th>Value</th><th></th></tr></thead>
                                    <tbody>
                                      {espDomResult.dns_records.map((rec,i)=>(
                                        <tr key={i}>
                                          <td><Bdg t="a">{rec.type}</Bdg></td>
                                          <td className="mono" style={{maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{rec.host}</td>
                                          <td className="mono" style={{maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{rec.value}</td>
                                          <td><button className="btn btn-g btn-xs" onClick={()=>copyToClipboard(`${rec.host}\t${rec.value}`)}>📋</button></td>
                                        </tr>
                                      ))}
                                    </tbody>
                                  </table>
                                </div>
                              </div>
                            )}
                            {espDomResult?.error&&<Info type="e">{espDomResult.error}</Info>}

                            {/* Verify result */}
                            {espVerifyResult&&(
                              <div style={{
                                background:espVerifyResult.verified?"#0f2a1a":"#2a1a0f",
                                border:`1px solid ${espVerifyResult.verified?"#22c55e44":"#f59e0b44"}`,
                                borderRadius:8, padding:"12px 14px"
                              }}>
                                <div style={{fontWeight:700,fontSize:13,color:espVerifyResult.verified?"#4ade80":"#fbbf24",marginBottom:6}}>
                                  {espVerifyResult.message||"Verification result"}
                                </div>
                                {espVerifyResult.records?.length>0&&(
                                  <div className="col g4">
                                    {espVerifyResult.records.map((rec,i)=>(
                                      <div key={i} className="row g8 xs">
                                        <span style={{color:rec.valid?"#4ade80":"#f87171"}}>{rec.valid?"✓":"✗"}</span>
                                        <span className="dim2">{rec.label}</span>
                                        {rec.reason&&<span style={{color:"#9ca3af",fontFamily:"monospace",fontSize:10}}>{rec.reason.slice(0,80)}</span>}
                                      </div>
                                    ))}
                                  </div>
                                )}
                                {espVerifyResult.error&&<div style={{color:"#f87171",fontSize:12}}>{espVerifyResult.error}</div>}
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    );
                  })()}
                </div>
              );
            })()}
          </div>
        </div>
      )}

    </div>
  );
}

function TabAccount({username, role, doLogout}) {
  const [aTab, setATab] = useState(role==="superadmin"||role==="admin"||role==="moderator"?"admin":"security");
  const [users, setUsers]     = useState([]);
  const [newU, setNewU]       = useState({username:"",password:"",role:"user",expires_at:""});
  const [adminMsg, setAdminMsg] = useState("");
  const [userSearch, setUserSearch] = useState("");
  const [apiKeyModal, setApiKeyModal] = useState(null); // {key, expires, username}
  const [editExpiry, setEditExpiry] = useState({}); // {uid: date string}
  const [pwForm, setPwForm]   = useState({current:"",new_pw:"",confirm:""});
  const [pwMsg, setPwMsg]     = useState("");

  // Telegram state
  const [tgStatus, setTgStatus]   = useState({linked:false,tg_username:"",tg_2fa_enabled:false});
  const [tgLink, setTgLink]       = useState(null);
  const [tgLoading, setTgLoading] = useState(false);
  const [tgConfig, setTgConfig]   = useState({bot_token:"",enabled:true,notify_channel:""});
  const [tgSaving, setTgSaving]   = useState(false);

  // Support tickets state
  const [tickets, setTickets]   = useState([]);
  const [openTicket, setOpenTicket] = useState(null);
  const [ticketMsgs, setTicketMsgs] = useState([]);
  const [newTicket, setNewTicket] = useState({subject:"",body:"",priority:"normal"});
  const [replyBody, setReplyBody] = useState("");
  const [ticketTab, setTicketTab] = useState("list");
  const [ticketFilter, setTicketFilter] = useState("open");

  // Admin notifications
  const [notifUid, setNotifUid]   = useState("");
  const [notifMsg, setNotifMsg]   = useState("");
  const [notifSent, setNotifSent] = useState("");

  const isAdmin = role==="admin"||role==="superadmin"||role==="moderator";
  const isSuperAdmin = role==="superadmin"||role==="admin";

  useEffect(()=>{
    loadTgStatus();
    loadTickets();
    if(isAdmin){ loadUsers(); if(isSuperAdmin) loadTgConfig(); }
  },[]);

  async function loadTgStatus(){
    try{const r=await apiCall("/api/tg/status");if(r.ok){const d=await r.json();setTgStatus(d);}}catch(e){}
  }
  async function loadTgConfig(){
    try{const r=await apiCall("/api/tg/config");if(r.ok){const d=await r.json();setTgConfig({...d,bot_token:""});}}catch(e){}
  }
  async function loadUsers(){
    try{const r=await apiCall("/api/admin/users/all");if(r.ok){const d=await r.json();setUsers(d.users||[]);}}catch(e){}
  }
  async function loadTickets(){
    try{const r=await apiCall(`/api/tickets?status=${ticketFilter}`);if(r.ok){const d=await r.json();setTickets(d.tickets||[]);}}catch(e){}
  }
  async function loadTicketMsgs(tid){
    try{const r=await apiCall(`/api/ticket/${tid}`);if(r.ok){const d=await r.json();setOpenTicket(d.ticket);setTicketMsgs(d.messages||[]);}}catch(e){}
  }

  useEffect(()=>{ loadTickets(); },[ticketFilter]);

  async function createUser(){
    try{const r=await apiCall("/api/admin/users",{method:"POST",body:JSON.stringify(newU)});const d=await r.json();if(r.ok){setAdminMsg("✓ User created");setNewU({username:"",password:"",role:"user",expires_at:""});loadUsers();}else setAdminMsg("✗ "+(d.error||"Failed"));}catch(e){setAdminMsg("Error: "+e.message);}
  }
  async function toggleUser(id){await apiCall(`/api/admin/users/${id}/toggle`,{method:"POST"});loadUsers();}
  const [confirmDelete, setConfirmDelete] = useState(null);
  async function deleteUser(id){
    await apiCall(`/api/admin/users/${id}`,{method:"DELETE"});
    setConfirmDelete(null); loadUsers();
  }
  async function setUserRole(uid, newRole){
    await apiCall("/api/admin/set-role",{method:"POST",body:JSON.stringify({user_id:uid,role:newRole})});
    loadUsers();
  }
  async function generateApiKey(uid, days){
    const r=await apiCall("/api/admin/api-key",{method:"POST",body:JSON.stringify({user_id:uid,days})});
    const d=await r.json();
    if(d.api_key){
      const uname=(users.find(u=>u.id===uid)||{}).username||"user";
      setApiKeyModal({key:d.api_key,expires:(d.expires||"").split("T")[0]||"",username:uname});
    }
    loadUsers();
  }
  async function updateExpiry(uid, date){
    await apiCall(`/api/admin/users/${uid}/expiry`,{method:"POST",body:JSON.stringify({expires_at:date||null})});
    loadUsers();
  }
  async function revokeApiKey(uid){
    await apiCall("/api/admin/api-key",{method:"POST",body:JSON.stringify({user_id:uid,revoke:true})});
    loadUsers();
  }
  async function changePw(){
    if(pwForm.new_pw!==pwForm.confirm){setPwMsg("✗ Passwords don't match");return;}
    try{const r=await apiCall("/api/change-password",{method:"POST",body:JSON.stringify({current:pwForm.current,new:pwForm.new_pw})});const d=await r.json();if(r.ok){setPwMsg("✓ Password changed");setPwForm({current:"",new_pw:"",confirm:""});}else setPwMsg("✗ "+(d.error||"Failed"));}catch(e){setPwMsg("Error: "+e.message);}
  }
  async function genLinkCode(){
    setTgLoading(true);
    try{const r=await apiCall("/api/tg/link-code",{method:"POST"});const d=await r.json();setTgLink(d);}catch(e){}
    setTgLoading(false);
  }
  async function unlinkTg(){
    const ok=await showPopup({title:"Unlink Telegram",msg:"This will also disable 2FA. Are you sure?",ico:"⚠️",type:"confirm"});if(!ok)return;
    await apiCall("/api/tg/unlink",{method:"POST"});
    setTgStatus({linked:false,tg_username:"",tg_2fa_enabled:false});
    setTgLink(null);
  }
  async function toggle2fa(){
    const r=await apiCall("/api/tg/toggle-2fa",{method:"POST"});
    const d=await r.json();
    if(r.ok) setTgStatus(s=>({...s,tg_2fa_enabled:d.enabled}));
  }
  async function saveTgConfig(){
    setTgSaving(true);
    await apiCall("/api/tg/config",{method:"POST",body:JSON.stringify(tgConfig)});
    await loadTgConfig();
    setTgSaving(false);
  }
  async function submitTicket(){
    if(!newTicket.subject.trim()||!newTicket.body.trim())return;
    const r=await apiCall("/api/tickets",{method:"POST",body:JSON.stringify(newTicket)});
    if(r.ok){setNewTicket({subject:"",body:"",priority:"normal"});setTicketTab("list");loadTickets();}
  }
  async function sendReply(tid){
    if(!replyBody.trim())return;
    await apiCall(`/api/ticket/${tid}/reply`,{method:"POST",body:JSON.stringify({body:replyBody})});
    setReplyBody(""); loadTicketMsgs(tid); loadTickets();
  }
  async function closeTicket(tid){
    await apiCall(`/api/ticket/${tid}/close`,{method:"POST"});
    loadTicketMsgs(tid); loadTickets();
  }
  async function reopenTicket(tid){
    await apiCall(`/api/ticket/${tid}/reopen`,{method:"POST"});
    loadTicketMsgs(tid); loadTickets();
  }
  async function sendTgNotif(){
    if(!notifUid||!notifMsg.trim())return;
    const r=await apiCall("/api/admin/tg-notify",{method:"POST",body:JSON.stringify({user_id:parseInt(notifUid),message:notifMsg})});
    if(r.ok){setNotifSent("✓ Sent");setNotifMsg("");}else setNotifSent("✗ Failed");
  }

  const TABS = [
    ...(isAdmin?[{id:"admin",lbl:"👥 Users"},{id:"tickets",lbl:"🎫 Support"},
                 {id:"tg-admin",lbl:"🤖 Telegram Bot"}]:[]),
    {id:"security",lbl:"🔐 Security"},
    {id:"telegram",lbl:"📱 Telegram"},
    {id:"password",lbl:"🔑 Password"},
  ];

  const roleBadgeColor = r => r==="superadmin"?"p":r==="admin"?"a":r==="moderator"?"ok":"n";

  return (
    <div>
      <div className="ph"><div className="ph-title">👤 Account</div><div className="ph-sub">Account settings, security, and support</div></div>
      <div className="tab-bar mb20">
        {TABS.map(t=>(
          <button key={t.id} className={`tb ${aTab===t.id?"on":""}`} onClick={()=>setATab(t.id)}>{t.lbl}</button>
        ))}
      </div>

      {/* ─── ADMIN: USERS ─── */}
      {aTab==="admin" && isAdmin && (
        <div>
          {isSuperAdmin && (
            <div className="ib ib-w mb16">
              <span className="ib-ic">🛡</span>
              <span><strong>Super Admin Mode</strong> — Changes here affect all users. Handle with care.</span>
            </div>
          )}
          {/* Create user */}
          <div className="card mb16">
            <div className="card-title">Create User</div>
            <div className="g2 mb10">
              <div><label className="lbl">Username</label><input value={newU.username} onChange={e=>setNewU({...newU,username:e.target.value})} style={{fontSize:14,padding:"10px 12px"}}/></div>
              <div><label className="lbl">Password</label><input type="password" value={newU.password} onChange={e=>setNewU({...newU,password:e.target.value})} style={{fontSize:14,padding:"10px 12px"}}/></div>
              <div>
                <label className="lbl">Role</label>
                <select value={newU.role} onChange={e=>setNewU({...newU,role:e.target.value})} style={{fontSize:14,padding:"10px 12px"}}>
                  <option value="user">User</option>
                  <option value="moderator">Moderator</option>
                  <option value="admin">Admin</option>
                  {role==="superadmin"&&<option value="superadmin">Super Admin</option>}
                </select>
              </div>
              <div><label className="lbl">Expires (optional)</label><input type="date" value={newU.expires_at} onChange={e=>setNewU({...newU,expires_at:e.target.value})} style={{fontSize:14,padding:"10px 12px"}}/></div>
            </div>
            <div className="row g8">
              <button className="btn btn-p btn-sm" onClick={createUser}>+ Create User</button>
              {adminMsg && <div className={`ib ${adminMsg.startsWith("✓")?"ib-ok":"ib-e"}`}><span className="ib-ic">{adminMsg.startsWith("✓")?"✓":"✗"}</span><span>{adminMsg}</span></div>}
            </div>
          </div>

          {/* User table */}
          {/* Admin Stats bar */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:16}}>
            <div className="stat"><div className="stat-v">{users.length}</div><div className="stat-l">Total Users</div></div>
            <div className="stat cg"><div className="stat-v">{users.filter(u=>u.active).length}</div><div className="stat-l">Active</div></div>
            <div className="stat ce"><div className="stat-v">{users.filter(u=>!u.active).length}</div><div className="stat-l">Suspended</div></div>
            <div className="stat ca"><div className="stat-v">{users.filter(u=>u.tg_linked).length}</div><div className="stat-l">TG Linked</div></div>
          </div>

          {/* API Key Modal */}
          {apiKeyModal && (
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9000}} onClick={()=>setApiKeyModal(null)}>
              <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"var(--radius)",padding:28,width:460,maxWidth:"90vw",boxShadow:"var(--shadow-md)"}} onClick={e=>e.stopPropagation()}>
                <div className="card-title mb8">🔑 API Key Generated</div>
                <Info type="w">Save this key now — it will NOT be shown again.</Info>
                <div className="mt12 mb8"><label className="lbl">Key for @{apiKeyModal.username} — expires {apiKeyModal.expires}</label></div>
                <div style={{background:"var(--inset)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",padding:"12px 14px",fontFamily:"var(--font-mono)",fontSize:13,wordBreak:"break-all",color:"var(--accent)"}}>{apiKeyModal.key}</div>
                <div className="row g8 mt12">
                  <button className="btn btn-p f1" onClick={()=>copyToClipboard(apiKeyModal.key)} >📋 Copy Key</button>
                  <button className="btn btn-g" onClick={()=>setApiKeyModal(null)}>Close</button>
                </div>
              </div>
            </div>
          )}

          <div className="card">
            <div className="row jb ac-center mb12">
              <div className="card-title" style={{marginBottom:0}}>Users ({users.length})</div>
              <div className="row g8">
                <input value={userSearch} onChange={e=>setUserSearch(e.target.value)} placeholder="Search users…" style={{width:190,padding:"6px 10px",fontSize:12}}/>
                <button className="btn btn-g btn-sm" onClick={loadUsers}>↻ Refresh</button>
              </div>
            </div>
            <div className="tw" style={{overflowX:"auto"}}>
              <table>
                <thead><tr><th>Username</th><th>Role</th><th>Status</th><th>TG</th><th>API Key</th><th>Expires</th><th>Last Login</th><th>Actions</th></tr></thead>
                <tbody>
                  {users.filter(u=>!userSearch||u.username.toLowerCase().includes(userSearch.toLowerCase())).map(u=>(
                    <tr key={u.id}>
                      <td className="bold">{u.username}</td>
                      <td>
                        {isSuperAdmin
                          ? <select value={u.role} onChange={e=>setUserRole(u.id,e.target.value)}
                              style={{fontSize:12,padding:"4px 8px",background:"var(--inp)",border:"1px solid var(--border)",borderRadius:6,color:"var(--text)",cursor:"pointer"}}>
                              <option value="user">user</option>
                              <option value="moderator">moderator</option>
                              <option value="admin">admin</option>
                              <option value="superadmin">superadmin</option>
                            </select>
                          : <Bdg t={roleBadgeColor(u.role)}>{u.role}</Bdg>
                        }
                      </td>
                      <td><Bdg t={u.active?"ok":"e"}>{u.active?"Active":"Inactive"}</Bdg></td>
                      <td>{u.tg_linked?<span title={u.tg_username}>✅</span>:<span className="dim2">—</span>}</td>
                      <td>
                        {u.has_api_key
                          ? <div className="row g4"><Bdg t="ok">Active</Bdg><button className="btn btn-d btn-xs" onClick={()=>revokeApiKey(u.id)}>Revoke</button></div>
                          : <div className="row g4">
                              <button className="btn btn-g btn-xs" onClick={()=>generateApiKey(u.id,30)}>30d</button>
                              <button className="btn btn-g btn-xs" onClick={()=>generateApiKey(u.id,90)}>90d</button>
                            </div>
                        }
                      </td>
                      <td>
                        {isSuperAdmin
                          ? <input type="date" value={editExpiry[u.id]!==undefined?editExpiry[u.id]:(u.expires_at?u.expires_at.split("T")[0]:"")}
                              onChange={e=>setEditExpiry(p=>({...p,[u.id]:e.target.value}))}
                              onBlur={e=>{ if(editExpiry[u.id]!==undefined) updateExpiry(u.id, editExpiry[u.id]); }}
                              style={{fontSize:11,padding:"3px 6px",width:118}}/>
                          : <span className="dim2 xs">{u.expires_at?u.expires_at.split("T")[0]:"Never"}</span>
                        }
                      </td>
                      <td className="dim2 xs" title={u.last_login||"Never"}>{u.last_login?u.last_login.split("T").join(" ").split(".")[0]:"—"}</td>
                      <td>
                        <div className="row g4">
                          <button className="btn btn-g btn-xs" onClick={()=>toggleUser(u.id)}>{u.active?"Suspend":"Activate"}</button>
                          {isSuperAdmin&&<button className="btn btn-g btn-xs" onClick={()=>{
                            const pw=window.prompt(`Reset password for ${u.username}:\nEnter new password (min 8 chars):`);
                            if(pw&&pw.length>=8) apiCall(`/api/admin/users/${u.id}/password`,{method:"POST",body:JSON.stringify({password:pw})}).then(r=>r.ok?setAdminMsg("✓ Password reset for "+u.username):setAdminMsg("✗ Reset failed"));
                            else if(pw) setAdminMsg("✗ Password too short (min 8 chars)");
                          }}>Reset PW</button>}
                          {u.username!==username&&(
                            confirmDelete===u.id
                              ? <span className="row g4">
                                  <button className="btn btn-d btn-xs" onClick={()=>deleteUser(u.id)}>Confirm</button>
                                  <button className="btn btn-g btn-xs" onClick={()=>setConfirmDelete(null)}>Cancel</button>
                                </span>
                              : <button className="btn btn-d btn-xs" onClick={()=>setConfirmDelete(u.id)}>Delete</button>
                          )}
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {/* Send TG notification to user */}
          {isSuperAdmin && (
            <div className="card mt16">
              <div className="card-title">Send Telegram Notification</div>
              <div className="g2 mb10">
                <div>
                  <label className="lbl">User</label>
                  <select value={notifUid} onChange={e=>setNotifUid(e.target.value)} style={{fontSize:14,padding:"10px 12px"}}>
                    <option value="">Select user...</option>
                    {users.filter(u=>u.tg_linked).map(u=><option key={u.id} value={u.id}>{u.username}</option>)}
                  </select>
                </div>
                <div><label className="lbl">Message</label><input value={notifMsg} onChange={e=>setNotifMsg(e.target.value)} placeholder="Your message..." style={{fontSize:14,padding:"10px 12px"}}/></div>
              </div>
              <div className="row g8">
                <button className="btn btn-p btn-sm" onClick={sendTgNotif} disabled={!notifUid||!notifMsg.trim()}>📤 Send</button>
                {notifSent&&<div className={`ib ${notifSent.startsWith("✓")?"ib-ok":"ib-e"}`}><span className="ib-ic">{notifSent.startsWith("✓")?"✓":"✗"}</span><span>{notifSent}</span></div>}
              </div>
            </div>
          )}
        </div>
      )}

      {/* ─── SUPPORT TICKETS ─── */}
      {aTab==="tickets" && (
        <div>
          <div className="tab-bar mb16">
            <button className={`tb ${ticketTab==="list"?"on":""}`} onClick={()=>setTicketTab("list")}>All Tickets</button>
            <button className={`tb ${ticketTab==="new"?"on":""}`} onClick={()=>setTicketTab("new")}>+ New Ticket</button>
          </div>

          {ticketTab==="new" && (
            <div className="g2" style={{alignItems:"start"}}>
              <div className="card">
                <div className="card-title">Open Support Ticket</div>
                <div className="col g12">
                  <div><label className="lbl">Subject</label><input value={newTicket.subject} onChange={e=>setNewTicket({...newTicket,subject:e.target.value})} placeholder="Brief summary of your issue" style={{fontSize:14,padding:"10px 12px"}}/></div>
                  <div>
                    <label className="lbl">Priority</label>
                    <select value={newTicket.priority} onChange={e=>setNewTicket({...newTicket,priority:e.target.value})} style={{fontSize:14,padding:"10px 12px"}}>
                      <option value="low">Low</option>
                      <option value="normal">Normal</option>
                      <option value="high">High</option>
                      <option value="urgent">Urgent</option>
                    </select>
                  </div>
                  <div><label className="lbl">Description</label><textarea value={newTicket.body} onChange={e=>setNewTicket({...newTicket,body:e.target.value})} placeholder="Describe your issue in detail..." style={{minHeight:140}}/></div>
                </div>
                <button className="btn btn-p btn-sm mt12" onClick={submitTicket} disabled={!newTicket.subject.trim()||!newTicket.body.trim()}>Submit Ticket</button>
              </div>
              <div className="card">
                <div className="card-title">Tips</div>
                <div className="col g10 sm dim2">
                  <div>📋 Be specific — include error messages and steps to reproduce</div>
                  <div>🔐 Never share passwords in tickets</div>
                  <div>📱 Connect Telegram to get reply notifications instantly</div>
                  <div>⚡ Urgent tickets get priority attention from the admin team</div>
                </div>
              </div>
            </div>
          )}

          {ticketTab==="list" && !openTicket && (
            <div>
              {isAdmin && (
                <div className="row g8 mb12">
                  {["open","closed","all"].map(f=>(
                    <button key={f} className={`btn btn-sm ${ticketFilter===f?"btn-p":"btn-g"}`} onClick={()=>setTicketFilter(f)}>{f.charAt(0).toUpperCase()+f.slice(1)}</button>
                  ))}
                </div>
              )}
              {tickets.length===0
                ? <div className="card"><Info type="i">No tickets found.</Info></div>
                : <div className="card">
                    <div className="tw">
                      <table>
                        <thead><tr><th>#</th><th>Subject</th>{isAdmin&&<th>User</th>}<th>Priority</th><th>Status</th><th>Messages</th><th>Updated</th><th></th></tr></thead>
                        <tbody>
                          {tickets.map(t=>(
                            <tr key={t.id}>
                              <td className="dim2 xs">#{t.id}</td>
                              <td className="bold">{t.subject}</td>
                              {isAdmin&&<td className="dim2">{t.username}</td>}
                              <td><Bdg t={t.priority==="urgent"?"e":t.priority==="high"?"p":t.priority==="normal"?"a":"n"}>{t.priority}</Bdg></td>
                              <td><Bdg t={t.status==="open"?"ok":"n"}>{t.status}</Bdg></td>
                              <td className="dim2">{t.msg_count}</td>
                              <td className="dim2 xs">{(t.updated_at||"").split("T")[0]}</td>
                              <td><button className="btn btn-g btn-xs" onClick={()=>{loadTicketMsgs(t.id);setTicketTab("view");}}>View →</button></td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
              }
            </div>
          )}

          {ticketTab==="view" && openTicket && (
            <div>
              <button className="btn btn-g btn-sm mb12" onClick={()=>{setOpenTicket(null);setTicketTab("list");loadTickets();}}>← Back to Tickets</button>
              <div className="g2" style={{alignItems:"start"}}>
                <div className="card" style={{flex:2}}>
                  <div className="row jb ac-center mb16">
                    <div>
                      <div className="card-title" style={{marginBottom:4}}>#{openTicket.id} {openTicket.subject}</div>
                      <div className="row g8"><Bdg t={openTicket.status==="open"?"ok":"n"}>{openTicket.status}</Bdg><Bdg t={openTicket.priority==="urgent"?"e":"n"}>{openTicket.priority}</Bdg></div>
                    </div>
                    <div className="row g6">
                      {openTicket.status==="open"
                        ? <button className="btn btn-g btn-sm" onClick={()=>closeTicket(openTicket.id)}>✓ Close</button>
                        : <button className="btn btn-g btn-sm" onClick={()=>reopenTicket(openTicket.id)}>↺ Reopen</button>
                      }
                    </div>
                  </div>
                  <div className="col g12" style={{maxHeight:400,overflowY:"auto",paddingRight:8}}>
                    {ticketMsgs.map(m=>(
                      <div key={m.id} className={`ticket-msg ${m.is_admin?"admin-msg":"user-msg"}`}>
                        <div className="row jb ac-center mb8">
                          <div className="row g8">
                            <strong>{m.sender_name}</strong>
                            {m.is_admin&&<Bdg t="p">Admin</Bdg>}
                          </div>
                          <span className="dim2 xs">{(m.created_at||"").split("T").join(" ").split(".")[0]}</span>
                        </div>
                        <div style={{whiteSpace:"pre-wrap",fontSize:14,lineHeight:1.6}}>{m.body}</div>
                      </div>
                    ))}
                  </div>
                  {openTicket.status==="open" && (
                    <div className="mt16">
                      <label className="lbl">Reply</label>
                      <textarea value={replyBody} onChange={e=>setReplyBody(e.target.value)} placeholder="Write your reply..." style={{minHeight:100}}/>
                      <button className="btn btn-p btn-sm mt8" onClick={()=>sendReply(openTicket.id)} disabled={!replyBody.trim()}>Send Reply</button>
                    </div>
                  )}
                </div>
                <div className="card" style={{flex:1}}>
                  <div className="card-title">Ticket Info</div>
                  <div className="col g10 sm">
                    {isAdmin&&<div><span className="dim2">User: </span><strong>{openTicket.username}</strong></div>}
                    <div><span className="dim2">Status: </span><Bdg t={openTicket.status==="open"?"ok":"n"}>{openTicket.status}</Bdg></div>
                    <div><span className="dim2">Priority: </span><strong>{openTicket.priority}</strong></div>
                    <div><span className="dim2">Created: </span>{(openTicket.created_at||"").split("T")[0]}</div>
                    <div><span className="dim2">Messages: </span>{ticketMsgs.length}</div>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ─── TELEGRAM BOT CONFIG (super admin) ─── */}
      {aTab==="tg-admin" && isSuperAdmin && (
        <div className="g2" style={{alignItems:"start"}}>
          <div className="card">
            <div className="card-title">🤖 Telegram Bot Setup</div>
            <Info type="i">Create a bot via @BotFather on Telegram, copy the token, and paste it here. The bot handles 2FA, login alerts, and admin commands.</Info>
            <div className="col g12 mt12">
              <div>
