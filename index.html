        <div className="stat cg">
          <div className="stat-v" style={{transition:"all .3s"}}>{stats.sent.toLocaleString()}</div>
          <div className="stat-l">Sent</div>
          <div className="stat-s">{successPct}% success</div>
        </div>
        <div className="stat ce">
          <div className="stat-v" style={{transition:"all .3s"}}>{stats.failed.toLocaleString()}</div>
          <div className="stat-l">Failed</div>
          {stats.failed>0 && <div className="stat-s" style={{color:"var(--err)"}}>{stats.total>0?Math.round(stats.failed/stats.total*100):0}% fail rate</div>}
        </div>
        <div className="stat ca">
          <div className="stat-v" style={{transition:"all .3s"}}>{stats.pending.toLocaleString()}</div>
          <div className="stat-l">Pending</div>
          {running && stats.total>0 && <div className="stat-s">{pct}% done</div>}
        </div>
      </div>

      {/* ── Controls + progress ── */}
      <div className="card mb16">
        <div className="row ac-center jb mb12">
          <div className="row ac-center g10">
            <span className={`dot ${running&&!paused?"dot-run":paused?"dot-pau":"dot-idle"}`}/>
            <span className="bold">{running&&!paused?"Sending…":paused?"Paused":"Idle"}</span>
            <span className="dim sm">{name}</span>
          </div>
          <div className="row g8">
            {!running ? (
              <button className="btn btn-p btn-lg" onClick={startCampaign}>▶ Start Campaign</button>
            ) : (
              <>
                {!paused
                  ? <button className="btn btn-w btn-sm" onClick={pauseCampaign}>⏸ Pause</button>
                  : <button className="btn btn-ok btn-sm" onClick={resumeCampaign}>▶ Resume</button>
                }
                <button className="btn btn-d btn-sm" onClick={stopCampaign}>⏹ Stop</button>
              </>
            )}
          </div>
        </div>
        <div className="mb8">
          <div className="row jb sm dim mb4">
            <span>Progress {running && stats.total>0 ? `— ${stats.sent+stats.failed} / ${stats.total}` : ""}</span>
            <span style={{fontWeight:700,fontSize:13,color:pct===100?"var(--ok)":pct>0?"var(--primary)":"var(--t3)"}}>{pct}%</span>
          </div>
          <div style={{height:18,borderRadius:6,overflow:"hidden",background:"var(--bg3)",position:"relative"}}>
            <div style={{
              width:pct+"%", height:"100%",
              borderRadius:6,
              background: pct===100
                ? "var(--ok)"
                : pct>66 ? "linear-gradient(90deg,#3b82f6,#06b6d4)"
                : pct>33 ? "linear-gradient(90deg,#3b82f6,#8b5cf6)"
                : "var(--primary)",
              transition:"width .5s ease",
              position:"relative",
            }} className={running&&pct<100&&pct>0?"prog-active":""}>
            </div>
            {pct>8&&(
              <span style={{
                position:"absolute",left:"50%",top:"50%",
                transform:"translate(-50%,-50%)",
                fontSize:10,fontWeight:700,color:"#fff",
                textShadow:"0 1px 3px rgba(0,0,0,.6)",pointerEvents:"none",
                whiteSpace:"nowrap",
              }}>{stats.sent+stats.failed} / {stats.total}</span>
            )}
          </div>
          {running && stats.total>0 && (
            <div className="row jb xs dim mt4">
              <span style={{color:"var(--ok)"}}>✓ {stats.sent.toLocaleString()} sent</span>
              <span style={{color:"var(--err)"}}>✗ {stats.failed.toLocaleString()} failed</span>
              <span>{stats.total-(stats.sent+stats.failed)} left</span>
            </div>
          )}
        </div>
        <div className="row g16 sm mt4">
          <span className="c-ok" style={{fontWeight:stats.sent>0?600:400}}>✓ {stats.sent.toLocaleString()} delivered</span>
          <span className="c-e"  style={{fontWeight:stats.failed>0?600:400}}>✗ {stats.failed.toLocaleString()} failed</span>
          <span className="dim">{stats.pending.toLocaleString()} pending</span>
        </div>
      </div>

      {/* ── Campaign settings ── */}
      <div className="card mb16">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div className="card-title" style={{margin:0}}>⚙ Campaign Settings</div>
          <button className="btn btn-g btn-sm" onClick={newCampaign} title="Clear leads, body and subject — keeps SMTP/senders">
            ✨ New Campaign
          </button>
        </div>
        <div className="g2 mb16">
          <div>
            <label className="lbl">Campaign Name</label>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="Campaign #1"/>
          </div>
          <div>
            <label className="lbl">Active Send Method</label>
            <div style={{padding:"10px 14px",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",fontSize:13,display:"flex",alignItems:"center",gap:8}}>
              {activeMethod==="smtp"&&<>📨 SMTP Relay</>}
              {activeMethod==="api"&&<>🔌 API / ESP</>}
              {activeMethod==="owa"&&<>📮 OWA / Exchange</>}
              {activeMethod==="crm"&&<>🗄️ CRM Integration</>}
              {activeMethod==="tunnel"&&<>🔑 SSH Tunnel</>}
              {activeMethod==="b2b"&&<>🔒 B2B Inbox</>}
              {activeMethod==="isp"&&<>🌐 ISP Proxy SMTP</>}
              <button className="btn btn-g btn-xs" onClick={()=>setTab("method")} style={{marginLeft:"auto"}}>Change →</button>
            </div>
          </div>
        </div>

        {/* Deliverability toggle */}
        <div className="row ac-center jb mb12">
          <span className="sh-t">DELIVERABILITY & SENDING</span>
          <button
            onClick={()=>setShowDeliv(!showDeliv)}
            style={{
              padding:"6px 16px",fontSize:12,fontWeight:600,cursor:"pointer",
              border:"2px solid var(--accent)",borderRadius:6,
              background:showDeliv?"var(--accent)":"transparent",
              color:showDeliv?"#fff":"var(--accent)",
              display:"flex",alignItems:"center",gap:6,
            }}>
            {showDeliv?"▲ Hide Settings":"▼ Show All Settings"}
          </button>
        </div>

        {showDeliv && (
          <div>
            {/* Sending behaviour */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
              <div>
                <label className="lbl"><span title="Sets X-Priority, Importance, and X-MSMail-Priority headers. High = red ! icon in Outlook. Low = ↓ arrow. Normal = no icon.">Email Urgency</span></label>
                <div style={{display:"flex",gap:4,height:42}}>
                  {[["low","⬇","Low","5","Low"],["normal","—","Normal","3","Normal"],["high","❗","High","1","High"]].map(([val,icon,lbl])=>(
                    <button key={val} onClick={()=>setPriority(val)} style={{
                      flex:1,border:"1px solid",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:600,
                      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",lineHeight:1.2,
                      borderColor: priority===val ? (val==="high"?"#ef4444":val==="low"?"#6366f1":"#22c55e") : "var(--brd)",
                      background: priority===val ? (val==="high"?"#450a0a":val==="low"?"#1e1b4b":"#052e16") : "var(--inp)",
                      color: priority===val ? (val==="high"?"#fca5a5":val==="low"?"#a5b4fc":"#86efac") : "var(--dim)",
                    }}>
                      <span style={{fontSize:16}}>{icon}</span>
                      <span style={{fontSize:10}}>{lbl}</span>
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <label className="lbl">Batch Size</label>
                <input type="number" value={batchSize} onChange={e=>setBatchSize(e.target.value)} min="1" max="1000" style={{fontSize:15,padding:"10px 12px"}}/>
              </div>
              <div>
                <label className="lbl"><span title="Pause after every N emails regardless of batch">Cooldown Every</span></label>
                <input type="number" value={cooldownEvery} onChange={e=>setCooldownEvery(e.target.value)} min="0" placeholder="0=off" style={{fontSize:15,padding:"10px 12px"}}/>
              </div>
              <div>
                <label className="lbl">Cooldown (secs)</label>
                <input type="number" value={cooldownSecs} onChange={e=>setCooldownSecs(e.target.value)} min="1" style={{fontSize:15,padding:"10px 12px"}}/>
              </div>
              <div>
                <label className="lbl"><span title="Extra pause between batches (0 = use delay)">Batch Pause (secs)</span></label>
                <input type="number" value={batchPauseSecs} onChange={e=>setBatchPauseSecs(e.target.value)} min="0" placeholder="0=use delay" style={{fontSize:15,padding:"10px 12px"}}/>
              </div>
              <div>
                <label className="lbl"><span title="Run N sends in parallel (ISP/tunnel mode). Higher = faster but more aggressive. Recommended: 3-8 for ISP.">Concurrent Sends</span></label>
                <input type="number" value={concurrent} onChange={e=>setConcurrent(e.target.value)} min="1" max="20" style={{fontSize:15,padding:"10px 12px"}}/>
              </div>
              <div>
                <label className="lbl">Delay</label>
                <input type="number" value={delay} onChange={e=>setDelay(e.target.value)} min="0" style={{fontSize:15,padding:"10px 12px"}}/>
              </div>
              <div>
                <label className="lbl">Unit</label>
                <select value={delayUnit} onChange={e=>setDelayUnit(e.target.value)} style={{fontSize:14,padding:"10px 12px"}}>
                  <option value="ms">ms</option><option value="sec">Sec</option><option value="min">Min</option>
                </select>
              </div>
            </div>

            <div className="col g12 mb16">
              <div className="row ac-center g12">
                <Tog checked={jitter} onChange={setJitter} label={<Tip text="Adds ±N seconds of random variance to each send delay. Instead of sending every 2s exactly, it sends every 1–5s randomly — making the sending pattern look human and avoiding rate-limit triggers.">Random delay jitter</Tip>} />
                {jitter && (
                  <div className="row ac-center g8">
                    <input type="number" value={jitterSec} onChange={e=>setJitterSec(e.target.value)} min="1" max="60" style={{width:70,fontSize:15,padding:"10px 12px"}}/>
                    <span className="dim xs">± seconds</span>
                  </div>
                )}
              </div>
              <Tog checked={domThrottle} onChange={setDomThrottle}
                label={<Tip text="Gmail, Yahoo, Hotmail and Outlook have the strictest rate limits. Enabling this adds extra delay per message when sending to those domains. Microsoft domains (Hotmail/Outlook/O365) get 8s delay; Gmail/Yahoo get 5s. Dramatically reduces rate-limit and blacklist risk.">Domain throttling</Tip>}
                desc="Extra per-message delay for Gmail (+5s), Hotmail/Outlook (+8s) — reduces rate-limit risk" />
              <Tog checked={warmup} onChange={setWarmup}
                label={<Tip text="New IPs must warm up gradually. Day 1: 50 emails, Day 2: 100, Day 3: 200… Sending 10,000 emails on day 1 = instant blacklist. This mode auto-limits your daily volume by warmup stage.">IP Warmup mode</Tip>}
                desc="Auto-limit volume for new IPs — prevents blacklisting" />
              <Tog checked={rateLimitPause} onChange={setRateLimitPause}
                label={<Tip text="When a receiving server rate-limits you (421/452/too many), pause and retry after a cooldown. ON = pause 15–45s then retry (better deliverability). OFF = log as failed and move on (faster, but loses rate-limited emails).">Rate limit auto-pause</Tip>}
                desc="Pause and retry when throttled — turn OFF to skip and move on instead" />
              <div>
                <Tog checked={bccEnabled} onChange={setBccEnabled}
                  label={<Tip text="Silently BCC a copy of every email to your own address. Useful for monitoring live sends, verifying rendering, and auditing what recipients receive.">Personal BCC (monitoring copy)</Tip>}
                  desc="Invisible BCC to your address on every send — for monitoring only"/>
                {bccEnabled && (
                  <div className="mt10">
                    <label className="lbl">BCC Address</label>
                    <input value={bccEmail} onChange={e=>setBccEmail(e.target.value)}
                      placeholder="you@yourdomain.com"
                      style={{fontSize:14,padding:"10px 12px",maxWidth:360}}/>
                  </div>
                )}
              </div>
            </div>

            <div className="div-lbl">REQUIRED HEADERS (GMAIL/YAHOO 2024+ RULES)</div>
            <Info type="w">Gmail and Yahoo require these for bulk senders (5000+ emails/day). Without them, emails go to spam or get rejected.</Info>
            <div className="col g12 mt12">
              <div>
                <Tog checked={listUnsub} onChange={setListUnsub}
                  label={<Tip text="Adds the 'Unsubscribe' button in Gmail/Yahoo inboxes. This is the #1 deliverability signal for bulk email. Tags work in the URL — use #EMAIL for the recipient's email.">List-Unsubscribe header</Tip>}/>
                {listUnsub && (
                  <div className="g2 mt10" style={{gap:10}}>
                    <div>
                      <label className="lbl">Unsubscribe Email</label>
                      <input value={unsubEmail} onChange={e=>setUnsubEmail(e.target.value)} placeholder="unsubscribe@yourdomain.com" style={{fontSize:14,padding:"10px 12px"}}/>
                    </div>
                    <div>
                      <label className="lbl">Unsubscribe URL <Tip text="Use #EMAIL here to personalise. Example: https://yourdomain.com/unsub?e=#EMAIL — the tag is replaced with the recipient's encoded email."/></label>
                      <input value={unsubUrl} onChange={e=>setUnsubUrl(e.target.value)} placeholder="https://yourdomain.com/unsub?e=#EMAIL" style={{fontSize:14,padding:"10px 12px"}}/>
                    </div>
                  </div>
                )}
              </div>
              <Tog checked={oneClick} onChange={setOneClick}
                label={<Tip text="Required since June 2024 for 5000+/day senders. Adds the 'List-Unsubscribe-Post: List-Unsubscribe=One-Click' header. Gmail will reject bulk emails without this.">One-Click Unsubscribe (RFC 8058)</Tip>}
                desc="Required for bulk senders since June 2024"/>
              <Tog checked={autoInject} onChange={setAutoInject}
                label="Auto-inject unsubscribe link in body"
                desc='Appends small "Unsubscribe | Manage preferences" link at bottom of HTML'/>
              <Tog checked={autoPlain} onChange={setAutoPlain}
                label="Auto-generate plain-text version"
                desc="Strips HTML to create multipart/alternative — improves inbox placement"/>
              <Tog checked={spamFilter} onChange={setSpamFilter}
                label="🧹 Spam Word Filter"
                desc='Automatically replaces common spam trigger words (e.g. "Security Warning" → "Account Notice") to improve inbox placement'/>
              <Tog checked={bypassMode} onChange={v=>{setBypassMode(v); if(v) setSpamFilter(true);}}
                label={<Tip text="Enables multi-layer content bypass engine. Activates automatically when Spam Word Filter is on. Layers: zero-font noise injection, HTML comment injection between words, invisible zero-width chars in subject, unique CSS/pixel fingerprint per email. Optionally adds homoglyph Unicode lookalike chars and font randomisation.">🔓 Advanced Bypass Mode</Tip>}
                desc="Zero-font + comment injection + invisible subject chars + unique fingerprint per email"/>
              {bypassMode && <div className="col g8 mt4 ml16" style={{borderLeft:"2px solid var(--bdr)",paddingLeft:12}}>
                <Tog checked={bypassZeroFont} onChange={setBypassZeroFont}
                  label="Zero-Font Noise"
                  desc="Inject invisible <u> words between real words — dilutes spam word density"/>
                <Tog checked={bypassComments} onChange={setBypassComments}
                  label="HTML Comment Injection"
                  desc="Insert <!-- --> comments between words — breaks keyword exact-match scanning"/>
                <Tog checked={bypassInnat} onChange={setBypassInnat}
                  label="Invisible Subject Chars"
                  desc="Insert zero-width Unicode chars in subject — breaks hash-based campaign fingerprinting"/>
                <Tog checked={bypassHomoglyphs} onChange={setBypassHomoglyphs}
                  label={<Tip text="Replaces characters in spam trigger words with visually identical Unicode lookalikes (Cyrillic а instead of Latin a etc). Breaks exact-match ASCII keyword filters. Use sparingly — some clients may render differently.">Homoglyph Encoding</Tip>}
                  desc="Replace Latin chars in spam words with Unicode lookalikes (Cyrillic/Greek)"/>
                <Tog checked={bypassFontRand} onChange={setBypassFontRand}
                  label="Font Randomisation"
                  desc="Wrap each word in a random font-family span — breaks ML text recognition models"/>
              </div>}
            </div>

            <div className="div-lbl" style={{marginTop:8}}>ANTI-DETECTION &amp; DELIVERY</div>
            <div className="col g12 mt12">
              <Tog checked={antiDetect} onChange={setAntiDetect}
                label={<Tip text="Enables full anti-fingerprinting suite: randomised MIME boundaries, per-recipient uniqueness tokens, jittered timestamps, and enhanced Exchange/SpamAssassin trust headers. Matches behaviour of real MUAs (Outlook 16.x). Recommended: always on.">🛡️ Anti-Detection Mode</Tip>}
                desc="Randomise MIME fingerprint, inject trust headers — matches real Outlook behaviour"/>
              <Tog checked={threadSimulate} onChange={setThreadSimulate}
                label={<Tip text="Adds In-Reply-To and References headers pointing to a plausible prior message. Spam filters treat replies as conversation threads and score them far more leniently than cold outbound. One of the highest-impact single inboxing tricks.">🧵 Thread Simulation</Tip>}
                desc="Fake In-Reply-To/References headers — filters treat email as a thread reply, not cold outbound"/>
              <Tog checked={arcSimulate} onChange={setArcSimulate}
                label={<Tip text="Injects ARC-Authentication-Results, ARC-Message-Signature, and ARC-Seal headers claiming the message passed SPF/DKIM/DMARC at mx.google.com. ARC is a chain of trust headers used by forwarded mail. Disable if your SMTP provider adds real ARC headers.">⛓️ ARC Chain Simulation</Tip>}
                desc="Fake ARC headers claiming SPF/DKIM/DMARC pass from Google infrastructure"/>
              <Tog checked={msExchangeHdrs} onChange={setMsExchangeHdrs}
                label={<Tip text="Injects X-MS-Exchange-Organization-SCL:-1 (spam confidence level = trusted), BCL:0, and PCL:2. Exchange and Office 365 servers read these to bypass their own junk filters. High impact for Outlook/Hotmail/O365 recipients.">🏢 MS Exchange Trust Headers</Tip>}
                desc="SCL:-1 + BCL:0 — tells Exchange/O365 to bypass junk filter for this message"/>
              <Tog checked={autoFlagEmail} onChange={setAutoFlagEmail}
                label={<Tip text="Adds X-Priority: 1 + Importance: High + X-MSMail-Priority: High headers, which cause Outlook/Hotmail to display a red flag icon next to the email in inbox. Increases open rates and makes emails stand out in crowded inboxes.">🚩 Auto-Flag Emails (red flag icon)</Tip>}
                desc="Sets high priority headers — Outlook shows red flag icon in inbox"/>
              <Tog checked={hideFromEmail} onChange={setHideFromEmail}
                label={<Tip text="Injects zero-width Unicode characters into the From display name. Visually invisible but breaks exact-match filters that check for known sender strings. Use with caution — aggressive filters may still detect the encoding.">👁️ Hide From Email (zero-width chars)</Tip>}
                desc="Inject invisible Unicode chars into From name — bypasses simple string filters"/>
              <Tog checked={skipPreflightDns} onChange={setSkipPreflightDns}
                label={<Tip text="Skips the DNS/MX check that runs before the campaign and removes senders with no MX records. Enable this if your domains are valid but failing DNS resolution (e.g. new domains, split-horizon DNS, or network issues during preflight).">⚡ Skip Preflight DNS Check</Tip>}
                desc="Send even if sender domains fail MX resolution — use if domains are valid but failing preflight"/>
            </div>
          </div>
        )}
      </div>

      {/* ── Log ── */}
      <div className="card" style={{minHeight:280,flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div className="row ac-center jb mb12" style={{flexShrink:0}}>
          <div className="row ac-center g8" style={{flexWrap:"wrap",minWidth:0}}>
            <div className="card-title" style={{marginBottom:0}}>📋 Send Log</div>
            <div className="tab-bar" style={{marginBottom:0,borderBottom:"none"}}>
              {[["live","Live"],["sent",`Sent (${sentEntries.length})`],["failed",`Failed (${failedEntries.length})`],["history","History"]].map(([k,l])=>(
                <button key={k} className={`tb ${histTab===k?"on":""}`} onClick={()=>setHistTab(k)}>{l}</button>
              ))}
            </div>
          </div>
          <button className="btn btn-g btn-xs" onClick={clearHistory}>Clear</button>
        </div>

        {histTab==="live" && (
          <div style={{position:"relative",flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
            <div className="flog" ref={logRef} onScroll={handleScroll} style={{flex:1,height:"auto",maxHeight:"none"}}>
              {!log.length && <div className="dim2 sm" style={{padding:"6px 0"}}>No activity yet — start a campaign to see live logs</div>}
              {log.map((e,i)=>(
                <div key={i} className="flog-e">
                  <span className="flog-ts">{e.ts}</span>
                  <span style={{flexShrink:0}}>{e.type==="ok"?"✓":e.type==="err"?"✗":e.type==="warn"?"⚠":"·"}</span>
                  <span className={`flog-${e.type==="ok"?"ok":e.type==="err"?"err":e.type==="warn"?"wrn":"inf"}`}>{e.msg}</span>
                </div>
              ))}
            </div>
            {running && (
              <div style={{position:"absolute",bottom:8,right:8}}>
                <button className="btn btn-g btn-xs" onClick={()=>{userScrolled.current=false;scrollToBottom();}}>
                  ↓ Latest
                </button>
              </div>
            )}
          </div>
        )}

        {histTab==="sent" && (
          <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
            {!sentEntries.length && <div className="dim2 sm" style={{padding:"6px 0"}}>No sent emails yet</div>}
            {sentEntries.length>0 && (
              <div className="tw" style={{fontSize:12,flex:1,maxHeight:"none"}}>
                <table>
                  <thead style={{position:"sticky",top:0,background:"var(--bg3)",zIndex:1}}><tr><th>Time</th><th>To</th><th>From</th><th>Sent Via</th></tr></thead>
                  <tbody>
                    {sentEntries.map((e,i)=>{
                      // Infer icon from via string
                      const v = e.via||"";
                      const vIcon = v.match(/amazonaws|smtp|relay/i) ? "📨"
                                  : v.match(/sendgrid|mailgun|sparkpost|postmark|ses|api/i) ? "🔌"
                                  : v.match(/tunnel|rdp|isp|socks/i) ? "🔑"
                                  : v.match(/owa|exchange|outlook/i) ? "📮"
                                  : v.match(/crm|hubspot|salesforce/i) ? "🗄️"
                                  : "📡";
                      return (
                        <tr key={i}>
                          <td className="dim2" style={{whiteSpace:"nowrap"}}>{e.ts}</td>
                          <td style={{fontFamily:"var(--font-mono)",color:"var(--ok)"}}>{e.email||e.msg}</td>
                          <td style={{fontFamily:"var(--font-mono)",color:"var(--t2)"}}>{e.from||"—"}</td>
                          <td style={{fontFamily:"var(--font-mono)",color:"var(--t3)",fontSize:11}}>{v ? `${vIcon} ${v}` : "—"}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}

        {histTab==="failed" && (
          <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
            <div className="flog mb8" style={{flex:1,height:"auto",maxHeight:"none"}}>
              {!failedEntries.length && <div className="dim2 sm" style={{padding:"6px 0"}}>No failures</div>}
              {failedEntries.map((e,i)=>(
                <div key={i} className="flog-e">
                  <span className="flog-ts">{e.ts}</span>
                  <span className="flog-err">✗</span>
                  <span className="flog-err">{e.msg}</span>
                </div>
              ))}
            </div>
            {failedEntries.length>0 && (
              <button className="btn btn-w btn-sm" onClick={()=>{
                const emails = failedEntries.map(e=>e.email).filter(Boolean).join("\n");
                setLeadsRaw(emails); setLeads(parseLeads(emails)); setTab("leads");
              }}>↺ Retry {failedEntries.length} failed emails</button>
            )}
          </div>
        )}

        {histTab==="history" && (
          <div style={{flex:1,minHeight:0,display:"flex",flexDirection:"column"}}>
            {!history.length && <div className="dim2 sm">No previous campaigns yet — runs will appear here once complete.</div>}
            {history.length>0 && (
              <div className="tw" style={{flex:1,maxHeight:"none"}}>
                <table>
                  <thead style={{position:"sticky",top:0,background:"var(--bg3)",zIndex:1}}><tr><th>Name</th><th>Method</th><th>Status</th><th>Sent</th><th>Failed</th><th>Total</th><th>Rate</th><th>Started</th><th>Duration</th></tr></thead>
                  <tbody>
                    {history.map(c=>{
                      const rate = c.total>0 ? Math.round((c.sent/c.total)*100) : 0;
                      const dur = (c.started_at && c.finished_at)
                        ? (() => { const s=Math.round((new Date(c.finished_at)-new Date(c.started_at))/1000); return s<60?`${s}s`:`${Math.floor(s/60)}m ${s%60}s`; })()
                        : "—";
                      const mIcon = {smtp:"📨",api:"🔌",owa:"📮",crm:"🗄️",tunnel:"🔑",isp:"🌐"}[c.method]||"📡";
                      return (
                        <tr key={c.id}>
                          <td>{c.name}</td>
                          <td style={{whiteSpace:"nowrap"}}>{mIcon} {c.method||"smtp"}</td>
                          <td><Bdg t={c.status==="running"?"a":c.status==="done"?"ok":"e"}>{c.status}</Bdg></td>
                          <td className="c-ok">{c.sent}</td>
                          <td className="c-e">{c.failed}</td>
                          <td>{c.total}</td>
                          <td style={{color:rate>80?"var(--ok)":rate>50?"var(--warn)":"var(--err)"}}>{rate}%</td>
                          <td className="dim2 xs">{fmtTime(c.started_at)}</td>
                          <td className="dim2 xs">{dur}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   TAB: COMPOSE
════════════════════════════════════════ */
function TabCompose({
  subject, setSubject, extraSubjects, setExtraSubjects,
  htmlBody, setHtmlBody, plainBody, setPlainBody,
  autoPlain, filesList, sendersRaw,
  linkRot = [], setLinkRot, linkRotDraft = "", setLinkRotDraft, linkRotMode = "sequential", setLinkRotMode,
  spamFilter = false, setSpamFilter,
  htmlBodies = [], setHtmlBodies, htmlRotateMode = "random", setHtmlRotateMode,
  preheader = "", setPreheader,
}) {
  const isMobile = useIsMobile();
  const [subTab, setSubTab] = React.useState("editor");
  const [splitView, setSplitView] = React.useState(false);
  // Preview state
  const [prevEmail,   setPrevEmail]   = React.useState("");
  const [prevName,    setPrevName]    = React.useState("John Smith");
  const [prevCompany, setPrevCompany] = React.useState("Acme Corp");
  const [prevMode,    setPrevMode]    = React.useState("html");

  // Random sample data for preview without entering email
  const SAMPLE_EMAILS = ["james.wilson@techcorp.com","sarah.johnson@globalmed.io","michael.chen@ventures.co","emily.davis@finstart.com","robert.kim@cloudtech.net"];
  const SAMPLE_NAMES  = ["James Wilson","Sarah Johnson","Michael Chen","Emily Davis","Robert Kim"];
  const SAMPLE_COS    = ["TechCorp","GlobalMed","Chen Ventures","FinStart","CloudTech"];
  const [sampleIdx, setSampleIdx] = React.useState(0);

  const autoEmail   = prevEmail || SAMPLE_EMAILS[sampleIdx];
  const autoName    = prevName  !== "John Smith" ? prevName  : SAMPLE_NAMES[sampleIdx];
  const autoCompany = prevCompany !== "Acme Corp" ? prevCompany : SAMPLE_COS[sampleIdx];

  // Tag modal
  const [showTagModal, setShowTagModal] = React.useState(false);
  const [activeRef,    setActiveRef]    = React.useState(null);
  // Refs for insert-at-cursor
  const subjectRef  = React.useRef(null);
  const bodyRef     = React.useRef(null);
  const plainRef    = React.useRef(null);

  // Insert tag at cursor in a controlled React textarea/input
  const insertAtCursor = (ref, setter, tag) => {
    const el = ref.current;
    if (!el) return;
    const start = el.selectionStart ?? el.value.length;
    const end   = el.selectionEnd   ?? el.value.length;
    const before = el.value.slice(0, start);
    const after  = el.value.slice(end);
    setter(before + tag + after);
    requestAnimationFrame(() => {
      el.focus();
      el.setSelectionRange(start + tag.length, start + tag.length);
    });
  };

  // Open tag modal targeting a specific field
  const openTagModal = (ref) => {
    setActiveRef(ref);
    setShowTagModal(true);
  };

  // Build preview with lead data (auto-fills if no email entered)
  const sampleLead = { company: autoCompany };
  const senderEmail = ((sendersRaw||"").split("\n")[0]||"").trim() || "";
  // Resolve tags in sender/subject too so preview shows actual values
  const resolvedSenderEmail = resolveTags(senderEmail, autoEmail, senderEmail, subject, autoName, 1, sampleLead);
  // Inject linkRot into sampleLead so #LINK resolves in preview
  const sampleLeadWithLinks = {...sampleLead, _links: linkRot, _linkMode: linkRotMode};
  const previewHtml    = resolveTags(htmlBody,  autoEmail, resolvedSenderEmail, subject, autoName, 1, sampleLeadWithLinks);
  const previewSubject = resolveTags(subject,   autoEmail, resolvedSenderEmail, subject, autoName, 1, sampleLeadWithLinks);

  // Compact tag toolbar — all sections
  const [tagBarSearch, setTagBarSearch] = React.useState("");
  const [tagBarSec, setTagBarSec]       = React.useState(0); // index into TAG_SECTIONS
  const tagBarSection = TAG_SECTIONS[tagBarSec];
  const tagBarFiltered = tagBarSearch.trim()
    ? TAG_SECTIONS.flatMap(s=>s.tags).filter(t =>
        t.tag.toLowerCase().includes(tagBarSearch.toLowerCase()) ||
        t.desc.toLowerCase().includes(tagBarSearch.toLowerCase()))
    : tagBarSection.tags;

  const tagBarInsert = (tag) => {
    const ref = activeRef || bodyRef;
    const setter = (activeRef === subjectRef) ? setSubject
                 : (activeRef === plainRef)   ? setPlainBody
                 : setHtmlBody;
    insertAtCursor(ref, setter, tag);
  };

  return (
    <div>
      <div className="ph">
        <div className="ph-title">✉️ Compose</div>
        <div className="ph-sub">Write your email with 117+ personalisation tags</div>
      </div>

      <div className="tab-bar" style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",gap:4}}>
          {[["editor","✏ Editor"],["preview","👁 Preview"],["checklist","✅ Checklist"]].map(([k,l])=>(
            <button key={k} className={`tb ${subTab===k?"on":""}`} onClick={()=>{setSubTab(k);if(k!=="editor")setSplitView(false);}}>{l}</button>
          ))}
        </div>
        {subTab==="editor" && (
          <button className={`btn btn-sm ${splitView?"btn-p":"btn-g"}`} style={{marginLeft:"auto",height:30,fontSize:11}} onClick={()=>setSplitView(v=>!v)}>
            {splitView ? "⬜ Single View" : "⬛ Split View"}
          </button>
        )}
      </div>

      {/* EDITOR (split or normal) */}
      {subTab==="editor" && (
      <div style={splitView && !isMobile ? {display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,alignItems:"start"} : {}}>
        {/* LEFT/ONLY: editor content */}
        <div>
          {/* Subject - supports multiple for rotation */}
          <div className="card mb16">
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <label className="lbl" style={{margin:0}}>Subject Line{extraSubjects.split("\n").filter(s=>s.trim()).length>0?" (rotating)":""}</label>
              <span className="dim2 xs">Separate multiple with new lines — rotates per recipient</span>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input ref={subjectRef} value={subject} onChange={e=>setSubject(e.target.value)}
                onFocus={()=>setActiveRef(subjectRef)}
                placeholder="Your subject with #FIRSTNAME personalisation…"
                style={{fontSize:15,padding:"11px 14px",flex:1}}/>
              <button className="btn btn-g btn-sm" style={{whiteSpace:"nowrap"}} onClick={()=>openTagModal(subjectRef)}>
                🏷 Tags
              </button>
            </div>
            {/* Quick chips for subject */}
            <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:8}}>
              {["#FIRSTNAME","#REALNAME","#COMPANY","#DOMAIN","#DATE","#FROMNAME","#SUBJECT"].map(tag=>(
                <span key={tag} className="tag-chip" onClick={()=>insertAtCursor(subjectRef,setSubject,tag)}
                  title="Click to insert into subject">{tag}</span>
              ))}
            </div>
            {/* Extra subjects for rotation */}
            <div style={{marginTop:10,borderTop:"1px solid var(--border)",paddingTop:10}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                <span className="dim2 xs">➕ Additional subjects (one per line, rotated randomly)</span>
                {extraSubjects.split("\n").filter(s=>s.trim()).length > 0 && (
                  <span className="bdg bdg-ok">{extraSubjects.split("\n").filter(s=>s.trim()).length+1} subjects total</span>
                )}
              </div>
              <textarea value={extraSubjects} onChange={e=>setExtraSubjects(e.target.value)}
                placeholder={"Re: Quick question about #COMPANY\nFollowing up on your #DOMAIN account…"}
                style={{minHeight:70,fontSize:13,fontFamily:"var(--font-mono)",resize:"vertical"}}/>
            </div>
          </div>

          {/* Compact tag toolbar */}
          <div className="card mb16" style={{padding:"12px 14px"}}>
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10,flexWrap:"wrap"}}>
              <span style={{fontWeight:600,fontSize:13}}>🏷 Tags</span>
              <input value={tagBarSearch} onChange={e=>setTagBarSearch(e.target.value)}
                placeholder="Search tags…"
                style={{flex:1,minWidth:140,fontSize:12,padding:"5px 10px",borderRadius:6,border:"1px solid var(--border)",background:"var(--bg2)",color:"var(--t1)"}}/>
              <button className="btn btn-p btn-sm" onClick={()=>openTagModal(activeRef||bodyRef)}>
                📂 All {TAG_SECTIONS.reduce((n,s)=>n+s.tags.length,0)} Tags
              </button>
            </div>
            {/* Section tabs */}
            {!tagBarSearch.trim() && (
              <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>
                {TAG_SECTIONS.map((s,i)=>(
                  <button key={s.label} onClick={()=>setTagBarSec(i)}
                    style={{fontSize:10,padding:"3px 8px",borderRadius:12,border:"1px solid var(--border)",
                      background:tagBarSec===i?"var(--accent)":"var(--bg3)",
                      color:tagBarSec===i?"#fff":"var(--t2)",cursor:"pointer",whiteSpace:"nowrap"}}>
                    {s.label.split(" ")[0]} ({s.tags.length})
                  </button>
                ))}
              </div>
            )}
            {/* Tag chips */}
            <div style={{display:"flex",flexWrap:"wrap",gap:5,maxHeight:120,overflowY:"auto"}}>
              {tagBarFiltered.map(t=>(
                <span key={t.tag} title={t.desc + "\n▶ Click to insert into active field"}
                  onClick={()=>tagBarInsert(t.tag)}
                  style={{
                    display:"inline-block",padding:"3px 9px",borderRadius:20,fontSize:11,
                    background:"var(--bg3)",border:"1px solid var(--border)",
                    color:"var(--accent)",cursor:"pointer",fontFamily:"var(--font-mono)",
                    transition:"all .15s"
                  }}
                  onMouseEnter={e=>{e.target.style.background="var(--aglow)";e.target.style.borderColor="var(--accent)";}}
                  onMouseLeave={e=>{e.target.style.background="var(--bg3)";e.target.style.borderColor="var(--border)";}}>
                  {t.tag}
                </span>
              ))}
              {tagBarFiltered.length===0 && <span style={{color:"var(--t3)",fontSize:12}}>No tags match</span>}
            </div>
            <div style={{fontSize:11,color:"var(--t3)",marginTop:8}}>
              Click tag → inserts at cursor · Active field: <strong>{
                activeRef===subjectRef?"Subject" : activeRef===plainRef?"Plain Text" : "HTML Body"
              }</strong>
            </div>
          </div>

          {/* Preheader */}
          <div className="card mb16">
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
              <label className="lbl" style={{margin:0}}>
                <Tip text="The preheader is the short preview text shown in the inbox list after the subject line. Injected as a hidden span at the top of the HTML body. Filling this prevents the email client from pulling the first line of your body content as preview — giving you control over what recipients see before opening. Supports #FIRSTNAME and other tags.">
                  📬 Preheader <span style={{fontWeight:400,color:"var(--t3)",fontSize:11}}>(inbox preview text)</span>

              <span className="dim2 xs">shown after subject in inbox list</span>
            </div>
            <input
              value={preheader}
              onChange={e=>setPreheader(e.target.value)}
              placeholder="Hi #FIRSTNAME, here's what you need to know…"
              style={{fontSize:14,padding:"10px 12px",width:"100%",boxSizing:"border-box"}}
              maxLength={200}
            />
            {preheader.length>0 && (
              <div style={{fontSize:11,color:"var(--t3)",marginTop:4}}>
                {preheader.length}/200 chars — {preheader.length<40?"too short (aim for 90–140)":preheader.length>160?"may be truncated":("✓ good length")}
              </div>
            )}
          </div>

          {/* HTML Body */}
          <div className="card mb16">
            <div className="row jb ac-center mb10">
              <label className="lbl" style={{marginBottom:0}}>HTML Body</label>
              <button className="btn btn-g btn-sm" onClick={()=>openTagModal(bodyRef)}>🏷 Insert Tag</button>
            </div>
            <textarea ref={bodyRef} value={htmlBody} onChange={e=>setHtmlBody(e.target.value)}
              onFocus={()=>setActiveRef(bodyRef)}
              placeholder={"<html>…your email HTML here…</html>\n\nUse #FIRSTNAME, #EMAIL, #COMPANY, #INVOICE_NUM etc."}
              style={{minHeight:260,fontFamily:"var(--font-mono)",fontSize:12,lineHeight:1.6}}/>
          </div>

          {/* Plain text */}
          <div className="card mb16">
            <div className="row jb ac-center mb8">
              <label className="lbl" style={{marginBottom:0}}>Plain Text</label>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                {autoPlain && <span className="bdg bdg-a">Auto-generated</span>}
                <button className="btn btn-g btn-sm" onClick={()=>openTagModal(plainRef)}>🏷 Tags</button>
              </div>
            </div>
            <textarea ref={plainRef} value={plainBody} onChange={e=>setPlainBody(e.target.value)}
              onFocus={()=>setActiveRef(plainRef)}
              placeholder="Plain text version — leave blank to auto-generate from HTML."
              style={{minHeight:100,fontFamily:"var(--font-mono)",fontSize:12}}/>
          </div>

          {/* Attachments */}
          <div className="card mb16">
            <div className="card-title">📎 Select Attachments</div>
            <div className="dim sm mb12">Choose from your uploaded attachments. Upload files first in the <strong>Attachments</strong> tab.</div>
            {filesList.filter(f=>f.category==="attachments").length===0 ? (
              <div className="ib ib-i"><span className="ib-ic">ℹ</span><span>No attachments uploaded yet. Go to the <strong>Attachments</strong> tab to upload files.</span></div>
            ) : (
              <div className="col g8">
                {filesList.filter(f=>f.category==="attachments").map(file=>(
                  <div key={file.id} className="row ac-center g10 card card-sm">
                    <input type="checkbox" style={{width:"auto",flexShrink:0}}/>
                    <span className="sm f1">{file.display_name||file.name}</span>
                    <span className="bdg bdg-n">{(file.mime||"").split("/")[1]||"file"}</span>
                    <span className="dim2 xs">{fmtBytes(file.size)}</span>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Link rotation */}
          <div className="card" style={{borderLeft:"3px solid var(--primary)"}}>
            <div className="row ac-center jb mb12">
              <div className="row ac-center g8">
                <span style={{fontSize:16}}>🔗</span>
                <div>
                  <div style={{fontWeight:600,fontSize:14}}>Link Rotation</div>
                  <div style={{fontSize:11,color:"var(--dim)"}}>Use <code style={{background:"var(--bg3)",padding:"1px 4px",borderRadius:3}}>#LINK</code> in your template — replaced per-send</div>
                </div>
              </div>
              <div className="row ac-center g6">
                {linkRot.length>0
                  ? <span className="bdg bdg-ok" style={{fontSize:11}}>✓ {linkRot.length} active</span>
                  : linkRotDraft.trim() && <span className="bdg" style={{background:"#f59e0b20",color:"#f59e0b",border:"1px solid #f59e0b",fontSize:11}}>⚠ Not applied</span>
                }
              </div>
            </div>

            <div className="row ac-center g10 mb10">
              <label className="lbl" style={{margin:0,whiteSpace:"nowrap"}}>Mode:</label>
              <select value={linkRotMode} onChange={e=>setLinkRotMode(e.target.value)} style={{fontSize:13,padding:"6px 10px",flex:1}}>
                <option value="sequential">Sequential — A, B, C, A, B, C…</option>
                <option value="random">Random — different link per email</option>
              </select>
            </div>

            <div style={{border:"1px solid var(--bdr)",borderRadius:6,overflow:"hidden"}}>
              <div style={{padding:"6px 12px",background:"var(--bg2)",fontSize:11,fontWeight:600,color:"var(--dim)",borderBottom:"1px solid var(--bdr)",display:"flex",justifyContent:"space-between"}}>
                <span>URLS — ONE PER LINE</span>
                {linkRotDraft.trim() && <span>{linkRotDraft.split("\n").filter(l=>l.trim()).length} URL{linkRotDraft.split("\n").filter(l=>l.trim()).length!==1?"s":""}</span>}
              </div>
              <textarea value={linkRotDraft} onChange={e=>setLinkRotDraft(e.target.value)}
                placeholder={"https://track.example.com/click?id=abc123\nhttps://track.example.com/click?id=xyz789"}
                style={{width:"100%",minHeight:90,padding:"10px 12px",border:"none",background:"var(--inp)",color:"var(--tx)",fontSize:12,fontFamily:"var(--font-mono)",boxSizing:"border-box",resize:"vertical"}}/>
            </div>

            {linkRot.length>0 && (
              <div style={{marginTop:8,padding:"8px 12px",background:"var(--bg2)",borderRadius:6,border:"1px solid var(--bdr)"}}>
                <div style={{fontSize:11,fontWeight:600,color:"var(--dim)",marginBottom:4}}>ACTIVE LINKS</div>
                {linkRot.map((url,i)=>(
                  <div key={i} style={{fontSize:11,fontFamily:"var(--font-mono)",color:"var(--ok)",padding:"2px 0",display:"flex",alignItems:"center",gap:6}}>
                    <span style={{color:"var(--dim)",minWidth:16}}>{i+1}.</span>
                    <span style={{wordBreak:"break-all"}}>{url}</span>
                  </div>
                ))}
              </div>
            )}

            <div className="row g8 mt10 ac-center">
              <button className="btn btn-p btn-sm" onClick={()=>setLinkRot(linkRotDraft.split("\n").map(s=>s.trim()).filter(Boolean))}>
                ✓ Apply Links
              </button>
              {linkRot.length>0 && <button className="btn btn-d btn-sm" onClick={()=>{setLinkRot([]);setLinkRotDraft("");}}>✕ Clear</button>}
            </div>
          </div>
        </div>

        {/* ── Multi-Letter Rotation ── */}
        <div className="card mt12">
          <div className="card-title row ac-center jb">
            <span>📨 Multiple Letters (A/B/C Rotation)</span>
            <span className="bdg" style={{background:"var(--bg2)",fontSize:11}}>{htmlBodies.length} letter{htmlBodies.length!==1?"s":""} + main</span>
          </div>
          <div style={{fontSize:12,color:"var(--dim)",marginBottom:10}}>
            Add extra HTML letters to rotate alongside the main letter above. The main letter always counts as Letter 1.
          </div>
          <div className="row ac-center g8 mb10">
            <label className="lbl" style={{margin:0}}>Rotation mode:</label>
            <select value={htmlRotateMode} onChange={e=>setHtmlRotateMode(e.target.value)} style={{fontSize:13,padding:"6px 10px"}}>
              <option value="random">Random per recipient</option>
              <option value="sequential">Sequential (A→B→C→...)</option>
              <option value="split">Split test (even split)</option>
            </select>
          </div>
          {htmlBodies.map((b,idx)=>(
            <div key={idx} style={{marginBottom:8,border:"1px solid var(--bdr)",borderRadius:6,overflow:"hidden"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 10px",background:"var(--bg2)",fontSize:12}}>
                <span style={{fontWeight:600}}>Letter {idx+2}</span>
                <button className="btn btn-d btn-sm" style={{fontSize:11,padding:"2px 8px"}} onClick={()=>setHtmlBodies(htmlBodies.filter((_,i)=>i!==idx))}>✕ Remove</button>
              </div>
              <textarea value={b} onChange={e=>setHtmlBodies(htmlBodies.map((x,i)=>i===idx?e.target.value:x))}
                rows={6} style={{width:"100%",padding:"8px 10px",border:"none",borderTop:"1px solid var(--bdr)",background:"var(--inp)",color:"var(--tx)",fontSize:12,fontFamily:"monospace",boxSizing:"border-box",resize:"vertical"}}
                placeholder="Paste HTML for this letter variant..."/>
            </div>
          ))}
          <button className="btn btn-g btn-sm mt8" onClick={()=>setHtmlBodies([...htmlBodies,""])}>+ Add Letter</button>
        </div>
        {/* RIGHT PANEL: live preview (split view only) */}
        {splitView && (
          <div style={{position:"sticky",top:16}}>
            <div className="card" style={{padding:"12px 14px"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <span style={{fontWeight:600,fontSize:13}}>👁 Live Preview</span>
                <div style={{display:"flex",gap:4}}>
                  {[["html","HTML"],["plain","Plain"],["source","Source"]].map(([k,l])=>(
                    <button key={k} className={`tb ${prevMode===k?"on":""}`} style={{fontSize:11,padding:"3px 8px"}} onClick={()=>setPrevMode(k)}>{l}</button>
                  ))}
                </div>
              </div>
              <div style={{fontSize:11,color:"var(--t3)",marginBottom:8,padding:"6px 10px",background:"var(--bg3)",borderRadius:6}}>
                <strong style={{color:"var(--t2)"}}>To:</strong> {autoEmail} &nbsp;
                <strong style={{color:"var(--t2)"}}>Subj:</strong> {previewSubject||subject||"(no subject)"}
              </div>
              {prevMode==="html" && (
                <div style={{background:"#fff",borderRadius:6,overflow:"hidden",minHeight:400,border:"1px solid var(--border)"}}>
                  {htmlBody
                    ? <iframe srcDoc={previewHtml} style={{width:"100%",minHeight:400,border:"none"}} sandbox="allow-same-origin"/>
                    : <div style={{padding:30,color:"#aaa",textAlign:"center",fontSize:13}}>Write HTML body on the left to preview</div>}
                </div>

              {prevMode==="plain" && (
                <div className="code" style={{minHeight:200,whiteSpace:"pre-wrap",fontSize:12}}>
                  {resolveTags(plainBody||htmlBody.replace(/<[^>]+>/g,""), autoEmail, resolvedSenderEmail, subject, autoName, 1, sampleLead)||"(empty)"}

              {prevMode==="source" && (
                <div className="code" style={{minHeight:200,fontSize:11}}>{htmlBody||"(no HTML)"}</div>

      )}

      {subTab==="preview" && (
        <div className="card">

          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,flexWrap:"wrap"}}>

            <button className="btn btn-g btn-xs" onClick={()=>setSampleIdx(i=>(i+1)%SAMPLE_EMAILS.length)}>🔀 Shuffle Sample</button>
            <span className="bdg bdg-n xs">{autoName} · {autoEmail}</span>

              <input value={prevName==="John Smith"?"":prevName} onChange={e=>setPrevName(e.target.value||"John Smith")}

          <div className="tab-bar" style={{marginBottom:12}}>

      )}

            {ok:htmlBody.trim().length>0,               lbl:"HTML body not empty"},
            {ok:!/FREE|CLICK HERE|WINNER/i.test(subject), lbl:"Subject has no common spam words"},
            {ok:!htmlBody.includes("http://"),           lbl:"No plain HTTP links (use HTTPS)"},
            {ok:autoPlain||plainBody.trim().length>0,   lbl:"Plain-text version present"},
            {ok:htmlBody.includes("#FIRSTNAME")||htmlBody.includes("#REALNAME")||subject.includes("#FIRSTNAME"), lbl:"Has personalisation tag"},
          ].map((item,i)=>(
            <div key={i} className={`row ac-center g10 mb10 sm ${item.ok?"c-ok":"c-e"}`}>

          ))}
        </div>
      )}

      {showTagModal && (
        <TagModal
          targetRef={activeRef||bodyRef}
          onClose={()=>setShowTagModal(false)}
          onInsert={(tag)=>{
            const ref = activeRef || bodyRef;
            const setter = (activeRef===subjectRef)?setSubject:(activeRef===plainRef)?setPlainBody:setHtmlBody;
            insertAtCursor(ref, setter, tag);
          }}
        />
      )}
    </div>
  );
}

                      </tbody>
                    </table></div>
                  </div>);
                })()
            }
          </div>
        )}
      </div>
    </div>
  );
}

function SesCredGen({onApply, initialRegion}) {
  const [ak, setAk] = React.useState("");
  const [sk, setSk] = React.useState("");
  const [region, setRegion] = React.useState(initialRegion||"us-east-1");
  const [result, setResult] = React.useState(null);
  const [loading, setLoading] = React.useState(false);

  // Sync region if preset changes
  React.useEffect(()=>{ if(initialRegion) setRegion(initialRegion); }, [initialRegion]);

  // Pure JS SHA-256 + HMAC — works on HTTP (no crypto.subtle needed)
  const generate = async function() {
    if (!ak || !sk) { showToast("err","Missing","Enter both Access Key and Secret Key"); return; }
    setLoading(true); setResult(null);

      // SHA-256 pure JS implementation

        let h=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
        if(typeof buf==="string"){const e=[];for(let i=0;i<buf.length;i++){const c=buf.charCodeAt(i);if(c<128)e.push(c);else if(c<2048)e.push(192|(c>>6),128|(c&63));else e.push(224|(c>>12),128|((c>>6)&63),128|(c&63));}buf=new Uint8Array(e);}
        const len=buf.length,bits=len*8;
        const padLen=((len%64)<56?56:120)-(len%64);
        const padded=new Uint8Array(len+padLen+8);
        padded.set(buf);padded[len]=0x80;
        const dv=new DataView(padded.buffer);
        dv.setUint32(padded.length-4,bits>>>0,false);
        dv.setUint32(padded.length-8,Math.floor(bits/0x100000000),false);
        for(let offset=0;offset<padded.length;offset+=64){
          const w=new Array(64);
          for(let i=0;i<16;i++)w[i]=dv.getUint32(offset+i*4,false);
          for(let i=16;i<64;i++){const s0=((w[i-15]>>>7)|(w[i-15]<<25))^((w[i-15]>>>18)|(w[i-15]<<14))^(w[i-15]>>>3);const s1=((w[i-2]>>>17)|(w[i-2]<<15))^((w[i-2]>>>19)|(w[i-2]<<13))^(w[i-2]>>>10);w[i]=(w[i-16]+s0+w[i-7]+s1)>>>0;}
          let [a,b,c,d,e,f,g,hh]=h;
          for(let i=0;i<64;i++){const S1=((e>>>6)|(e<<26))^((e>>>11)|(e<<21))^((e>>>25)|(e<<7));const ch=(e&f)^(~e&g);const temp1=(hh+S1+ch+K[i]+w[i])>>>0;const S0=((a>>>2)|(a<<30))^((a>>>13)|(a<<19))^((a>>>22)|(a<<10));const maj=(a&b)^(a&c)^(b&c);const temp2=(S0+maj)>>>0;hh=g;g=f;f=e;e=(d+temp1)>>>0;d=c;c=b;b=a;a=(temp1+temp2)>>>0;}
          h[0]=(h[0]+a)>>>0;h[1]=(h[1]+b)>>>0;h[2]=(h[2]+c)>>>0;h[3]=(h[3]+d)>>>0;h[4]=(h[4]+e)>>>0;h[5]=(h[5]+f)>>>0;h[6]=(h[6]+g)>>>0;h[7]=(h[7]+hh)>>>0;
        }
        const out=new Uint8Array(32);const odv=new DataView(out.buffer);h.forEach((v,i)=>odv.setUint32(i*4,v,false));return out;

      const smtpPass=btoa(String.fromCharCode(...combined));
      const res={status:"ok",smtpUser:ak,smtpPass:smtpPass,smtpHost:"email-smtp."+region+".amazonaws.com",smtpPort:587,region:region};
      setResult(res);
      showToast("ok","Generated!","Click Apply to fill the form");
    } catch(e){showToast("err","Error",e.message);setResult({status:"error",message:e.message});}
    setLoading(false);
  };

  return (
    <div style={{background:"#0f1f2a",border:"1px solid #1e4a6e",borderRadius:8,padding:"14px 16px",marginBottom:14}}>
      <div style={{fontWeight:700,color:"#60a5fa",marginBottom:10,fontSize:13}}>🔑 Generate SMTP Credentials from IAM Keys</div>
      <div style={{fontSize:11,color:"#93c5fd",marginBottom:12,lineHeight:1.6}}>
        Paste your IAM Access Key + Secret Key below. SynthTel derives the SMTP password locally using AWS's official HMAC algorithm — your keys are never stored or sent anywhere except your own server.
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <div>
          <label className="lbl" style={{color:"#93c5fd"}}>IAM Access Key ID</label>
          <input value={ak} onChange={e=>setAk(e.target.value.trim())} placeholder="AKIASRN7FWSD6DED4AX6"
            style={{width:"100%",padding:"8px 10px",background:"var(--bg2)",border:"1px solid #1e4a6e",borderRadius:6,color:"var(--tx)",fontSize:12,fontFamily:"monospace",boxSizing:"border-box"}}/>
        </div>
        <div>
          <label className="lbl" style={{color:"#93c5fd"}}>IAM Secret Access Key</label>
          <input type="password" value={sk} onChange={e=>setSk(e.target.value.trim())} placeholder="Your secret key"
            style={{width:"100%",padding:"8px 10px",background:"var(--bg2)",border:"1px solid #1e4a6e",borderRadius:6,color:"var(--tx)",fontSize:12,boxSizing:"border-box"}}/>
        </div>
        <div>
          <label className="lbl" style={{color:"#93c5fd"}}>Region</label>
          <select value={region} onChange={e=>setRegion(e.target.value)}
            style={{width:"100%",padding:"8px 10px",background:"var(--bg2)",border:"1px solid #1e4a6e",borderRadius:6,color:"var(--tx)",fontSize:12,boxSizing:"border-box"}}>
            {["us-east-1","us-east-2","us-west-1","us-west-2","eu-west-1","eu-west-2","eu-west-3","eu-central-1","eu-north-1","ap-southeast-1","ap-southeast-2","ap-northeast-1","ap-south-1","ca-central-1","sa-east-1"].map(r=>(
              <option key={r} value={r}>{r}</option>
            ))}
          </select>
        </div>
        <div style={{alignSelf:"flex-end"}}>
          <button className="btn btn-p" style={{width:"100%",height:38}} disabled={loading} onClick={generate}>
            {loading ? "Generating…" : "⚡ Generate SMTP Password"}
          </button>
        </div>
      </div>
      {result && result.status==="ok" && (
        <div style={{background:"#0a2a0a",border:"1px solid #22c55e44",borderRadius:6,padding:"10px 12px",marginTop:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{color:"#4ade80",fontWeight:700,fontSize:12}}>✓ Credentials Generated</span>
            <button className="btn btn-p btn-sm" onClick={()=>onApply(result)}>⬆ Apply to Form</button>
          </div>
          <div style={{fontSize:11,fontFamily:"monospace",color:"#86efac",lineHeight:1.8}}>
            <div><span style={{color:"#4ade80"}}>Host:</span> {result.smtpHost}:{result.smtpPort}</div>
            <div><span style={{color:"#4ade80"}}>User:</span> {result.smtpUser}</div>
            <div><span style={{color:"#4ade80"}}>Pass:</span> {(result.smtpPass||"").slice(0,20)}… <span style={{color:"#6b7280"}}>(click Apply to fill)</span></div>
          </div>
        </div>
      )}
      {result && result.status!=="ok" && (
        <div style={{background:"#2a0a0a",border:"1px solid #ef444444",borderRadius:6,padding:"8px 12px",marginTop:8,fontSize:11,color:"#f87171"}}>
          ✗ {result.message}
        </div>
      )}
    </div>
  );
}

function TabMethod({
  activeMethod, setActiveMethod,
  smtpList, setSmtpList, smtpDraft, setSmtpDraft,
  apiList, setApiList, apiDraft, setApiDraft,
  owaConfig, setOwaConfig, crmConfig, setCrmConfig,
  tunnelList, setTunnelList, tunnelDraft, setTunnelDraft,
}) {
  const [mTab, setMTab] = useState("smtp");
  const [smtpPreset, setSmtpPreset] = useState("");
  const [testR, setTestR] = useState({});
  const [testL, setTestL] = useState({});
  const [apiTestResult, setApiTestResult] = useState(null);
  const [apiTestLoading, setApiTestLoading] = useState(false);

  async function testSmtp(smtp, key) {
    setTestL(p=>({...p,[key]:true}));
    try {
      const r = await apiCall("/api/test-smtp",{method:"POST",body:JSON.stringify(smtp)});
      let d;
      try { d = await r.json(); } catch(e) { d = {status:"error", message:"Server returned non-JSON (status "+r.status+")"}; }
      if (r.status === 401) d = {status:"error", message:"Not authenticated — please log out and back in"};
      if (r.status === 400) d = {status:"error", message:"Bad request — check host/port fields"};
      setTestR(p=>({...p,[key]:d}));
    } catch(e) { setTestR(p=>({...p,[key]:{status:"error",message:e.message}})); }
    setTestL(p=>({...p,[key]:false}));
  }

  async function testCrm(type, cfg) {
    try {
      const r=await apiCall("/api/test-crm",{method:"POST",body:JSON.stringify({type,...cfg})});
      const d=await r.json();
      showPopup({title:"CRM Test",msg:d.message||d.status||JSON.stringify(d),ico:d.status==="ok"?"✅":"❌",type:"alert"});
    } catch(e){showPopup({title:"CRM Test Error",msg:"Error: "+e.message,ico:"❌",type:"alert"});}
  }

  return (
    <div>
      <div className="ph">
        <div className="ph-title">⚙️ Send Method</div>
        <div className="ph-sub">Configure your sending infrastructure — settings are saved per account</div>
      </div>

      {/* Active method selector */}
      <div className="card mb16">
        <div className="card-title">Active Sending Method</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:12}}>
          {[
            {id:"smtp",   ico:"📨", name:"SMTP Relay",      desc:"Your own SMTP servers"},
            {id:"api",    ico:"🔌", name:"API / ESP",       desc:"SendGrid, Mailchimp, etc."},
            {id:"owa",    ico:"📮", name:"OWA / Exchange",  desc:"Exchange Web Services"},
            {id:"crm",    ico:"🗄️", name:"CRM Integration", desc:"Salesforce, HubSpot, etc."},
            {id:"tunnel", ico:"🔑", name:"SSH Tunnel",      desc:"Route via remote server"},
            {id:"b2b",    ico:"🔒", name:"B2B Inbox",       desc:"Send from extracted inboxes"},
            {id:"isp",    ico:"🌐", name:"ISP Proxy SMTP",  desc:"Residential ISP routing"},
          ].map(m=>(
            <div key={m.id} className={`mc ${activeMethod===m.id?"sel":""}`} onClick={()=>setActiveMethod(m.id)}>
              <div className="mc-ic">{m.ico}</div>
              <div className="mc-name">{m.name}</div>
              <div className="mc-desc">{m.desc}</div>
              {activeMethod===m.id && <div className="mt8"><Bdg t="a">Active</Bdg></div>}
            </div>
          ))}
        </div>
      </div>

      {/* Config tabs */}
      <div className="tab-bar">
        {["smtp","api","owa","crm","tunnel","isp"].map(t=>(
          <button key={t} className={`tb ${mTab===t?"on":""}`} onClick={()=>setMTab(t)}>{t.toUpperCase()}</button>
        ))}
      </div>

      {/* ── SMTP ── */}
      {mTab==="smtp" && (
        <div>
          <div className="card mb12">
            <div className="card-title">Add SMTP Server</div>
            <div className="mb10">
              <label className="lbl">Quick Preset</label>
              <select value={smtpPreset} onChange={e=>{
                const p=SMTP_PRESETS.find(s=>s.name===e.target.value);
                if(p) setSmtpDraft({...smtpDraft,host:p.host,port:p.port,ssl:p.ssl});
                setSmtpPreset(e.target.value);
              }} style={{fontSize:14,padding:"10px 12px"}}>
                <option value="">Select preset…</option>
                <optgroup label="── Email Providers ──">
                  {SMTP_PRESETS.filter(p=>!p.ses).map(p=><option key={p.name}>{p.name}</option>)}
                </optgroup>
                <optgroup label="── AWS SES by Region ──">
                  {SMTP_PRESETS.filter(p=>p.ses).map(p=><option key={p.name}>{p.name}</option>)}
                </optgroup>
              </select>
            </div>

            {/* AWS SES: show credential generator if SES preset selected */}
            {smtpPreset && (SMTP_PRESETS.find(p=>p.name===smtpPreset)||{}).ses ? (
              <SesCredGen
                initialRegion={(SMTP_PRESETS.find(p=>p.name===smtpPreset)||{}).region||"us-east-1"}
                onApply={(creds)=>{
                  setSmtpDraft({...smtpDraft, host:creds.smtpHost, port:587, username:creds.smtpUser, password:creds.smtpPass, ssl:false});
                  showToast("ok","Applied","Credentials filled — SSL/TLS turned OFF (port 587 uses STARTTLS)");
                }}/>
            ) : smtpPreset && (SMTP_PRESETS.find(p=>p.name===smtpPreset)||{}).note ? (
              <div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:12,color:"var(--t2)"}}>
                💡 <b>{smtpPreset}:</b> {SMTP_PRESETS.find(p=>p.name===smtpPreset).note}
              </div>
            ) : null}

            <div className="g3 mb10">
              <div>
                <label className="lbl">Host</label>
                <input value={smtpDraft.host} onChange={e=>{
                  const v=e.target.value;
                  const sesMatch=v.match(/email-smtp\.([\w-]+)\.amazonaws\.com/);
                  if(sesMatch){const preset=SMTP_PRESETS.find(p=>p.host===v.trim());if(preset)setSmtpPreset(preset.name);}
                  setSmtpDraft({...smtpDraft,host:v});
                }} placeholder="smtp.gmail.com" style={{fontSize:13,padding:"10px 12px"}}/>
              </div>
              <div>
                <label className="lbl">Port</label>
                <input type="number" value={smtpDraft.port} onChange={e=>{const p=parseInt(e.target.value);setSmtpDraft({...smtpDraft,port:p,ssl:p===465});}} style={{fontSize:15,padding:"10px 12px"}}/>
              </div>
              <div style={{alignSelf:"flex-end",paddingBottom:2}}>
                <Tog checked={smtpDraft.ssl} onChange={v=>setSmtpDraft({...smtpDraft,ssl:v})} label="SSL / TLS"/>
              </div>
            </div>
            <div className="g2 mb12">
              <div>
                <label className="lbl">{smtpPreset&&(SMTP_PRESETS.find(p=>p.name===smtpPreset)||{}).ses?"SMTP Username (from generator above or SES Console)":smtpPreset==="SendGrid"?"Username (always: apikey)":"Username"}</label>
                <input value={smtpDraft.username} onChange={e=>setSmtpDraft({...smtpDraft,username:e.target.value})}
                  placeholder={smtpPreset&&(SMTP_PRESETS.find(p=>p.name===smtpPreset)||{}).ses?"AKIA...":smtpPreset==="SendGrid"?"apikey":"your@email.com"}
                  style={{fontSize:14,padding:"10px 12px"}}/>
              </div>
              <div>
                <label className="lbl">{smtpPreset&&(SMTP_PRESETS.find(p=>p.name===smtpPreset)||{}).ses?"SMTP Password (generated — NOT your IAM secret key)":"Password / App Password"}</label>
                <input type="password" value={smtpDraft.password} onChange={e=>setSmtpDraft({...smtpDraft,password:e.target.value})}
                  placeholder={smtpPreset&&(SMTP_PRESETS.find(p=>p.name===smtpPreset)||{}).ses?"Click Generate above":"password"}
                  style={{fontSize:14,padding:"10px 12px"}}/>
              </div>
            </div>
            <div className="row g8 ac-center" style={{flexWrap:"wrap"}}>
              <button className="btn btn-p btn-sm" onClick={()=>{
                if(!smtpDraft.host) return;
                setSmtpList(p=>[...p,{...smtpDraft,id:Date.now()}]);
                setSmtpDraft({host:"",port:587,username:"",password:"",ssl:false});
                setSmtpPreset("");
                setTestR({});
              }}>+ Add Server</button>
              <button className="btn btn-g btn-sm" onClick={()=>testSmtp(smtpDraft,"draft")} disabled={testL["draft"]}>
                {testL["draft"]?"Testing…":"🔍 Test Connection"}
              </button>
            </div>
            {testR["draft"] && (
              <div style={{marginTop:10,padding:"10px 14px",borderRadius:8,fontSize:12,
                background: testR["draft"].status==="ok" ? "#0f2a1a" : "#2a0f0f",
                border: "1px solid "+(testR["draft"].status==="ok" ? "#22c55e44" : "#ef444444"),
                color: testR["draft"].status==="ok" ? "#4ade80" : "#f87171"}}>
                {testR["draft"].status==="ok"
                  ? "✓ " + (testR["draft"].message||"Connected & authenticated")
                  : "✗ " + (testR["draft"].message||"Failed")}
              </div>
            )}
          </div>

          {smtpList.length>0 && (
            <div className="card">
              <div className="row jb ac-center mb12">
                <span className="card-title" style={{marginBottom:0}}>Configured Servers ({smtpList.length})</span>
                <button className="btn btn-d btn-xs" onClick={()=>{if(confirm("Remove all SMTP servers?"))setSmtpList([]);}}>Remove All</button>
              </div>
              <div className="col g8">
                {smtpList.map((s,i)=>(
                  <div key={s.id} style={{border:"1px solid var(--border)",borderRadius:8,overflow:"hidden"}}>
                    <div className="row ac-center g10" style={{padding:"10px 14px",background:"var(--bg2)"}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontFamily:"var(--font-mono)",fontSize:12,fontWeight:600}}>{s.host}:{s.port} {s.ssl?"(SSL)":"(STARTTLS)"}</div>
                        <div style={{fontSize:11,color:"var(--t2)",marginTop:2}}>{s.username||"no username"}</div>
                      </div>
                      <button className="btn btn-g btn-xs" onClick={()=>testSmtp(s,i)} disabled={testL[i]}>
                        {testL[i]?"Testing…":"Test"}
                      </button>
                      <button className="btn btn-d btn-xs" onClick={()=>setSmtpList(p=>p.filter((_,j)=>j!==i))}>✕ Delete</button>
                    </div>
                    {testR[i] && (
                      <div style={{padding:"8px 14px",fontSize:11,
                        background: testR[i].status==="ok" ? "#0f2a1a" : "#2a0f0f",
                        color: testR[i].status==="ok" ? "#4ade80" : "#f87171"}}>
                        {testR[i].status==="ok"
                          ? "✓ " + (testR[i].message||"OK")
                          : "✗ " + (testR[i].message||"Failed")}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

          {/* ── API ── */}
      {mTab==="api" && (
        <div className="card">
          <div className="card-title">API / ESP Keys</div>
          <div className="g2 mb10">
            <div>
              <label className="lbl">Provider</label>
              <select value={apiDraft.provider} onChange={e=>setApiDraft({...apiDraft,provider:e.target.value})} style={{fontSize:14,padding:"10px 12px"}}>
                <optgroup label="── Transactional ESP ──">
                  {["sendgrid","mailgun","postmark","sparkpost","brevo","mailchimp"].map(p=><option key={p}>{p}</option>)}
                </optgroup>
                <optgroup label="── AWS ──">
                  <option value="ses-api">AWS SES (API)</option>
                </optgroup>
                <optgroup label="── Microsoft ──">
                  <option value="graph">Graph API / O365 (Bearer Token)</option>
                </optgroup>
              </select>
            </div>
            <div>
              <label className="lbl">
                {apiDraft.provider==="ses-api" ? "AWS Access Key ID" : "API Key"}
              </label>
              <input type="password" value={apiDraft.key} onChange={e=>{
                const k=e.target.value;
                let p=apiDraft.provider;
                if(k.startsWith("SG."))           p="sendgrid";
                else if(k.startsWith("key-"))     p="mailgun";
                else if(k.startsWith("AKIA")||k.startsWith("ASIA")) p="ses-api";
                else if(k.startsWith("xkeysib-")||k.startsWith("xsmtpsib-")) p="brevo";
                else if(k.startsWith("re_"))      p="resend";
                else if(k.startsWith("server_"))  p="postmark";
                setApiDraft({...apiDraft,key:k,provider:p});
              }}
                placeholder={apiDraft.provider==="ses-api" ? "AKIA..." : apiDraft.provider==="mailgun" ? "key-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" : "sk_…"}
                style={{fontSize:14,padding:"10px 12px"}}/>
            </div>

            {/* Mailgun — domain (required) + region */}
            {apiDraft.provider==="mailgun" && (
              <div style={{gridColumn:"1/-1"}}>
                <label className="lbl">Mailgun Sending Domain <span style={{color:"var(--err)",fontSize:11}}>required</span></label>
                <input value={apiDraft.mailgunDomain||""} onChange={e=>setApiDraft({...apiDraft,mailgunDomain:e.target.value})}
                  placeholder="mg.yourdomain.com  or  yourdomain.com"
                  style={{fontSize:14,padding:"10px 12px"}}/>
                <div className="dim2 xs mt4">Found in Mailgun dashboard → Sending → Domains</div>
              </div>
            )}
            {apiDraft.provider==="mailgun" && (
              <div style={{gridColumn:"1/-1"}}>
                <label className="lbl">Mailgun Region</label>
                <select value={apiDraft.mailgunRegion||"us"} onChange={e=>setApiDraft({...apiDraft,mailgunRegion:e.target.value})} style={{fontSize:14,padding:"10px 12px",width:"100%",borderRadius:6,border:"1px solid var(--border)",background:"var(--inp)",color:"var(--text)"}}>
                  <option value="us">US (api.mailgun.net)</option>
                  <option value="eu">EU (api.eu.mailgun.net)</option>
                </select>
              </div>
            )}

            {/* AWS SES — secret + region */}
            {apiDraft.provider==="ses-api" && (
              <div style={{gridColumn:"1/-1"}}>
                <label className="lbl">AWS Secret Access Key</label>
                <input type="password" value={apiDraft.secret||""} onChange={e=>setApiDraft({...apiDraft,secret:e.target.value})}
                  placeholder="Your IAM secret key" style={{fontSize:14,padding:"10px 12px"}}/>
              </div>
            )}
            {apiDraft.provider==="ses-api" && (
              <div style={{gridColumn:"1/-1"}}>
                <label className="lbl">Region</label>
                <select value={apiDraft.region||"us-east-1"} onChange={e=>setApiDraft({...apiDraft,region:e.target.value})} style={{fontSize:14,padding:"10px 12px"}}>
                  {["us-east-1","us-west-2","eu-west-1","eu-central-1","ap-southeast-2","ca-central-1"].map(r=><option key={r}>{r}</option>)}
                </select>
              </div>
            )}

            {/* SparkPost region */}
            {apiDraft.provider==="sparkpost" && (
              <div style={{gridColumn:"1/-1"}}>
                <label className="lbl">SparkPost Region</label>
                <select value={apiDraft.sparkpostRegion||"us"} onChange={e=>setApiDraft({...apiDraft,sparkpostRegion:e.target.value})} style={{fontSize:14,padding:"10px 12px",width:"100%",borderRadius:6,border:"1px solid var(--border)",background:"var(--inp)",color:"var(--text)"}}>
                  <option value="us">US (api.sparkpost.com)</option>
                  <option value="eu">EU (api.eu.sparkpost.com)</option>
                </select>
              </div>
            )}
          </div>
          <div className="row g8 mt12">
            <button className="btn btn-p btn-sm" onClick={()=>{
              if(!apiDraft.key) return;
              if(apiDraft.provider==="mailgun" && !apiDraft.mailgunDomain){
                showPopup({title:"Domain Required",msg:"Mailgun requires a sending domain (e.g. mg.yourdomain.com). Find it in your Mailgun dashboard → Sending → Domains.",ico:"⚠️",type:"alert"});
                return;
              }
              setApiList(p=>[...p,{...apiDraft,id:Date.now()}]);
              setApiDraft({provider:"sendgrid",key:"",secret:"",region:"us-east-1",mailgunDomain:"",mailgunRegion:"us",sparkpostRegion:"us"});
              setApiTestResult(null);
            }}>+ Add Key</button>
            <button className="btn btn-g btn-sm" disabled={apiTestLoading||!apiDraft.key} onClick={async()=>{
              if(!apiDraft.key) return;
              setApiTestLoading(true); setApiTestResult(null);
              try {
                const r=await apiCall("/api/tools/check-esp",{method:"POST",body:JSON.stringify({
                  key:apiDraft.key, secret:apiDraft.secret||null,
                  region:apiDraft.region||"us-east-1",
                  domain:apiDraft.mailgunDomain||null,
                })});
                const d=await r.json();
                if(d.error){
                  setApiTestResult({ok:false, msg:d.error});
                } else {
                  const s=(d.account_status||"").toLowerCase();
                  const canSend=s.includes("active")||s.includes("enabled")||s.includes("healthy")||s==="ok";
                  const parts=[`Status: ${d.account_status||"Unknown"}`];
                  if(d.plan&&d.plan!=="Unknown") parts.push(d.plan);
                  if(d.daily_limit) parts.push(`${Number(d.daily_limit).toLocaleString()} daily limit`);
                  if(d.remaining_this_month!=null) parts.push(`${Number(d.remaining_this_month).toLocaleString()} remaining`);
                  if(d.domains?.length) parts.push(`${d.domains.length} domain(s)`);
                  if(d.verified_emails?.length) parts.push(`${d.verified_emails.length} verified sender(s)`);
                  setApiTestResult({ok:canSend, msg:`${d.provider||"ESP"} · ${parts.join(" · ")}`});
                }
              } catch(e){
                setApiTestResult({ok:false, msg:e.message||"Request failed"});
              }
              setApiTestLoading(false);
            }}>
              {apiTestLoading?"🔍 Testing…":"🔍 Test Connection"}
            </button>
          </div>
          {apiTestResult && (
            <div style={{marginTop:10,padding:"10px 14px",borderRadius:8,fontSize:12,
              background:apiTestResult.ok?"#0f2a1a":"#2a0f0f",
              border:"1px solid "+(apiTestResult.ok?"#22c55e44":"#ef444444"),
              color:apiTestResult.ok?"#4ade80":"#f87171"}}>
              {apiTestResult.ok?"✓ ":"✗ "}{apiTestResult.msg}
            </div>
          )}
          {apiList.length>0 && (
            <div className="col g8 mt12">
              <div className="row jb ac-center">
                <span style={{fontSize:12,fontWeight:700,color:"var(--t2)"}}>SAVED KEYS ({apiList.length})</span>
                <button className="btn btn-d btn-xs" onClick={()=>{if(confirm("Remove all API keys?"))setApiList([]);}}>Remove All</button>
              </div>
              {apiList.map((a,i)=>(
                <div key={a.id} className="row ac-center g10 card card-sm" style={{flexWrap:"wrap"}}>
                  <Bdg t="a">{a.provider}</Bdg>
                  <span className="mono f1 trunc">{a.key.slice(0,12)}…</span>
                  {a.mailgunDomain&&<span style={{fontSize:11,color:"var(--ok)",fontFamily:"var(--font-mono)"}}>{a.mailgunDomain}</span>}
                  {a.provider==="ses-api"&&a.region&&<span style={{fontSize:11,color:"var(--t2)"}}>{a.region}</span>}
                  <button className="btn btn-d btn-xs" onClick={()=>setApiList(p=>p.filter((_,j)=>j!==i))}>✕ Delete</button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ── OWA ── */}
      {mTab==="owa" && (
