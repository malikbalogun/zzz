/* ── Global clipboard helper — works on HTTP and HTTPS ── */
function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).catch(function() { _copyFallback(text); });
  } else { _copyFallback(text); }
}
function _copyFallback(text) {
  var ta = document.createElement("textarea");
  ta.value = text; ta.style.position = "fixed"; ta.style.top = "-9999px";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand("copy"); } catch(e) {}
  document.body.removeChild(ta);
}

            loadHistory();
          }
        }
      } catch(e) {}
    }
    const iv = setInterval(poll, 3000); // poll every 3s for responsive updates
    poll();
    return ()=>{ active=false; clearInterval(iv); };
  },[token]);

  function addLog(msg, type="inf", email="", meta={}) {
    const d=new Date(), ts=`${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}:${String(d.getSeconds()).padStart(2,"0")}`;
    setCampLog(p=>[...p,{ts,msg,type,email,...meta}].slice(-500));

  async function startCampaign() {
    const pLeads = parseLeads(leadsRaw, allowDupes);
    if(!pLeads.length){showPopup({title:"No Leads",msg:"No valid leads loaded. Add emails in the Leads tab.",ico:"👥",type:"alert"});return;}
    if(!subject.trim()){showPopup({title:"Missing Subject",msg:"Subject line is required before launching.",ico:"✉️",type:"alert"});return;}
    if(!htmlBody.trim()&&!plainBody.trim()){showPopup({title:"No Email Body",msg:"Write your email in the Compose tab first.",ico:"📝",type:"alert"});return;}
    const senders=sendersRaw.split(/\r?\n/).map(s=>s.trim()).filter(s=>s.includes("@"));
    if(!senders.length){showPopup({title:"No Senders",msg:"Add at least one sender email in the Senders tab.",ico:"📤",type:"alert"});return;}

    pauseRef.current={paused:false,abort:false};
    setCampRunning(true); setCampPaused(false); setCampLog([]);
    setCampStats({total:pLeads.length,sent:0,failed:0,pending:pLeads.length});
    addLog(`🚀 "${campName}" started — ${pLeads.length.toLocaleString()} recipients`,"inf");
    setHistTab("live");

    // Build ISP tunnels directly from proxies (no RDP needed — proxy connects directly)
    let ispTunnels = [];
    try {
      const ispProxies = JSON.parse(localStorage.getItem("isp_proxies") || "[]");
      ispTunnels = ispProxies.filter(px => px.host && px.ispSmtpHost).map(px => ({
        tunnelType: "isp",
        label: px.label || (px.user ? px.user.split("-")[0] : px.host) + " → " + px.ispSmtpHost,
        // No RDP — proxy connects directly to ISP SMTP
        sshHost: "",
        rdpSshPort: 22,
        sshUser: "",
        sshPass: "",
        socksHost: px.host,
        socksPort: parseInt(px.port) || 17521,
        // ISP proxy credentials
        proxyHost: px.host,
        proxyPort: px.port || "17521",
        proxyUser: px.user || "",
        proxyPass: px.pass || "",
        proxyType: px.type || "socks5",
        // ISP SMTP
        ispSmtpHost: px.ispSmtpHost || "",
        ispSmtpPort: px.ispSmtpPort || "25",
        fromDomain: px.fromDomain || "",
        smtpFromEmail: px.smtpFromEmail || "",
      }));
      console.log("ISP tunnels built:", ispTunnels.length, ispTunnels);
    } catch(e) { console.error("ISP tunnel build error:", e); }

    // Determine effective method and tunnels
    const effectiveMethod = activeMethod === "isp" ? "isp" : activeMethod;
    const effectiveTunnels = activeMethod === "isp" ? ispTunnels : tunnelList;

    const allSubjects = [subject, ...extraSubjects.split("\n").map(s=>s.trim()).filter(Boolean)];
    const allFromNames = [senderName, ...senderNames.split("\n").map(s=>s.trim()).filter(Boolean)].filter(Boolean);

    const payload={
      leads:pLeads.map(l=>l.email),
      subject, subjects:allSubjects,
      html:htmlBody, plain:plainBody,
      fromEmails:senders,
      fromName:allFromNames.length>0?allFromNames[0]:senderName,
      fromNames:allFromNames,
      replyTo:senderReplyTo.split("\n").map(s=>s.trim()).filter(Boolean)[0]||"",
      replyTos:senderReplyTo.split("\n").map(s=>s.trim()).filter(Boolean),
      _uid: (()=>{try{const u=JSON.parse(atob((localStorage.getItem("st_token")||"").split(".")[1]||"{}"));return u.sub||u.id||u.user_id||"";}catch(e){return "";}})(),
      method:effectiveMethod, smtpServers:smtpList, apiKeys:apiList,
      owa:owaConfig, crm:crmConfig, tunnels:effectiveTunnels,
      // Only include ispTunnels if actually using ISP method — prevents auto-switch to tunnel
      ...(effectiveMethod==="isp" ? {ispTunnels} : {}),
      proxies:proxies.map(p=>p.raw||p),
      batchSize:parseInt(batchSize), maxConnections:parseInt(concurrent)||1, delay:parseInt(delay), delayUnit,
      cooldownEvery:parseInt(cooldownEvery)||0, cooldownSecs:parseFloat(cooldownSecs)||60,
      batchPauseSecs:parseFloat(batchPauseSecs)||0,
      htmlBodies, htmlRotateMode,
      jitter:jitter?parseInt(jitterSec):0, domainThrottle:domThrottle, gmailDelay:5, msDelay:8, warmup, rateLimitPause,
      listUnsub, unsubEmail, unsubUrl, oneClickUnsub:oneClick,
      autoInjectUnsub:autoInject, autoPlainText:autoPlain, spamFilter, preheader,
      bypassMode, bypassZeroFont, bypassComments, bypassHomoglyphs, bypassFontRand, bypassInnat,
      hideFromEmail, autoFlagEmail, antiDetect, emailPriority:priority,
      threadSimulate, arcSimulate, msExchangeHeaders:msExchangeHdrs,
      skipPreflightDns,
      bcc: bccEnabled && bccEmail.trim() ? bccEmail.trim() : null,
      campaignName:campName, rotationMode:rotMode,
      linkRotation:linkRot.length>0 ? linkRot : linkRotDraft.split('\n').map(s=>s.trim()).filter(Boolean), linkRotMode,
      // Dynamic attachment config
      attachments: selectedType ? (() => {
        const cfg = {};
        if(selectedType==="ics") cfg.ics = {title:attachConfig.title, dtStart:attachConfig.dtStart, duration:attachConfig.duration, location:attachConfig.location};
        if(selectedType==="pdf") cfg.pdf = {name:attachConfig.fileName, content:attachConfig.content};
        if(selectedType==="ghost_pdf") cfg.ghost_pdf = {link:attachConfig.ghostLink, title:attachConfig.ghostTitle, name:attachConfig.ghostName, text:attachConfig.ghostText};
        if(selectedType==="html_image") cfg.html_image = {width:attachConfig.imgWidth||650, height:attachConfig.imgHeight||800, format:attachConfig.imgFormat||"png", name:attachConfig.imgName, inline_replace:attachConfig.imgInlineReplace||false};
        return cfg;
      })() : {},
    };

    try {
      const r = await apiCall("/api/send",{method:"POST",body:JSON.stringify(payload)});
      const reader=r.body.getReader(), dec=new TextDecoder(); let buf="",sent=0,failed=0;
      while(true){
        if(pauseRef.current.abort){addLog("⛔ Aborted","wrn");break;}
        while(pauseRef.current.paused&&!pauseRef.current.abort) await new Promise(res=>setTimeout(res,300));
        const{done,value}=await reader.read(); if(done)break;
        buf+=dec.decode(value,{stream:true});
        const lines=buf.split("\n"); buf=lines.pop();
        for(const line of lines){
          if(!line.trim())continue;
          try{
            const ev=JSON.parse(line);
            if(ev.type==="sent"||ev.type==="success"){
              sent++;
              setCampStats(s=>({...s,sent,pending:s.total-sent-failed}));
              const fromPart = ev.from ? ` ← ${ev.from}` : "";
              const v = ev.via||"";
              const vIcon = v.match(/amazonaws|smtp|relay/i) ? "📨"
                          : v.match(/sendgrid|mailgun|sparkpost|postmark|ses|api/i) ? "🔌"
                          : v.match(/tunnel|rdp|isp|socks/i) ? "🔑"
                          : v.match(/owa|exchange|outlook/i) ? "📮"
                          : v.match(/crm|hubspot|salesforce/i) ? "🗄️"
                          : v ? "📡" : "";
              const viaPart  = v ? ` ${vIcon} ${v}` : "";
              addLog(`${ev.email||""}${fromPart}${viaPart}`, "ok", ev.email||"", {from:ev.from||"",via:v});
            }
            else if(ev.type==="error"||ev.type==="fail"){
              failed++;
              setCampStats(s=>({...s,failed,pending:s.total-sent-failed}));
              addLog(`✗ ${ev.email||""} — ${ev.msg||ev.error||""}`, "err", ev.email||"");
            }
            else if(ev.type==="info") addLog(ev.msg||"","inf");
            else if(ev.type==="warn") addLog(ev.msg||"","wrn");
            else if(ev.type==="proxy_dead") {
              // Remove dead proxy from Proxy List tab state
              const deadHost = (ev.host||"").toLowerCase();
              if(deadHost) {
                const _filterDead = p => {
                  const raw = (p.raw||"").toLowerCase();
                  const pHost = (p.host||"").toLowerCase();
                  return !raw.includes(deadHost) && pHost !== deadHost;
                };
                // Remove from Proxy List tab (in-memory state)
                setProxies(prev => prev.filter(_filterDead));
                // Remove from ISP proxies (localStorage + state via saveIspProxies if available)
                try {
                  const isp = JSON.parse(localStorage.getItem("isp_proxies")||"[]");
                  const ispUpdated = isp.filter(_filterDead);
                  localStorage.setItem("isp_proxies", JSON.stringify(ispUpdated));
                } catch(e){}
                addLog(`🗑 Proxy ${ev.host} removed from pool (persistent)`, "inf");
              }
            }
            else if(ev.type==="pause") addLog(ev.msg||"⏸ Paused","wrn");
            else if(ev.type==="batch") addLog(ev.msg||"","inf");
            else if(ev.type==="done") {
              addLog(`✅ Complete — ${sent.toLocaleString()} sent, ${failed.toLocaleString()} failed`,"inf");
              setCampStats(s=>({...s,pending:0}));
            }
            // SMTP dead detection — warn/info events only; errors already shown as ✗
            // Skip: pause/batch/cooldown events, AUP events, auth failures, sender-removal infos
            const msgText = ev.msg||ev.error||"";
            const _skipPatterns = /AUP#POL|AUP#MXRT|sender rejected|temporarily unavailable|✂ Sender|greylist|MXRT retry|proxy retry|health=|demoted|Resuming|removed.*remaining|dead proxy|cooling down|pausing|Cooldown|Rate limit.*cooling|⏸/i;
            if(!_skipPatterns.test(msgText) && ev.type!=="error" && ev.type!=="fail" && ev.type!=="success" &&
               ev.type!=="pause" && ev.type!=="batch" &&
               msgText.match(/connect.*fail|connection.*refused|SMTP.*error|AUTH.*fail|wrong credentials|authentication.*fail|535|534|too many|rate.?limit|blacklist|banned|blocked|timeout|timed out/i)) {
              addLog(`⚠️ SMTP Issue: ${msgText.slice(0,120)}`,"warn");
            }
          }catch(e){}
        }
      }
    } catch(e){ addLog(`❌ Error: ${e.message}`,"err"); }
    setCampRunning(false); setCampPaused(false);
    loadHistory();
  }

          <div className="mm-section-title">Senders ({sendersRaw.split("\n").filter(Boolean).length})</div>
          <textarea value={sendersRaw} onChange={e=>setSendersRaw(e.target.value)}
            placeholder="one@sender.com&#10;two@sender.com"
            style={{width:"100%",fontSize:11,padding:"8px 10px",minHeight:70,
              background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:6,
              color:"var(--tx)",fontFamily:"var(--font-mono)",resize:"vertical",boxSizing:"border-box"}}/>
        </div>

        {/* Recent log */}
        <div className="mm-quick-edit">
          <div className="mm-section-title">Live Log</div>
          <div className="mm-log">
            {(campLog||[]).slice(-30).reverse().map((entry,i)=>(
              <div key={i} className="mm-log-entry" style={{
                color: entry.type==="ok" ? "var(--ok)" : entry.type==="err" ? "var(--err)" : "var(--t2)"
              }}>
                {entry.msg}
              </div>
            ))}
            {(!campLog||campLog.length===0) && <div style={{color:"var(--t3)",textAlign:"center",padding:12}}>No log entries yet</div>}
          </div>
        </div>
      </div>
    );
  }

  /* ── RENDER TAB CONTENT ── */
  function renderTab() {
    const TAB_LABELS = {
      campaign:"🚀 Campaign", compose:"✉️ Compose", leads:"👥 Leads",
      senders:"📤 Senders", method:"⚙️ Method", proxies:"🌐 Proxies",
      b2b:"🔒 B2B Sender", attachments:"📎 Attachments", tags:"🏷️ Tags",
      files:"📁 Files", tools:"🔧 Tools", account:"👤 Account", logs:"🔍 Debug",
    };
    const MobTopBar = ()=>(
      <div className="mob-topbar">
        <div className="mob-topbar-left">
          <div className="mob-topbar-title">{TAB_LABELS[tab]||tab}</div>
          <div className="mob-topbar-sub">SynthTel v5</div>
        </div>
        <div className="mob-topbar-right">
          {["dark","dusk","light"].map(t=>(
            <button key={t} className={`th-btn ${theme===t?"on":""}`} onClick={()=>setTheme(t)}>
              {t==="dark"?"🌑":t==="dusk"?"🌆":"☀️"}
            </button>
          ))}
          <button className="btn btn-d btn-xs" onClick={doLogout}
            style={{padding:"5px 8px",fontSize:11,whiteSpace:"nowrap"}}>
            Sign Out
          </button>
        </div>
      </div>
    );
    // Bottom spacer so fixed nav bar never covers content
    const MobSpacer = ()=><div style={{height:72,flexShrink:0}} aria-hidden="true"/>;
    const commonCampProps = {
      name:campName, setName:setCampName, running:campRunning, paused:campPaused,
      stats:campStats, log:campLog, history:campHistory, histTab, setHistTab,
      pauseRef, startCampaign, pauseCampaign, resumeCampaign, stopCampaign,
      cooldownEvery, setCooldownEvery, cooldownSecs, setCooldownSecs,
      batchPauseSecs, setBatchPauseSecs,
      setLeadsRaw, setLeads, setTab,
      priority,setPriority,batchSize,setBatchSize,delay,setDelay,delayUnit,setDelayUnit,
      jitter,setJitter,jitterSec,setJitterSec,domThrottle,setDomThrottle,warmup,setWarmup,rateLimitPause,setRateLimitPause,
      listUnsub,setListUnsub,unsubEmail,setUnsubEmail,unsubUrl,setUnsubUrl,
      oneClick,setOneClick,autoInject,setAutoInject,autoPlain,setAutoPlain,spamFilter,setSpamFilter,
      activeMethod,setActiveMethod,showDeliv,setShowDeliv,
      concurrent,setConcurrent,
      hideFromEmail,setHideFromEmail,autoFlagEmail,setAutoFlagEmail,antiDetect,setAntiDetect,
      skipPreflightDns,setSkipPreflightDns,
      threadSimulate,setThreadSimulate,
      msExchangeHdrs,setMsExchangeHdrs,
      arcSimulate,setArcSimulate,
      bypassMode,setBypassMode,bypassZeroFont,setBypassZeroFont,
      bypassComments,setBypassComments,bypassHomoglyphs,setBypassHomoglyphs,
      bypassFontRand,setBypassFontRand,bypassInnat,setBypassInnat,
      newCampaign, clearHistory,
      bccEnabled,setBccEnabled,bccEmail,setBccEmail,
    };

    switch(tab) {
      case "campaign":    return <>{isMobile&&<MobTopBar/>}{isMobile ? <MobileMonitor/> : <TabCampaign {...commonCampProps}/>}{isMobile&&<MobSpacer/>}</>;
      case "compose":     return <>{isMobile&&<MobTopBar/>}<TabCompose subject={subject} setSubject={setSubject} extraSubjects={extraSubjects} setExtraSubjects={setExtraSubjects} htmlBody={htmlBody} setHtmlBody={setHtmlBody} plainBody={plainBody} setPlainBody={setPlainBody} autoPlain={autoPlain} filesList={filesList} sendersRaw={sendersRaw} linkRot={linkRot} setLinkRot={setLinkRot} linkRotDraft={linkRotDraft} setLinkRotDraft={setLinkRotDraft} linkRotMode={linkRotMode} setLinkRotMode={setLinkRotMode} spamFilter={spamFilter} setSpamFilter={setSpamFilter} htmlBodies={htmlBodies} setHtmlBodies={setHtmlBodies} htmlRotateMode={htmlRotateMode} setHtmlRotateMode={setHtmlRotateMode} preheader={preheader} setPreheader={setPreheader}/>{isMobile&&<MobSpacer/>}</>;
      case "leads":       return <>{isMobile&&<MobTopBar/>}<TabLeads leadsRaw={leadsRaw} setLeadsRaw={setLeadsRaw} leads={leads} setLeads={setLeads} filesList={filesList} uploadFile={uploadFile} allowDupes={allowDupes} setAllowDupes={setAllowDupes}/>{isMobile&&<MobSpacer/>}</>;
      case "senders":     return <>{isMobile&&<MobTopBar/>}<TabSenders sendersRaw={sendersRaw} setSendersRaw={setSendersRaw} senderName={senderName} setSenderName={setSenderName} senderNames={senderNames} setSenderNames={setSenderNames} senderReplyTo={senderReplyTo} setSenderReplyTo={setSenderReplyTo} rotMode={rotMode} setRotMode={setRotMode} filesList={filesList} uploadFile={uploadFile}/>{isMobile&&<MobSpacer/>}</>;
      case "method":      return <>{isMobile&&<MobTopBar/>}<TabMethod activeMethod={activeMethod} setActiveMethod={setActiveMethod} smtpList={smtpList} setSmtpList={setSmtpList} smtpDraft={smtpDraft} setSmtpDraft={setSmtpDraft} apiList={apiList} setApiList={setApiList} apiDraft={apiDraft} setApiDraft={setApiDraft} owaConfig={owaConfig} setOwaConfig={setOwaConfig} crmConfig={crmConfig} setCrmConfig={setCrmConfig} tunnelList={tunnelList} setTunnelList={setTunnelList} tunnelDraft={tunnelDraft} setTunnelDraft={setTunnelDraft}/>{isMobile&&<MobSpacer/>}</>;
      case "proxies":     return <>{isMobile&&<MobTopBar/>}<TabProxies proxies={proxies} setProxies={setProxies} proxyDraft={proxyDraft} setProxyDraft={setProxyDraft} proxyType={proxyType} setProxyType={setProxyType}/>{isMobile&&<MobSpacer/>}</>;
      case "b2b":         return <>{isMobile&&<MobTopBar/>}<TabB2B setLeadsRaw={setLeadsRaw} setLeads={setLeads} setTab={setTab}/>{isMobile&&<MobSpacer/>}</>;
      case "attachments": return <>{isMobile&&<MobTopBar/>}<TabAttachments filesList={filesList} uploadFile={uploadFile} deleteFile={deleteFile} renameFile={renameFile} selectedType={selectedType} setSelectedType={setSelectedType} attachConfig={attachConfig} setAttachConfig={setAttachConfig}/>{isMobile&&<MobSpacer/>}</>;
      case "tags":        return <>{isMobile&&<MobTopBar/>}<TabTagsTemplates setHtmlBody={setHtmlBody} setTab={setTab}/>{isMobile&&<MobSpacer/>}</>;
      case "files":       return <>{isMobile&&<MobTopBar/>}<TabFiles filesList={filesList} uploadFile={uploadFile} deleteFile={deleteFile} renameFile={renameFile} fileUploadLoading={fileUploadLoading}/>{isMobile&&<MobSpacer/>}</>;
      case "tools":       return <>{isMobile&&<MobTopBar/>}<TabTools filesList={filesList} uploadFile={uploadFile} setLeadsRaw={setLeadsRaw} setLeads={setLeads} setTab={setTab}/>{isMobile&&<MobSpacer/>}</>;
      case "account":     return <>{isMobile&&<MobTopBar/>}<TabAccount username={username} role={role} doLogout={doLogout}/>{isMobile&&<MobSpacer/>}</>;
      case "logs":        return <>{isMobile&&<MobTopBar/>}<TabLogs/>{isMobile&&<MobSpacer/>}</>;
      default:            return <div className="dim">Select a tab</div>;
    }
  }


  function TabLogs() {
    const [logText, setLogText] = React.useState("Loading...");
    const [dbgTemplate, setDbgTemplate] = React.useState("Hi, #LINK check this out.");
    const [dbgLinks, setDbgLinks] = React.useState("https://google.com");
    const [dbgResult, setDbgResult] = React.useState(null);
    const [loading, setLoading] = React.useState(false);
    const taRef = React.useRef(null);

    async function fetchLogs() {
      try {
        const r = await apiCall("/api/logs?lines=150");
        const d = await r.json();
        setLogText(d.log || "(empty log)");
        setTimeout(()=>{ if(taRef.current) taRef.current.scrollTop = taRef.current.scrollHeight; },50);
      } catch(e) { setLogText("Error: "+e); }
    }

    async function testTags() {
      setLoading(true);
      try {
        const links = dbgLinks.split("\n").map(s=>s.trim()).filter(Boolean);
        const r = await apiCall("/api/debug-tags", {method:"POST", body: JSON.stringify({template: dbgTemplate, links, mode:"sequential"})});
        const d = await r.json();
        setDbgResult(d);
      } catch(e) { setDbgResult({error: String(e)}); }
      setLoading(false);
    }

    React.useEffect(()=>{ fetchLogs(); }, []);

    return (
      <div style={{padding:24, maxWidth:900}}>
        <div className="ph"><div className="ph-title">🔍 Debug & Logs</div><div className="ph-sub">Test tag resolution and view server logs</div></div>

        <div className="card mb20" style={{padding:20}}>
          <div style={{fontWeight:600, marginBottom:12, fontSize:15}}>🔗 Test #LINK Resolution</div>
          <div style={{marginBottom:8}}><label className="lbl">Template text (use #LINK where your link goes)</label>
            <input value={dbgTemplate} onChange={e=>setDbgTemplate(e.target.value)}
              style={{width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid var(--bdr)",background:"var(--inp)",color:"var(--tx)",fontSize:13,boxSizing:"border-box"}}/>
          </div>
          <div style={{marginBottom:12}}><label className="lbl">Links (one per line — same as link rotation box)</label>
            <textarea value={dbgLinks} onChange={e=>setDbgLinks(e.target.value)} rows={3}
              style={{width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid var(--bdr)",background:"var(--inp)",color:"var(--tx)",fontSize:13,boxSizing:"border-box",resize:"vertical"}}/>
          </div>
          <button className="btn btn-p" onClick={testTags} disabled={loading}>{loading?"Testing...":"▶ Test Resolution"}</button>
          {dbgResult && (
            <div style={{marginTop:14, padding:14, borderRadius:8, background: dbgResult.link_replaced===false ? "#fff3cd" : "var(--bg2)", border:"1px solid var(--bdr)"}}>
              {dbgResult.error
                ? <div style={{color:"#e53935"}}>❌ Error: {dbgResult.error}</div>
                : <>
                  <div style={{marginBottom:8}}>
                    <span style={{fontWeight:600}}>Status: </span>
                    {dbgResult.link_replaced
                      ? <span style={{color:"#22c55e",fontWeight:600}}>✅ #LINK was replaced successfully</span>
                      : <span style={{color:"#f59e0b",fontWeight:600}}>⚠️ #LINK was NOT replaced — links_cfg was empty</span>}
                  </div>
                  <div style={{marginBottom:6}}><span style={{fontWeight:600}}>Input: </span><code style={{fontSize:12}}>{dbgResult.template}</code></div>
                  <div style={{marginBottom:6}}><span style={{fontWeight:600}}>Output: </span><code style={{fontSize:12, wordBreak:"break-all"}}>{dbgResult.resolved}</code></div>
                  <div><span style={{fontWeight:600}}>links_cfg sent to engine: </span><code style={{fontSize:11}}>{JSON.stringify(dbgResult.links_cfg)}</code></div>
                  {dbgResult.note && <div style={{marginTop:6,fontSize:12,color:"var(--dim)"}}>{dbgResult.note}</div>}
                </>
              }
            </div>
          )}
        </div>

        <div className="card" style={{padding:20}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div style={{fontWeight:600, fontSize:15}}>📋 Server Log (last 150 lines)</div>
            <button className="btn btn-g btn-sm" onClick={fetchLogs}>↻ Refresh</button>
          </div>
          <textarea ref={taRef} readOnly value={logText} rows={20}
            style={{width:"100%",padding:"10px",borderRadius:6,border:"1px solid var(--bdr)",background:"#0d1117",color:"#c9d1d9",fontSize:11,fontFamily:"monospace",resize:"vertical",boxSizing:"border-box"}}/>
        </div>
      </div>
    );
  }

  /* ── FULL APP SHELL ── */
  return (
    <div data-theme={theme} style={{display:"flex",width:"100%",height:"100vh",overflow:"hidden",background:"var(--bg)"}}>
      <ToastContainer/>
      {/* Sidebar */}
      <div className="sidebar">
        {/* Logo */}
        <div className="sb-logo">
          <div className="sb-logo-icon">✉</div>
          <div>
            <div className="sb-logo-name">SynthTel</div>
            <div className="sb-logo-ver">v5</div>
          </div>
        </div>

        {/* Nav */}
        <div className="sb-nav">
          {NAV.map((item,i) => {
            if(item===null) return <div key={i} style={{height:1,background:"var(--border)",margin:"6px 0"}}/>;
            const isSection = typeof item === "string";
            if(isSection) return <div key={i} className="sb-section">{item}</div>;
            return (
              <div key={item.id} className={`sb-item ${tab===item.id?"active":""}`} onClick={()=>setTab(item.id)}>
                <span className="sb-icon">{item.ico}</span>
                <span>{item.lbl}</span>
                {item.badge && <span className="sb-badge">{item.badge}</span>}
              </div>
            );
          })}
        </div>

        {/* Footer */}
        <div className="sb-footer">
          <div className="user-row" onClick={()=>setTab("account")}>
            <div className="user-av">{(username[0]||"").toUpperCase()||"U"}</div>
            <div>
              <div className="user-name">{username}</div>
              <div className="user-role">{role}</div>
            </div>
          </div>
          <div className="theme-row">
            {["dark","dusk","light"].map(t=>(
              <button key={t} className={`th-btn ${theme===t?"on":""}`} onClick={()=>setTheme(t)}>
                {t==="dark"?"🌑":t==="dusk"?"🌆":"☀️"}
              </button>
            ))}
          </div>
          <button className="btn btn-g btn-sm w100" onClick={doLogout}>Sign Out</button>
        </div>
      </div>

      {/* Main content */}
      <div className={`main${tab==="campaign" ? " tab-campaign" : ""}`} id="main-scroll">
        {renderTab()}
      </div>

      {/* ── Mobile bottom navigation bar ── */}
      {isMobile && (()=>{
        const MOB_NAV = [
          {id:"campaign",ico:"📊",lbl:"Monitor"},
          {id:"compose", ico:"✉️",lbl:"Compose"},
          {id:"leads",   ico:"👥",lbl:"Leads",   badge:leads.length>0?leads.length:null},
          {id:"method",  ico:"⚙️",lbl:"Method"},
          {id:"senders", ico:"📤",lbl:"Senders"},
          {id:"account", ico:"👤",lbl:"Account"},
        ];
        const MOB_MORE = [
          {id:"tools",       ico:"🔧",lbl:"Tools"},
          {id:"proxies",     ico:"🌐",lbl:"Proxies",     badge:proxies.length>0?proxies.length:null},
          {id:"attachments", ico:"📎",lbl:"Attachments"},
          {id:"tags",        ico:"🏷️",lbl:"Tags & Templates"},
          {id:"files",       ico:"📁",lbl:"Files",       badge:filesList.length>0?filesList.length:null},
          {id:"b2b",         ico:"🔒",lbl:"B2B Sender"},
          {id:"logs",        ico:"🔍",lbl:"Debug"},
        ];
        const moreOpen = mobMoreOpen;
        const inMore = MOB_MORE.some(x=>x.id===tab);
        return (
          <>
            {/* More drawer overlay */}
            {moreOpen && (
              <div onClick={()=>setMobMoreOpen(false)} style={{
                position:"fixed",inset:0,zIndex:999,background:"rgba(0,0,0,.5)"
              }}/>
            )}
            {/* More drawer */}
            <div style={{
              position:"fixed",bottom:58,left:0,right:0,zIndex:1000,
              background:"var(--bg2)",borderTop:"1px solid var(--border)",
              borderRadius:"16px 16px 0 0",
              padding:"6px 0 4px",
              transform:moreOpen?"translateY(0)":"translateY(100%)",
              transition:"transform .25s ease",
              boxShadow:"0 -4px 24px rgba(0,0,0,.4)",
            }}>
              <div style={{width:36,height:4,background:"var(--border)",borderRadius:2,margin:"0 auto 10px"}}/>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:2,padding:"0 8px 8px"}}>
                {MOB_MORE.map(item=>(
                  <button key={item.id}
                    onClick={()=>{setTab(item.id);setMobMoreOpen(false);}}
                    style={{
                      display:"flex",flexDirection:"column",alignItems:"center",
                      gap:4,padding:"10px 4px",borderRadius:10,border:"none",cursor:"pointer",
                      background:tab===item.id?"var(--aglow)":"transparent",
                      color:tab===item.id?"var(--accent)":"var(--t2)",
                      position:"relative",
                    }}>
                    {item.badge&&<span style={{
                      position:"absolute",top:6,right:"20%",
                      background:"var(--err)",color:"#fff",
                      fontSize:8,fontWeight:700,padding:"1px 4px",borderRadius:20,
                    }}>{item.badge}</span>}
                    <span style={{fontSize:22}}>{item.ico}</span>
                    <span style={{fontSize:10,fontWeight:600}}>{item.lbl}</span>
                  </button>
                ))}
              </div>
            </div>

            {/* Bottom nav bar */}
            <div className="mob-nav">
              {MOB_NAV.map(item=>(
                <button key={item.id} className={`mob-nav-item${tab===item.id?" active":""}`}
                  onClick={()=>{setTab(item.id);setMobMoreOpen(false);}}>
                  {item.badge&&<span className="mob-nav-badge">{item.badge}</span>}
                  <span className="mob-nav-icon">{item.ico}</span>
                  <span className="mob-nav-lbl">{item.lbl}</span>
                </button>
              ))}
              {/* More button */}
              <button className={`mob-nav-item${inMore?" active":""}`}
                onClick={()=>setMobMoreOpen(p=>!p)}>
                <span className="mob-nav-icon">{moreOpen?"✕":"⋯"}</span>
                <span className="mob-nav-lbl">More</span>
              </button>
            </div>
          </>
        );
      })()}
      <PopupDOM/>
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
} catch(e) {
  document.getElementById("root").innerHTML = '<div style="padding:40px;font-family:monospace;color:#f87171;background:#0f0f0f;min-height:100vh;white-space:pre-wrap"><h2 style="margin-bottom:16px">⚠ React Error</h2>' + e.message + '\n\n' + (e.stack||'') + '</div>';
}
</script>
</body>
</html>
