                      </div>
                      <div style={{fontSize:11,color:"var(--t2)",wordBreak:"break-all"}}>{px.type}://{px.host}:{px.port} → {px.ispSmtpHost}:{px.ispSmtpPort}</div>
                      {px.fromDomain && <div style={{fontSize:11,color:"var(--t2)"}}>EHLO: {px.fromDomain}</div>}
                      {px.portResults && (
                        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:4}}>
                          {px.portResults.map(function(pr){return(
                            <span key={pr.port} style={{fontSize:10,padding:"1px 6px",borderRadius:3,fontFamily:"monospace",
                              background:pr.ok?"rgba(34,197,94,.15)":"rgba(239,68,68,.12)",
                              color:pr.ok?"var(--ok)":"var(--err)",
                              border:"1px solid "+(pr.ok?"rgba(34,197,94,.3)":"rgba(239,68,68,.2)")}}>
                              {pr.ok?"✓":"✗"} :{pr.port}{pr.ok&&pr.latency_ms?" "+pr.latency_ms+"ms":""}
                            </span>
                          );})}
                        </div>
                      )}
                      {px.testResult && !px.portResults && <div style={{fontSize:11,color:px.status==="ok"?"var(--ok)":"var(--err)",marginTop:2,wordBreak:"break-all"}}>{px.testResult}</div>}
                    </div>
                    <div style={{display:"flex",gap:6,flexShrink:0}}>
                      <button className="btn btn-g btn-sm" disabled={!!testingPx[px.id]} onClick={function(){testProxy(px);}}>{testingPx[px.id]?"Testing...":"Test"}</button>
                      <button className="btn btn-sm" style={{background:"#ef4444",color:"#fff",border:"none"}} onClick={function(){saveProxies(proxies.filter(function(x){return x.id!==px.id;}));}}>Remove</button>
                    </div>
                  </div>
                </div>
              );})}
            </div>
          )}
      </>
    </div>
  );
}


function TabProxies({proxies, setProxies, proxyDraft, setProxyDraft, proxyType, setProxyType}) {
  const [pTab, setPTab] = useState("list");
  const [testR, setTestR] = useState({});
  const [testL, setTestL] = useState({});
  const [testSmtpHost, setTestSmtpHost] = useState("");
  const [testSmtpPort, setTestSmtpPort] = useState("");
  const [serverIp, setServerIp] = React.useState("");
  React.useEffect(()=>{
    apiCall("/api/server-ip").then(r=>r.json()).then(d=>{if(d.ip) setServerIp(d.ip);}).catch(()=>{});
  },[]);

  async function testOne(p, i) {
    setTestL(prev=>({...prev,[i]:true})); setTestR(prev=>({...prev,[i]:null}));
    try {
      // Use the global test target if set, otherwise fall back to per-proxy stored host
      const payload = {
        proxy: p.raw || p,
        ispSmtpHost: testSmtpHost.trim() || p.ispSmtpHost || p.smtpHost || "",
        ispSmtpPort: parseInt(testSmtpPort) || p.ispSmtpPort || p.smtpPort || 0,
      };
      const r = await apiCall("/api/test-proxy",{method:"POST",body:JSON.stringify(payload)});
      const d = await r.json();
      setTestR(prev=>({...prev,[i]:d}));
      const statusLabel = d.status==="ok" ? "ok" : (d.http_works ? "smtp_blocked" : "failed");
      setProxies(prev=>prev.map((px,j)=>j===i?{...px,status:statusLabel,testResult:d.message,openPorts:d.open_ports,bestPort:d.best_port,portResults:d.port_results,httpWorks:d.http_works}:px));
    } catch(e) { setTestR(prev=>({...prev,[i]:{status:"error",message:e.message}})); }
    setTestL(prev=>({...prev,[i]:false}));
  }

  return (
    <div>
      <div className="ph">
        <div className="ph-title">🌐 Proxies</div>
        <div className="ph-sub">Route traffic through proxies for IP rotation and anonymity</div>
      </div>

      <div className="tab-bar">
        {[["list","Proxy List"],["builder","Builder"],["deploy","Deploy VPS"]].map(([k,l])=>(
          <button key={k} className={`tb ${pTab===k?"on":""}`} onClick={()=>setPTab(k)}>{l}</button>
        ))}
      </div>

      {pTab==="list" && (
        <div className="g2" style={{alignItems:"start"}}>
          <div className="card">
            {serverIp && <div style={{background:"var(--bg2)",border:"1px solid var(--bdr)",borderRadius:6,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10,fontSize:13}}>
              <span style={{color:"var(--t2)"}}>🖥️ Your server IP (whitelist this in proxy dashboards):</span>
              <code style={{fontFamily:"var(--font-mono)",fontWeight:700,color:"var(--ok)",fontSize:14}}>{serverIp}</code>
              <button className="btn btn-g btn-xs" onClick={()=>copyToClipboard(serverIp)}>📋 Copy</button>
            </div>}
            <div className="card-title">
              <Tip text="Supported formats: socks5://user:pass@host:port, http://host:port, or just host:port. One proxy per line.">
                Add Proxies
              </Tip>
            </div>
            <div className="mb10">
              <label className="lbl">Proxy Type</label>
              <select value={proxyType} onChange={e=>setProxyType(e.target.value)} style={{width:180,fontSize:14,padding:"10px 12px"}}>
                <option value="socks5">SOCKS5</option>
                <option value="socks4">SOCKS4</option>
                <option value="http">HTTP</option>
                <option value="https">HTTPS</option>
              </select>
            </div>
            <textarea value={proxyDraft} onChange={e=>setProxyDraft(e.target.value)}
              placeholder={"socks5://user:pass@1.2.3.4:1080\nhttp://proxy.host:8080"}
              style={{minHeight:200, fontFamily:"var(--font-mono)", fontSize:12}}/>
            <button className="btn btn-p btn-sm mt8" onClick={()=>{
              const newP = proxyDraft.split("\n").map(s=>s.trim()).filter(Boolean).map(raw=>({raw,type:proxyType,status:"untested"}));
              setProxies(p=>[...p,...newP]); setProxyDraft("");
            }}>+ Add Proxies</button>
          </div>

          <div className="card">
            <div className="row jb ac-center mb12">
              <div className="card-title" style={{marginBottom:0}}>Proxy Pool ({proxies.length})</div>
              <div className="row g8">
                <button className="btn btn-g btn-sm" onClick={async()=>{for(let i=0;i<proxies.length;i++)await testOne(proxies[i],i);}}>🔍 Test All</button>
                <button className="btn btn-w btn-sm" onClick={()=>setProxies(p=>p.filter((_,i)=>p[i].status!=="failed"))}>Remove Dead</button>
                <button className="btn btn-d btn-sm" onClick={()=>setProxies([])}>Clear All</button>
              </div>
            </div>
            <div className="row g8 mb12" style={{alignItems:"center"}}>
              <div style={{flex:2,minWidth:0}}>
                <label className="lbl" style={{marginBottom:4}}>Test SMTP Target (host to reach through proxy)</label>
                <input value={testSmtpHost} onChange={e=>setTestSmtpHost(e.target.value)}
                  placeholder="leave blank for default (portquiz.net)"
                  style={{width:"100%",padding:"7px 10px",background:"var(--bg2)",border:"1px solid var(--bdr)",borderRadius:6,color:"var(--tx)",fontSize:12,fontFamily:"var(--font-mono)",boxSizing:"border-box"}}/>
              </div>
              <div style={{width:80}}>
                <label className="lbl" style={{marginBottom:4}}>Port</label>
                <input value={testSmtpPort} onChange={e=>setTestSmtpPort(e.target.value)}
                  placeholder="auto"
                  style={{width:"100%",padding:"7px 10px",background:"var(--bg2)",border:"1px solid var(--bdr)",borderRadius:6,color:"var(--tx)",fontSize:12,fontFamily:"var(--font-mono)",boxSizing:"border-box"}}/>
              </div>
              <div style={{fontSize:11,color:"var(--t2)",paddingTop:16,flexShrink:0}}>Leave blank = auto-probe all ports</div>
            </div>
            {proxies.length===0
              ? <div className="dim2 sm" style={{padding:"40px 0",textAlign:"center"}}>No proxies added yet.<br/>Add some from the left panel.</div>
              : <div style={{maxHeight:340,overflowY:"auto",border:"1px solid var(--border)",borderRadius:6}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead>
                    <tr style={{background:"var(--bg2)",position:"sticky",top:0}}>
                      <th style={{padding:"6px 10px",textAlign:"left",fontWeight:600,color:"var(--dim)",fontSize:11,borderBottom:"1px solid var(--border)"}}>STATUS</th>
                      <th style={{padding:"6px 10px",textAlign:"left",fontWeight:600,color:"var(--dim)",fontSize:11,borderBottom:"1px solid var(--border)"}}>PROXY</th>
                      <th style={{padding:"6px 10px",textAlign:"left",fontWeight:600,color:"var(--dim)",fontSize:11,borderBottom:"1px solid var(--border)"}}>TYPE</th>
                      <th style={{padding:"6px 10px",textAlign:"left",fontWeight:600,color:"var(--dim)",fontSize:11,borderBottom:"1px solid var(--border)"}}>RESULT</th>
                      <th style={{padding:"6px 10px",borderBottom:"1px solid var(--border)"}}></th>
                    </tr>
                  </thead>
                  <tbody>
                    {proxies.map((p,i)=>(
                      <tr key={i} style={{borderBottom:"1px solid var(--border)",background:i%2===0?"var(--bg)":"var(--bg2)"}}>
                        <td style={{padding:"7px 10px"}}>
                          <span title={p.status==="smtp_blocked"?"HTTP works but SMTP blocked":""}>
                            {p.status==="ok"?"✅":p.status==="failed"?"❌":p.status==="smtp_blocked"?"🟡":"⚪"}
                          </span>
                        </td>
                        <td style={{padding:"7px 10px",fontFamily:"var(--font-mono)",color:"var(--tx)",maxWidth:260,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.raw}</td>
                        <td style={{padding:"7px 10px"}}><span style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:3,padding:"1px 6px",fontSize:11,fontFamily:"var(--font-mono)"}}>{p.type||"socks5"}</span></td>
                        <td style={{padding:"7px 10px",maxWidth:220}}>
                          {testL[i] && <span className="dim xs">Testing…</span>}
                          {testR[i] && !testL[i] && (
                            testR[i].port_results
                              ? <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                                  {testR[i].port_results.map(pr=>(
                                    <span key={pr.port} style={{fontSize:10,padding:"1px 5px",borderRadius:3,fontFamily:"monospace",
                                      background:pr.ok?"rgba(34,197,94,.15)":"rgba(239,68,68,.12)",
                                      color:pr.ok?"var(--ok)":"var(--err)",
                                      border:"1px solid "+(pr.ok?"rgba(34,197,94,.3)":"rgba(239,68,68,.2)")}}>
                                      {pr.ok?"✓":"✗"}:{pr.port}{pr.ok&&pr.latency_ms?" "+pr.latency_ms+"ms":""}
                                    </span>
                                  ))}
                                </div>
                              : <span className={`xs ${testR[i].status==="ok"?"c-ok":"c-e"}`} style={{wordBreak:"break-word"}}>{testR[i].message||""}</span>
                          )}
                        </td>
                        <td style={{padding:"7px 10px"}}>
                          <div className="row g6">
                            <button className="btn btn-g btn-xs" onClick={()=>testOne(p,i)} disabled={testL[i]}>Test</button>
                            <button className="btn btn-d btn-xs" onClick={()=>setProxies(p=>p.filter((_,j)=>j!==i))}>✕</button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            }
          </div>
        </div>
      )}

      {pTab==="builder" && (
        <div className="g2" style={{alignItems:"start"}}>
          <div className="card">
            <div className="card-title">Proxy URL Builder</div>
            <Info type="i">Build proxy URLs from separate credential fields from your proxy provider.</Info>
            <div className="g2 mt12">
              {["host","port","username","password"].map(f=>(
                <div key={f}><label className="lbl">{f.charAt(0).toUpperCase()+f.slice(1)}</label><input id={`pb_${f}`} placeholder={f} style={{fontSize:14,padding:"10px 12px"}}/></div>
              ))}
            </div>
            <button className="btn btn-p btn-sm mt12" onClick={()=>{
              const h=document.getElementById("pb_host"||{}).value;
              const p=document.getElementById("pb_port"||{}).value;

              if(!h||!p) return;
              const url=u?`${proxyType}://${u}:${pw}@${h}:${p}`:`${proxyType}://${h}:${p}`;
              setProxies(prev=>[...prev,{raw:url,type:proxyType,status:"untested"}]);

          </div>
          <div className="card">
            <div className="card-title">Format Guide</div>

                  <div className="code" style={{fontSize:12,padding:"8px 12px"}}>{ex}</div>

            </div>
          </div>
        </div>

      {pTab==="deploy" && (

          </div>
          <div className="card">
            <div className="card-title">What This Does</div>
            <div className="col g12 dim2 sm">
              <div>🔐 Connects via SSH to your VPS</div>
              <div>📦 Installs <span className="mono">dante-server</span> (SOCKS5 daemon)</div>
              <div>⚙️ Configures it with username/password auth</div>
              <div>✅ Adds the new proxy to your proxy pool automatically</div>
              <div className="mt8"><Info type="i">Root SSH access required. Works on Ubuntu/Debian VPS.</Info></div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

        <button className={`tb ${tTab==="tpls"?"on":""}`} onClick={()=>setTTab("tpls")}>Templates ({allTpls.length})</button>

      {tTab==="tags" && (
        <div>
          <div className="row g8 mb16" style={{flexWrap:"wrap"}}>
            <input value={tagSearch} onChange={e=>setTagSearch(e.target.value)} placeholder="Search tags…" style={{width:220}}/>
            <div className="row g4" style={{flexWrap:"wrap"}}>
              {TAG_CATS.map(c=>(
                <button key={c} className={`btn btn-sm ${tagCat===c?"btn-p":"btn-g"}`} onClick={()=>setTagCat(c)}>
                  {c.charAt(0).toUpperCase()+c.slice(1)}
                </button>
              ))}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:12}}>
            {filteredTags.map(t=>(
              <div key={t.tag} className="card card-sm" style={{cursor:"pointer"}} onClick={()=>copyToClipboard(t.tag)}>
                <div className="row jb ac-center mb6">
                  <code style={{fontSize:15,fontWeight:700,color:"var(--accent)",fontFamily:"var(--font-mono)"}}>{t.tag}</code>
                  <Bdg t="n">{t.cat}</Bdg>
                </div>
                <div className="sm mb4">{t.desc}</div>
                <div className="xs dim2 mb6" style={{lineHeight:1.5}}>{t.long}</div>
                <div className="row ac-center g6">
                  <span className="dim2 xs">Example:</span>
                  <code style={{fontSize:11,color:"var(--ok)",fontFamily:"var(--font-mono)"}}>{t.ex}</code>
                  <span className="dim2 xs ml-auto">Click to copy</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {tTab==="tpls" && (
        <div>
          <div className="row g8 ac-center mb16">
            <input value={tplSearch} onChange={e=>setTplSearch(e.target.value)} placeholder="Search templates…" style={{flex:1}}/>
            <button className="btn btn-g btn-sm" onClick={()=>{
              const n=prompt("Template name:");
              if(!n) return;
              setCustomTpls(p=>[...p,{id:"c_"+Date.now(),name:n,cat:"Custom",col:"#f9f9f9",html:""}]);
            }}>+ New Template</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:16}}>
            {filtered.map(t=>(
              <div key={t.id} className="tplc">
                <div className="tplc-prev" style={{background:t.col||"#fff"}}>
                  {t.html
                    ? <iframe srcDoc={t.html} sandbox="allow-same-origin" title={t.name} style={{width:"200%",height:"200%",transform:"scale(.5)",transformOrigin:"top left",border:"none",pointerEvents:"none"}}/>
                    : <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:"#ccc",fontSize:13}}>No preview</div>
                  }
                </div>
                <div className="tplc-info">
                  <div className="tplc-name">{t.name}</div>
                  <div className="tplc-cat">{t.cat}</div>
                  <div className="row g6 mt8">
                    <button className="btn btn-p btn-xs" onClick={()=>{setHtmlBody(t.html);setTab("compose");}}>Use</button>
                    <button className="btn btn-g btn-xs" onClick={()=>setEditing({...t})}>Edit</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {editing && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}}
          onClick={()=>setEditing(null)}>
          <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"var(--radius)",padding:24,width:"82vw",maxHeight:"82vh",overflow:"auto"}}
            onClick={e=>e.stopPropagation()}>
            <div className="card-title">Editing: {editing.name}</div>
            <div className="mb10"><label className="lbl">Name</label><input value={editing.name} onChange={e=>setEditing({...editing,name:e.target.value})}/></div>
            <div><label className="lbl">HTML</label><textarea value={editing.html} onChange={e=>setEditing({...editing,html:e.target.value})} style={{minHeight:320,fontFamily:"var(--font-mono)",fontSize:12}}/></div>
            <div className="row g8 mt12">
              <button className="btn btn-p btn-sm" onClick={()=>{
                const isBuiltin = BUILTIN_TEMPLATES.find(t=>t.id===editing.id);
                if(isBuiltin) {
                  setCustomTpls(p=>{const ex=p.find(t=>t.id===editing.id);return ex?p.map(t=>t.id===editing.id?editing:t):[...p,{...editing,id:"c_"+editing.id}];});
                } else {
                  setCustomTpls(p=>p.map(t=>t.id===editing.id?editing:t));
                }
                setEditing(null);
              }}>Save</button>
              <button className="btn btn-g btn-sm" onClick={()=>setEditing(null)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════
   TAB: B2B
════════════════════════════════════════ */
function TabB2B({setLeadsRaw, setLeads, setTab}) {
  const [step, setStep] = useState(0);
  const [email, setEmail] = useState("");
  const [provider, setProvider] = useState("");
  const [providerInfo, setProviderInfo] = useState(null);
  const [authMode, setAuthMode] = useState("password");
  const [password, setPassword] = useState("");
  const [token, setToken] = useState("");
  const [session, setSession] = useState(null);
  const [extracted, setExtracted] = useState([]);
  const [limit, setLimit] = useState(500);
  const [filterG, setFilterG] = useState(true);
  const [daysBack, setDaysBack] = useState(90);
  const [loading, setLoading] = useState(false);
  const [msg, setMsg] = useState({text:"",type:"i"});
  const [extractLog, setExtractLog] = useState([]);

  const PROVIDERS = {
    microsoft365:  {ico:"🪟", label:"Microsoft 365",  authHints:["Regular password or App Password if MFA enabled","OAuth token from Azure portal","Device code flow for conditional access"]},
    google:        {ico:"🔵", label:"Google Workspace",authHints:["App Password required (myaccount.google.com/apppasswords)","OAuth token via Google Cloud Console","Must have IMAP enabled in Gmail settings"]},
    exchange:      {ico:"📮", label:"Exchange / OWA",  authHints:["Domain credentials (user@domain.com)","EWS endpoint auto-detected","NTLM/Basic auth supported"]},
    imap:          {ico:"📬", label:"IMAP (Generic)",  authHints:["Direct IMAP SSL (port 993)","App Password if provider requires it","Port 143 STARTTLS as fallback"]},
    generic:       {ico:"📧", label:"Unknown Provider",authHints:["Try password authentication","Check provider docs for app passwords","IMAP access may need to be enabled"]},
  };

  const steps=["Detect","Authenticate","Extract","Send"];

  function setInfo(text,type="i"){setMsg({text,type});}

  async function detect() {
    if(!email||!email.includes("@")){setInfo("Enter a valid email address first.","e");return;}
    setLoading(true); setInfo("","i");
    try {
      const r=await apiCall("/api/b2b/detect",{method:"POST",body:JSON.stringify({email})});
      if(r.ok){
        const d=await r.json();
        const prov=d.provider||"generic";
        setProvider(prov); setProviderInfo(d);
        const pi=PROVIDERS[prov]||PROVIDERS.generic;
        setInfo(`✓ Detected: ${pi.label}${d.mx?" — MX: "+d.mx:""}${d.autodiscover?" — Exchange autodiscovery found":""}${d.imap_host?" — IMAP: "+d.imap_host:""}`, "ok");
        setStep(1);
      } else {
        const d=await r.json().catch(()=>({}));
        setInfo("Detection failed: "+(d.error||"Could not identify provider. Will attempt generic IMAP."),"w");
        setProvider("generic"); setProviderInfo(null); setStep(1);
      }
    } catch(e){setInfo("Network error: "+e.message,"e");}
    setLoading(false);
  }

  async function auth() {
    setLoading(true); setInfo("","i");
    try {
      const ep=authMode==="password"?"/api/b2b/auth/password":"/api/b2b/auth/token";
      const body=authMode==="password"?{email,password,provider,providerInfo}:{email,token,provider};
      const r=await apiCall(ep,{method:"POST",body:JSON.stringify(body)});
      const d=await r.json();
      if(d.session||d.status==="ok"){
        setSession(d.session||d);setStep(2);
        setInfo("✓ Authenticated successfully — ready to extract","ok");
      } else {
        setInfo("Authentication failed: "+(d.error||"Check your credentials and try again"),"e");
      }
    } catch(e){setInfo("Auth error: "+e.message,"e");}
    setLoading(false);
  }

  async function extract() {
    setLoading(true); setInfo("Extracting leads…","i"); setExtracted([]); setExtractLog([]);
    try {
      const r=await apiCall("/api/b2b/extract",{method:"POST",body:JSON.stringify({email,session,limit,filterGeneric:filterG,daysBack})});
      const reader=r.body.getReader(),dec=new TextDecoder(); let buf="",all=[];
      while(true){
        const{done,value}=await reader.read();if(done)break;
        buf+=dec.decode(value,{stream:true});
        const lines=buf.split("\n");buf=lines.pop();
        for(const l of lines){
          if(!l.trim())continue;
          try{
            const ev=JSON.parse(l);
            if(ev.type==="lead"){all.push(ev.email);setExtracted([...all]);}
            else if(ev.type==="progress"){setExtractLog(p=>[...p.slice(-20),ev.msg]);}
            else if(ev.type==="done"){setInfo(`✓ Extracted ${all.length} leads from ${daysBack} days of email`,"ok");setStep(3);}
            else if(ev.type==="error"){setInfo("Error: "+ev.msg,"e");}
          }catch(e){}
        }
      }
    } catch(e){setInfo("Extraction error: "+e.message,"e");}
    setLoading(false);
  }

  const pi = PROVIDERS[provider]||PROVIDERS.generic;

  return (
    <div>
      <div className="ph"><div className="ph-title">🔒 B2B Sender</div><div className="ph-sub">Authenticate to inboxes, extract leads, and send directly</div></div>

      {/* Wizard steps */}
      <div className="wiz mb20">
        {steps.map((s,i)=>(
          <div key={s} className={`wiz-step ${step>i?"done":step===i?"cur":""}`} onClick={()=>step>i&&setStep(i)} style={{cursor:step>i?"pointer":"default"}}>
            <div className="wiz-n">{step>i?"✓":i+1}</div>
            <div className="wiz-l">{s}</div>
          </div>
        ))}
      </div>

      {msg.text && <div className="mb14"><Info type={msg.type}>{msg.text}</Info></div>}

      {/* ── Step 0: Detect ── */}
      {step===0 && (
        <div style={{display:"flex",gap:16,alignItems:"start"}}>
          <div className="card" style={{flex:"0 0 420px"}}>
            <div className="card-title">Step 1 — Detect Provider</div>
            <label className="lbl">Email Address</label>
            <input value={email} onChange={e=>setEmail(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&detect()}
              placeholder="user@company.com" style={{fontSize:15,padding:"12px 14px"}}/>
            <div className="mt14 row g8">
              <button className="btn btn-p" onClick={detect} disabled={loading||!email}>
                {loading?<span>🔍 Detecting…</span>:<span>Detect Provider →</span>}
              </button>
            </div>
            <div className="mt16" style={{borderTop:"1px solid var(--border)",paddingTop:14}}>
              <div className="dim2 xs mb10">Supported providers:</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {Object.values(PROVIDERS).filter(p=>p.label!=="Unknown Provider").map(p=>(
                  <span key={p.label} style={{fontSize:12,padding:"3px 10px",background:"var(--bg3)",borderRadius:20,border:"1px solid var(--border)"}}>{p.ico} {p.label}</span>
                ))}
              </div>
            </div>
          </div>
          <div className="card" style={{flex:1}}>
            <div className="card-title">How B2B Sender Works</div>
            <div className="col g14 sm">
              {[["🔍","Detect","We identify the email provider (Microsoft 365, Google, Exchange, IMAP) from the domain MX records and autodiscovery."],
                ["🔑","Authenticate","Log in with your password or OAuth token. App passwords work for MFA-protected accounts."],
                ["📥","Extract","Pull unique contact emails from inbox headers — people who emailed this inbox."],
                ["📤","Send","Load extracted leads directly into the campaign tab, or send directly from this authenticated inbox."]
              ].map(([ico,name,desc])=>(
                <div key={name} style={{display:"flex",gap:10}}>
                  <span style={{fontSize:18,flexShrink:0}}>{ico}</span>
                  <div><div style={{fontWeight:600,marginBottom:2}}>{name}</div><div className="dim2 xs">{desc}</div></div>
                </div>
              ))}
            </div>
            <div className="mt12"><Info type="i">This sends from a real authenticated business inbox — highest deliverability, bypasses spam filters, no SMTP credentials needed.</Info></div>
          </div>
        </div>
      )}

      {/* ── Step 1: Auth ── */}
      {step===1 && (
        <div style={{display:"flex",gap:16,alignItems:"start"}}>
          <div className="card" style={{flex:"0 0 420px"}}>
            <div className="card-title">Step 2 — Authenticate</div>
            <div className="row ac-center g10 mb14" style={{padding:"12px 14px",background:"var(--bg3)",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)"}}>
              <span style={{fontSize:22}}>{pi.ico}</span>
              <div>
                <div style={{fontWeight:600,fontSize:14}}>{pi.label}</div>
                <div className="dim2 xs">{email}</div>
              </div>
              <button className="btn btn-g btn-xs ml-auto" onClick={()=>setStep(0)}>← Change</button>
            </div>
            <div className="tab-bar mb12">
              {[["password","🔐 Password"],["token","🪙 OAuth Token"]].map(([k,l])=>(
                <button key={k} className={`tb ${authMode===k?"on":""}`} onClick={()=>setAuthMode(k)}>{l}</button>
              ))}
            </div>
            {authMode==="password" ? (
              <div>
                <label className="lbl">Password / App Password</label>
                <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&auth()}
                  placeholder="Your password or app-specific password" style={{fontSize:14,padding:"10px 12px"}}/>
              </div>
            ) : (
              <div>
                <label className="lbl">Access / Bearer Token</label>
                <textarea value={token} onChange={e=>setToken(e.target.value)}
                  placeholder="Paste OAuth bearer token here…"
                  style={{minHeight:90,fontFamily:"var(--font-mono)",fontSize:11}}/>
              </div>
            )}
            <div className="row g8 mt14">
              <button className="btn btn-p" onClick={auth} disabled={loading}>{loading?"Authenticating…":"Authenticate →"}</button>
            </div>
          </div>
          <div className="card" style={{flex:1}}>
            <div className="card-title">{pi.ico} {pi.label} — Auth Tips</div>
            <div className="col g10">
              {pi.authHints.map((h,i)=>(
                <div key={i} style={{display:"flex",gap:8,fontSize:13}}>
                  <span style={{color:"var(--accent)",flexShrink:0}}>→</span>
                  <span className="dim">{h}</span>
                </div>
              ))}
            </div>
            {(provider==="microsoft365"||provider==="exchange") && (
              <div className="mt14">
                <Info type="i">If standard auth fails, try the <strong>OAuth Device Code</strong> flow — works with MFA, SSO, and Conditional Access policies without needing app passwords.</Info>
                <button className="btn btn-g btn-sm mt8" onClick={async()=>{
                  setInfo("Starting device code flow…","i");setLoading(true);
                  try{
                    const r=await apiCall("/api/oauth/device-code",{method:"POST",body:JSON.stringify({email})});
                    const d=await r.json();
                    if(d.user_code&&d.verification_uri){
                      setInfo(`Open ${d.verification_uri} and enter code: ${d.user_code}. Then click Poll below.`,"w");
                      window.open(d.verification_uri,"_blank");
                    }
                  }catch(e){setInfo("Device code error: "+e.message,"e");}
                  setLoading(false);
                }}>🔗 Start Device Code Flow</button>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── Step 2: Extract ── */}
      {step===2 && (
        <div style={{display:"flex",gap:16,alignItems:"start"}}>
          <div className="card" style={{flex:"0 0 420px"}}>
            <div className="card-title">Step 3 — Extract Leads</div>
            <div style={{padding:"10px 14px",background:"var(--ok)11",border:"1px solid var(--ok)44",borderRadius:"var(--radius-sm)",marginBottom:14,fontSize:13}}>
              <span className="c-ok">✓ Authenticated</span> as <strong>{email}</strong> via {pi.label}
            </div>
            <div className="g2 mb12">
              <div>
                <label className="lbl">Email Limit</label>
                <input type="number" value={limit} onChange={e=>setLimit(parseInt(e.target.value))} min="10" max="10000" style={{fontSize:15,padding:"10px 12px"}}/>
              </div>
              <div>
                <label className="lbl">Days Back</label>
                <input type="number" value={daysBack} onChange={e=>setDaysBack(parseInt(e.target.value))} min="7" max="365" style={{fontSize:15,padding:"10px 12px"}}/>
              </div>
            </div>
            <div className="mb14"><Tog checked={filterG} onChange={setFilterG} label="Filter generic addresses" desc="Skip noreply@, info@, admin@, postmaster@ etc."/></div>
            <div className="row g8">
              <button className="btn btn-g btn-sm" onClick={()=>setStep(1)}>← Back</button>
              <button className="btn btn-p" onClick={extract} disabled={loading}>{loading?"Extracting…":"🔍 Extract Leads"}</button>
            </div>
          </div>
          <div className="card" style={{flex:1}}>
            <div className="row jb ac-center mb8">
              <div className="card-title" style={{marginBottom:0}}>Live Results</div>
              {extracted.length>0&&<Bdg t="ok">{extracted.length} found</Bdg>}
            </div>
            {loading && extractLog.length>0 && (
              <div className="flog mb10" style={{height:120}}>{extractLog.map((l,i)=><div key={i} className="dim2 xs">{l}</div>)}</div>
            )}
            {extracted.length>0 ? (
              <div className="code" style={{maxHeight:280,overflowY:"auto",fontSize:12,lineHeight:1.8}}>
                {extracted.slice(0,100).join("\n")}{extracted.length>100?`\n…and ${extracted.length-100} more`:""}
              </div>
            ) : (
              <div className="dim2 sm" style={{padding:"30px 0",textAlign:"center"}}>
                {loading?"⏳ Scanning inbox for contacts…":"Results will appear here"}
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── Step 3: Use leads ── */}
      {step===3 && (
        <div style={{display:"flex",gap:16,alignItems:"start"}}>
          <div className="card" style={{flex:"0 0 420px"}}>
            <div className="card-title">Step 4 — Use Leads</div>
            <Info type="ok">{extracted.length} unique leads extracted from {email}</Info>
            <div className="col g8 mt14">
              <button className="btn btn-p" onClick={()=>{setLeadsRaw(extracted.join("\n"));setLeads(parseLeads(extracted.join("\n")));setTab("leads");}}>
                📋 Load into Leads Tab
              </button>
              <button className="btn btn-g btn-sm" onClick={()=>{
                const a=document.createElement("a");
                a.href="data:text/plain;charset=utf-8,"+encodeURIComponent(extracted.join("\n"));
                a.download=`leads_${email.split("@")[0]}_${Date.now()}.txt`;a.click();
              }}>⬇ Download as TXT</button>
              <button className="btn btn-g btn-sm" onClick={()=>setStep(2)}>← Extract More</button>
            </div>
          </div>
          <div className="card" style={{flex:1}}>
            <div className="row jb ac-center mb10">
              <div className="card-title" style={{marginBottom:0}}>All Extracted ({extracted.length})</div>
              <Bdg t="ok">{extracted.length} leads</Bdg>
            </div>
            <div className="code" style={{maxHeight:340,overflowY:"auto",fontSize:12,lineHeight:1.8}}>
              {extracted.join("\n")}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════
   TAB: FILES
════════════════════════════════════════ */
function TabFiles({filesList, uploadFile, deleteFile, renameFile, fileUploadLoading}) {
  const [cat, setCat] = useState("all");
  const cats=["all","attachments","leads","letters","templates","senders","misc"];
  const catIco={attachments:"📎",leads:"👥",letters:"✉️",templates:"📋",senders:"📤",misc:"📦"};
  const filtered=cat==="all"?filesList:filesList.filter(f=>f.category===cat);
  const [selCat, setSelCat] = useState("attachment");

  return (
    <div>
      <div className="ph"><div className="ph-title">📁 Files</div><div className="ph-sub">All uploaded files organised by category</div></div>

      <div style={{display:"flex",gap:16,alignItems:"flex-start"}}>
        {/* Sidebar */}
        <div style={{width:170,flexShrink:0,minWidth:170}}>
          <div className="card">
            <div className="dim2 xs bold mb8">CATEGORIES</div>
            {cats.map(c=>(
              <div key={c} className={`sb-item ${cat===c?"active":""}`} style={{borderRadius:"var(--radius-sm)",padding:"7px 12px",fontSize:13}} onClick={()=>setCat(c)}>
                <span>{catIco[c]||"📁"}</span>
                <span>{c.charAt(0).toUpperCase()+c.slice(1)}</span>
                <span className="ml-auto xs dim2">{c==="all"?filesList.length:filesList.filter(f=>f.category===c).length}</span>
              </div>
            ))}
          </div>
        </div>

        {/* File list */}
        <div style={{flex:1}}>
          <div className="card">
            <div className="row jb ac-center mb12">
              <div className="card-title" style={{marginBottom:0}}>{cat.charAt(0).toUpperCase()+cat.slice(1)} ({filtered.length})</div>
              <div className="row g8">
                <select value={selCat} onChange={e=>setSelCat(e.target.value)} style={{width:"auto",padding:"6px 10px"}}>
                  <option value="attachment">Attachment</option>
                  <option value="leads">Leads</option>
                  <option value="letter">Letter</option>
                  <option value="template">Template</option>
                  <option value="senders">Senders</option>
                  <option value="misc">Misc</option>
                </select>
                <button className="btn btn-g btn-sm" onClick={()=>document.getElementById("files-up"||{}).click()} disabled={fileUploadLoading}>
                  {fileUploadLoading?"Uploading…":"⬆ Upload"}
                </button>
              </div>
              <input id="files-up" type="file" multiple style={{display:"none"}}
                onChange={async e=>{for(const f of e.target.files) await uploadFile(f,selCat);}}/>
            </div>

            {filtered.length===0
              ? <Info type="i">No files here. Upload using the button above.</Info>
              : (
                <div className="col g8">
                  {filtered.map(file=>{
                    const ti=ATTACH_TYPES.find(t=>(file.mime_type||"").includes(t.id))||ATTACH_TYPES[13];
                    return (
                      <div key={file.id} className="fi">
                        <div className="fi-ic" style={{background:ti.col+"22"}}>{ti.ico}</div>
                        <div style={{flex:1}}>
                          <div className="fi-name">{file.display_name||file.original_name}</div>
                          <div className="fi-meta">{file.category} · {fmtBytes(file.size)} · {(file.created_at||"").split("T")[0]}</div>
                        </div>
                        <Bdg t="n">{(file.mime_type||"").split("/")[1]||"file"}</Bdg>
                        <div className="row g6">
                          <button className="btn btn-g btn-xs" onClick={async()=>{const n=await showPopup({title:"Rename File",msg:"Enter new name:",ico:"✏️",type:"prompt",defaultValue:file.display_name||file.original_name});if(n)await renameFile(file.id,n);}}>✏️</button>
                          <button className="btn btn-d btn-xs" onClick={()=>deleteFile(file.id)}>🗑</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )
            }
          </div>
        </div>
      </div>
    </div>
  );
}

function TabTools({filesList, uploadFile, setLeadsRaw, setLeads, setTab}) {
  const [tTool, setTTool] = useState("extractor");
  // Extractor state
  const [exEmail, setExEmail] = useState("");
  const [exPass, setExPass] = useState("");
  const [exTok, setExTok] = useState("");
  const [exHost, setExHost] = useState("");
  const [exPort, setExPort] = useState(993);
  const [exLimit, setExLimit] = useState(500);
  const [exFilter, setExFilter] = useState(true);
  const [exLoading, setExLoading] = useState(false);
  const [exResult, setExResult] = useState(null);
  // Validator state
  const [valEmails, setValEmails] = useState("");

  const [valLoading, setValLoading] = useState(false);
  const [valResult, setValResult] = useState(null);
  const [randomise, setRandomise] = useState(false);

  async function runExtract() {
    setExLoading(true); setExResult(null);
    try {
      const r=await apiCall("/api/extract-inbox",{method:"POST",body:JSON.stringify({email:exEmail,password:exPass,accessToken:exTok,imapHost:exHost,imapPort:parseInt(exPort),limit:parseInt(exLimit),filterGeneric:exFilter})});
      setExResult(await r.json());
    } catch(e){setExResult({error:"Connection error: "+e.message+". Make sure the backend server is running and this route is available."}); }
    setExLoading(false);
  }

  async function runValidate() {
    setValLoading(true); setValResult(null);
    // Resolve #RANDOMSTR before sending — validator checks domain only; literal tag breaks display
    const emails=valEmails.split(/\r?\n/).map(s=>s.trim()).filter(Boolean).map(e=>{
      if(e.includes("#RANDOMSTR")){
        const rand=Math.random().toString(36).slice(2,10);
        return e.replace(/#RANDOMSTR/g, rand);
      }
      return e;
    });
    try {
      const r=await apiCall("/api/tools/validate-fromemail",{method:"POST",body:JSON.stringify({emails})});
      setValResult(await r.json());
    } catch(e){setValResult({error:e.message});}
    setValLoading(false);
  }

  return (
    <div>
      <div className="ph"><div className="ph-title">🔧 Tools</div><div className="ph-sub">Utilities for inbox extraction and sender validation</div></div>

      <div className="tab-bar">
        <button className={`tb ${tTool==="extractor"?"on":""}`} onClick={()=>setTTool("extractor")}>📥 From-Mail Extractor</button>
        <button className={`tb ${tTool==="validator"?"on":""}`} onClick={()=>setTTool("validator")}>✅ From-Mail Validator</button>
      </div>

      {tTool==="extractor" && (
        <div className="g2" style={{alignItems:"start"}}>
          <div className="card">
            <div className="card-title">📥 Inbox From-Mail Extractor</div>
            <Info type="i">Connects to a mailbox via IMAP and extracts unique sender addresses. Great for building B2B lead lists. <strong>Note:</strong> Requires backend route <code>/api/extract-inbox</code> to be active.</Info>
            <div className="g2 mt12 mb12">
              <div><label className="lbl">Email Address</label><input value={exEmail} onChange={e=>setExEmail(e.target.value)} placeholder="you@company.com" style={{fontSize:14,padding:"10px 12px"}}/></div>
              <div><label className="lbl">Password / App Password</label><input type="password" value={exPass} onChange={e=>setExPass(e.target.value)} style={{fontSize:14,padding:"10px 12px"}}/></div>
              <div><label className="lbl">OAuth Token (optional)</label><input value={exTok} onChange={e=>setExTok(e.target.value)} placeholder="Bearer token" style={{fontSize:14,padding:"10px 12px"}}/></div>
              <div><label className="lbl">Custom IMAP Host (optional)</label><input value={exHost} onChange={e=>setExHost(e.target.value)} placeholder="imap.yourdomain.com" style={{fontSize:14,padding:"10px 12px"}}/></div>
              <div><label className="lbl">IMAP Port</label><input type="number" value={exPort} onChange={e=>setExPort(e.target.value)} style={{fontSize:15,padding:"10px 12px"}}/></div>
              <div><label className="lbl">Limit (emails to scan)</label><input type="number" value={exLimit} onChange={e=>setExLimit(e.target.value)} style={{fontSize:15,padding:"10px 12px"}}/></div>
            </div>
            <Tog checked={exFilter} onChange={setExFilter} label="Filter generic addresses" desc="Remove noreply@, info@, admin@, support@ etc."/>
            <div className="mt12"><button className="btn btn-p" onClick={runExtract} disabled={exLoading||!exEmail}>{exLoading?"Extracting…":"▶ Extract From-Mails"}</button></div>
          </div>

          <div className="card">
            <div className="card-title">Results</div>
            {!exResult
              ? <div className="dim2 sm" style={{padding:"20px 0",textAlign:"center"}}>Run extraction to see results here.</div>
              : exResult.error
                ? <Info type="e">{exResult.error}</Info>
                : <div>
                    <div className="row jb ac-center mb12">
                      <Bdg t="ok">{(exResult.emails||[]).length||0} addresses extracted</Bdg>
                      <div className="row g8">
                        <button className="btn btn-ok btn-sm" onClick={()=>{
                          const txt=(exResult.emails||[]).join("\n");
                          setLeadsRaw(txt); setLeads(parseLeads(txt)); setTab("leads");
                        }}>→ Load to Leads</button>
                        <button className="btn btn-g btn-sm" onClick={()=>uploadFile(new Blob([(exResult.emails||[]).join("\n")],{type:"text/plain"}), "leads")}>
                          💾 Save to Files
                        </button>
                      </div>
                    </div>
                    <div className="code" style={{maxHeight:400,overflowY:"auto",fontSize:12}}>
                      {(exResult.emails||[]).join("\n")}
                    </div>
                  </div>
            }
          </div>
        </div>
      )}

      {tTool==="validator" && (
        <div className="g2" style={{alignItems:"start"}}>
          <div className="card">
            <div className="card-title">✅ From-Mail Validator</div>
            <Info type="i">Checks DNS/MX records, SPF, DMARC, and Spamhaus blacklist for each sender domain. No SSH required.</Info>
            <div className="mt12 mb12">
              <label className="lbl">From Emails to Validate (one per line)</label>
              <textarea value={valEmails} onChange={e=>setValEmails(e.target.value)}
                placeholder={"hello@domain1.com\nnoreply@domain2.com"}
                style={{minHeight:150,fontFamily:"var(--font-mono)",fontSize:12}}/>
            </div>

            <Tog checked={randomise} onChange={setRandomise} label="Randomise local part for usable senders" desc='Replaces the part before @ with #RANDOMSTR@domain.com after validation'/>
            <div className="mt12"><button className="btn btn-p" onClick={runValidate} disabled={valLoading||!valEmails.trim()}>{valLoading?"Validating…":"▶ Validate From-Mails"}</button></div>
          </div>

          <div className="card">
            <div className="card-title">Validation Results</div>
            {!valResult
              ? <div className="dim2 sm" style={{padding:"20px 0",textAlign:"center"}}>Run validation to see results here.</div>
              : valResult.error
                ? <Info type="e">{valResult.error}</Info>
                : <div>
                    {(()=>{
                      const usable=(valResult.results||[]).filter(r=>r.sendable);
                      const warned=(valResult.results||[]).filter(r=>r.sendable&&(r.warnings||[]).length>0&&!r.blacklisted);
                      const failed=(valResult.results||[]).filter(r=>!r.sendable);
                      const copyEmails=(arr)=>{
                        let emails=arr.map(r=>r.email);
                        if(randomise) emails=emails.map(e=>"#RANDOMSTR@"+(e.split("@")[1]||e));
                        copyToClipboard(emails.join("\n"));
                      };
                      return (<div className="row g8 mb12" style={{flexWrap:"wrap"}}>
                        <Bdg t="ok">{usable.length} sendable of {valResult.total||0}</Bdg>
                        {warned.length>0&&<Bdg t="w">{warned.length} warnings</Bdg>}
                        {failed.length>0&&<Bdg t="e">{failed.length} failed</Bdg>}
                        {usable.length>0&&<button className="btn btn-ok btn-sm" onClick={()=>copyEmails(usable)}>📋 Copy valid ({usable.length}){randomise?" (randomised)":""}</button>}
                        {failed.length>0&&<button className="btn btn-g btn-sm" onClick={()=>copyEmails(failed)}>📋 Copy bad ({failed.length})</button>}
                      </div>);
                    })()}
                    <div className="tw">
                      <table>
                        <thead><tr><th>Email</th><th>MX</th><th>SPF</th><th>DMARC</th><th>Score</th><th>Blacklist</th><th>Sendable</th></tr></thead>
                        <tbody>
                          {(valResult.results||[]).map((r,i)=>{
                            const spfColor = r.spf_status==="strict"?"ok":r.spf_status==="softfail"?"w":r.spf_status==="missing"?"e":"n";
                            const dmarcColor = r.dmarc_status==="reject"?"e":r.dmarc_status==="quarantine"?"w":r.dmarc_status==="missing"?"w":"ok";
                            const scoreColor = (r.score||0)>=70?"ok":(r.score||0)>=50?"w":"e";
                            return (
                            <tr key={i}>
                              <td className="mono" style={{fontSize:11}}>{r.email}</td>
                              <td>{r.mx?<span title={r.mx}>✓</span>:<Bdg t="e">✗</Bdg>}</td>
                              <td><Bdg t={spfColor}>{r.spf_status||"?"}</Bdg></td>
                              <td><Bdg t={dmarcColor}>{r.dmarc_status||"?"}</Bdg></td>
                              <td><Bdg t={scoreColor}>{r.score||0}</Bdg></td>
                              <td>{r.blacklisted?<Bdg t="e">⚠</Bdg>:<span style={{color:"var(--ok)"}}>✓</span>}</td>
                              <td>{r.sendable?<Bdg t="ok">✓</Bdg>:<Bdg t="e">✗</Bdg>}</td>
                            </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
            }
          </div>
        </div>
      )}
    </div>
  );
}

function TabAccount({username, role, doLogout}) {
  const [aTab, setATab] = useState(role==="superadmin"||role==="admin"||role==="moderator"?"admin":"security");
  const [users, setUsers]     = useState([]);
  const [newU, setNewU]       = useState({username:"",password:"",role:"user",expires_at:""});
  const [adminMsg, setAdminMsg] = useState("");
  const [userSearch, setUserSearch] = useState("");
  const [apiKeyModal, setApiKeyModal] = useState(null); // {key, expires, username}
  const [editExpiry, setEditExpiry] = useState({}); // {uid: date string}
  const [pwForm, setPwForm]   = useState({current:"",new_pw:"",confirm:""});
  const [pwMsg, setPwMsg]     = useState("");

  // Telegram state
  const [tgStatus, setTgStatus]   = useState({linked:false,tg_username:"",tg_2fa_enabled:false});
  const [tgLink, setTgLink]       = useState(null);
  const [tgLoading, setTgLoading] = useState(false);
  const [tgConfig, setTgConfig]   = useState({bot_token:"",enabled:true,notify_channel:""});
  const [tgSaving, setTgSaving]   = useState(false);

  // Support tickets state
  const [tickets, setTickets]   = useState([]);
  const [openTicket, setOpenTicket] = useState(null);
  const [ticketMsgs, setTicketMsgs] = useState([]);
  const [newTicket, setNewTicket] = useState({subject:"",body:"",priority:"normal"});
  const [replyBody, setReplyBody] = useState("");
  const [ticketTab, setTicketTab] = useState("list");
  const [ticketFilter, setTicketFilter] = useState("open");

  // Admin notifications
  const [notifUid, setNotifUid]   = useState("");
  const [notifMsg, setNotifMsg]   = useState("");
  const [notifSent, setNotifSent] = useState("");

  const isAdmin = role==="admin"||role==="superadmin"||role==="moderator";
  const isSuperAdmin = role==="superadmin"||role==="admin";

  useEffect(()=>{
    loadTgStatus();
    loadTickets();
    if(isAdmin){ loadUsers(); if(isSuperAdmin) loadTgConfig(); }
  },[]);

  async function loadTgStatus(){
    try{const r=await apiCall("/api/tg/status");if(r.ok){const d=await r.json();setTgStatus(d);}}catch(e){}
  }
  async function loadTgConfig(){
    try{const r=await apiCall("/api/tg/config");if(r.ok){const d=await r.json();setTgConfig({...d,bot_token:""});}}catch(e){}
  }
  async function loadUsers(){
    try{const r=await apiCall("/api/admin/users/all");if(r.ok){const d=await r.json();setUsers(d.users||[]);}}catch(e){}
  }
  async function loadTickets(){
    try{const r=await apiCall(`/api/tickets?status=${ticketFilter}`);if(r.ok){const d=await r.json();setTickets(d.tickets||[]);}}catch(e){}
  }
  async function loadTicketMsgs(tid){
    try{const r=await apiCall(`/api/ticket/${tid}`);if(r.ok){const d=await r.json();setOpenTicket(d.ticket);setTicketMsgs(d.messages||[]);}}catch(e){}
  }

  useEffect(()=>{ loadTickets(); },[ticketFilter]);

  async function createUser(){
    try{const r=await apiCall("/api/admin/users",{method:"POST",body:JSON.stringify(newU)});const d=await r.json();if(r.ok){setAdminMsg("✓ User created");setNewU({username:"",password:"",role:"user",expires_at:""});loadUsers();}else setAdminMsg("✗ "+(d.error||"Failed"));}catch(e){setAdminMsg("Error: "+e.message);}
  }
  async function toggleUser(id){await apiCall(`/api/admin/users/${id}/toggle`,{method:"POST"});loadUsers();}
  const [confirmDelete, setConfirmDelete] = useState(null);
  async function deleteUser(id){
    await apiCall(`/api/admin/users/${id}`,{method:"DELETE"});
    setConfirmDelete(null); loadUsers();
  }
  async function setUserRole(uid, newRole){
    await apiCall("/api/admin/set-role",{method:"POST",body:JSON.stringify({user_id:uid,role:newRole})});
    loadUsers();
  }
  async function generateApiKey(uid, days){
    const r=await apiCall("/api/admin/api-key",{method:"POST",body:JSON.stringify({user_id:uid,days})});
    const d=await r.json();
    if(d.api_key){
      const uname=users.find(u=>u.id===uid||{}).username||"user";
      setApiKeyModal({key:d.api_key,expires:(d.expires||"").split("T")[0]||"",username:uname});
    }
    loadUsers();
  }
  async function updateExpiry(uid, date){
    await apiCall(`/api/admin/users/${uid}/expiry`,{method:"POST",body:JSON.stringify({expires_at:date||null})});
    loadUsers();
  }
  async function revokeApiKey(uid){
    await apiCall("/api/admin/api-key",{method:"POST",body:JSON.stringify({user_id:uid,revoke:true})});
    loadUsers();
  }
  async function changePw(){
    if(pwForm.new_pw!==pwForm.confirm){setPwMsg("✗ Passwords don't match");return;}
    try{const r=await apiCall("/api/change-password",{method:"POST",body:JSON.stringify({current:pwForm.current,new:pwForm.new_pw})});const d=await r.json();if(r.ok){setPwMsg("✓ Password changed");setPwForm({current:"",new_pw:"",confirm:""});}else setPwMsg("✗ "+(d.error||"Failed"));}catch(e){setPwMsg("Error: "+e.message);}
  }
  async function genLinkCode(){
    setTgLoading(true);
    try{const r=await apiCall("/api/tg/link-code",{method:"POST"});const d=await r.json();setTgLink(d);}catch(e){}
    setTgLoading(false);
  }
  async function unlinkTg(){
    const ok=await showPopup({title:"Unlink Telegram",msg:"This will also disable 2FA. Are you sure?",ico:"⚠️",type:"confirm"});if(!ok)return;
    await apiCall("/api/tg/unlink",{method:"POST"});
    setTgStatus({linked:false,tg_username:"",tg_2fa_enabled:false});
    setTgLink(null);
  }
  async function toggle2fa(){
    const r=await apiCall("/api/tg/toggle-2fa",{method:"POST"});
    const d=await r.json();
    if(r.ok) setTgStatus(s=>({...s,tg_2fa_enabled:d.enabled}));
  }
  async function saveTgConfig(){
    setTgSaving(true);
    await apiCall("/api/tg/config",{method:"POST",body:JSON.stringify(tgConfig)});
    await loadTgConfig();
    setTgSaving(false);
  }
  async function submitTicket(){
    if(!newTicket.subject.trim()||!newTicket.body.trim())return;
    const r=await apiCall("/api/tickets",{method:"POST",body:JSON.stringify(newTicket)});
    if(r.ok){setNewTicket({subject:"",body:"",priority:"normal"});setTicketTab("list");loadTickets();}
  }
  async function sendReply(tid){
    if(!replyBody.trim())return;
    await apiCall(`/api/ticket/${tid}/reply`,{method:"POST",body:JSON.stringify({body:replyBody})});
    setReplyBody(""); loadTicketMsgs(tid); loadTickets();
  }
  async function closeTicket(tid){
    await apiCall(`/api/ticket/${tid}/close`,{method:"POST"});
    loadTicketMsgs(tid); loadTickets();
  }
  async function reopenTicket(tid){
    await apiCall(`/api/ticket/${tid}/reopen`,{method:"POST"});
    loadTicketMsgs(tid); loadTickets();
  }
  async function sendTgNotif(){
    if(!notifUid||!notifMsg.trim())return;
    const r=await apiCall("/api/admin/tg-notify",{method:"POST",body:JSON.stringify({user_id:parseInt(notifUid),message:notifMsg})});
    if(r.ok){setNotifSent("✓ Sent");setNotifMsg("");}else setNotifSent("✗ Failed");
  }

  const TABS = [
    ...(isAdmin?[{id:"admin",lbl:"👥 Users"},{id:"tickets",lbl:"🎫 Support"},
                 {id:"tg-admin",lbl:"🤖 Telegram Bot"}]:[]),
    {id:"security",lbl:"🔐 Security"},
    {id:"telegram",lbl:"📱 Telegram"},
    {id:"password",lbl:"🔑 Password"},
  ];

  const roleBadgeColor = r => r==="superadmin"?"p":r==="admin"?"a":r==="moderator"?"ok":"n";

  return (
    <div>
      <div className="ph"><div className="ph-title">👤 Account</div><div className="ph-sub">Account settings, security, and support</div></div>
      <div className="tab-bar mb20">
        {TABS.map(t=>(
          <button key={t.id} className={`tb ${aTab===t.id?"on":""}`} onClick={()=>setATab(t.id)}>{t.lbl}</button>
        ))}
      </div>

      {/* ─── ADMIN: USERS ─── */}
      {aTab==="admin" && isAdmin && (
        <div>
          {isSuperAdmin && (
            <div className="ib ib-w mb16">
              <span className="ib-ic">🛡</span>
              <span><strong>Super Admin Mode</strong> — Changes here affect all users. Handle with care.</span>
            </div>
          )}
          {/* Create user */}
          <div className="card mb16">
            <div className="card-title">Create User</div>
            <div className="g2 mb10">
              <div><label className="lbl">Username</label><input value={newU.username} onChange={e=>setNewU({...newU,username:e.target.value})} style={{fontSize:14,padding:"10px 12px"}}/></div>
              <div><label className="lbl">Password</label><input type="password" value={newU.password} onChange={e=>setNewU({...newU,password:e.target.value})} style={{fontSize:14,padding:"10px 12px"}}/></div>
              <div>
                <label className="lbl">Role</label>
                <select value={newU.role} onChange={e=>setNewU({...newU,role:e.target.value})} style={{fontSize:14,padding:"10px 12px"}}>
                  <option value="user">User</option>
                  <option value="moderator">Moderator</option>
                  <option value="admin">Admin</option>
                  {role==="superadmin"&&<option value="superadmin">Super Admin</option>}
                </select>
              </div>
              <div><label className="lbl">Expires (optional)</label><input type="date" value={newU.expires_at} onChange={e=>setNewU({...newU,expires_at:e.target.value})} style={{fontSize:14,padding:"10px 12px"}}/></div>
            </div>
            <div className="row g8">
              <button className="btn btn-p btn-sm" onClick={createUser}>+ Create User</button>
              {adminMsg && <div className={`ib ${adminMsg.startsWith("✓")?"ib-ok":"ib-e"}`}><span className="ib-ic">{adminMsg.startsWith("✓")?"✓":"✗"}</span><span>{adminMsg}</span></div>}
            </div>
          </div>

          {/* User table */}
          {/* Admin Stats bar */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:16}}>
            <div className="stat"><div className="stat-v">{users.length}</div><div className="stat-l">Total Users</div></div>
            <div className="stat cg"><div className="stat-v">{users.filter(u=>u.active).length}</div><div className="stat-l">Active</div></div>
            <div className="stat ce"><div className="stat-v">{users.filter(u=>!u.active).length}</div><div className="stat-l">Suspended</div></div>
            <div className="stat ca"><div className="stat-v">{users.filter(u=>u.tg_linked).length}</div><div className="stat-l">TG Linked</div></div>
          </div>

          {/* API Key Modal */}
          {apiKeyModal && (
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9000}} onClick={()=>setApiKeyModal(null)}>
              <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"var(--radius)",padding:28,width:460,maxWidth:"90vw",boxShadow:"var(--shadow-md)"}} onClick={e=>e.stopPropagation()}>
                <div className="card-title mb8">🔑 API Key Generated</div>
                <Info type="w">Save this key now — it will NOT be shown again.</Info>
                <div className="mt12 mb8"><label className="lbl">Key for @{apiKeyModal.username} — expires {apiKeyModal.expires}</label></div>
                <div style={{background:"var(--inset)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",padding:"12px 14px",fontFamily:"var(--font-mono)",fontSize:13,wordBreak:"break-all",color:"var(--accent)"}}>{apiKeyModal.key}</div>
                <div className="row g8 mt12">
                  <button className="btn btn-p f1" onClick={()=>copyToClipboard(apiKeyModal.key)} >📋 Copy Key</button>
                  <button className="btn btn-g" onClick={()=>setApiKeyModal(null)}>Close</button>
                </div>
              </div>
            </div>
          )}

          <div className="card">
            <div className="row jb ac-center mb12">
              <div className="card-title" style={{marginBottom:0}}>Users ({users.length})</div>
              <div className="row g8">
                <input value={userSearch} onChange={e=>setUserSearch(e.target.value)} placeholder="Search users…" style={{width:190,padding:"6px 10px",fontSize:12}}/>
                <button className="btn btn-g btn-sm" onClick={loadUsers}>↻ Refresh</button>
              </div>
            </div>
            <div className="tw" style={{overflowX:"auto"}}>
              <table>
                <thead><tr><th>Username</th><th>Role</th><th>Status</th><th>TG</th><th>API Key</th><th>Expires</th><th>Last Login</th><th>Actions</th></tr></thead>
                <tbody>
                  {users.filter(u=>!userSearch||u.username.toLowerCase().includes(userSearch.toLowerCase())).map(u=>(
                    <tr key={u.id}>
                      <td className="bold">{u.username}</td>
                      <td>
                        {isSuperAdmin

/* ── Global clipboard helper — works on HTTP and HTTPS ── */
function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).catch(function() {
      _copyFallback(text);
    });
  } else {
    _copyFallback(text);
  }
}
function _copyFallback(text) {
  var ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.top = "-9999px";
  ta.style.left = "-9999px";
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand("copy"); } catch(e) {}
  document.body.removeChild(ta);
}

  // ── New Campaign — reset all campaign fields to defaults ───────────────
  function newCampaign() {
    if(!confirm("Start a new campaign? This will clear your current leads, senders, and email body. SMTP servers and settings are kept.")) return;
    setSubject(""); setExtraSubjects(""); setPreheader(""); setHtmlBody(""); setPlainBody("");
    setLinkRot([]); setLinkRotDraft(""); setLeadsRaw(""); setLeads([]); setCampName("Campaign "+new Date().toLocaleDateString());
    setCampLog([]); setCampStats({total:0,sent:0,failed:0,pending:0});
    // Keep: smtpList, apiList, tunnelList, senderName, sendersRaw, proxies — these are reusable infrastructure
  }

  // ── Load files on login ──
  useEffect(()=>{ if(token){ loadFiles(); loadHistory(); } },[token]);

  async function loadFiles() {
    try{ const r=await apiCall("/api/files"); if(r.ok){const d=await r.json();setFilesList(d.files||[]);} }catch(e){}
  }
  async function loadHistory() {
    try{ const r=await apiCall("/api/campaigns"); if(r.ok){const d=await r.json();setCampHistory(d.campaigns||[]);} }catch(e){}
  }

  async function uploadFile(file, category) {
    setFileUploadLoading(true);
    const fd = new FormData();
    fd.append(category, file, file.name||"file.bin");
    const tk = localStorage.getItem("st_token");
    try {
      const r = await fetch(API+"/api/files/upload",{method:"POST",headers:{"Authorization":"Bearer "+tk},body:fd});
      const d = await r.json();
      if((d.uploaded||[]).length) await loadFiles();
    } catch(e){}
    setFileUploadLoading(false);
  }

  async function deleteFile(id) {
    try{ const r=await apiCall(`/api/files/delete/${id}`,{method:"POST"});if(r.ok)setFilesList(p=>p.filter(f=>f.id!==id)); }catch(e){}
  }

  async function renameFile(id, name) {
    try{ await apiCall(`/api/files/rename/${id}`,{method:"POST",body:JSON.stringify({display_name:name})}); await loadFiles(); }catch(e){}
  }

  // ── Login ──
  const [pendingToken, setPendingToken] = useState("");
  const [otpMode, setOtpMode]           = useState(false);
  const [otpCode, setOtpCode]           = useState("");
  const [otpErr, setOtpErr]             = useState("");

  async function doLogin() {
    setLoginLoading(true); setLoginErr("");
    try {
      const r = await fetch(API+"/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:loginU,password:loginP})});
      const d = await r.json();
      if(r.ok && d.pending_2fa){
        // 2FA required — show OTP input
        setPendingToken(d.pending_token);
        setOtpMode(true);
        setLoginLoading(false);
        return;
      }
      if(r.ok&&d.token){
        localStorage.setItem("st_token",d.token); localStorage.setItem("st_user",d.username); localStorage.setItem("st_role",d.role);
        setToken(d.token); setUsername(d.username); setRole(d.role);
      } else setLoginErr(d.error||"Login failed");
    } catch(e){ setLoginErr("Connection error — is the server running?"); }
    setLoginLoading(false);
  }

  async function doVerifyOtp() {
    setLoginLoading(true); setOtpErr("");
    try {
      const r = await fetch(API+"/api/login/verify-otp",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({pending_token:pendingToken,otp_code:otpCode})});
      const d = await r.json();
      if(r.ok&&d.token){
        localStorage.setItem("st_token",d.token); localStorage.setItem("st_user",d.username); localStorage.setItem("st_role",d.role);
        setToken(d.token); setUsername(d.username); setRole(d.role);
        setOtpMode(false);
      } else setOtpErr(d.error||"Invalid code");
    } catch(e){ setOtpErr("Connection error"); }
    setLoginLoading(false);
  }

  function doLogout() {
    apiCall("/api/logout",{method:"POST"}).catch(()=>{});
    ["st_token","st_user","st_role"].forEach(k=>localStorage.removeItem(k));
    setToken(""); setUsername(""); setRole(""); setTab("campaign");
  }

  // ── Campaign send ──
  function addLog(msg, type="inf", email="", meta={}) {
    const d=new Date(), ts=`${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}:${String(d.getSeconds()).padStart(2,"0")}`;
    setCampLog(p=>[...p,{ts,msg,type,email,...meta}].slice(-500));
  }

  async function startCampaign() {
    const pLeads = parseLeads(leadsRaw, allowDupes);
    if(!pLeads.length){showPopup({title:"No Leads",msg:"No valid leads loaded. Add emails in the Leads tab.",ico:"👥",type:"alert"});return;}
    if(!subject.trim()){showPopup({title:"Missing Subject",msg:"Subject line is required before launching.",ico:"✉️",type:"alert"});return;}
    if(!htmlBody.trim()&&!plainBody.trim()){showPopup({title:"No Email Body",msg:"Write your email in the Compose tab first.",ico:"📝",type:"alert"});return;}
    const senders=sendersRaw.split(/\r?\n/).map(s=>s.trim()).filter(s=>s.includes("@"));
    if(!senders.length){showPopup({title:"No Senders",msg:"Add at least one sender email in the Senders tab.",ico:"📤",type:"alert"});return;}

    pauseRef.current={paused:false,abort:false};
    setCampRunning(true); setCampPaused(false); setCampLog([]);
    setCampStats({total:pLeads.length,sent:0,failed:0,pending:pLeads.length});
    addLog(`🚀 "${campName}" started — ${pLeads.length.toLocaleString()} recipients`,"inf");
    setHistTab("live");

    // Build ISP tunnels directly from proxies (no RDP needed — proxy connects directly)
    let ispTunnels = [];
    try {
      const ispProxies = JSON.parse(localStorage.getItem("isp_proxies") || "[]");
      ispTunnels = ispProxies.filter(px => px.host && px.ispSmtpHost).map(px => ({
        tunnelType: "isp",
        label: px.label || (px.user ? px.user.split("-")[0] : px.host) + " → " + px.ispSmtpHost,
        // No RDP — proxy connects directly to ISP SMTP
        sshHost: "",
        rdpSshPort: 22,
        sshUser: "",
        sshPass: "",
        socksHost: px.host,
        socksPort: parseInt(px.port) || 17521,
        // ISP proxy credentials
        proxyHost: px.host,
        proxyPort: px.port || "17521",
        proxyUser: px.user || "",
        proxyPass: px.pass || "",
        proxyType: px.type || "socks5",
        // ISP SMTP
        ispSmtpHost: px.ispSmtpHost || "",
        ispSmtpPort: px.ispSmtpPort || "25",
        fromDomain: px.fromDomain || "",
        smtpFromEmail: px.smtpFromEmail || "",
      }));
      console.log("ISP tunnels built:", ispTunnels.length, ispTunnels);
    } catch(e) { console.error("ISP tunnel build error:", e); }

    // Determine effective method and tunnels
    const effectiveMethod = activeMethod === "isp" ? "isp" : activeMethod;
    const effectiveTunnels = activeMethod === "isp" ? ispTunnels : tunnelList;

    const allSubjects = [subject, ...extraSubjects.split("\n").map(s=>s.trim()).filter(Boolean)];
    const allFromNames = [senderName, ...senderNames.split("\n").map(s=>s.trim()).filter(Boolean)].filter(Boolean);

    const payload={
      leads:pLeads.map(l=>l.email),
      subject, subjects:allSubjects,
      html:htmlBody, plain:plainBody,
      fromEmails:senders,
      fromName:allFromNames.length>0?allFromNames[0]:senderName,
      fromNames:allFromNames,
      replyTo:senderReplyTo.split("\n").map(s=>s.trim()).filter(Boolean)[0]||"",
      replyTos:senderReplyTo.split("\n").map(s=>s.trim()).filter(Boolean),
      _uid: (()=>{try{const u=JSON.parse(atob((localStorage.getItem("st_token")||"").split(".")[1]||"{}"));return u.sub||u.id||u.user_id||"";}catch(e){return "";}})(),
      method:effectiveMethod, smtpServers:smtpList, apiKeys:apiList,
      owa:owaConfig, crm:crmConfig, tunnels:effectiveTunnels,
      // Only include ispTunnels if actually using ISP method — prevents auto-switch to tunnel
      ...(effectiveMethod==="isp" ? {ispTunnels} : {}),
      proxies:proxies.map(p=>p.raw||p),
      batchSize:parseInt(batchSize), maxConnections:parseInt(concurrent)||1, delay:parseInt(delay), delayUnit,
      cooldownEvery:parseInt(cooldownEvery)||0, cooldownSecs:parseFloat(cooldownSecs)||60,
      batchPauseSecs:parseFloat(batchPauseSecs)||0,
      htmlBodies, htmlRotateMode,
      jitter:jitter?parseInt(jitterSec):0, domainThrottle:domThrottle, gmailDelay:5, msDelay:8, warmup,
      listUnsub, unsubEmail, unsubUrl, oneClickUnsub:oneClick,
      autoInjectUnsub:autoInject, autoPlainText:autoPlain, spamFilter, preheader,
      bypassMode, bypassZeroFont, bypassComments, bypassHomoglyphs, bypassFontRand, bypassInnat,
      hideFromEmail, autoFlagEmail, antiDetect, emailPriority:priority,
      threadSimulate, arcSimulate, msExchangeHeaders:msExchangeHdrs,
      skipPreflightDns,
      campaignName:campName, rotationMode:rotMode,
      linkRotation:linkRot.length>0 ? linkRot : linkRotDraft.split('\n').map(s=>s.trim()).filter(Boolean), linkRotMode,
      // Dynamic attachment config
      attachments: selectedType ? (() => {
        const cfg = {};
        if(selectedType==="ics") cfg.ics = {title:attachConfig.title, dtStart:attachConfig.dtStart, duration:attachConfig.duration, location:attachConfig.location};
        if(selectedType==="pdf") cfg.pdf = {name:attachConfig.fileName, content:attachConfig.content};
        if(selectedType==="ghost_pdf") cfg.ghost_pdf = {link:attachConfig.ghostLink, title:attachConfig.ghostTitle, name:attachConfig.ghostName, text:attachConfig.ghostText};
        if(selectedType==="html_image") cfg.html_image = {width:attachConfig.imgWidth||650, height:attachConfig.imgHeight||800, format:attachConfig.imgFormat||"png", name:attachConfig.imgName, inline_replace:attachConfig.imgInlineReplace||false};
        return cfg;
      })() : {},
    };

    try {
      const r = await apiCall("/api/send",{method:"POST",body:JSON.stringify(payload)});
      const reader=r.body.getReader(), dec=new TextDecoder(); let buf="",sent=0,failed=0;
      while(true){
        if(pauseRef.current.abort){addLog("⛔ Aborted","wrn");break;}
        while(pauseRef.current.paused&&!pauseRef.current.abort) await new Promise(res=>setTimeout(res,300));
        const{done,value}=await reader.read(); if(done)break;
        buf+=dec.decode(value,{stream:true});
        const lines=buf.split("\n"); buf=lines.pop();
        for(const line of lines){
          if(!line.trim())continue;
          try{
            const ev=JSON.parse(line);
            if(ev.type==="sent"||ev.type==="success"){
              sent++;
              setCampStats(s=>({...s,sent,pending:s.total-sent-failed}));
              const fromPart = ev.from ? ` ← ${ev.from}` : "";
              const v = ev.via||"";
              const vIcon = v.match(/amazonaws|smtp|relay/i) ? "📨"
                          : v.match(/sendgrid|mailgun|sparkpost|postmark|ses|api/i) ? "🔌"
                          : v.match(/tunnel|rdp|isp|socks/i) ? "🔑"
                          : v.match(/owa|exchange|outlook/i) ? "📮"
                          : v.match(/crm|hubspot|salesforce/i) ? "🗄️"
                          : v ? "📡" : "";
              const viaPart  = v ? ` ${vIcon} ${v}` : "";
              addLog(`${ev.email||""}${fromPart}${viaPart}`, "ok", ev.email||"", {from:ev.from||"",via:v});
            }
            else if(ev.type==="error"||ev.type==="fail"){
              failed++;
              setCampStats(s=>({...s,failed,pending:s.total-sent-failed}));
              addLog(`✗ ${ev.email||""} — ${ev.msg||ev.error||""}`, "err", ev.email||"");
            }
            else if(ev.type==="info") addLog(ev.msg||"","inf");
            else if(ev.type==="warn") addLog(ev.msg||"","wrn");
            else if(ev.type==="proxy_dead") {
              // Remove dead proxy from Proxy List tab state
              const deadHost = (ev.host||"").toLowerCase();
              if(deadHost) {
                const _filterDead = p => {
                  const raw = (p.raw||"").toLowerCase();
                  const pHost = (p.host||"").toLowerCase();
                  return !raw.includes(deadHost) && pHost !== deadHost;
                };
                // Remove from Proxy List tab (in-memory state)
                setProxies(prev => prev.filter(_filterDead));
                // Remove from ISP proxies (localStorage + state via saveIspProxies if available)
                try {
                  const isp = JSON.parse(localStorage.getItem("isp_proxies")||"[]");
                  const ispUpdated = isp.filter(_filterDead);
                  localStorage.setItem("isp_proxies", JSON.stringify(ispUpdated));
                } catch(e){}
                addLog(`🗑 Proxy ${ev.host} removed from pool (persistent)`, "inf");
              }
            }
            else if(ev.type==="pause") addLog(ev.msg||"⏸ Paused","wrn");
            else if(ev.type==="batch") addLog(ev.msg||"","inf");
            else if(ev.type==="done") {
              addLog(`✅ Complete — ${sent.toLocaleString()} sent, ${failed.toLocaleString()} failed`,"inf");
              setCampStats(s=>({...s,pending:0}));
            }
            // SMTP dead detection — warn/info events only; errors already shown as ✗
            // Skip: AUP events (dedicated messages), auth failures (shown in ✗ line),
            //        sender-removal infos (✂), greylist/retry events
            const msgText = ev.msg||ev.error||"";
            const _skipPatterns = /AUP#POL|AUP#MXRT|sender rejected|temporarily unavailable|✂ Sender|greylist|MXRT retry|proxy retry|health=|demoted|Resuming|removed.*remaining|dead proxy/i;
            if(!_skipPatterns.test(msgText) && ev.type!=="error" && ev.type!=="fail" && ev.type!=="success" &&
               msgText.match(/connect.*fail|connection.*refused|SMTP.*error|AUTH.*fail|wrong credentials|authentication.*fail|535|534|too many|rate.?limit|blacklist|banned|blocked|timeout|timed out/i)) {
              addLog(`⚠️ SMTP Issue: ${msgText.slice(0,120)}`,"warn");
            }
          }catch(e){}
        }
      }
    } catch(e){ addLog(`❌ Error: ${e.message}`,"err"); }
    setCampRunning(false); setCampPaused(false);
    loadHistory();
  }

  function pauseCampaign()  { pauseRef.current.paused=true;  setCampPaused(true);  addLog("⏸ Paused","wrn"); }
  function resumeCampaign() { pauseRef.current.paused=false; setCampPaused(false); addLog("▶ Resumed","inf"); }
  function stopCampaign()   { pauseRef.current.abort=true;   setCampRunning(false); setCampPaused(false); }
