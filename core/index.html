function TabCompose({
  subject, setSubject, extraSubjects, setExtraSubjects,
  htmlBody, setHtmlBody, plainBody, setPlainBody,
  autoPlain, filesList, sendersRaw,
  linkRot = [], setLinkRot, linkRotDraft = "", setLinkRotDraft, linkRotMode = "sequential", setLinkRotMode,
  spamFilter = false, setSpamFilter,
  htmlBodies = [], setHtmlBodies, htmlRotateMode = "random", setHtmlRotateMode,
  preheader = "", setPreheader,
}) {
  const [subTab, setSubTab] = React.useState("editor");
  const [splitView, setSplitView] = React.useState(false);
  // Preview state
  const [prevEmail,   setPrevEmail]   = React.useState("");
  const [prevName,    setPrevName]    = React.useState("John Smith");
  const [prevCompany, setPrevCompany] = React.useState("Acme Corp");
  const [prevMode,    setPrevMode]    = React.useState("html");

  // Random sample data for preview without entering email
  const SAMPLE_EMAILS = ["james.wilson@techcorp.com","sarah.johnson@globalmed.io","michael.chen@ventures.co","emily.davis@finstart.com","robert.kim@cloudtech.net"];
  const SAMPLE_NAMES  = ["James Wilson","Sarah Johnson","Michael Chen","Emily Davis","Robert Kim"];
  const SAMPLE_COS    = ["TechCorp","GlobalMed","Chen Ventures","FinStart","CloudTech"];
  const [sampleIdx, setSampleIdx] = React.useState(0);

  const autoEmail   = prevEmail || SAMPLE_EMAILS[sampleIdx];
  const autoName    = prevName  !== "John Smith" ? prevName  : SAMPLE_NAMES[sampleIdx];
  const autoCompany = prevCompany !== "Acme Corp" ? prevCompany : SAMPLE_COS[sampleIdx];

  // Tag modal
  const [showTagModal, setShowTagModal] = React.useState(false);
  const [activeRef,    setActiveRef]    = React.useState(null);
  // Refs for insert-at-cursor
  const subjectRef  = React.useRef(null);
  const bodyRef     = React.useRef(null);
  const plainRef    = React.useRef(null);

  // Insert tag at cursor in a controlled React textarea/input
  const insertAtCursor = (ref, setter, tag) => {
    const el = ref.current;
    if (!el) return;
    const start = el.selectionStart ?? el.value.length;
    const end   = el.selectionEnd   ?? el.value.length;
    const before = el.value.slice(0, start);
    const after  = el.value.slice(end);
    setter(before + tag + after);
    requestAnimationFrame(() => {
      el.focus();
      el.setSelectionRange(start + tag.length, start + tag.length);
    });
  };

  // Open tag modal targeting a specific field
  const openTagModal = (ref) => {
    setActiveRef(ref);
    setShowTagModal(true);
  };

  // Build preview with lead data (auto-fills if no email entered)
  const sampleLead = { company: autoCompany };
  const senderEmail = ((sendersRaw||"").split("\n")[0]||"").trim() || "";
  // Resolve tags in sender/subject too so preview shows actual values
  const resolvedSenderEmail = resolveTags(senderEmail, autoEmail, senderEmail, subject, autoName, 1, sampleLead);
  // Inject linkRot into sampleLead so #LINK resolves in preview
  const sampleLeadWithLinks = {...sampleLead, _links: linkRot, _linkMode: linkRotMode};
  const previewHtml    = resolveTags(htmlBody,  autoEmail, resolvedSenderEmail, subject, autoName, 1, sampleLeadWithLinks);
  const previewSubject = resolveTags(subject,   autoEmail, resolvedSenderEmail, subject, autoName, 1, sampleLeadWithLinks);

  // Compact tag toolbar — all sections
  const [tagBarSearch, setTagBarSearch] = React.useState("");
  const [tagBarSec, setTagBarSec]       = React.useState(0); // index into TAG_SECTIONS
  const tagBarSection = TAG_SECTIONS[tagBarSec];
  const tagBarFiltered = tagBarSearch.trim()
    ? TAG_SECTIONS.flatMap(s=>s.tags).filter(t =>
        t.tag.toLowerCase().includes(tagBarSearch.toLowerCase()) ||
        t.desc.toLowerCase().includes(tagBarSearch.toLowerCase()))
    : tagBarSection.tags;

  const tagBarInsert = (tag) => {
    const ref = activeRef || bodyRef;
    const setter = (activeRef === subjectRef) ? setSubject
                 : (activeRef === plainRef)   ? setPlainBody
                 : setHtmlBody;
    insertAtCursor(ref, setter, tag);
  };

  return (
    <div>
      <div className="ph">
        <div className="ph-title">✉️ Compose</div>
        <div className="ph-sub">Write your email with 117+ personalisation tags</div>
      </div>

      <div className="tab-bar" style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",gap:4}}>
          {[["editor","✏ Editor"],["preview","👁 Preview"],["checklist","✅ Checklist"]].map(([k,l])=>(
            <button key={k} className={`tb ${subTab===k?"on":""}`} onClick={()=>{setSubTab(k);if(k!=="editor")setSplitView(false);}}>{l}</button>
          ))}
        </div>
        {subTab==="editor" && (
          <button className={`btn btn-sm ${splitView?"btn-p":"btn-g"}`} style={{marginLeft:"auto",height:30,fontSize:11}} onClick={()=>setSplitView(v=>!v)}>
            {splitView ? "⬜ Single View" : "⬛ Split View"}
          </button>
        )}
      </div>

      {/* EDITOR (split or normal) */}
      {subTab==="editor" && (
      <div style={splitView ? {display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,alignItems:"start"} : {}}>
        {/* LEFT/ONLY: editor content */}
        <div>
          {/* Subject - supports multiple for rotation */}
          <div className="card mb16">
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <label className="lbl" style={{margin:0}}>Subject Line{extraSubjects.split("\n").filter(s=>s.trim()).length>0?" (rotating)":""}</label>
              <span className="dim2 xs">Separate multiple with new lines — rotates per recipient</span>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input ref={subjectRef} value={subject} onChange={e=>setSubject(e.target.value)}
                onFocus={()=>setActiveRef(subjectRef)}
                placeholder="Your subject with #FIRSTNAME personalisation…"
                style={{fontSize:15,padding:"11px 14px",flex:1}}/>
              <button className="btn btn-g btn-sm" style={{whiteSpace:"nowrap"}} onClick={()=>openTagModal(subjectRef)}>
                🏷 Tags
              </button>
            </div>
            {/* Quick chips for subject */}
            <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:8}}>
              {["#FIRSTNAME","#REALNAME","#COMPANY","#DOMAIN","#DATE","#FROMNAME","#SUBJECT"].map(tag=>(
                <span key={tag} className="tag-chip" onClick={()=>insertAtCursor(subjectRef,setSubject,tag)}
                  title="Click to insert into subject">{tag}</span>
              ))}
            </div>
            {/* Extra subjects for rotation */}
            <div style={{marginTop:10,borderTop:"1px solid var(--border)",paddingTop:10}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                <span className="dim2 xs">➕ Additional subjects (one per line, rotated randomly)</span>
                {extraSubjects.split("\n").filter(s=>s.trim()).length > 0 && (
                  <span className="bdg bdg-ok">{extraSubjects.split("\n").filter(s=>s.trim()).length+1} subjects total</span>
                )}
              </div>
              <textarea value={extraSubjects} onChange={e=>setExtraSubjects(e.target.value)}
                placeholder={"Re: Quick question about #COMPANY\nFollowing up on your #DOMAIN account…"}
                style={{minHeight:70,fontSize:13,fontFamily:"var(--font-mono)",resize:"vertical"}}/>
            </div>
          </div>

          {/* Compact tag toolbar */}
          <div className="card mb16" style={{padding:"12px 14px"}}>
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10,flexWrap:"wrap"}}>
              <span style={{fontWeight:600,fontSize:13}}>🏷 Tags</span>
              <input value={tagBarSearch} onChange={e=>setTagBarSearch(e.target.value)}
                placeholder="Search tags…"
                style={{flex:1,minWidth:140,fontSize:12,padding:"5px 10px",borderRadius:6,border:"1px solid var(--border)",background:"var(--bg2)",color:"var(--t1)"}}/>
              <button className="btn btn-p btn-sm" onClick={()=>openTagModal(activeRef||bodyRef)}>
                📂 All {TAG_SECTIONS.reduce((n,s)=>n+s.tags.length,0)} Tags
              </button>
            </div>
            {/* Section tabs */}
            {!tagBarSearch.trim() && (
              <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>
                {TAG_SECTIONS.map((s,i)=>(
                  <button key={s.label} onClick={()=>setTagBarSec(i)}
                    style={{fontSize:10,padding:"3px 8px",borderRadius:12,border:"1px solid var(--border)",
                      background:tagBarSec===i?"var(--accent)":"var(--bg3)",
                      color:tagBarSec===i?"#fff":"var(--t2)",cursor:"pointer",whiteSpace:"nowrap"}}>
                    {s.label.split(" ")[0]} ({s.tags.length})
                  </button>
                ))}
              </div>
            )}
            {/* Tag chips */}
            <div style={{display:"flex",flexWrap:"wrap",gap:5,maxHeight:120,overflowY:"auto"}}>
              {tagBarFiltered.map(t=>(
                <span key={t.tag} title={t.desc + "\n▶ Click to insert into active field"}
                  onClick={()=>tagBarInsert(t.tag)}
                  style={{
                    display:"inline-block",padding:"3px 9px",borderRadius:20,fontSize:11,
                    background:"var(--bg3)",border:"1px solid var(--border)",
                    color:"var(--accent)",cursor:"pointer",fontFamily:"var(--font-mono)",
                    transition:"all .15s"
                  }}
                  onMouseEnter={e=>{e.target.style.background="var(--aglow)";e.target.style.borderColor="var(--accent)";}}
                  onMouseLeave={e=>{e.target.style.background="var(--bg3)";e.target.style.borderColor="var(--border)";}}>
                  {t.tag}
                </span>
              ))}
              {tagBarFiltered.length===0 && <span style={{color:"var(--t3)",fontSize:12}}>No tags match</span>}
            </div>
            <div style={{fontSize:11,color:"var(--t3)",marginTop:8}}>
              Click tag → inserts at cursor · Active field: <strong>{
                activeRef===subjectRef?"Subject" : activeRef===plainRef?"Plain Text" : "HTML Body"
              }</strong>
            </div>
          </div>

          {/* Preheader */}
          <div className="card mb16">
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
              <label className="lbl" style={{margin:0}}>
                <Tip text="The preheader is the short preview text shown in the inbox list after the subject line. Injected as a hidden span at the top of the HTML body. Filling this prevents the email client from pulling the first line of your body content as preview — giving you control over what recipients see before opening. Supports #FIRSTNAME and other tags.">
                  📬 Preheader <span style={{fontWeight:400,color:"var(--t3)",fontSize:11}}>(inbox preview text)</span>
                </Tip>
              </label>
              <span className="dim2 xs">shown after subject in inbox list</span>
            </div>
            <input
              value={preheader}
              onChange={e=>setPreheader(e.target.value)}
              placeholder="Hi #FIRSTNAME, here's what you need to know…"
              style={{fontSize:14,padding:"10px 12px",width:"100%",boxSizing:"border-box"}}
              maxLength={200}
            />
            {preheader.length>0 && (
              <div style={{fontSize:11,color:"var(--t3)",marginTop:4}}>
                {preheader.length}/200 chars — {preheader.length<40?"too short (aim for 90–140)":preheader.length>160?"may be truncated":("✓ good length")}
              </div>
            )}
          </div>

          {/* HTML Body */}
          <div className="card mb16">
            <div className="row jb ac-center mb10">
              <label className="lbl" style={{marginBottom:0}}>HTML Body</label>
              <button className="btn btn-g btn-sm" onClick={()=>openTagModal(bodyRef)}>🏷 Insert Tag</button>
            </div>
            <textarea ref={bodyRef} value={htmlBody} onChange={e=>setHtmlBody(e.target.value)}
              onFocus={()=>setActiveRef(bodyRef)}
              placeholder={"<html>…your email HTML here…</html>\n\nUse #FIRSTNAME, #EMAIL, #COMPANY, #INVOICE_NUM etc."}
              style={{minHeight:260,fontFamily:"var(--font-mono)",fontSize:12,lineHeight:1.6}}/>
          </div>

          {/* Plain text */}
          <div className="card mb16">
            <div className="row jb ac-center mb8">
              <label className="lbl" style={{marginBottom:0}}>Plain Text</label>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                {autoPlain && <span className="bdg bdg-a">Auto-generated</span>}
                <button className="btn btn-g btn-sm" onClick={()=>openTagModal(plainRef)}>🏷 Tags</button>
              </div>
            </div>
            <textarea ref={plainRef} value={plainBody} onChange={e=>setPlainBody(e.target.value)}
              onFocus={()=>setActiveRef(plainRef)}
              placeholder="Plain text version — leave blank to auto-generate from HTML."
              style={{minHeight:100,fontFamily:"var(--font-mono)",fontSize:12}}/>
          </div>

          {/* Attachments */}
          <div className="card mb16">
            <div className="card-title">📎 Select Attachments</div>
            <div className="dim sm mb12">Choose from your uploaded attachments. Upload files first in the <strong>Attachments</strong> tab.</div>
            {filesList.filter(f=>f.category==="attachments").length===0 ? (
              <div className="ib ib-i"><span className="ib-ic">ℹ</span><span>No attachments uploaded yet. Go to the <strong>Attachments</strong> tab to upload files.</span></div>
            ) : (
              <div className="col g8">
                {filesList.filter(f=>f.category==="attachments").map(file=>(
                  <div key={file.id} className="row ac-center g10 card card-sm">
                    <input type="checkbox" style={{width:"auto",flexShrink:0}}/>
                    <span className="sm f1">{file.display_name||file.original_name}</span>
                    <span className="bdg bdg-n">{(file.mime_type||"").split("/")[1]||"file"}</span>
                    <span className="dim2 xs">{fmtBytes(file.size)}</span>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Link rotation */}
          <div className="card" style={{borderLeft:"3px solid var(--primary)"}}>
            <div className="row ac-center jb mb12">
              <div className="row ac-center g8">
                <span style={{fontSize:16}}>🔗</span>
                <div>
                  <div style={{fontWeight:600,fontSize:14}}>Link Rotation</div>
                  <div style={{fontSize:11,color:"var(--dim)"}}>Use <code style={{background:"var(--bg3)",padding:"1px 4px",borderRadius:3}}>#LINK</code> in your template — replaced per-send</div>
                </div>
              </div>
              <div className="row ac-center g6">
                {linkRot.length>0
                  ? <span className="bdg bdg-ok" style={{fontSize:11}}>✓ {linkRot.length} active</span>
                  : linkRotDraft.trim() && <span className="bdg" style={{background:"#f59e0b20",color:"#f59e0b",border:"1px solid #f59e0b",fontSize:11}}>⚠ Not applied</span>
                }
              </div>
            </div>

            <div className="row ac-center g10 mb10">
              <label className="lbl" style={{margin:0,whiteSpace:"nowrap"}}>Mode:</label>
              <select value={linkRotMode} onChange={e=>setLinkRotMode(e.target.value)} style={{fontSize:13,padding:"6px 10px",flex:1}}>
                <option value="sequential">Sequential — A, B, C, A, B, C…</option>
                <option value="random">Random — different link per email</option>
              </select>
            </div>

            <div style={{border:"1px solid var(--bdr)",borderRadius:6,overflow:"hidden"}}>
              <div style={{padding:"6px 12px",background:"var(--bg2)",fontSize:11,fontWeight:600,color:"var(--dim)",borderBottom:"1px solid var(--bdr)",display:"flex",justifyContent:"space-between"}}>
                <span>URLS — ONE PER LINE</span>
                {linkRotDraft.trim() && <span>{linkRotDraft.split("\n").filter(l=>l.trim()).length} URL{linkRotDraft.split("\n").filter(l=>l.trim()).length!==1?"s":""}</span>}
              </div>
              <textarea value={linkRotDraft} onChange={e=>setLinkRotDraft(e.target.value)}
                placeholder={"https://track.example.com/click?id=abc123\nhttps://track.example.com/click?id=xyz789"}
                style={{width:"100%",minHeight:90,padding:"10px 12px",border:"none",background:"var(--inp)",color:"var(--tx)",fontSize:12,fontFamily:"var(--font-mono)",boxSizing:"border-box",resize:"vertical"}}/>
            </div>

            {linkRot.length>0 && (
              <div style={{marginTop:8,padding:"8px 12px",background:"var(--bg2)",borderRadius:6,border:"1px solid var(--bdr)"}}>
                <div style={{fontSize:11,fontWeight:600,color:"var(--dim)",marginBottom:4}}>ACTIVE LINKS</div>
                {linkRot.map((url,i)=>(
                  <div key={i} style={{fontSize:11,fontFamily:"var(--font-mono)",color:"var(--ok)",padding:"2px 0",display:"flex",alignItems:"center",gap:6}}>
                    <span style={{color:"var(--dim)",minWidth:16}}>{i+1}.</span>
                    <span style={{wordBreak:"break-all"}}>{url}</span>
                  </div>
                ))}
              </div>
            )}

            <div className="row g8 mt10 ac-center">
              <button className="btn btn-p btn-sm" onClick={()=>setLinkRot(linkRotDraft.split("\n").map(s=>s.trim()).filter(Boolean))}>
                ✓ Apply Links
              </button>
              {linkRot.length>0 && <button className="btn btn-d btn-sm" onClick={()=>{setLinkRot([]);setLinkRotDraft("");}}>✕ Clear</button>}
            </div>
          </div>
        </div>

        {/* ── Multi-Letter Rotation ── */}
        <div className="card mt12">
          <div className="card-title row ac-center jb">
            <span>📨 Multiple Letters (A/B/C Rotation)</span>
            <span className="bdg" style={{background:"var(--bg2)",fontSize:11}}>{htmlBodies.length} letter{htmlBodies.length!==1?"s":""} + main</span>
          </div>
          <div style={{fontSize:12,color:"var(--dim)",marginBottom:10}}>
            Add extra HTML letters to rotate alongside the main letter above. The main letter always counts as Letter 1.
          </div>
          <div className="row ac-center g8 mb10">
            <label className="lbl" style={{margin:0}}>Rotation mode:</label>
            <select value={htmlRotateMode} onChange={e=>setHtmlRotateMode(e.target.value)} style={{fontSize:13,padding:"6px 10px"}}>
              <option value="random">Random per recipient</option>
              <option value="sequential">Sequential (A→B→C→...)</option>
              <option value="split">Split test (even split)</option>
            </select>
          </div>
          {htmlBodies.map((b,idx)=>(
            <div key={idx} style={{marginBottom:8,border:"1px solid var(--bdr)",borderRadius:6,overflow:"hidden"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 10px",background:"var(--bg2)",fontSize:12}}>
                <span style={{fontWeight:600}}>Letter {idx+2}</span>
                <button className="btn btn-d btn-sm" style={{fontSize:11,padding:"2px 8px"}} onClick={()=>setHtmlBodies(htmlBodies.filter((_,i)=>i!==idx))}>✕ Remove</button>
              </div>
              <textarea value={b} onChange={e=>setHtmlBodies(htmlBodies.map((x,i)=>i===idx?e.target.value:x))}
                rows={6} style={{width:"100%",padding:"8px 10px",border:"none",borderTop:"1px solid var(--bdr)",background:"var(--inp)",color:"var(--tx)",fontSize:12,fontFamily:"monospace",boxSizing:"border-box",resize:"vertical"}}
                placeholder="Paste HTML for this letter variant..."/>
            </div>
          ))}
          <button className="btn btn-g btn-sm mt8" onClick={()=>setHtmlBodies([...htmlBodies,""])}>+ Add Letter</button>
        </div>
        {/* RIGHT PANEL: live preview (split view only) */}
        {splitView && (
          <div style={{position:"sticky",top:16}}>
            <div className="card" style={{padding:"12px 14px"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <span style={{fontWeight:600,fontSize:13}}>👁 Live Preview</span>
                <div style={{display:"flex",gap:4}}>
                  {[["html","HTML"],["plain","Plain"],["source","Source"]].map(([k,l])=>(
                    <button key={k} className={`tb ${prevMode===k?"on":""}`} style={{fontSize:11,padding:"3px 8px"}} onClick={()=>setPrevMode(k)}>{l}</button>
                  ))}
                </div>
              </div>
              <div style={{fontSize:11,color:"var(--t3)",marginBottom:8,padding:"6px 10px",background:"var(--bg3)",borderRadius:6}}>
                <strong style={{color:"var(--t2)"}}>To:</strong> {autoEmail} &nbsp;
                <strong style={{color:"var(--t2)"}}>Subj:</strong> {previewSubject||subject||"(no subject)"}
              </div>
              {prevMode==="html" && (
                <div style={{background:"#fff",borderRadius:6,overflow:"hidden",minHeight:400,border:"1px solid var(--border)"}}>
                  {htmlBody
                    ? <iframe srcDoc={previewHtml} style={{width:"100%",minHeight:400,border:"none"}} sandbox="allow-same-origin"/>
                    : <div style={{padding:30,color:"#aaa",textAlign:"center",fontSize:13}}>Write HTML body on the left to preview</div>}
                </div>
              )}
              {prevMode==="plain" && (
                <div className="code" style={{minHeight:200,whiteSpace:"pre-wrap",fontSize:12}}>
                  {resolveTags(plainBody||htmlBody.replace(/<[^>]+>/g,""), autoEmail, resolvedSenderEmail, subject, autoName, 1, sampleLead)||"(empty)"}
                </div>
              )}
              {prevMode==="source" && (
                <div className="code" style={{minHeight:200,fontSize:11}}>{htmlBody||"(no HTML)"}</div>
              )}
              <div style={{marginTop:8,display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                <button className="btn btn-g btn-xs" onClick={()=>setSampleIdx(i=>(i+1)%SAMPLE_EMAILS.length)}>
                  🔀 Next Sample
                </button>
                <span className="dim2 xs">{autoName} · {autoEmail}</span>
              </div>
            </div>
          </div>
        )}
      </div>
      )}

      {subTab==="preview" && (
        <div className="card">
          <div className="card-title">👁 Email Preview</div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,flexWrap:"wrap"}}>
            <span className="dim2 xs">Tags auto-fill with sample data. Override below:</span>
            <button className="btn btn-g btn-xs" onClick={()=>setSampleIdx(i=>(i+1)%SAMPLE_EMAILS.length)}>🔀 Shuffle Sample</button>
            <span className="bdg bdg-n xs">{autoName} · {autoEmail}</span>
          </div>
          {/* Preview lead inputs */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:8,marginBottom:14}}>
            <div>
              <label className="lbl">Override Email</label>
              <input value={prevEmail} onChange={e=>setPrevEmail(e.target.value)}
                placeholder={autoEmail} style={{fontSize:13,padding:"8px 10px"}}/>
            </div>
            <div>
              <label className="lbl">Override Name</label>
              <input value={prevName==="John Smith"?"":prevName} onChange={e=>setPrevName(e.target.value||"John Smith")}
                placeholder={autoName} style={{fontSize:13,padding:"8px 10px"}}/>
            </div>
            <div>
              <label className="lbl">Override Company</label>
              <input value={prevCompany==="Acme Corp"?"":prevCompany} onChange={e=>setPrevCompany(e.target.value||"Acme Corp")}
                placeholder={autoCompany} style={{fontSize:13,padding:"8px 10px"}}/>
            </div>
          </div>
          {/* Mode tabs */}
          <div className="tab-bar" style={{marginBottom:12}}>
            {[["html","📧 HTML"],["plain","📄 Plain"],["source","💻 Source"]].map(([k,l])=>(
              <button key={k} className={`tb ${prevMode===k?"on":""}`} onClick={()=>setPrevMode(k)}>{l}</button>
            ))}
          </div>
          {/* Resolved header */}
          <div style={{background:"var(--bg3)",padding:"8px 14px",fontSize:12,color:"var(--t2)",borderRadius:"var(--radius)",marginBottom:10,border:"1px solid var(--border)"}}>
            <strong>To:</strong> {autoEmail}{" "}{" "}
            <strong>From:</strong> {senderEmail||"(no sender set)"}{" "}{" "}
            <strong>Subject:</strong> <span style={{color:"var(--t1)"}}>{previewSubject||subject||"(no subject)"}</span>
          </div>
          {prevMode==="html" && (
            <div style={{background:"#fff",border:"1px solid var(--border)",borderRadius:"var(--radius)",overflow:"hidden",minHeight:340}}>
              {htmlBody
                ? <iframe srcDoc={previewHtml} style={{width:"100%",minHeight:340,border:"none"}} sandbox="allow-same-origin"/>
                : <div style={{padding:40,color:"#aaa",textAlign:"center"}}>No HTML body — write content in the Editor tab</div>
              }
            </div>
          )}
          {prevMode==="plain" && (
            <div className="code" style={{minHeight:200,whiteSpace:"pre-wrap"}}>
              {resolveTags(plainBody||htmlBody.replace(/<[^>]+>/g,""), autoEmail, resolvedSenderEmail, subject, autoName, 1, sampleLead)||"(empty body)"}
            </div>
          )}
          {prevMode==="source" && (
            <div className="code" style={{minHeight:200}}>{htmlBody||"(no HTML)"}</div>
          )}
        </div>
      )}

      {subTab==="checklist" && (
        <div className="card">
          <div className="card-title">✅ Deliverability Checklist</div>
          {[
            {ok:subject.trim().length>0,               lbl:"Subject line set"},
            {ok:htmlBody.trim().length>0,               lbl:"HTML body not empty"},
            {ok:!/FREE|CLICK HERE|WINNER/i.test(subject), lbl:"Subject has no common spam words"},
            {ok:!htmlBody.includes("http://"),           lbl:"No plain HTTP links (use HTTPS)"},
            {ok:autoPlain||plainBody.trim().length>0,   lbl:"Plain-text version present"},
            {ok:htmlBody.includes("#FIRSTNAME")||htmlBody.includes("#REALNAME")||subject.includes("#FIRSTNAME"), lbl:"Has personalisation tag"},
          ].map((item,i)=>(
            <div key={i} className={`row ac-center g10 mb10 sm ${item.ok?"c-ok":"c-e"}`}>
              <span>{item.ok?"✓":"✗"}</span><span>{item.lbl}</span>
            </div>
          ))}
        </div>
      )}

      {showTagModal && (
        <TagModal
          targetRef={activeRef||bodyRef}
          onClose={()=>setShowTagModal(false)}
          onInsert={(tag)=>{
            const ref = activeRef || bodyRef;
            const setter = (activeRef===subjectRef)?setSubject:(activeRef===plainRef)?setPlainBody:setHtmlBody;
            insertAtCursor(ref, setter, tag);
          }}
        />
      )}
    </div>
  );
}


/* ════════════════════════════════════════
   TAB: LEADS
════════════════════════════════════════ */
function TabLeads({leadsRaw, setLeadsRaw, leads, setLeads, filesList, allowDupes, setAllowDupes}) {
  const [filter, setFilter] = useState("");
  const filtered = filter ? leads.filter(l=>l.email.includes(filter)||(l.realName||"").toLowerCase().includes(filter.toLowerCase())) : leads;
  const fileInputRef = useRef(null);
  const rawLineCount = (leadsRaw||"").split(/\r?\n/).filter(l=>l.trim().includes("@")).length;
  const dupeCount = rawLineCount - leads.length;

  function handleImport(file) {
    const reader = new FileReader();
    reader.onload = e => { setLeadsRaw(e.target.result); setLeads(parseLeads(e.target.result, allowDupes)); };
    reader.readAsText(file);
  }

  return (
    <div>
      <div className="ph">
        <div className="ph-title">👥 Leads</div>
        <div className="ph-sub">Load and manage recipient email lists</div>
      </div>

      {/* Two-column layout: Paste + Load from Files */}
      <div className="g2 mb16">

        {/* Left: Paste Leads */}
        <div className="card">
          <div className="card-title">📋 Paste Leads</div>
          <Info type="i">One per line. Supports: email, email,name, or email,name,company</Info>
          <textarea value={leadsRaw}
            onChange={e=>{setLeadsRaw(e.target.value);setLeads(parseLeads(e.target.value, allowDupes));}}
            placeholder={"sam@company.com\nJohn Doe,john@acme.com\njohn@acme.com,John Doe,Acme Corp"}
            style={{minHeight:180,fontFamily:"var(--font-mono)",fontSize:12,marginTop:10}}
            onDrop={e=>{e.preventDefault();const f=e.dataTransfer.files[0];f&&handleImport(f);}}
            onDragOver={e=>e.preventDefault()}
          />
          <div className="row g8 mt8 ac-center" style={{flexWrap:"wrap"}}>
            {leads.length>0 && <button className="btn btn-g btn-sm" onClick={()=>{setLeadsRaw("");setLeads([]);}}>Clear</button>}
            <span style={{background:"var(--ok)22",color:"var(--ok)",border:"1px solid var(--ok)44",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700,display:leads.length>0?"inline":"none"}}>{leads.length} valid leads</span>
            {!allowDupes && dupeCount>0 && (
              <span style={{background:"var(--warn)22",color:"var(--warn)",border:"1px solid var(--warn)44",borderRadius:20,padding:"2px 10px",fontSize:11}}>
                {dupeCount} duplicates removed
              </span>
            )}
            {/* Allow duplicates toggle */}
            <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:12,color:"var(--t2)",marginLeft:"auto"}}>
              <input type="checkbox" checked={allowDupes} onChange={e=>{
                setAllowDupes(e.target.checked);
                setLeads(parseLeads(leadsRaw, e.target.checked));
              }}/>
              Allow duplicates
            </label>
            {filesList.filter(f=>f.category==="leads").map(file=>(
              <button key={file.id} className="btn btn-g btn-xs" onClick={async()=>{
                const r=await apiCall(`/api/files/download/${file.id}`);
                const text=await r.text();
                setLeadsRaw(text); setLeads(parseLeads(text));
              }}>📂 {file.display_name||file.original_name}</button>
            ))}
          </div>
        </div>

        {/* Right: Load from Files */}
        <div className="card">
          <div className="card-title">📂 Load from Files</div>

function SesCredGen({onApply, initialRegion}) {
  const [ak, setAk] = React.useState("");
  const [sk, setSk] = React.useState("");
  const [region, setRegion] = React.useState(initialRegion||"us-east-1");
  const [result, setResult] = React.useState(null);
  const [loading, setLoading] = React.useState(false);

  // Sync region if preset changes
  React.useEffect(()=>{ if(initialRegion) setRegion(initialRegion); }, [initialRegion]);

  // Pure JS SHA-256 + HMAC — works on HTTP (no crypto.subtle needed)
  const generate = async function() {
    if (!ak || !sk) { showToast("err","Missing","Enter both Access Key and Secret Key"); return; }
    setLoading(true); setResult(null);
    try {
      // SHA-256 pure JS implementation
      function sha256(buf) {
        const K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
        let h=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
        if(typeof buf==="string"){const e=[];for(let i=0;i<buf.length;i++){const c=buf.charCodeAt(i);if(c<128)e.push(c);else if(c<2048)e.push(192|(c>>6),128|(c&63));else e.push(224|(c>>12),128|((c>>6)&63),128|(c&63));}buf=new Uint8Array(e);}
        const len=buf.length,bits=len*8;
        const padLen=((len%64)<56?56:120)-(len%64);
        const padded=new Uint8Array(len+padLen+8);
        padded.set(buf);padded[len]=0x80;
        const dv=new DataView(padded.buffer);
        dv.setUint32(padded.length-4,bits>>>0,false);
        dv.setUint32(padded.length-8,Math.floor(bits/0x100000000),false);
        for(let offset=0;offset<padded.length;offset+=64){
          const w=new Array(64);
          for(let i=0;i<16;i++)w[i]=dv.getUint32(offset+i*4,false);
          for(let i=16;i<64;i++){const s0=((w[i-15]>>>7)|(w[i-15]<<25))^((w[i-15]>>>18)|(w[i-15]<<14))^(w[i-15]>>>3);const s1=((w[i-2]>>>17)|(w[i-2]<<15))^((w[i-2]>>>19)|(w[i-2]<<13))^(w[i-2]>>>10);w[i]=(w[i-16]+s0+w[i-7]+s1)>>>0;}
          let [a,b,c,d,e,f,g,hh]=h;
          for(let i=0;i<64;i++){const S1=((e>>>6)|(e<<26))^((e>>>11)|(e<<21))^((e>>>25)|(e<<7));const ch=(e&f)^(~e&g);const temp1=(hh+S1+ch+K[i]+w[i])>>>0;const S0=((a>>>2)|(a<<30))^((a>>>13)|(a<<19))^((a>>>22)|(a<<10));const maj=(a&b)^(a&c)^(b&c);const temp2=(S0+maj)>>>0;hh=g;g=f;f=e;e=(d+temp1)>>>0;d=c;c=b;b=a;a=(temp1+temp2)>>>0;}
          h[0]=(h[0]+a)>>>0;h[1]=(h[1]+b)>>>0;h[2]=(h[2]+c)>>>0;h[3]=(h[3]+d)>>>0;h[4]=(h[4]+e)>>>0;h[5]=(h[5]+f)>>>0;h[6]=(h[6]+g)>>>0;h[7]=(h[7]+hh)>>>0;
        }
        const out=new Uint8Array(32);const odv=new DataView(out.buffer);h.forEach((v,i)=>odv.setUint32(i*4,v,false));return out;
      }
      function hmac(key, msg) {
        if(typeof key==="string"){const e=[];for(let i=0;i<key.length;i++)e.push(key.charCodeAt(i));key=new Uint8Array(e);}
        if(typeof msg==="string"){const e=[];for(let i=0;i<msg.length;i++)e.push(msg.charCodeAt(i));msg=new Uint8Array(e);}
        if(key.length>64)key=sha256(key);
        const ipad=new Uint8Array(64+msg.length),opad=new Uint8Array(64+32);
        for(let i=0;i<64;i++){ipad[i]=(i<key.length?key[i]:0)^0x36;opad[i]=(i<key.length?key[i]:0)^0x5c;}
        ipad.set(msg,64);const inner=sha256(ipad);opad.set(inner,64);return sha256(opad);
      }
      const enc=s=>{const a=[];for(let i=0;i<s.length;i++)a.push(s.charCodeAt(i));return new Uint8Array(a);};
      let sig=hmac(enc("AWS4"+sk),"11111111");
      sig=hmac(sig,region);sig=hmac(sig,"ses");sig=hmac(sig,"aws4_request");sig=hmac(sig,"SendRawEmail");
      const ver=new Uint8Array([0x04]),combined=new Uint8Array(1+sig.length);
      combined.set(ver);combined.set(sig,1);
      const smtpPass=btoa(String.fromCharCode(...combined));
      const res={status:"ok",smtpUser:ak,smtpPass:smtpPass,smtpHost:"email-smtp."+region+".amazonaws.com",smtpPort:587,region:region};
      setResult(res);
      showToast("ok","Generated!","Click Apply to fill the form");
    } catch(e){showToast("err","Error",e.message);setResult({status:"error",message:e.message});}
    setLoading(false);
  };

  return (
    <div style={{background:"#0f1f2a",border:"1px solid #1e4a6e",borderRadius:8,padding:"14px 16px",marginBottom:14}}>
      <div style={{fontWeight:700,color:"#60a5fa",marginBottom:10,fontSize:13}}>🔑 Generate SMTP Credentials from IAM Keys</div>
      <div style={{fontSize:11,color:"#93c5fd",marginBottom:12,lineHeight:1.6}}>
        Paste your IAM Access Key + Secret Key below. SynthTel derives the SMTP password locally using AWS's official HMAC algorithm — your keys are never stored or sent anywhere except your own server.
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <div>
          <label className="lbl" style={{color:"#93c5fd"}}>IAM Access Key ID</label>
          <input value={ak} onChange={e=>setAk(e.target.value.trim())} placeholder="AKIASRN7FWSD6DED4AX6"
            style={{width:"100%",padding:"8px 10px",background:"var(--bg2)",border:"1px solid #1e4a6e",borderRadius:6,color:"var(--tx)",fontSize:12,fontFamily:"monospace",boxSizing:"border-box"}}/>
        </div>
        <div>
          <label className="lbl" style={{color:"#93c5fd"}}>IAM Secret Access Key</label>
          <input type="password" value={sk} onChange={e=>setSk(e.target.value.trim())} placeholder="Your secret key"
            style={{width:"100%",padding:"8px 10px",background:"var(--bg2)",border:"1px solid #1e4a6e",borderRadius:6,color:"var(--tx)",fontSize:12,boxSizing:"border-box"}}/>
        </div>
        <div>
          <label className="lbl" style={{color:"#93c5fd"}}>Region</label>
          <select value={region} onChange={e=>setRegion(e.target.value)}
            style={{width:"100%",padding:"8px 10px",background:"var(--bg2)",border:"1px solid #1e4a6e",borderRadius:6,color:"var(--tx)",fontSize:12,boxSizing:"border-box"}}>
            {["us-east-1","us-east-2","us-west-1","us-west-2","eu-west-1","eu-west-2","eu-west-3","eu-central-1","eu-north-1","ap-southeast-1","ap-southeast-2","ap-northeast-1","ap-south-1","ca-central-1","sa-east-1"].map(r=>(
              <option key={r} value={r}>{r}</option>
            ))}
          </select>
        </div>
        <div style={{alignSelf:"flex-end"}}>
          <button className="btn btn-p" style={{width:"100%",height:38}} disabled={loading} onClick={generate}>
            {loading ? "Generating…" : "⚡ Generate SMTP Password"}
          </button>
        </div>
      </div>
      {result && result.status==="ok" && (
        <div style={{background:"#0a2a0a",border:"1px solid #22c55e44",borderRadius:6,padding:"10px 12px",marginTop:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{color:"#4ade80",fontWeight:700,fontSize:12}}>✓ Credentials Generated</span>
            <button className="btn btn-p btn-sm" onClick={()=>onApply(result)}>⬆ Apply to Form</button>
          </div>
          <div style={{fontSize:11,fontFamily:"monospace",color:"#86efac",lineHeight:1.8}}>
            <div><span style={{color:"#4ade80"}}>Host:</span> {result.smtpHost}:{result.smtpPort}</div>
            <div><span style={{color:"#4ade80"}}>User:</span> {result.smtpUser}</div>
            <div><span style={{color:"#4ade80"}}>Pass:</span> {(result.smtpPass||"").slice(0,20)}… <span style={{color:"#6b7280"}}>(click Apply to fill)</span></div>
          </div>
        </div>
      )}
      {result && result.status!=="ok" && (
        <div style={{background:"#2a0a0a",border:"1px solid #ef444444",borderRadius:6,padding:"8px 12px",marginTop:8,fontSize:11,color:"#f87171"}}>
          ✗ {result.message}
        </div>
      )}
    </div>
  );
}

function TabMethod({
  activeMethod, setActiveMethod,
  smtpList, setSmtpList, smtpDraft, setSmtpDraft,
  apiList, setApiList, apiDraft, setApiDraft,
  owaConfig, setOwaConfig, crmConfig, setCrmConfig,
  tunnelList, setTunnelList, tunnelDraft, setTunnelDraft,
}) {
  const [mTab, setMTab] = useState("smtp");

  const [testL, setTestL] = useState({});

      let d;
      try { d = await r.json(); } catch(e) { d = {status:"error", message:"Server returned non-JSON (status "+r.status+")"}; }
      if (r.status === 401) d = {status:"error", message:"Not authenticated — please log out and back in"};
      if (r.status === 400) d = {status:"error", message:"Bad request — check host/port fields"};
      setTestR(p=>({...p,[key]:d}));
    } catch(e) { setTestR(p=>({...p,[key]:{status:"error",message:e.message}})); }
    setTestL(p=>({...p,[key]:false}));
  }

/* ===== TOAST SYSTEM ===== */
let _toastSetFn = null;
function showToast(type, title, msg) {
  if (_toastSetFn) _toastSetFn(function(prev) { return [...prev, {id: Date.now()+Math.random(), type: type, title: title, msg: msg}]; });
}

function ToastContainer() {
  const [toasts, setToasts] = React.useState([]);
  _toastSetFn = setToasts;
  const remove = function(id) { setToasts(function(p) { return p.filter(function(t) { return t.id !== id; }); }); };
  React.useEffect(function() {
    if (!toasts.length) return;
    const t = toasts[0];
    const timer = setTimeout(function() { remove(t.id); }, 5000);
    return function() { clearTimeout(timer); };
  }, [toasts]);
  const icons = {ok:"[OK]", err:"[!]", w:"[~]", i:"[i]"};
  return (
    <div id="st-toasts">
      {toasts.map(function(t) { return (
        <div key={t.id} className={"st-toast t-"+t.type}>
          <span className="st-toast-ic">{icons[t.type]||"[i]"}</span>
          <div className="st-toast-body">
            {t.title && <div className="st-toast-title">{t.title}</div>}
            {t.msg && <div className="st-toast-msg">{t.msg}</div>}
          </div>
          <button className="st-toast-close" onClick={function(){remove(t.id);}}>x</button>
        </div>
      ); })}
    </div>
  );
}

/* ===== ISP PANEL ===== */
function DeployResult({msg, rdp}) {
  // msg may be JSON {status, message, log} or legacy plain text
  var parsed = null;
  try { parsed = JSON.parse(msg); } catch(e) {}

  var status  = parsed ? parsed.status  : (msg.indexOf("DEPLOY_OK") !== -1 ? "ok" : "error");
  var message = parsed ? parsed.message : msg;
  var log     = parsed ? parsed.log     : "";

  if (status === "deploying") {
    return (
      <div style={{marginTop:12, borderRadius:10, border:"1px solid #3b82f640", background:"#0f1e38",
        padding:"14px 16px", display:"flex", alignItems:"center", gap:12}}>
        <div style={{width:16, height:16, border:"2px solid #3b82f6", borderTopColor:"transparent",
          borderRadius:"50%", animation:"spin 0.8s linear infinite", flexShrink:0}}></div>
        <div>
          <div style={{fontSize:13, fontWeight:600, color:"#60a5fa"}}>Deploying...</div>
          <div style={{fontSize:11, color:"#94a3b8", marginTop:2}}>{message}</div>
        </div>
      </div>
    );
  }

  var isFirewallErr = message && (
    message.indexOf("Cannot reach") !== -1 ||
    message.indexOf("All remote ports") !== -1 ||
    message.indexOf("OpenSSH") !== -1 ||
    message.indexOf("timed out") !== -1
  );

  var opensshCmd = [
    "# Run ONE TIME in PowerShell as Administrator on the RDP:",
    "Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0",
    "Start-Service sshd",
    "Set-Service -Name sshd -StartupType Automatic",
    'netsh advfirewall firewall add rule name="SSH-In" dir=in action=allow protocol=tcp localport=22',
    "",
    "# Also enable WinRM as backup:",
    "winrm quickconfig -q",
    'netsh advfirewall firewall add rule name="WinRM-In" dir=in action=allow protocol=tcp localport=5985'
  ].join("\n");

  var [copied, setCopied] = React.useState(false);
  var [showLog, setShowLog] = React.useState(false);

  function copyCmd() {
    var text = isFirewallErr ? opensshCmd : (log || message);
    copyToClipboard(text);
    setCopied(true); setTimeout(function() { setCopied(false); }, 2000);
  }

  var borderCol = status === "ok" ? "#22c55e30" : "#ef444430";
  var bgHeader  = status === "ok" ? "#0f2718"   : "#2a0f0f";
  var textCol   = status === "ok" ? "#4ade80"   : "#f87171";
  var subCol    = status === "ok" ? "#86efac"   : "#fca5a5";
  var icon      = status === "ok" ? "v" : "x";

  if (status === "ok") {
    return (
      <div style={{marginTop:12, borderRadius:10, border:"1px solid "+borderCol, overflow:"hidden"}}>
        <div style={{background:bgHeader, padding:"12px 14px", display:"flex", alignItems:"center", gap:10}}>
          <span style={{fontSize:18, color:textCol, flexShrink:0}}>{icon}</span>
          <div style={{flex:1, fontSize:13, color:subCol, fontWeight:600}}>{message}</div>
        </div>
        {log && (
          <div style={{background:"#0a1a0a", borderTop:"1px solid #22c55e20"}}>
            <button onClick={function(){setShowLog(function(v){return !v;});}}
              style={{width:"100%", background:"none", border:"none", color:"#4ade8099", fontSize:11,
                padding:"6px 14px", cursor:"pointer", textAlign:"left"}}>
              {showLog ? "Hide" : "Show"} deploy log
            </button>
            {showLog && (
              <pre style={{margin:0, padding:"0 14px 10px", fontSize:11, color:"#86efac",
                fontFamily:"monospace", whiteSpace:"pre-wrap", wordBreak:"break-all", maxHeight:200, overflowY:"auto"}}>
                {log}
              </pre>
            )}
          </div>
        )}
      </div>
    );
  }

  if (isFirewallErr) {
    return (
      <div style={{marginTop:12, borderRadius:10, overflow:"hidden", border:"1px solid #ef444430"}}>
        <div style={{background:"#2a0f0f", padding:"12px 14px", display:"flex", alignItems:"flex-start", gap:10}}>
          <span style={{fontSize:18, flexShrink:0}}>x</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:700, color:"#f87171", fontSize:13, marginBottom:4}}>All remote ports blocked</div>
            <div style={{fontSize:12, color:"#fca5a5", lineHeight:1.6}}>
              SSH (22), WinRM (5985), and SMB (445) are all unreachable on {rdp.host}.
              Run the commands below on the RDP, then click Auto-Deploy again.
            </div>
          </div>
        </div>
        <div style={{background:"#1a0a0a", padding:"10px 14px", borderTop:"1px solid #ef444422"}}>
          <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8}}>
            <div style={{fontSize:11, fontWeight:700, color:"#f87171", textTransform:"uppercase", letterSpacing:.5}}>
              Run in PowerShell as Admin on the RDP
            </div>
            <button onClick={copyCmd} style={{
              background: copied ? "#166534" : "#1e3a5f",
              border: "1px solid " + (copied ? "#22c55e" : "#3b82f6"),
              color: copied ? "#4ade80" : "#60a5fa",
              borderRadius:6, padding:"4px 12px", fontSize:11, cursor:"pointer",
              fontWeight:600, whiteSpace:"nowrap"}}>
              {copied ? "Copied!" : "Copy Command"}
            </button>
          </div>
          <pre style={{margin:0, background:"#0d1117", borderRadius:8, padding:"10px 12px",
            fontSize:11, lineHeight:1.7, color:"#e2e8f0", overflowX:"auto",
            border:"1px solid #30363d", fontFamily:"monospace"}}>{opensshCmd}</pre>
          <div style={{marginTop:8, fontSize:11, color:"#6b7280"}}>
            After running, click Auto-Deploy again.
          </div>
        </div>
      </div>
    );
  }

  // Generic error with real log
  return (
    <div style={{marginTop:12, borderRadius:10, border:"1px solid #ef444430", overflow:"hidden"}}>
      <div style={{background:"#2a0f0f", padding:"12px 14px", display:"flex", alignItems:"flex-start", gap:10}}>
        <span style={{fontSize:16, flexShrink:0}}>x</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:700, color:"#f87171", fontSize:13, marginBottom:4}}>Deploy Failed</div>
          <div style={{fontSize:12, color:"#fca5a5", lineHeight:1.6}}>{message}</div>
        </div>
      </div>
      {log && (
        <div style={{background:"#1a0808", borderTop:"1px solid #ef444422"}}>
          <button onClick={function(){setShowLog(function(v){return !v;});}}
            style={{width:"100%", background:"none", border:"none", color:"#f8717199", fontSize:11,
              padding:"6px 14px", cursor:"pointer", textAlign:"left", display:"flex", justifyContent:"space-between"}}>
            <span>{showLog ? "Hide" : "Show"} full log ({log.split("\n").length} lines)</span>
            <span style={{fontSize:10}}>{showLog ? "^" : "v"}</span>
          </button>
          {showLog && (
            <pre style={{margin:0, padding:"0 14px 10px", fontSize:11, color:"#fca5a5",
              fontFamily:"monospace", whiteSpace:"pre-wrap", wordBreak:"break-all", maxHeight:240, overflowY:"auto"}}>
              {log}
            </pre>
          )}
        </div>
      )}
    </div>
  );
}


function IspProxySMTPPanel() {
  const [proxies, setProxies] = React.useState(function() { try { return JSON.parse(localStorage.getItem("isp_proxies")||"[]"); } catch(e) { return []; } });
  const [pxDraft, setPxDraft] = React.useState({label:"",host:"",port:"17521",user:"",pass:"",type:"socks5",ispSmtpHost:"",ispSmtpPort:"25",fromDomain:"",smtpFromEmail:""});
  const [probing, setProbing] = React.useState(false);
  const [probeRes, setProbeRes] = React.useState(null);
  const [bulkImportOpen, setBulkImportOpen] = React.useState(false);
  const [bulkText, setBulkText] = React.useState("");
  const [bulkSmtpHost, setBulkSmtpHost] = React.useState("");
  const [bulkSmtpPort, setBulkSmtpPort] = React.useState("25");
  const [bulkEnvFrom, setBulkEnvFrom] = React.useState("");
  const [bulkImportResult, setBulkImportResult] = React.useState(null);
  const [testingPx, setTestingPx] = React.useState({});

  const saveProxies = function(v) { setProxies(v); try { localStorage.setItem("isp_proxies", JSON.stringify(v)); } catch(e) {} try { apiCall("/api/isp/sync", {method:"POST", body:JSON.stringify({rdps:[], proxies:v, assignments:{}})}).catch(()=>{}); } catch(e) {} };

  const addProxy = function() {
    if (!pxDraft.host || !pxDraft.ispSmtpHost) { showToast("err","Missing Fields","Enter proxy host and ISP SMTP host."); return; }
    const e = Object.assign({}, pxDraft, {id: Date.now(), status:"untested"});
    if (!e.label) e.label = (e.user||e.host)+" -> "+e.ispSmtpHost;
    saveProxies([...proxies, e]);
    setPxDraft({label:"",host:"",port:"17521",user:"",pass:"",type:"socks5",ispSmtpHost:"",ispSmtpPort:"25",fromDomain:"",smtpFromEmail:""});
    setProbeRes(null);
  };

  const bulkImportProxies = function() {
    if (!bulkText.trim()) { showToast("err","Empty","Paste proxy lines first."); return; }
    if (!bulkSmtpHost.trim()) { showToast("err","Missing","Enter the ISP SMTP host for these proxies."); return; }
    var lines = bulkText.trim().split(/\r?\n/).map(function(l){return l.trim();}).filter(Boolean);
    var added = 0, skipped = 0, newProxies = [];
    lines.forEach(function(line) {
      // Supported formats:
      // user:pass:host:port
      // host:port:user:pass  (standard socks format)
      // user:pass@host:port
      var parts;
      if (line.includes("@")) {
        // user:pass@host:port
        var atIdx = line.lastIndexOf("@");
        var creds = line.slice(0, atIdx).split(":");
        var hostport = line.slice(atIdx+1).split(":");
        parts = [creds[0]||"", creds[1]||"", hostport[0]||"", hostport[1]||"17521"];
      } else {
        parts = line.split(":");
      }
      if (parts.length < 2) { skipped++; return; }
      // Detect format: if part[0] looks like a hostname (contains dot and no spaces), host:port:user:pass
      // Otherwise assume user:pass:host:port (9proxy/niceproxy format)
      var host, port, user, pass;
      var p0HasDot = parts[0].includes(".");
      var p2HasDot = parts.length >= 3 && parts[2].includes(".");
      if (p2HasDot && !p0HasDot) {
        // user:pass:host:port
        user = parts[0]; pass = parts[1]; host = parts[2]; port = parts[3]||"17521";
      } else if (p0HasDot) {
        // host:port:user:pass
        host = parts[0]; port = parts[1]||"17521"; user = parts[2]||""; pass = parts[3]||"";
      } else {
        // fallback: user:pass:host:port
        user = parts[0]; pass = parts[1]; host = parts[2]||""; port = parts[3]||"17521";
      }
      if (!host) { skipped++; return; }
      var ehlo = bulkSmtpHost.split(".").slice(-2).join(".");
      var label = (user||host).split("-ssid-")[0].slice(-20) + " → " + bulkSmtpHost;
      newProxies.push({
        id: Date.now() + Math.random(),
        label: label,
        host: host,
        port: port,
        user: user,
        pass: pass,
        type: "socks5",
        ispSmtpHost: bulkSmtpHost,
        ispSmtpPort: bulkSmtpPort,
        fromDomain: ehlo,
        smtpFromEmail: bulkEnvFrom.trim(),
        status: "untested"
      });
      added++;
    });
    if (newProxies.length > 0) {
      saveProxies([...proxies, ...newProxies]);
      setBulkImportResult({added: added, skipped: skipped});
      setBulkText("");
      showToast("ok","Imported", added+" proxies added" + (skipped?" ("+skipped+" skipped)":""));
    } else {
      showToast("err","Nothing imported","Could not parse any valid proxy lines. Check format.");
      setBulkImportResult({added: 0, skipped: skipped});
    }
  };

  const probeSmtp = async function(smtpHost) {
    if (!smtpHost) { showToast("err","No Host","Enter an ISP SMTP host first."); return; }
    setProbing(true); setProbeRes(null);
    try {
      const r = await apiCall("/api/isp/probe-smtp", {method:"POST", body:JSON.stringify({host:smtpHost})});
      const d = await r.json();
      if (d.status === "ok") {
        setProbeRes(d);
        if (d.best) {
          setPxDraft(function(p) { return Object.assign({}, p, {ispSmtpPort: String(d.best.port), fromDomain: d.ehlo||p.fromDomain}); });
          showToast("ok","Port Detected","Best: "+d.best.port+" | "+d.open_count+" open | EHLO: "+d.ehlo);
        } else {
          showToast("w","No Open Ports","Could not find an open SMTP port. Try manually.");
        }
      } else {
        showToast("err","Probe Failed", d.message||"Could not reach host");
      }
    } catch(e) { showToast("err","Probe Error", e.message); }
    setProbing(false);
  };

  const testProxy = async function(px) {
    setTestingPx(function(p) { return Object.assign({}, p, {[px.id]:true}); });
    showToast("i","Testing proxy…","Routing through "+px.host+" → "+px.ispSmtpHost);
    try {
      // Build proxy string — backend smart parser handles all formats
      var proxyStr = "socks5://"+px.user+":"+px.pass+"@"+px.host+":"+px.port;
      var payload = {
        proxy: proxyStr,
        ispSmtpHost: px.ispSmtpHost || "smtp.shaw.ca",
        ispSmtpPort: parseInt(px.ispSmtpPort) || 25,
      };
      const r = await apiCall("/api/test-proxy", {method:"POST", body:JSON.stringify(payload)});
      const d = await r.json();
      if (d.status==="ok") {
        var portStr = d.open_ports ? " ports: "+d.open_ports.join(",") : "";
        showToast("ok","Proxy OK","Connected via "+px.host+portStr);
        saveProxies(proxies.map(function(x) { return x.id===px.id ? Object.assign({},x,{status:"ok",testResult:d.message,openPorts:d.open_ports,bestPort:d.best_port,portResults:d.port_results}) : x; }));
      } else {
        var msg = d.message || "Proxy test failed";
        showToast("err","Proxy Failed", msg.slice(0,120));
        saveProxies(proxies.map(function(x) { return x.id===px.id ? Object.assign({},x,{status:"error",testResult:msg,portResults:d.port_results}) : x; }));
      }
    } catch(e) { showToast("err","Test Error", e.message); }
    setTestingPx(function(p) { return Object.assign({}, p, {[px.id]:false}); });
  };

  const inpStyle = {width:"100%",padding:"9px 10px",background:"var(--bg2)",border:"1px solid var(--bdr)",borderRadius:8,color:"var(--tx)",fontSize:13,boxSizing:"border-box"};
  const selStyle = Object.assign({},inpStyle,{cursor:"pointer"});

  return (
    <div>
      <div className="card mb16">
        <div className="card-title">ISP Proxy SMTP Fleet</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginTop:10}}>
          {[
            {n:proxies.length, l:"Proxies"},
            {n:proxies.filter(function(p){return p.status==="ok";}).length, l:"Tested OK"},
            {n:proxies.filter(function(p){return p.status==="error";}).length, l:"Failed"},
          ].map(function(s){return(
            <div key={s.l} className="card" style={{textAlign:"center",padding:"12px 8px"}}>
              <div style={{fontSize:20,fontWeight:700}}>{s.n}</div>
              <div style={{fontSize:11,color:"var(--t2)"}}>{s.l}</div>
            </div>
          );})}
        </div>
      </div>

      <>
          <div className="card mb14">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div className="card-title" style={{margin:0}}>Bulk Import Proxies</div>
              <button className="btn btn-g btn-sm" onClick={function(){setBulkImportOpen(function(v){return !v;}); setBulkImportResult(null);}}>
                {bulkImportOpen ? "▲ Hide" : "▼ Paste & Import"}
              </button>
            </div>
            {bulkImportOpen && (
              <div style={{marginTop:12}}>
                <div style={{fontSize:12,color:"var(--t2)",marginBottom:10}}>
                  Paste one proxy per line. Supported formats:<br/>
                  <code style={{background:"var(--bg0)",padding:"2px 6px",borderRadius:4,display:"inline-block",marginTop:4}}>user:pass:host:port</code>&nbsp;
                  <code style={{background:"var(--bg0)",padding:"2px 6px",borderRadius:4}}>host:port:user:pass</code>&nbsp;
                  <code style={{background:"var(--bg0)",padding:"2px 6px",borderRadius:4}}>user:pass@host:port</code>
                </div>
                <textarea
                  style={Object.assign({},inpStyle,{width:"100%",minHeight:120,fontFamily:"monospace",fontSize:11,resize:"vertical",boxSizing:"border-box"})}
                  value={bulkText}
                  onChange={function(e){setBulkText(e.target.value); setBulkImportResult(null);}}
                  placeholder={"boxboy_DB33-country-CA-isp-as6327_shaw-ssid-Abc123:Admin123:niceproxy.io:17521\nboxboy_DB33-country-CA-isp-as6327_shaw-ssid-Def456:Admin123:niceproxy.io:17521\n..."}
                />
                <div style={{display:"grid",gridTemplateColumns:"1fr 120px auto",gap:8,marginTop:10,alignItems:"flex-end"}}>
                  <div>
                    <label className="lbl">ISP SMTP Host (applies to all)</label>
                    <input style={inpStyle} value={bulkSmtpHost} onChange={function(e){setBulkSmtpHost(e.target.value);}} placeholder="smtp.shaw.ca"/>
                    <label className="lbl" style={{marginTop:8}}>Envelope From (SPF Fix) <span style={{color:"var(--t2)",fontWeight:400}}>— ISP account email, e.g. yourname@shaw.ca</span></label>
                    <input style={inpStyle} value={bulkEnvFrom} onChange={function(e){setBulkEnvFrom(e.target.value);}} placeholder="yourshawaccount@shaw.ca (optional but fixes Unverified tag)"/>
                  </div>
                  <div>
                    <label className="lbl">SMTP Port</label>
                    <select style={selStyle} value={bulkSmtpPort} onChange={function(e){setBulkSmtpPort(e.target.value);}}>
                      <option value="25">25</option>
                      <option value="587">587</option>
                      <option value="465">465</option>
                      <option value="2525">2525</option>
                    </select>
                  </div>
                  <button className="btn btn-p" style={{height:38,whiteSpace:"nowrap"}} onClick={bulkImportProxies}>
                    Import All
                  </button>
                </div>
                {bulkImportResult && (
                  <div style={{marginTop:8,padding:"8px 12px",borderRadius:6,fontSize:12,
                    background: bulkImportResult.added > 0 ? "#0f2a1a" : "#2a0f0f",
                    border: "1px solid " + (bulkImportResult.added > 0 ? "#166534" : "#7f1d1d"),
                    color: bulkImportResult.added > 0 ? "#4ade80" : "#f87171"}}>
                    {bulkImportResult.added > 0
                      ? "✓ "+bulkImportResult.added+" proxies imported" + (bulkImportResult.skipped > 0 ? " — "+bulkImportResult.skipped+" lines skipped (bad format)" : "")
                      : "✗ Nothing imported — check format. Lines skipped: "+bulkImportResult.skipped}
                  </div>
                )}
              </div>
            )}
          </div>
          <div className="card mb14">
            <div className="card-title">Add Proxy</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginTop:10}}>
              <div><label className="lbl">Label</label><input style={inpStyle} value={pxDraft.label} onChange={function(e){setPxDraft(function(p){return Object.assign({},p,{label:e.target.value});});}} placeholder="Eastlink-CA-1"/></div>
              <div><label className="lbl">Type</label><select style={selStyle} value={pxDraft.type} onChange={function(e){setPxDraft(function(p){return Object.assign({},p,{type:e.target.value});});}}><option value="socks5">SOCKS5</option><option value="http">HTTP</option></select></div>
              <div><label className="lbl">Proxy Host</label><input style={inpStyle} value={pxDraft.host} onChange={function(e){setPxDraft(function(p){return Object.assign({},p,{host:e.target.value});});}} placeholder="niceproxy.io"/></div>
              <div><label className="lbl">Proxy Port</label><input style={inpStyle} value={pxDraft.port} onChange={function(e){setPxDraft(function(p){return Object.assign({},p,{port:e.target.value});});}} placeholder="17521"/></div>
              <div style={{gridColumn:"1 / -1"}}><label className="lbl">Proxy Username</label><input style={Object.assign({},inpStyle,{fontFamily:"monospace",fontSize:12})} value={pxDraft.user} onChange={function(e){setPxDraft(function(p){return Object.assign({},p,{user:e.target.value});});}} placeholder="proxybullet_TOKEN-country-CA-isp-..."/></div>
              <div><label className="lbl">Proxy Password</label><input style={inpStyle} type="password" value={pxDraft.pass} onChange={function(e){setPxDraft(function(p){return Object.assign({},p,{pass:e.target.value});});}} placeholder="Admin123"/></div>
            </div>
            <div style={{height:1,background:"var(--bdr)",margin:"14px 0"}}/>
            <div style={{display:"flex",gap:8,alignItems:"flex-end",marginBottom:10}}>
              <div style={{flex:1}}>
                <label className="lbl">ISP SMTP Host</label>
                <input style={inpStyle} value={pxDraft.ispSmtpHost} onChange={function(e){
                  const v = e.target.value;
                  const parts = v.split(".");
                  const ehlo = parts.length >= 2 ? parts.slice(-2).join(".") : v;
                  setPxDraft(function(p){return Object.assign({},p,{ispSmtpHost:v, fromDomain:ehlo});});

                }} placeholder="smtp.eastlink.ca"/>
              </div>
              <button className="btn btn-g" disabled={probing} style={{whiteSpace:"nowrap",height:38}} onClick={function(){probeSmtp(pxDraft.ispSmtpHost);}}>{probing?"Probing...":"Detect Port"}</button>
            </div>
            {probeRes && (
              <div style={{marginBottom:12,padding:"10px 12px",background:"var(--bg0)",borderRadius:8,fontSize:12}}>
                <div style={{fontWeight:600,marginBottom:6,color:"var(--t2)"}}>Ports for {pxDraft.ispSmtpHost}:</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {probeRes.results.map(function(r){return(
                    <button key={r.port} className={"btn btn-sm "+(pxDraft.ispSmtpPort===String(r.port)?"btn-p":"btn-g")}
                      style={{opacity:r.open?1:0.4}} disabled={!r.open}
                      onClick={function(){if(r.open)setPxDraft(function(p){return Object.assign({},p,{ispSmtpPort:String(r.port)});});}}>
                      {r.open?"v":"x"} {r.port}
                    </button>
                  );})}
                </div>
              </div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
              <div>
                <label className="lbl">SMTP Port</label>
                <div style={{display:"flex",gap:6}}>
                  <input style={Object.assign({},inpStyle,{flex:1,minWidth:0})} value={pxDraft.ispSmtpPort} onChange={function(e){setPxDraft(function(p){return Object.assign({},p,{ispSmtpPort:e.target.value});});}} placeholder="25"/>
                  <select style={Object.assign({},selStyle,{width:70,padding:"9px 4px"})} value={pxDraft.ispSmtpPort} onChange={function(e){setPxDraft(function(p){return Object.assign({},p,{ispSmtpPort:e.target.value});});}}>
                    <option value="25">25</option><option value="587">587</option><option value="465">465</option><option value="2525">2525</option><option value="26">26</option>
                  </select>
                </div>
              </div>
              <div style={{gridColumn:"span 2"}}><label className="lbl">EHLO Domain (auto-filled)</label><input style={inpStyle} value={pxDraft.fromDomain} onChange={function(e){setPxDraft(function(p){return Object.assign({},p,{fromDomain:e.target.value});});}} placeholder="eastlink.ca"/></div>
              <div style={{gridColumn:"span 2"}}><label className="lbl"><span title="A verified ISP email address to use as MAIL FROM envelope sender. Must be an account on this ISP (e.g. clive@shaw.ca). Fixes SPF and removes Unverified tag. Leave blank to use campaign From address.">Envelope From (SPF Fix)</span></label><input style={inpStyle} value={pxDraft.smtpFromEmail} onChange={function(e){setPxDraft(function(p){return Object.assign({},p,{smtpFromEmail:e.target.value});});}} placeholder="youraccount@shaw.ca"/></div>
            </div>
            <button className="btn btn-p mt12" onClick={addProxy}>+ Add Proxy</button>
          </div>
          {proxies.length===0 ? (
            <div className="card" style={{padding:20,textAlign:"center",color:"var(--t2)",fontSize:13}}>No proxies yet.</div>

              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 2px"}}>
                <span style={{fontSize:13,fontWeight:600,color:"var(--t2)"}}>Proxy Pool ({proxies.length})</span>
                <div style={{display:"flex",gap:8}}>
                  <button className="btn btn-g btn-sm" onClick={async function(){for(var i=0;i<proxies.length;i++)await testProxy(proxies[i]);}}>🔍 Test All</button>
                  <button className="btn btn-g btn-sm" onClick={function(){saveProxies(proxies.filter(function(p){return p.status!=="error";}));}}>Remove Dead</button>
                  <button className="btn btn-d btn-sm" onClick={function(){saveProxies([]);}}>Clear All</button>

              {proxies.map(function(px){return(
                <div key={px.id} className="card card-sm">
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,fontWeight:600}}>
                        <span>{px.status==="ok"?"✅":px.status==="error"?"❌":"⚪"}</span>
