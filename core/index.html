        <div className="login-card">
          <div className="login-ic">✉</div>
          <div className="login-t">SynthTel Sender</div>
          <div className="login-s">v5 · Enterprise Email Platform</div>
          <div className="col g12 mb16">
            <div>
              <label className="lbl">Username</label>
              <input value={loginU} onChange={e=>setLoginU(e.target.value)} placeholder="admin" style={{fontSize:15,padding:"11px 14px"}} onKeyDown={e=>e.key==="Enter"&&doLogin()} autoFocus/>
            </div>
            <div>
              <label className="lbl">Password</label>
              <input type="password" value={loginP} onChange={e=>setLoginP(e.target.value)} placeholder="••••••••" style={{fontSize:15,padding:"11px 14px"}} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
            </div>
          </div>
          {!otpMode && (
            <div>
              {loginErr && <div className="ib ib-e mb12"><span className="ib-ic">✗</span>{loginErr}</div>}
              <button className="btn btn-p w100 btn-lg" onClick={doLogin} disabled={loginLoading}>
                {loginLoading?"Signing in…":"Sign In →"}
              </button>
            </div>
          )}
          {otpMode && (
            <div>
              <div className="ib ib-i mb12" style={{textAlign:"center"}}>
                <span className="ib-ic">🔐</span>Check your Telegram for a 6-digit code
              </div>
              <label className="lbl">Verification Code</label>
              <input value={otpCode} onChange={e=>setOtpCode(e.target.value)}
                placeholder="000000" maxLength={6}
                style={{fontSize:24,letterSpacing:8,textAlign:"center",padding:"12px",fontFamily:"var(--font-mono)"}}
                onKeyDown={e=>e.key==="Enter"&&doVerifyOtp()} autoFocus/>
              {otpErr && <div className="ib ib-e mt8 mb0"><span className="ib-ic">✗</span>{otpErr}</div>}
              <div className="row g8 mt12">
                <button className="btn btn-g btn-sm" onClick={()=>{setOtpMode(false);setOtpCode("");setPendingToken("");}}>← Back</button>
                <button className="btn btn-p f1" onClick={doVerifyOtp} disabled={loginLoading||otpCode.length<6}>
                  {loginLoading?"Verifying…":"Verify →"}
                </button>
              </div>
            </div>
          )}
          <div className="mt16">
            <div className="theme-row">
              {["dark","dusk","light"].map(t=>(
                <button key={t} className={`th-btn ${theme===t?"on":""}`} onClick={()=>setTheme(t)}>
                  {t==="dark"?"🌑":t==="dusk"?"🌆":"☀️"} {t[0].toUpperCase()+t.slice(1)}
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );

  /* ── NAV CONFIG ── */
  const NAV = [
    {id:"campaign",    ico:"🚀", lbl:"Campaign"},
    {id:"compose",     ico:"✉️", lbl:"Compose"},
    {id:"leads",       ico:"👥", lbl:"Leads",    badge:leads.length>0?String(leads.length):null},
    {id:"senders",     ico:"📤", lbl:"Senders"},
    {id:"method",      ico:"⚙️", lbl:"Method"},
    {id:"proxies",     ico:"🌐", lbl:"Proxies",  badge:proxies.length>0?String(proxies.length):null},
    null,
    {id:"b2b",         ico:"🔒", lbl:"B2B Sender"},
    {id:"attachments", ico:"📎", lbl:"Attachments"},
    {id:"tags",        ico:"🏷️", lbl:"Tags & Templates"},
    null,
    {id:"files",       ico:"📁", lbl:"Files",    badge:filesList.length>0?String(filesList.length):null},
    {id:"tools",       ico:"🔧", lbl:"Tools"},
    {id:"account",     ico:"👤", lbl:"Account"},
    {id:"logs",        ico:"🔍", lbl:"Debug"},
  ];

  /* ── RENDER TAB CONTENT ── */
  function renderTab() {
    const commonCampProps = {
      name:campName, setName:setCampName, running:campRunning, paused:campPaused,
      stats:campStats, log:campLog, history:campHistory, histTab, setHistTab,
      pauseRef, startCampaign, pauseCampaign, resumeCampaign, stopCampaign,
      cooldownEvery, setCooldownEvery, cooldownSecs, setCooldownSecs,
      batchPauseSecs, setBatchPauseSecs,
      setLeadsRaw, setLeads, setTab,
      priority,setPriority,batchSize,setBatchSize,delay,setDelay,delayUnit,setDelayUnit,
      jitter,setJitter,jitterSec,setJitterSec,domThrottle,setDomThrottle,warmup,setWarmup,
      listUnsub,setListUnsub,unsubEmail,setUnsubEmail,unsubUrl,setUnsubUrl,
      oneClick,setOneClick,autoInject,setAutoInject,autoPlain,setAutoPlain,spamFilter,setSpamFilter,
      activeMethod,setActiveMethod,showDeliv,setShowDeliv,
      concurrent,setConcurrent,
      hideFromEmail,setHideFromEmail,autoFlagEmail,setAutoFlagEmail,antiDetect,setAntiDetect,
      skipPreflightDns,setSkipPreflightDns,
      threadSimulate,setThreadSimulate,
      msExchangeHdrs,setMsExchangeHdrs,
      arcSimulate,setArcSimulate,
      newCampaign,
    };

    switch(tab) {
      case "campaign":    return <TabCampaign {...commonCampProps}/>;
      case "compose":     return <TabCompose subject={subject} setSubject={setSubject} extraSubjects={extraSubjects} setExtraSubjects={setExtraSubjects} htmlBody={htmlBody} setHtmlBody={setHtmlBody} plainBody={plainBody} setPlainBody={setPlainBody} autoPlain={autoPlain} filesList={filesList} sendersRaw={sendersRaw} linkRot={linkRot} setLinkRot={setLinkRot} linkRotDraft={linkRotDraft} setLinkRotDraft={setLinkRotDraft} linkRotMode={linkRotMode} setLinkRotMode={setLinkRotMode} spamFilter={spamFilter} setSpamFilter={setSpamFilter} htmlBodies={htmlBodies} setHtmlBodies={setHtmlBodies} htmlRotateMode={htmlRotateMode} setHtmlRotateMode={setHtmlRotateMode} preheader={preheader} setPreheader={setPreheader}/>;
      case "leads":       return <TabLeads leadsRaw={leadsRaw} setLeadsRaw={setLeadsRaw} leads={leads} setLeads={setLeads} filesList={filesList} uploadFile={uploadFile} allowDupes={allowDupes} setAllowDupes={setAllowDupes}/>;
      case "senders":     return <TabSenders sendersRaw={sendersRaw} setSendersRaw={setSendersRaw} senderName={senderName} setSenderName={setSenderName} senderNames={senderNames} setSenderNames={setSenderNames} senderReplyTo={senderReplyTo} setSenderReplyTo={setSenderReplyTo} rotMode={rotMode} setRotMode={setRotMode} filesList={filesList} uploadFile={uploadFile}/>;
      case "method":      return <TabMethod activeMethod={activeMethod} setActiveMethod={setActiveMethod} smtpList={smtpList} setSmtpList={setSmtpList} smtpDraft={smtpDraft} setSmtpDraft={setSmtpDraft} apiList={apiList} setApiList={setApiList} apiDraft={apiDraft} setApiDraft={setApiDraft} owaConfig={owaConfig} setOwaConfig={setOwaConfig} crmConfig={crmConfig} setCrmConfig={setCrmConfig} tunnelList={tunnelList} setTunnelList={setTunnelList} tunnelDraft={tunnelDraft} setTunnelDraft={setTunnelDraft}/>;
      case "proxies":     return <TabProxies proxies={proxies} setProxies={setProxies} proxyDraft={proxyDraft} setProxyDraft={setProxyDraft} proxyType={proxyType} setProxyType={setProxyType}/>;
      case "b2b":         return <TabB2B setLeadsRaw={setLeadsRaw} setLeads={setLeads} setTab={setTab}/>;
      case "attachments": return <TabAttachments filesList={filesList} uploadFile={uploadFile} deleteFile={deleteFile} renameFile={renameFile} selectedType={selectedType} setSelectedType={setSelectedType} attachConfig={attachConfig} setAttachConfig={setAttachConfig}/>;
      case "tags":        return <TabTagsTemplates setHtmlBody={setHtmlBody} setTab={setTab}/>;
      case "files":       return <TabFiles filesList={filesList} uploadFile={uploadFile} deleteFile={deleteFile} renameFile={renameFile} fileUploadLoading={fileUploadLoading}/>;
      case "tools":       return <TabTools filesList={filesList} uploadFile={uploadFile} setLeadsRaw={setLeadsRaw} setLeads={setLeads} setTab={setTab}/>;
      case "account":     return <TabAccount username={username} role={role} doLogout={doLogout}/>;
      case "logs":        return <TabLogs/>;
      default:            return <div className="dim">Select a tab</div>;
    }
  }


  function TabLogs() {
    const [logText, setLogText] = React.useState("Loading...");
    const [dbgTemplate, setDbgTemplate] = React.useState("Hi, #LINK check this out.");
    const [dbgLinks, setDbgLinks] = React.useState("https://google.com");
    const [dbgResult, setDbgResult] = React.useState(null);
    const [loading, setLoading] = React.useState(false);
    const taRef = React.useRef(null);

    async function fetchLogs() {
      try {
        const r = await apiCall("/api/logs?lines=150");
        const d = await r.json();
        setLogText(d.log || "(empty log)");
        setTimeout(()=>{ if(taRef.current) taRef.current.scrollTop = taRef.current.scrollHeight; },50);
      } catch(e) { setLogText("Error: "+e); }
    }

    async function testTags() {
      setLoading(true);
      try {
        const links = dbgLinks.split("\n").map(s=>s.trim()).filter(Boolean);
        const r = await apiCall("/api/debug-tags", {method:"POST", body: JSON.stringify({template: dbgTemplate, links, mode:"sequential"})});
        const d = await r.json();
        setDbgResult(d);
      } catch(e) { setDbgResult({error: String(e)}); }
      setLoading(false);
    }

    React.useEffect(()=>{ fetchLogs(); }, []);

    return (
      <div style={{padding:24, maxWidth:900}}>
        <div className="ph"><div className="ph-title">🔍 Debug & Logs</div><div className="ph-sub">Test tag resolution and view server logs</div></div>

        <div className="card mb20" style={{padding:20}}>
          <div style={{fontWeight:600, marginBottom:12, fontSize:15}}>🔗 Test #LINK Resolution</div>
          <div style={{marginBottom:8}}><label className="lbl">Template text (use #LINK where your link goes)</label>
            <input value={dbgTemplate} onChange={e=>setDbgTemplate(e.target.value)}
              style={{width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid var(--bdr)",background:"var(--inp)",color:"var(--tx)",fontSize:13,boxSizing:"border-box"}}/>
          </div>
          <div style={{marginBottom:12}}><label className="lbl">Links (one per line — same as link rotation box)</label>
            <textarea value={dbgLinks} onChange={e=>setDbgLinks(e.target.value)} rows={3}
              style={{width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid var(--bdr)",background:"var(--inp)",color:"var(--tx)",fontSize:13,boxSizing:"border-box",resize:"vertical"}}/>
          </div>
          <button className="btn btn-p" onClick={testTags} disabled={loading}>{loading?"Testing...":"▶ Test Resolution"}</button>
          {dbgResult && (
            <div style={{marginTop:14, padding:14, borderRadius:8, background: dbgResult.link_replaced===false ? "#fff3cd" : "var(--bg2)", border:"1px solid var(--bdr)"}}>
              {dbgResult.error
                ? <div style={{color:"#e53935"}}>❌ Error: {dbgResult.error}</div>
                : <>
                  <div style={{marginBottom:8}}>
                    <span style={{fontWeight:600}}>Status: </span>
                    {dbgResult.link_replaced
                      ? <span style={{color:"#22c55e",fontWeight:600}}>✅ #LINK was replaced successfully</span>
                      : <span style={{color:"#f59e0b",fontWeight:600}}>⚠️ #LINK was NOT replaced — links_cfg was empty</span>}
                  </div>
                  <div style={{marginBottom:6}}><span style={{fontWeight:600}}>Input: </span><code style={{fontSize:12}}>{dbgResult.template}</code></div>
                  <div style={{marginBottom:6}}><span style={{fontWeight:600}}>Output: </span><code style={{fontSize:12, wordBreak:"break-all"}}>{dbgResult.resolved}</code></div>
                  <div><span style={{fontWeight:600}}>links_cfg sent to engine: </span><code style={{fontSize:11}}>{JSON.stringify(dbgResult.links_cfg)}</code></div>
                  {dbgResult.note && <div style={{marginTop:6,fontSize:12,color:"var(--dim)"}}>{dbgResult.note}</div>}
                </>
              }
            </div>
          )}
        </div>

        <div className="card" style={{padding:20}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div style={{fontWeight:600, fontSize:15}}>📋 Server Log (last 150 lines)</div>
            <button className="btn btn-g btn-sm" onClick={fetchLogs}>↻ Refresh</button>
          </div>
          <textarea ref={taRef} readOnly value={logText} rows={20}
            style={{width:"100%",padding:"10px",borderRadius:6,border:"1px solid var(--bdr)",background:"#0d1117",color:"#c9d1d9",fontSize:11,fontFamily:"monospace",resize:"vertical",boxSizing:"border-box"}}/>
        </div>
      </div>
    );
  }

  /* ── FULL APP SHELL ── */
  return (
    <div data-theme={theme} style={{display:"flex",width:"100%",height:"100vh",overflow:"hidden",background:"var(--bg)"}}>
      <ToastContainer/>
      {/* Sidebar */}
      <div className="sidebar">
        {/* Logo */}
        <div className="sb-logo">
          <div className="sb-logo-icon">✉</div>
          <div>
            <div className="sb-logo-name">SynthTel</div>
            <div className="sb-logo-ver">v5</div>
          </div>
        </div>

        {/* Nav */}
        <div className="sb-nav">
          {NAV.map((item,i) => {
            if(item===null) return <div key={i} style={{height:1,background:"var(--border)",margin:"6px 0"}}/>;
            const isSection = typeof item === "string";
            if(isSection) return <div key={i} className="sb-section">{item}</div>;
            return (
              <div key={item.id} className={`sb-item ${tab===item.id?"active":""}`} onClick={()=>setTab(item.id)}>
                <span className="sb-icon">{item.ico}</span>
                <span>{item.lbl}</span>
                {item.badge && <span className="sb-badge">{item.badge}</span>}
              </div>
            );
          })}
        </div>

        {/* Footer */}
        <div className="sb-footer">
          <div className="user-row" onClick={()=>setTab("account")}>
            <div className="user-av">{(username[0]||"").toUpperCase()||"U"}</div>
            <div>
              <div className="user-name">{username}</div>
              <div className="user-role">{role}</div>
            </div>
          </div>
          <div className="theme-row">
            {["dark","dusk","light"].map(t=>(
              <button key={t} className={`th-btn ${theme===t?"on":""}`} onClick={()=>setTheme(t)}>
                {t==="dark"?"🌑":t==="dusk"?"🌆":"☀️"}
              </button>
            ))}
          </div>
          <button className="btn btn-g btn-sm w100" onClick={doLogout}>Sign Out</button>
        </div>
      </div>

      {/* Main content */}
      <div className={`main${tab==="campaign" ? " tab-campaign" : ""}`} id="main-scroll">
        {renderTab()}
      </div>
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
} catch(e) {
  document.getElementById("root").innerHTML = '<div style="padding:40px;font-family:monospace;color:#f87171;background:#0f0f0f;min-height:100vh;white-space:pre-wrap"><h2 style="margin-bottom:16px">⚠ React Error</h2>' + e.message + '\n\n' + (e.stack||'') + '</div>';
}
</script>
</body>
</html>
