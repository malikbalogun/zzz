<style>
/* ═══════════════ RESET ═══════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ═══════════════ THEME VARIABLES ═══════════════ */
:root {
  --font-ui: 'Sora', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 10px;
  --radius-sm: 6px;
  --sidebar-w: 224px;
  --tr: 0.16s ease;
}

/* DARK */
[data-theme="dark"] {
  --bg: #0d1117;       --bg2: #161b22;    --bg3: #21262d;    --bg4: #2d333b;
  --border: #30363d;   --text: #e6edf3;   --t1: #c9d1d9;     --t2: #8b949e;     --t3: #6e7681;
  --accent: #58a6ff;   --accent2: #1f6feb; --aglow: rgba(88,166,255,.14);
  --ok: #3fb950;       --ok-bg: rgba(63,185,80,.12);
  --warn: #d29922;     --warn-bg: rgba(210,153,34,.12);
  --err: #f85149;      --err-bg: rgba(248,81,73,.12);
  --info: #79c0ff;     --info-bg: rgba(121,192,255,.1);
  --purple: #bc8cff;   --purple-bg: rgba(188,140,255,.12);
  --card: #161b22;     --inp: #0d1117;    --inp-b: #30363d;
  --tog-off: #21262d;  --tog-on: #1f6feb;
  --scroll: #30363d;   --badge: #21262d;
  --inset: #21262d;
  --toast-ok-bg: #0f2718;  --toast-ok-b: rgba(34,197,94,.25);  --toast-ok-c: #4ade80;
  --toast-err-bg: #2a0f0f; --toast-err-b: rgba(239,68,68,.25); --toast-err-c: #f87171;
  --toast-w-bg: #1f1a0a;   --toast-w-b: rgba(245,158,11,.25);  --toast-w-c: #fbbf24;
  --toast-i-bg: #0f1829;   --toast-i-b: rgba(59,130,246,.25);  --toast-i-c: #60a5fa;
  --msg-admin-bg: rgba(88,166,255,.08); --msg-admin-b: rgba(88,166,255,.3);
  --msg-user-bg: rgba(255,255,255,.04); --msg-user-b: #30363d;
  --shadow-sm: 0 2px 8px rgba(0,0,0,.4);
  --shadow-md: 0 8px 30px rgba(0,0,0,.5);
}

/* LIGHT */
[data-theme="light"] {
  --bg: #f6f8fa;       --bg2: #ffffff;    --bg3: #f0f3f6;    --bg4: #e8ecf0;
  --border: #d0d7de;   --text: #1f2328;   --t1: #3d444d;     --t2: #57606a;     --t3: #8c959f;
  --accent: #0969da;   --accent2: #0550ae; --aglow: rgba(9,105,218,.1);
  --ok: #1a7f37;       --ok-bg: rgba(26,127,55,.1);
  --warn: #9a6700;     --warn-bg: rgba(154,103,0,.1);
  --err: #cf222e;      --err-bg: rgba(207,34,46,.1);
  --info: #0969da;     --info-bg: rgba(9,105,218,.08);
  --purple: #8250df;   --purple-bg: rgba(130,80,223,.1);
  --card: #ffffff;     --inp: #ffffff;    --inp-b: #d0d7de;
  --tog-off: #d0d7de;  --tog-on: #0969da;
  --scroll: #d0d7de;   --badge: #eaeef2;
  --inset: #f0f3f6;
  --toast-ok-bg: #f0fdf4;  --toast-ok-b: rgba(26,127,55,.3);  --toast-ok-c: #1a7f37;
  --toast-err-bg: #fff0f0; --toast-err-b: rgba(207,34,46,.3); --toast-err-c: #cf222e;
  --toast-w-bg: #fffbeb;   --toast-w-b: rgba(154,103,0,.3);   --toast-w-c: #9a6700;
  --toast-i-bg: #f0f7ff;   --toast-i-b: rgba(9,105,218,.3);   --toast-i-c: #0969da;
  --msg-admin-bg: rgba(9,105,218,.07); --msg-admin-b: rgba(9,105,218,.25);
  --msg-user-bg: #f6f8fa; --msg-user-b: #d0d7de;
  --shadow-sm: 0 2px 8px rgba(0,0,0,.1);
  --shadow-md: 0 8px 30px rgba(0,0,0,.15);
}

/* DUSK (mid) */
[data-theme="dusk"] {
  --bg: #1e2030;       --bg2: #252737;    --bg3: #2e3046;    --bg4: #373a54;
  --border: #414568;   --text: #cdd6f4;   --t1: #b0b8d8;     --t2: #9097b8;     --t3: #6c7086;
  --accent: #89b4fa;   --accent2: #6192e8; --aglow: rgba(137,180,250,.14);
  --ok: #a6e3a1;       --ok-bg: rgba(166,227,161,.12);
  --warn: #f9e2af;     --warn-bg: rgba(249,226,175,.1);
  --err: #f38ba8;      --err-bg: rgba(243,139,168,.12);
  --info: #89dceb;     --info-bg: rgba(137,220,235,.1);
  --purple: #cba6f7;   --purple-bg: rgba(203,166,247,.12);
  --card: #252737;     --inp: #1e2030;    --inp-b: #414568;
  --tog-off: #2e3046;  --tog-on: #6192e8;
  --scroll: #414568;   --badge: #2e3046;
  --inset: #2e3046;
  --toast-ok-bg: #1a2e1e;  --toast-ok-b: rgba(166,227,161,.25); --toast-ok-c: #a6e3a1;
  --toast-err-bg: #2e1a23; --toast-err-b: rgba(243,139,168,.25);--toast-err-c: #f38ba8;
  --toast-w-bg: #2a2010;   --toast-w-b: rgba(249,226,175,.2);   --toast-w-c: #f9e2af;
  --toast-i-bg: #162030;   --toast-i-b: rgba(137,220,235,.2);   --toast-i-c: #89dceb;
  --msg-admin-bg: rgba(137,180,250,.1); --msg-admin-b: rgba(137,180,250,.3);
  --msg-user-bg: rgba(255,255,255,.03); --msg-user-b: #414568;
  --shadow-sm: 0 2px 8px rgba(0,0,0,.35);
  --shadow-md: 0 8px 30px rgba(0,0,0,.45);
}

/* ═══════════════ BASE ═══════════════ */
body { font-family: var(--font-ui); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; overflow: hidden; height: 100vh; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 3px; }
#root { display: flex; height: 100vh; overflow: hidden; }

/* ═══════════════ SIDEBAR ═══════════════ */
.sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden; z-index: 10;
}
.sb-logo {
  padding: 16px 18px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.sb-logo-icon {
  width: 34px; height: 34px; background: var(--accent);
  border-radius: 9px; display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
}
.sb-logo-name { font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
.sb-logo-ver { font-size: 10px; color: var(--t3); font-family: var(--font-mono); }
.sb-nav { flex: 1; overflow-y: auto; padding: 6px 0; }
.sb-section { padding: 10px 18px 3px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--t3); }
.sb-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 18px; cursor: pointer; color: var(--t2); font-size: 13px; font-weight: 500;
  position: relative; user-select: none; transition: background var(--tr), color var(--tr);
}
.sb-item:hover { background: var(--bg3); color: var(--text); }
.sb-item.active { background: var(--aglow); color: var(--accent); }
.sb-item.active::before {
  content: ''; position: absolute; left: 0; top: 5px; bottom: 5px;
  width: 3px; background: var(--accent); border-radius: 0 2px 2px 0;
}
.sb-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
.sb-badge {
  margin-left: auto; background: var(--accent); color: #fff;
  font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 20px;
  font-family: var(--font-mono);
}
.sb-badge.red { background: var(--err); }
.sb-badge.green { background: var(--ok); }
.sb-footer {
  border-top: 1px solid var(--border); padding: 12px 18px;
  display: flex; flex-direction: column; gap: 8px;
}
.user-row {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 10px; border-radius: var(--radius-sm);
  background: var(--bg3); cursor: pointer;
}
.user-av {
  width: 28px; height: 28px; border-radius: 50%; background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.user-name { font-size: 12px; font-weight: 600; }
.user-role { font-size: 10px; color: var(--t3); }
.theme-row { display: flex; gap: 4px; }
.th-btn {
  flex: 1; padding: 5px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: transparent; cursor: pointer; font-size: 11px; color: var(--t2);
  transition: all var(--tr); font-family: var(--font-ui);
}
.th-btn:hover { background: var(--bg3); color: var(--text); }
.th-btn.on { background: var(--aglow); color: var(--accent); border-color: var(--accent); }

/* ═══════════════ MAIN ═══════════════ */
.main { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 28px 32px; background: var(--bg); }
.main.tab-campaign { overflow-y: auto; padding: 16px 24px; display: flex; flex-direction: column; }
.main.tab-campaign .tab-campaign-inner { flex: 1; display: flex; flex-direction: column; min-height: 0; }

/* ═══════════════ PAGE HEADER ═══════════════ */
.ph { margin-bottom: 24px; }
.ph-title { font-size: 22px; font-weight: 700; letter-spacing: -.4px; display: flex; align-items: center; gap: 10px; }
.ph-sub { font-size: 13px; color: var(--t2); margin-top: 3px; }

/* ═══════════════ CARDS ═══════════════ */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
}
.card-sm { padding: 14px 18px; }
.card-title {
  font-size: 13px; font-weight: 700; color: var(--text);
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}

/* ═══════════════ FORM ═══════════════ */
.lbl {
  display: block; font-size: 11px; font-weight: 700; color: var(--t2);
  margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px;
}
input, textarea, select {
  width: 100%; background: var(--inp); border: 1px solid var(--inp-b);
  border-radius: var(--radius-sm); color: var(--text); font-family: var(--font-ui);
  font-size: 13px; padding: 9px 12px; outline: none;
  transition: border-color var(--tr), box-shadow var(--tr);
}
input:focus, textarea:focus, select:focus {
  border-color: var(--accent); box-shadow: 0 0 0 3px var(--aglow);
}
input::placeholder, textarea::placeholder { color: var(--t3); }
select { appearance: none; cursor: pointer; }
textarea { resize: vertical; min-height: 80px; }

/* ═══════════════ BUTTONS ═══════════════ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 8px 16px; border-radius: var(--radius-sm); font-family: var(--font-ui);
  font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid transparent;
  transition: all var(--tr); white-space: nowrap; user-select: none;
}
.btn:disabled { opacity: .45; cursor: not-allowed; }
.btn-p  { background: var(--accent);   color: #fff;          border-color: var(--accent);   }
.btn-p:hover:not(:disabled)  { background: var(--accent2); border-color: var(--accent2); }
.btn-g  { background: transparent;     color: var(--t2);     border-color: var(--border);   }
.btn-g:hover:not(:disabled)  { background: var(--bg3); color: var(--text); }
.btn-d  { background: var(--err-bg);   color: var(--err);    border-color: transparent; }
.btn-d:hover:not(:disabled)  { filter: brightness(1.15); }
.btn-ok { background: var(--ok-bg);    color: var(--ok);     border-color: transparent; }
.btn-ok:hover:not(:disabled) { filter: brightness(1.15); }
.btn-w  { background: var(--warn-bg);  color: var(--warn);   border-color: transparent; }
.btn-w:hover:not(:disabled)  { filter: brightness(1.15); }
.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn-xs { padding: 3px 8px;  font-size: 11px; }
.btn-lg { padding: 11px 22px; font-size: 14px; }
.btn-ic { padding: 7px; }
.w100 { width: 100%; }

/* ═══════════════ TOGGLE ═══════════════ */
.tog-wrap { display: flex; align-items: flex-start; gap: 10px; }
.tog { position: relative; width: 40px; height: 22px; flex-shrink: 0; margin-top: 1px; }
.tog input { opacity: 0; width: 0; height: 0; }
.tog-track {
  position: absolute; cursor: pointer; inset: 0;
  background: var(--tog-off); border-radius: 11px; transition: background var(--tr);
}
.tog input:checked + .tog-track { background: var(--tog-on); }
.tog-track::after {
  content: ''; position: absolute; width: 16px; height: 16px;
  background: #fff; border-radius: 50%; left: 3px; top: 3px;
  transition: transform var(--tr); box-shadow: 0 1px 3px rgba(0,0,0,.3);
}
.tog input:checked + .tog-track::after { transform: translateX(18px); }
.tog-lbl { font-size: 13px; font-weight: 500; }
.tog-desc { font-size: 11px; color: var(--t3); margin-top: 2px; }

/* ═══════════════ BADGES ═══════════════ */
.bdg {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700;
  font-family: var(--font-mono);
}
.bdg-a { background: var(--aglow);    color: var(--accent); }
.bdg-ok{ background: var(--ok-bg);    color: var(--ok);     }
.bdg-e { background: var(--err-bg);   color: var(--err);    }
.bdg-w { background: var(--warn-bg);  color: var(--warn);   }
.bdg-p { background: var(--purple-bg);color: var(--purple); }
.bdg-n { background: var(--badge);    color: var(--t2);     }

/* ═══════════════ INFO BOXES ═══════════════ */
.ib {
  padding: 11px 14px; border-radius: var(--radius-sm);
  font-size: 12px; display: flex; gap: 8px; align-items: flex-start; line-height: 1.5;
}
.ib-i { background: var(--info-bg);  color: var(--info);  border: 1px solid rgba(121,192,255,.3); }
.ib-w { background: var(--warn-bg);  color: var(--warn);  border: 1px solid rgba(210,153,34,.35); }
.ib-e { background: var(--err-bg);   color: var(--err);   border: 1px solid rgba(248,81,73,.3);  }
.ib-ok{ background: var(--ok-bg);    color: var(--ok);    border: 1px solid rgba(63,185,80,.3);  }
.ib-ic { flex-shrink: 0; font-size: 13px; margin-top: 1px; }

/* ═══════════════ TOOLTIP ═══════════════ */
.tip-wrap { position: relative; display: inline-flex; align-items: center; }
.tip-q {
  width: 16px; height: 16px; border-radius: 50%; background: var(--bg4);
  border: 1px solid var(--border); display: inline-flex; align-items: center;
  justify-content: center; font-size: 10px; font-weight: 700; font-style: normal;
  color: var(--t3); cursor: help; margin-left: 5px; flex-shrink: 0;
}
.tip-q:hover { color: var(--accent); border-color: var(--accent); }
.tip-pop {
  position: absolute; bottom: calc(100% + 8px); left: 50%;
  transform: translateX(-50%); background: var(--bg4); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 14px; font-size: 12px; color: var(--text);
  min-width: 220px; max-width: 320px; z-index: 1000; pointer-events: none;
  box-shadow: var(--shadow-md); white-space: normal; line-height: 1.5; font-weight: 400;
}
.tip-pop::after {
  content: ''; position: absolute; top: 100%; left: 50%;
  transform: translateX(-50%); border: 5px solid transparent; border-top-color: var(--border);
}

/* ═══════════════ TAG CHIPS ═══════════════ */
.tag-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-size: 12px; font-family: var(--font-mono);
  color: var(--accent); cursor: pointer; transition: all var(--tr); position: relative;
}
.tag-chip:hover { background: var(--aglow); border-color: var(--accent); }
.tag-tip {
  position: absolute; bottom: calc(100% + 8px); left: 50%;
  transform: translateX(-50%); background: var(--bg4); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 9px 12px; font-size: 11px; color: var(--text);
  font-family: var(--font-ui); max-width: 270px; z-index: 1000; pointer-events: none;
  box-shadow: var(--shadow-sm); white-space: normal; line-height: 1.5;
}
.tag-tip::after {
  content: ''; position: absolute; top: 100%; left: 50%;
  transform: translateX(-50%); border: 5px solid transparent; border-top-color: var(--border);
}

/* ═══════════════ SECTION HEADER ═══════════════ */
.sh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.sh-t { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--accent); }

/* ═══════════════ GRIDS ═══════════════ */
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.g4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
.g-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 16px; }

/* ═══════════════ STAT CARDS ═══════════════ */
.stat {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 20px;
}
.stat-v { font-size: 30px; font-weight: 700; font-family: var(--font-mono); line-height: 1; }
.stat-l { font-size: 12px; color: var(--t2); font-weight: 500; margin-top: 4px; }
.stat-s { font-size: 11px; color: var(--t3); margin-top: 2px; }
.stat.ca .stat-v { color: var(--accent); }
.stat.cg .stat-v { color: var(--ok); }
.stat.ce .stat-v { color: var(--err); }
.stat.cw .stat-v { color: var(--warn); }

/* ═══════════════ PROGRESS ═══════════════ */
.prog-t { height: 7px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.prog-f { height: 100%; border-radius: 4px; background: var(--accent); transition: width .3s ease; }
.prog-f.pg { background: var(--ok); }
.prog-f.pr { background: var(--err); }

/* ═══════════════ TAB BAR ═══════════════ */
.tab-bar { display: flex; border-bottom: 1px solid var(--border); gap: 0; margin-bottom: 20px; }
.tb {
  padding: 8px 16px; cursor: pointer; font-size: 13px; font-weight: 500;
  color: var(--t2); border: none; background: none; font-family: var(--font-ui);
  border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all var(--tr);
}
.tb:hover { color: var(--text); }
.tb.on { color: var(--accent); border-bottom-color: var(--accent); }

/* ═══════════════ FLOW LOG ═══════════════ */
.flog {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
  height: 340px; max-height: 340px; overflow-y: auto; padding: 10px 12px;
  font-family: var(--font-mono); font-size: 12px; scroll-behavior: smooth;
}
.flog-e {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 3px 0; border-bottom: 1px solid var(--border); animation: fi .2s ease;
  flex-wrap: nowrap;
}
.flog-e > span:last-child { flex: 1; word-break: break-all; }
.flog-e:last-child { border-bottom: none; }
.flog-ts { color: var(--t3); flex-shrink: 0; min-width: 65px; }
.flog-ok  { color: var(--ok); }
.flog-err { color: var(--err); }
.flog-inf { color: var(--info); }
.flog-wrn { color: var(--warn); }
@keyframes fi { from { opacity:0; transform:translateY(3px) } to { opacity:1; transform:none } }

/* ═══════════════ STATUS DOT ═══════════════ */
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-run  { background: var(--accent); animation: pulse 1.4s infinite; }
.dot-ok   { background: var(--ok); }
.dot-err  { background: var(--err); }
.dot-pau  { background: var(--warn); }
.dot-idle { background: var(--t3); }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

/* ═══════════════ UPLOAD ZONE ═══════════════ */
.drop {
  border: 2px dashed var(--border); border-radius: var(--radius);
  padding: 32px 20px; text-align: center; cursor: pointer;
  transition: all var(--tr); color: var(--t3);
}
.drop:hover, .drop.over { border-color: var(--accent); background: var(--aglow); color: var(--accent); }
.drop-ic { font-size: 32px; margin-bottom: 8px; }
.drop-t  { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.drop-s  { font-size: 12px; }

/* ═══════════════ FILE ITEM ═══════════════ */
.fi {
  display: flex; align-items: center; gap: 12px; padding: 10px 14px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); transition: background var(--tr);
}
.fi:hover { background: var(--bg3); }
.fi-ic { width: 38px; height: 38px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.fi-name { font-size: 13px; font-weight: 600; flex: 1; }
.fi-meta { font-size: 11px; color: var(--t3); }

/* ═══════════════ ATTACH CARD ═══════════════ */
.ac {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px 14px; cursor: pointer; transition: all var(--tr);
  text-align: center; display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.ac:hover { border-color: var(--accent); background: var(--aglow); }
.ac.sel  { border-color: var(--accent); background: var(--aglow); }
.ac-ic   { width: 56px; height: 56px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 30px; }
.ac-lbl  { font-size: 13px; font-weight: 600; }
.ac-sub  { font-size: 10px; color: var(--t3); }

/* ═══════════════ METHOD CARD ═══════════════ */
.mc {
  padding: 16px; border: 1px solid var(--border); border-radius: var(--radius);
  cursor: pointer; transition: all var(--tr); min-height: 100px;
  display: flex; flex-direction: column;
}
.mc:hover { border-color: var(--accent); background: var(--bg3); }
.mc.sel  { border-color: var(--accent); background: var(--aglow); }
.mc-ic   { font-size: 22px; margin-bottom: 8px; }
.mc-name { font-size: 13px; font-weight: 700; }
.mc-desc { font-size: 11px; color: var(--t3); margin-top: 3px; flex: 1; }

/* ═══════════════ PROXY ITEM ═══════════════ */
.pi { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--card); }

/* ═══════════════ TEMPLATE CARD ═══════════════ */
.tplc {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: all var(--tr);
}
.tplc:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow-md); will-change: transform; }
.tplc-prev { height: 140px; overflow: hidden; background: #fff; position: relative; }
.tplc-prev iframe { width: 200%; height: 200%; transform: scale(.5); transform-origin: top left; pointer-events: none; border: none; }
.tplc-info { padding: 12px 14px; }
.tplc-name { font-size: 13px; font-weight: 700; }
.tplc-cat  { font-size: 11px; color: var(--t3); }

/* ═══════════════ WIZARD ═══════════════ */
.wiz { display: flex; align-items: center; margin-bottom: 24px; }
.wiz-step { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; position: relative; }
.wiz-step:not(:last-child)::after { content:''; position:absolute; top:14px; left:50%; width:100%; height:2px; background:var(--border); z-index:0; }
.wiz-step.done::after { background: var(--ok); }
.wiz-step.cur::after  { background: var(--accent); }
.wiz-n { width:28px;height:28px;border-radius:50%;background:var(--bg3);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;z-index:1;transition:all var(--tr); }
.wiz-step.cur  .wiz-n { background:var(--accent);border-color:var(--accent);color:#fff; }
.wiz-step.done .wiz-n { background:var(--ok);border-color:var(--ok);color:#fff; }
.wiz-l { font-size:11px;color:var(--t3);font-weight:500; }
.wiz-step.cur  .wiz-l { color:var(--accent); }
.wiz-step.done .wiz-l { color:var(--ok); }

/* ═══════════════ LOGIN ═══════════════ */
.login-screen { min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center; }
.login-card { width:380px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:40px;text-align:center; }
.login-ic { font-size:42px;margin-bottom:14px; }
.login-t  { font-size:22px;font-weight:700;margin-bottom:4px; }
.login-s  { font-size:13px;color:var(--t2);margin-bottom:28px; }

/* ═══════════════ CODE ═══════════════ */
.code { background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;font-family:var(--font-mono);font-size:12px;color:var(--text);white-space:pre-wrap;word-break:break-all; }

/* ═══════════════ MODAL ═══════════════ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.55); backdrop-filter: blur(2px);
  display: flex; align-items: center; justify-content: center; z-index: 9000;
}
.modal-box {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 28px; width: 460px; max-width: 92vw; box-shadow: var(--shadow-md);
}
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }

/* ═══════════════ ADMIN STATS ═══════════════ */
.stat-mini { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 16px; }
.stat-mini .stat-v { font-size: 22px; }

/* ═══════════════ TICKET MESSAGES ═══════════════ */
.ticket-msg { border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
.ticket-msg.admin-msg { background: var(--msg-admin-bg); border: 1px solid var(--msg-admin-b); }
.ticket-msg.user-msg  { background: var(--msg-user-bg);  border: 1px solid var(--msg-user-b);  }

/* ═══════════════ USER ROW HOVER ═══════════════ */
.user-tbl-row:hover td { background: var(--bg3); }

/* ═══════════════ DIVIDERS ═══════════════ */
.div { height:1px;background:var(--border);margin:20px 0; }
.div-lbl { display:flex;align-items:center;gap:12px;color:var(--t3);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:20px 0; }
.div-lbl::before,.div-lbl::after { content:'';flex:1;height:1px;background:var(--border); }

/* ═══════════════ TABLE ═══════════════ */
.tw { border:1px solid var(--border);border-radius:var(--radius);overflow:hidden; }
table { width:100%;border-collapse:collapse; }
th { background:var(--bg3);padding:9px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);border-bottom:1px solid var(--border); }
td { padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:var(--bg3); }

/* ═══════════════ UTILITY ═══════════════ */
.row  { display:flex; }
.col  { display:flex;flex-direction:column; }
.ac-center { align-items:center; }
.jb { justify-content:space-between; }
.g4u { gap:4px; } .g6 { gap:6px; } .g8 { gap:8px; } .g10 { gap:10px; } .g12 { gap:12px; } .g16 { gap:16px; } .g20 { gap:20px; }
.mb4 { margin-bottom:4px; } .mb8 { margin-bottom:8px; } .mb12 { margin-bottom:12px; }
.mb16 { margin-bottom:16px; } .mb20 { margin-bottom:20px; } .mb24 { margin-bottom:24px; }
.mt8 { margin-top:8px; } .mt12 { margin-top:12px; } .mt16 { margin-top:16px; }
.ml-auto { margin-left:auto; }
.f1 { flex:1; }
.w100 { width:100%; }
.mono { font-family:var(--font-mono);font-size:12px; }
.sm { font-size:12px; }
.xs { font-size:11px; }
.dim { color:var(--t2); }
.dim2 { color:var(--t3); }
.c-a { color:var(--accent); }
.c-ok { color:var(--ok); }
.c-e { color:var(--err); }
.c-w { color:var(--warn); }
.bold { font-weight:700; }
.trunc { overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }

/* ═══════════════ RESPONSIVE ═══════════════ */
@media(max-width:1100px){
  .g4{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:900px){
  .sidebar{width:60px;min-width:60px;}
  .sb-logo-name,.sb-logo-ver,.sb-item span:not(.sb-icon),.sb-badge,.user-name,.user-role{display:none;}
  .sb-item{justify-content:center;padding:10px;}
  .sb-section{display:none;}
  .main{padding:16px;}
  .g3{grid-template-columns:1fr 1fr;}
  .sb-footer{padding:8px 6px;gap:6px;align-items:center;}
  .user-row{justify-content:center;padding:6px;}
  .theme-row .th-btn{padding:4px 3px;font-size:9px;}
}
@media(max-width:640px){
  .g2,.g3,.g4{grid-template-columns:1fr;}
}

#st-toasts {

@keyframes spin { to { transform: rotate(360deg); } }

function apiCall(path, opts={}) {
  const tk = localStorage.getItem("st_token");
  return fetch(API + path, {
    headers: {"Content-Type":"application/json", ...(tk?{"Authorization":"Bearer "+tk}:{}), ...(opts.headers||{})},
    ...opts
  });
}

function fmtBytes(b) {
  if(!b) return "0 B";
  if(b<1024) return b+" B";
  if(b<1048576) return (b/1024).toFixed(1)+" KB";
  return (b/1048576).toFixed(1)+" MB";
}

function fmtTime(dt) {
  if(!dt) return "—";
  return new Date(dt).toLocaleString();
}

const _DOM_SKIP = new Set(["com","net","org","gov","edu","co","ac","or","io","uk","ca","us","au","de","fr","nl","ru","cn","jp","in","br","mx","es","it","pl","se","no","dk","fi","pt","gr","tr","za","nz","sg","hk","tw","kr","th","vn","ph","id","my","pk"]);
const _SUB_SKIP = new Set(["mail","smtp","email","mx","webmail","imap","pop","pop3","send","outgoing","relay","mta"]);

function extractDomainName(dom) {
  const parts = (dom||"").split(".");
  // Find rightmost meaningful label (not TLD, not common subdomain)
  const meaningful = parts.filter(p => p.length > 2 && !_DOM_SKIP.has(p.toLowerCase()) && !_SUB_SKIP.has(p.toLowerCase()));
  if (meaningful.length) return meaningful[meaningful.length-1];
  // Fallback: first non-subdomain part
  return parts.find(p => !_SUB_SKIP.has(p.toLowerCase())) || parts[0] || "";
}

function smartSplitWords(s) {
  if (!s) return "";
  // Split on separators: dots, dashes, underscores, plus
  let parts = s.split(/[.\-_+]+/).filter(Boolean);
  if (parts.length > 1) return parts.map(w=>w[0].toUpperCase()+w.slice(1).toLowerCase()).join(" ");
  // Split camelCase: usaTruckCompany → Usa Truck Company
  const cc = s.replace(/([a-z])([A-Z])/g,"$1 $2").replace(/([A-Z]+)([A-Z][a-z])/g,"$1 $2");
  if (cc.includes(" ")) return cc.split(" ").map(w=>w[0].toUpperCase()+w.slice(1).toLowerCase()).join(" ");
  // Single word — just capitalise
  return s[0].toUpperCase()+s.slice(1).toLowerCase();
}

function parseLead(line) {
  if(!(line||"").trim()) return null;
  const raw = line.trim();

  // Support comma, semicolon, tab, pipe separators
  // But don't split on commas inside quoted strings
  let parts;
  if(raw.includes('"')) {
    parts = [];
    let cur="", inQ=false;
    for(let i=0;i<raw.length;i++){
      const c=raw[i];
      if(c==='"'){inQ=!inQ;}
      else if(!inQ&&/[,;\t|]/.test(c)){if(cur.trim())parts.push(cur.trim());cur="";}
      else{cur+=c;}
    }
    if(cur.trim())parts.push(cur.trim());
  } else {
    parts = raw.split(/[,;\t|]+/).map(p=>p.trim()).filter(Boolean);
  }

  const emailIdx = parts.findIndex(p=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(p));
  if(emailIdx === -1) return null;
  const email = parts[emailIdx].toLowerCase();

  // Combine ALL non-email parts so name,email,company all work regardless of order
  const nonEmail = [...parts.slice(0, emailIdx), ...parts.slice(emailIdx+1)];
  const name    = nonEmail[0]||"";
  const company = nonEmail[1]||"";

  const local   = email.split("@")[0]||"";
  const dom     = email.split("@")[1]||"";
  const domName = extractDomainName(dom);

  // Smart name: split local part on separators / camelCase
  // e.g. john.smith → John Smith, jsmith → Jsmith, john_doe → John Doe
  const derivedName = smartSplitWords(local);
  const realName    = name || derivedName;
  const words       = realName.trim().split(/\s+/).filter(Boolean);
  const firstName   = words[0]||"";
  const lastName    = words.length>1?words.slice(1).join(" "):"";
  const middleName  = words.length>2?words.slice(1,-1).join(" "):"";

  // Smart company: split domain name on separators / camelCase
  // e.g. usatruckcompany → Usatruckcompany, usa-truck → Usa Truck, eastLink → East Link
  const derivedCompany = smartSplitWords(domName);
  const companyTag     = company || derivedCompany;

  return {email, name, company, realName, firstName, lastName, middleName, domain:dom, domainName:domName, companyTag};
}

function parseLeads(txt, allowDupes=false) {
  const seen = new Set(), out = [];
  for(const line of (txt||"").split(/\r?\n/)) {
    const l = parseLead(line);
    if(l && (allowDupes || !seen.has(l.email))) { seen.add(l.email); out.push(l); }
  }
  return out;
}

    .replace(/#LOREM_LONG/g,        LOREM_LONG)
    .replace(/#LOREM_PARAGRAPH/g,   LOREM_MED)
    .replace(/#LOREM_SHORT/g,       LOREM_SHORT)
    .replace(/#LOREM/g,             LOREM_SHORT)
    // ── FUNCTIONAL ──
    .replace(/#SHUF\{([^}]+)\}/g, (_,opts)=>{const a=opts.split("|").filter(Boolean);return a[Math.floor(Math.random()*a.length)]||"";})
    .replace(/#UCFIRST\{([^}]+)\}/g, (_,t)=>t.charAt(0).toUpperCase()+t.slice(1))
    .replace(/#UPPER\{([^}]+)\}/g,   (_,t)=>t.toUpperCase())
    .replace(/#LOWER\{([^}]+)\}/g,   (_,t)=>t.toLowerCase())
    .replace(/#TITLE\{([^}]+)\}/g,   (_,t)=>t.replace(/\b\w/g,c=>c.toUpperCase()))
    .replace(/#REPEAT\{([^}]+)\}\{(\d+)\}/g, (_,t,n)=>t.repeat(Math.min(parseInt(n),50)))
    .replace(/#TRUNCATE\{([^}]+)\}\{(\d+)\}/g, (_,t,n)=>t.slice(0,parseInt(n))+(t.length>parseInt(n)?"…":""))
    .replace(/#IF_FIELD\{([^}]+)\}\{([^}]*)\}/g, (_,k,v)=>(leadData[k.toLowerCase()]?v:""))
    .replace(/#IF_NOCOMPANY\{([^}]+)\}/g, (_,t)=>(!company?t:""))
    .replace(/#IF_COMPANY\{([^}]+)\}/g,   (_,t)=>(company?t:""))
    .replace(/#IF_NONAME\{([^}]+)\}/g,    (_,t)=>(!leadName?t:""))
    .replace(/#IF_NAME\{([^}]+)\}/g,      (_,t)=>(leadName?t:""))
    .replace(/#RANDSENTENCE/g,     ()=>pick(RANDSENTENCES))
    .replace(/#MISSPELL\{([^}]+)\}/g, (_,t)=>{if(!t)return t;const i=Math.floor(Math.random()*t.length);return t.slice(0,i)+t[i]+t[i]+t.slice(i+1);})
    .replace(/#CAPSHUFFLE\{([^}]+)\}/g, (_,t)=>t.split("").map(ch=>Math.random()>.5?ch.toUpperCase():ch.toLowerCase()).join(""))
    .replace(/#HIDDEN\{([^}]+)\}/g, (_,t)=>`<span style="display:none">${t}</span>`)
    .replace(/#ZWSP/g, "\u200B").replace(/#ZWJ/g, "\u200D").replace(/#SOFT_HYPHEN/g, "\u00AD")
    .replace(/#COUNTER/g, String(counter))
    .replace(/#UNIQID/g, uid).replace(/#RANDOM(?!_)/g, ()=>rn(6))
    .replace(/#RANDOMSTR/g, ()=>ra(8))
    .replace(/#SENDER/g, sender||"").replace(/#SENDERDOMAIN/g, sdom)
    .replace(/#UNSUB/g, `${(typeof window!=="undefined"?window.location.origin:"")}/unsub?e=${uenc(email||"")}`)
    // ── LINK rotation ──
    .replace(/#LINK/g, ()=>{
      const links=(leadData._links||[]).filter(Boolean);
      if(!links.length) return "#LINK";
      const mode=leadData._linkMode||"sequential";
      return mode==="random" ? links[Math.floor(Math.random()*links.length)] : links[(counter-1)%links.length];
    })
    // ── VARIABLE LENGTH (regex, applied last) ──
    .replace(/#RANDUPPERALPHA(\d+)/g, (_,n)=>rL(Math.min(parseInt(n),200)))
    .replace(/#RANDUPPERHEX(\d+)/g,   (_,n)=>rH(Math.min(parseInt(n),200)))
    .replace(/#RANDUPPERAL(\d+)/g,    (_,n)=>rA(Math.min(parseInt(n),200)))
    .replace(/#RANDALPHANUM\{(\d+)\}/g, (_,n)=>ra(Math.min(parseInt(n),200)))
    .replace(/#RANDALPHANUM(\d+)/g,   (_,n)=>ra(Math.min(parseInt(n),200)))
    .replace(/#RANDALPHA\{(\d+)\}/g,    (_,n)=>rl(Math.min(parseInt(n),200)))
    .replace(/#RANDALPHA(\d+)/g,      (_,n)=>rl(Math.min(parseInt(n),200)))
    .replace(/#RANDHEX\{(\d+)\}/g,      (_,n)=>rh(Math.min(parseInt(n),200)))
    .replace(/#RANDHEX(\d+)/g,        (_,n)=>rh(Math.min(parseInt(n),200)))
    .replace(/#RANDNUM\{(\d+)\}/g,      (_,n)=>rn(Math.min(parseInt(n),200)))
    .replace(/#RANDNUM(\d+)/g,        (_,n)=>rn(Math.min(parseInt(n),200)))
    // ── Range-based RAND: #RAND{1-20} or #RAND1-20 ──
    .replace(/#RAND\{(\d+)-(\d+)\}/g, (_,lo,hi)=>String(randRange(parseInt(lo),parseInt(hi))))
    .replace(/#RAND(\d+)-(\d+)/g,     (_,lo,hi)=>String(randRange(parseInt(lo),parseInt(hi))));
}


/* ════════════════════════════════════════
   POPUP SYSTEM (replaces alert/confirm/prompt)
════════════════════════════════════════ */
let _popupResolve = null;
function showPopup({title,msg,ico="",type="alert",placeholder="",defaultValue=""}) {
  return new Promise(resolve=>{
    _popupResolve = resolve;
    const e = document.getElementById("st-popup");
    if(e) {
      document.getElementById("st-popup-ico").textContent=ico;
      document.getElementById("st-popup-title").textContent=title||"";
      document.getElementById("st-popup-msg").textContent=msg||"";
      const inp=document.getElementById("st-popup-inp");
      const inpWrap=document.getElementById("st-popup-inp-wrap");
      const cancelBtn=document.getElementById("st-popup-cancel");
      if(type==="prompt"){inp.value=defaultValue;inp.placeholder=placeholder;inpWrap.style.display="block";cancelBtn.style.display="inline-flex";}
      else if(type==="confirm"){inpWrap.style.display="none";cancelBtn.style.display="inline-flex";}
      else {inpWrap.style.display="none";cancelBtn.style.display="none";}
      document.getElementById("st-popup-ok").textContent=type==="confirm"?"Yes, Confirm":"OK";
      document.getElementById("st-popup-type").value=type;
      e.style.display="flex";
      if(type==="prompt") setTimeout(()=>inp.focus(),50);
    }
  });
}
function _popupOk(){
  const t=document.getElementById("st-popup-type"||{}).value;
  const val=t==="prompt"?document.getElementById("st-popup-inp").value:(t==="confirm"?true:true);
  document.getElementById("st-popup").style.display="none";
  if(_popupResolve){_popupResolve(val);_popupResolve=null;}
}
function _popupCancel(){
  document.getElementById("st-popup").style.display="none";
  if(_popupResolve){_popupResolve(null);_popupResolve=null;}
}

function PopupDOM() {
  return (
    <div id="st-popup" style={{display:"none"}} className="popup-overlay" onClick={e=>{if(e.target.id==="st-popup")_popupCancel();}}>
      <div className="popup-box">
        <div id="st-popup-ico" className="popup-ico"/>
        <div id="st-popup-title" className="popup-title"/>
        <div id="st-popup-msg" className="popup-msg"/>
        <div id="st-popup-inp-wrap" className="popup-input" style={{display:"none"}}>
          <input id="st-popup-inp" onKeyDown={e=>e.key==="Enter"&&_popupOk()}/>
        </div>
        <input type="hidden" id="st-popup-type" defaultValue="alert"/>
        <div className="popup-btns">
          <button id="st-popup-cancel" className="btn btn-g btn-sm" style={{display:"none"}} onClick={_popupCancel}>Cancel</button>
          <button id="st-popup-ok" className="btn btn-p btn-sm" onClick={_popupOk}>OK</button>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   TAG REFERENCE MODAL
════════════════════════════════════════ */
function TagModal({onClose, onInsert, targetRef}) {
  const [search, setSearch] = React.useState("");
  const [cat, setCat]       = React.useState("all");
  const [hoveredTag, setHoveredTag] = React.useState(null);

  const cats = ["all", ...TAG_SECTIONS.map(s => s.label)];
  const filtered = TAG_SECTIONS
    .filter(s => cat === "all" || s.label === cat)
    .map(s => ({
      ...s,
      tags: s.tags.filter(t =>
        !search.trim() ||
        t.tag.toLowerCase().includes(search.trim().toLowerCase()) ||
        t.desc.toLowerCase().includes(search.trim().toLowerCase())
      )
    }))
    .filter(s => s.tags.length > 0);

  // Insert tag at cursor position in the target textarea/input, or append
  const insertTag = (tag) => {
    const el = targetRef && targetRef.current;
    if (el && (el.tagName === "TEXTAREA" || el.tagName === "INPUT")) {
      const start = el.selectionStart ?? el.value.length;
      const end   = el.selectionEnd   ?? el.value.length;
      const before = el.value.slice(0, start);
      const after  = el.value.slice(end);
      const newVal = before + tag + after;
      // React synthetic event to update state
      const nativeInputValueSetter = Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype, 'value'||{}).set
        || Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value'||{}).set;
      if (nativeInputValueSetter) {
        nativeInputValueSetter.call(el, newVal);
        el.dispatchEvent(new Event('input', { bubbles: true }));
      } else {
        el.value = newVal;
      }
      // Restore cursor after inserted tag
      requestAnimationFrame(() => {
        el.focus();
        el.setSelectionRange(start + tag.length, start + tag.length);
      });
    }
    if (onInsert) onInsert(tag);
  };

  // Preview what a tag resolves to using a sample lead
  const previewTag = (tag) => {
    try {
      return resolveTags(tag, "john.smith@acme.com", "sender@yourcompany.com", "Sample Subject", "John Smith", 1, {company:"Acme Corp"});
    } catch(e) { return tag; }
  };

  return (
    <div className="tag-modal-overlay" onClick={e=>e.target.className==="tag-modal-overlay"&&onClose()}>
      <div className="tag-modal-box" style={{width:"min(900px,96vw)",maxHeight:"88vh",display:"flex",flexDirection:"column"}}>
        {/* Header */}
        <div className="tag-modal-head" style={{padding:"14px 16px",borderBottom:"1px solid var(--border)",gap:10,flexShrink:0}}>
          <span style={{fontWeight:700,fontSize:15}}>🏷 Insert Tag</span>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Search 117+ tags…" autoFocus
            style={{flex:1,padding:"8px 12px",fontSize:13,borderRadius:7,border:"1px solid var(--border)",background:"var(--bg2)",color:"var(--t1)"}}/>
          <button className="btn btn-g btn-sm" onClick={onClose}>✕</button>
        </div>
        {/* Category filter */}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",padding:"10px 16px",borderBottom:"1px solid var(--border)",flexShrink:0,background:"var(--bg2)"}}>
          {cats.map(c=>(
            <button key={c} onClick={()=>setCat(c)}
              style={{fontSize:11,padding:"4px 10px",borderRadius:20,border:"1px solid var(--border)",
                background:cat===c?"var(--accent)":"var(--bg3)",
                color:cat===c?"#fff":"var(--t2)",cursor:"pointer",whiteSpace:"nowrap"}}>
              {c==="all"?"ALL":c}
            </button>
          ))}
        </div>
        {/* Tag grid + preview */}
        <div style={{display:"flex",flex:1,overflow:"hidden",minHeight:0}}>
          {/* Tag list */}
          <div className="tag-modal-body" style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
            {filtered.map(sec=>(
              <div key={sec.label} style={{marginBottom:16}}>
                <div className="tag-section-hdr" style={{fontSize:11,fontWeight:700,letterSpacing:".5px",color:"var(--t3)",textTransform:"uppercase",marginBottom:6,paddingBottom:4,borderBottom:"1px solid var(--border)"}}>
                  {sec.label} <span style={{color:"var(--t3)",fontWeight:400}}>({sec.tags.length})</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:4}}>
                  {sec.tags.map(t=>(
                    <div key={t.tag}
                      className="tag-row"
                      style={{
                        display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:6,cursor:"pointer",
                        background:hoveredTag===t.tag?"var(--aglow)":"transparent",
                        border:"1px solid",borderColor:hoveredTag===t.tag?"var(--accent)":"transparent",
                        transition:"all .1s"
                      }}
                      onClick={()=>insertTag(t.tag)}
                      onMouseEnter={()=>setHoveredTag(t.tag)}
                      onMouseLeave={()=>setHoveredTag(null)}>
                      <code style={{fontSize:11,background:"var(--bg3)",padding:"2px 6px",borderRadius:4,color:"var(--accent)",flexShrink:0,fontFamily:"var(--font-mono)",whiteSpace:"nowrap"}}>
                        {t.tag}
                      </code>
                      <span style={{fontSize:12,color:"var(--t2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.desc}</span>
                    </div>
                  ))}
                </div>
              </div>
            ))}
            {filtered.length===0 && <div style={{color:"var(--t3)",textAlign:"center",padding:32}}>No tags match "{search}"</div>}
          </div>
          {/* Live preview panel */}
          {hoveredTag && (
            <div style={{width:260,flexShrink:0,borderLeft:"1px solid var(--border)",padding:16,background:"var(--bg2)",display:"flex",flexDirection:"column",gap:10,overflowY:"auto"}}>
              <div style={{fontSize:11,fontWeight:700,color:"var(--t3)",textTransform:"uppercase",letterSpacing:".5px"}}>Tag Preview</div>
              <code style={{fontSize:13,color:"var(--accent)",background:"var(--bg3)",padding:"8px 10px",borderRadius:6,wordBreak:"break-all",fontFamily:"var(--font-mono)"}}>
                {hoveredTag}
              </code>
              <div style={{fontSize:12,color:"var(--t2)"}}>
                {TAG_SECTIONS.flatMap(s=>s.tags).find(t=>t.tag===hoveredTag||{}).desc}
              </div>
              <div style={{borderTop:"1px solid var(--border)",paddingTop:10}}>
                <div style={{fontSize:11,color:"var(--t3)",marginBottom:6}}>Resolves to:</div>
                <div style={{fontSize:13,color:"var(--ok)",background:"var(--bg3)",padding:"8px 10px",borderRadius:6,wordBreak:"break-all",minHeight:32,fontFamily:"var(--font-mono)"}}>
                  {previewTag(hoveredTag)}
                </div>
              </div>
              <div style={{fontSize:11,color:"var(--t3)"}}>
                Sample: john.smith@acme.com<br/>Name: John Smith<br/>Company: Acme Corp
              </div>
              <button className="btn btn-p btn-sm" onClick={()=>insertTag(hoveredTag)} style={{marginTop:"auto"}}>
                ⬆ Insert Tag
              </button>
            </div>
          )}
        </div>
        {/* Footer */}
        <div style={{padding:"10px 16px",borderTop:"1px solid var(--border)",background:"var(--bg2)",fontSize:12,color:"var(--t3)",flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span>Click any tag to insert at cursor · Hover to preview resolved value</span>
          <span>{TAG_SECTIONS.reduce((n,s)=>n+s.tags.length,0)} tags available</span>
        </div>
      </div>
    </div>
  );
}

function TabCampaign({
  name, setName, running, paused, stats, log, history, histTab, setHistTab,
  pauseRef, startCampaign, pauseCampaign, resumeCampaign, stopCampaign,
  setLeadsRaw, setLeads, setTab,
  // deliverability
  priority, setPriority, batchSize, setBatchSize, delay, setDelay, delayUnit, setDelayUnit,
  jitter, setJitter, jitterSec, setJitterSec, domThrottle, setDomThrottle, warmup, setWarmup,
  listUnsub, setListUnsub, unsubEmail, setUnsubEmail, unsubUrl, setUnsubUrl,
  oneClick, setOneClick, autoInject, setAutoInject, autoPlain, setAutoPlain, spamFilter, setSpamFilter,
  activeMethod, setActiveMethod, showDeliv, setShowDeliv,
  cooldownEvery, setCooldownEvery, cooldownSecs, setCooldownSecs,
  batchPauseSecs, setBatchPauseSecs,
  concurrent, setConcurrent,
  hideFromEmail, setHideFromEmail, autoFlagEmail, setAutoFlagEmail, antiDetect, setAntiDetect,
  skipPreflightDns, setSkipPreflightDns,
  threadSimulate, setThreadSimulate,
  msExchangeHdrs, setMsExchangeHdrs,
  arcSimulate, setArcSimulate,
  newCampaign,
}) {
  const pct = stats.total>0 ? Math.round((stats.sent+stats.failed)/stats.total*100) : 0;
  const successPct = stats.total>0 ? Math.round(stats.sent/stats.total*100) : 0;
  const sentEntries   = log.filter(e=>e.type==="ok");
  const failedEntries = log.filter(e=>e.type==="err");

  // Auto-scroll with snap-back logic
  const logRef        = useRef(null);
  const userScrolled  = useRef(false);
  const snapTimer     = useRef(null);

  const scrollToBottom = () => {
    if(logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  };

  useEffect(()=>{
    if(!userScrolled.current) scrollToBottom();
  },[log]);

  const handleScroll = () => {
    const el = logRef.current;
    if(!el) return;
    const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 40;
    if(!atBottom) {
      userScrolled.current = true;
      clearTimeout(snapTimer.current);
      snapTimer.current = setTimeout(()=>{
        userScrolled.current = false;
        scrollToBottom();
      }, 3000);
    } else {
      userScrolled.current = false;
      clearTimeout(snapTimer.current);
    }
  };

  return (
    <div className="tab-campaign-inner">
      <div className="ph" style={{paddingBottom:8,marginBottom:8}}>

        </div>
        <div className="stat ca">
          <div className="stat-v" style={{transition:"all .3s"}}>{stats.pending.toLocaleString()}</div>
          <div className="stat-l">Pending</div>
          {running && stats.total>0 && <div className="stat-s">{pct}% done</div>}

      {/* ── Controls + progress ── */}

            <span className={`dot ${running&&!paused?"dot-run":paused?"dot-pau":"dot-idle"}`}/>

                  {[["low","⬇","Low","5","Low"],["normal","—","Normal","3","Normal"],["high","❗","High","1","High"]].map(([val,icon,lbl])=>(
                    <button key={val} onClick={()=>setPriority(val)} style={{
                      flex:1,border:"1px solid",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:600,
                      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",lineHeight:1.2,

                      background: priority===val ? (val==="high"?"#450a0a":val==="low"?"#1e1b4b":"#052e16") : "var(--inp)",
                      color: priority===val ? (val==="high"?"#fca5a5":val==="low"?"#a5b4fc":"#86efac") : "var(--dim)",
                    }}>

              <div>

              </div>
              <div>
                <label className="lbl">Cooldown (secs)</label>
                <input type="number" value={cooldownSecs} onChange={e=>setCooldownSecs(e.target.value)} min="1" style={{fontSize:15,padding:"10px 12px"}}/>
              </div>
              <div>
                <label className="lbl"><span title="Extra pause between batches (0 = use delay)">Batch Pause (secs)</span></label>
                <input type="number" value={batchPauseSecs} onChange={e=>setBatchPauseSecs(e.target.value)} min="0" placeholder="0=use delay" style={{fontSize:15,padding:"10px 12px"}}/>
              </div>
              <div>
                <label className="lbl"><span title="Run N sends in parallel (ISP/tunnel mode). Higher = faster but more aggressive. Recommended: 3-8 for ISP.">Concurrent Sends</span></label>
                <input type="number" value={concurrent} onChange={e=>setConcurrent(e.target.value)} min="1" max="20" style={{fontSize:15,padding:"10px 12px"}}/>
              </div>
              <div>
                <label className="lbl">Delay</label>
                <input type="number" value={delay} onChange={e=>setDelay(e.target.value)} min="0" style={{fontSize:15,padding:"10px 12px"}}/>
              </div>
              <div>
                <label className="lbl">Unit</label>
                <select value={delayUnit} onChange={e=>setDelayUnit(e.target.value)} style={{fontSize:14,padding:"10px 12px"}}>
                  <option value="ms">ms</option><option value="sec">Sec</option><option value="min">Min</option>
                </select>
              </div>
            </div>

            <div className="col g12 mb16">
              <div className="row ac-center g12">
                <Tog checked={jitter} onChange={setJitter} label={<Tip text="Adds ±N seconds of random variance to each send delay. Instead of sending every 2s exactly, it sends every 1–5s randomly — making the sending pattern look human and avoiding rate-limit triggers.">Random delay jitter</Tip>} />
                {jitter && (
                  <div className="row ac-center g8">
                    <input type="number" value={jitterSec} onChange={e=>setJitterSec(e.target.value)} min="1" max="60" style={{width:70,fontSize:15,padding:"10px 12px"}}/>
                    <span className="dim xs">± seconds</span>
                  </div>
                )}
              </div>
              <Tog checked={domThrottle} onChange={setDomThrottle}
                label={<Tip text="Gmail, Yahoo, Hotmail and Outlook have the strictest rate limits. Enabling this adds extra delay per message when sending to those domains. Microsoft domains (Hotmail/Outlook/O365) get 8s delay; Gmail/Yahoo get 5s. Dramatically reduces rate-limit and blacklist risk.">Domain throttling</Tip>}
                desc="Extra per-message delay for Gmail (+5s), Hotmail/Outlook (+8s) — reduces rate-limit risk" />
              <Tog checked={warmup} onChange={setWarmup}
                label={<Tip text="New IPs must warm up gradually. Day 1: 50 emails, Day 2: 100, Day 3: 200… Sending 10,000 emails on day 1 = instant blacklist. This mode auto-limits your daily volume by warmup stage.">IP Warmup mode</Tip>}
                desc="Auto-limit volume for new IPs — prevents blacklisting" />
            </div>

            <div className="div-lbl">REQUIRED HEADERS (GMAIL/YAHOO 2024+ RULES)</div>
            <Info type="w">Gmail and Yahoo require these for bulk senders (5000+ emails/day). Without them, emails go to spam or get rejected.</Info>
            <div className="col g12 mt12">
              <div>
                <Tog checked={listUnsub} onChange={setListUnsub}
                  label={<Tip text="Adds the 'Unsubscribe' button in Gmail/Yahoo inboxes. This is the #1 deliverability signal for bulk email. Tags work in the URL — use #EMAIL for the recipient's email.">List-Unsubscribe header</Tip>}/>
                {listUnsub && (
                  <div className="g2 mt10" style={{gap:10}}>
                    <div>
                      <label className="lbl">Unsubscribe Email</label>
                      <input value={unsubEmail} onChange={e=>setUnsubEmail(e.target.value)} placeholder="unsubscribe@yourdomain.com" style={{fontSize:14,padding:"10px 12px"}}/>
                    </div>
                    <div>
                      <label className="lbl">Unsubscribe URL <Tip text="Use #EMAIL here to personalise. Example: https://yourdomain.com/unsub?e=#EMAIL — the tag is replaced with the recipient's encoded email."/></label>
                      <input value={unsubUrl} onChange={e=>setUnsubUrl(e.target.value)} placeholder="https://yourdomain.com/unsub?e=#EMAIL" style={{fontSize:14,padding:"10px 12px"}}/>

              </div>
              <Tog checked={oneClick} onChange={setOneClick}
                label={<Tip text="Required since June 2024 for 5000+/day senders. Adds the 'List-Unsubscribe-Post: List-Unsubscribe=One-Click' header. Gmail will reject bulk emails without this.">One-Click Unsubscribe (RFC 8058)</Tip>}
                desc="Required for bulk senders since June 2024"/>
              <Tog checked={autoInject} onChange={setAutoInject}

                desc='Appends small "Unsubscribe | Manage preferences" link at bottom of HTML'/>
              <Tog checked={autoPlain} onChange={setAutoPlain}
                label="Auto-generate plain-text version"
                desc="Strips HTML to create multipart/alternative — improves inbox placement"/>
              <Tog checked={spamFilter} onChange={setSpamFilter}
                label="🧹 Spam Word Filter"
                desc='Automatically replaces common spam trigger words (e.g. "Security Warning" → "Account Notice") to improve inbox placement'/>
              <Tog checked={bypassMode} onChange={v=>{setBypassMode(v); if(v) setSpamFilter(true);}}
                label={<Tip text="Enables multi-layer content bypass engine. Activates automatically when Spam Word Filter is on. Layers: zero-font noise injection, HTML comment injection between words, invisible zero-width chars in subject, unique CSS/pixel fingerprint per email. Optionally adds homoglyph Unicode lookalike chars and font randomisation.">🔓 Advanced Bypass Mode</Tip>}
                desc="Zero-font + comment injection + invisible subject chars + unique fingerprint per email"/>
              {bypassMode && <div className="col g8 mt4 ml16" style={{borderLeft:"2px solid var(--bdr)",paddingLeft:12}}>
                <Tog checked={bypassZeroFont} onChange={setBypassZeroFont}
                  label="Zero-Font Noise"
                  desc="Inject invisible <u> words between real words — dilutes spam word density"/>
                <Tog checked={bypassComments} onChange={setBypassComments}
                  label="HTML Comment Injection"
                  desc="Insert <!-- --> comments between words — breaks keyword exact-match scanning"/>
                <Tog checked={bypassInnat} onChange={setBypassInnat}
                  label="Invisible Subject Chars"
                  desc="Insert zero-width Unicode chars in subject — breaks hash-based campaign fingerprinting"/>
                <Tog checked={bypassHomoglyphs} onChange={setBypassHomoglyphs}
                  label={<Tip text="Replaces characters in spam trigger words with visually identical Unicode lookalikes (Cyrillic а instead of Latin a etc). Breaks exact-match ASCII keyword filters. Use sparingly — some clients may render differently.">Homoglyph Encoding</Tip>}
                  desc="Replace Latin chars in spam words with Unicode lookalikes (Cyrillic/Greek)"/>
                <Tog checked={bypassFontRand} onChange={setBypassFontRand}
                  label="Font Randomisation"
                  desc="Wrap each word in a random font-family span — breaks ML text recognition models"/>
              </div>}
            </div>

            <div className="div-lbl" style={{marginTop:8}}>ANTI-DETECTION &amp; DELIVERY</div>
            <div className="col g12 mt12">
              <Tog checked={antiDetect} onChange={setAntiDetect}
                label={<Tip text="Enables full anti-fingerprinting suite: randomised MIME boundaries, per-recipient uniqueness tokens, jittered timestamps, and enhanced Exchange/SpamAssassin trust headers. Matches behaviour of real MUAs (Outlook 16.x). Recommended: always on.">🛡️ Anti-Detection Mode</Tip>}
                desc="Randomise MIME fingerprint, inject trust headers — matches real Outlook behaviour"/>
              <Tog checked={threadSimulate} onChange={setThreadSimulate}
                label={<Tip text="Adds In-Reply-To and References headers pointing to a plausible prior message. Spam filters treat replies as conversation threads and score them far more leniently than cold outbound. One of the highest-impact single inboxing tricks.">🧵 Thread Simulation</Tip>}
                desc="Fake In-Reply-To/References headers — filters treat email as a thread reply, not cold outbound"/>
              <Tog checked={arcSimulate} onChange={setArcSimulate}
                label={<Tip text="Injects ARC-Authentication-Results, ARC-Message-Signature, and ARC-Seal headers claiming the message passed SPF/DKIM/DMARC at mx.google.com. ARC is a chain of trust headers used by forwarded mail. Disable if your SMTP provider adds real ARC headers.">⛓️ ARC Chain Simulation</Tip>}
                desc="Fake ARC headers claiming SPF/DKIM/DMARC pass from Google infrastructure"/>
              <Tog checked={msExchangeHdrs} onChange={setMsExchangeHdrs}
                label={<Tip text="Injects X-MS-Exchange-Organization-SCL:-1 (spam confidence level = trusted), BCL:0, and PCL:2. Exchange and Office 365 servers read these to bypass their own junk filters. High impact for Outlook/Hotmail/O365 recipients.">🏢 MS Exchange Trust Headers</Tip>}
                desc="SCL:-1 + BCL:0 — tells Exchange/O365 to bypass junk filter for this message"/>
              <Tog checked={autoFlagEmail} onChange={setAutoFlagEmail}
                label={<Tip text="Adds X-Priority: 1 + Importance: High + X-MSMail-Priority: High headers, which cause Outlook/Hotmail to display a red flag icon next to the email in inbox. Increases open rates and makes emails stand out in crowded inboxes.">🚩 Auto-Flag Emails (red flag icon)</Tip>}
                desc="Sets high priority headers — Outlook shows red flag icon in inbox"/>
              <Tog checked={hideFromEmail} onChange={setHideFromEmail}
                label={<Tip text="Injects zero-width Unicode characters into the From display name. Visually invisible but breaks exact-match filters that check for known sender strings. Use with caution — aggressive filters may still detect the encoding.">👁️ Hide From Email (zero-width chars)</Tip>}
                desc="Inject invisible Unicode chars into From name — bypasses simple string filters"/>
              <Tog checked={skipPreflightDns} onChange={setSkipPreflightDns}
                label={<Tip text="Skips the DNS/MX check that runs before the campaign and removes senders with no MX records. Enable this if your domains are valid but failing DNS resolution (e.g. new domains, split-horizon DNS, or network issues during preflight).">⚡ Skip Preflight DNS Check</Tip>}
                desc="Send even if sender domains fail MX resolution — use if domains are valid but failing preflight"/>
            </div>
          </div>
        )}
      </div>

      {/* ── Log ── */}
      <div className="card" style={{minHeight:280,display:"flex",flexDirection:"column"}}>
        <div className="row ac-center jb mb12">
          <div className="row ac-center g8">
            <div className="card-title" style={{marginBottom:0}}>📋 Send Log</div>
            <div className="tab-bar" style={{marginBottom:0,borderBottom:"none"}}>
              {[["live","Live"],["sent",`Sent (${sentEntries.length})`],["failed",`Failed (${failedEntries.length})`],["history","History"]].map(([k,l])=>(
                <button key={k} className={`tb ${histTab===k?"on":""}`} onClick={()=>setHistTab(k)}>{l}</button>
              ))}
            </div>
          </div>
          <button className="btn btn-g btn-xs" onClick={()=>{}}>Clear</button>
        </div>

        {histTab==="live" && (
          <div style={{position:"relative",flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
            <div className="flog" ref={logRef} onScroll={handleScroll}>
              {!log.length && <div className="dim2 sm" style={{padding:"6px 0"}}>No activity yet — start a campaign to see live logs</div>}
              {log.map((e,i)=>(
                <div key={i} className="flog-e">
                  <span className="flog-ts">{e.ts}</span>
                  <span style={{flexShrink:0}}>{e.type==="ok"?"✓":e.type==="err"?"✗":e.type==="warn"?"⚠":"·"}</span>
                  <span className={`flog-${e.type==="ok"?"ok":e.type==="err"?"err":e.type==="warn"?"wrn":"inf"}`}>{e.msg}</span>
                </div>
              ))}
            </div>
            {running && (
              <div style={{position:"absolute",bottom:8,right:8}}>
                <button className="btn btn-g btn-xs" onClick={()=>{userScrolled.current=false;scrollToBottom();}}>
                  ↓ Latest
                </button>
              </div>
            )}
          </div>
        )}

        {histTab==="sent" && (
          <div>
            {!sentEntries.length && <div className="dim2 sm" style={{padding:"6px 0"}}>No sent emails yet</div>}
            {sentEntries.length>0 && (
              <div style={{maxHeight:320,overflowY:"auto",border:"1px solid var(--border)",borderRadius:6}}>
              <div className="tw" style={{fontSize:12}}>
                <table>
                  <thead style={{position:"sticky",top:0,background:"var(--bg2)"}}><tr><th>Time</th><th>To</th><th>From</th><th>Sent Via</th></tr></thead>
                  <tbody>
                    {sentEntries.map((e,i)=>{
                      // Infer icon from via string
                      const v = e.via||"";
                      const vIcon = v.match(/amazonaws|smtp|relay/i) ? "📨"
                                  : v.match(/sendgrid|mailgun|sparkpost|postmark|ses|api/i) ? "🔌"
                                  : v.match(/tunnel|rdp|isp|socks/i) ? "🔑"
                                  : v.match(/owa|exchange|outlook/i) ? "📮"
                                  : v.match(/crm|hubspot|salesforce/i) ? "🗄️"
                                  : "📡";
                      return (
                        <tr key={i}>
                          <td className="dim2" style={{whiteSpace:"nowrap"}}>{e.ts}</td>
                          <td style={{fontFamily:"var(--font-mono)",color:"var(--ok)"}}>{e.email||e.msg}</td>
                          <td style={{fontFamily:"var(--font-mono)",color:"var(--t2)"}}>{e.from||"—"}</td>
                          <td style={{fontFamily:"var(--font-mono)",color:"var(--t3)",fontSize:11}}>{v ? `${vIcon} ${v}` : "—"}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              </div>
            )}
          </div>
        )}

        {histTab==="failed" && (
          <div>
            <div className="flog mb8" style={{maxHeight:320}}>
              {!failedEntries.length && <div className="dim2 sm" style={{padding:"6px 0"}}>No failures</div>}
              {failedEntries.map((e,i)=>(
                <div key={i} className="flog-e">
                  <span className="flog-ts">{e.ts}</span>
                  <span className="flog-err">✗</span>
                  <span className="flog-err">{e.msg}</span>
                </div>
              ))}
            </div>
            {failedEntries.length>0 && (
              <button className="btn btn-w btn-sm" onClick={()=>{
                const emails = failedEntries.map(e=>e.email).filter(Boolean).join("\n");
                setLeadsRaw(emails); setLeads(parseLeads(emails)); setTab("leads");
              }}>↺ Retry {failedEntries.length} failed emails</button>
            )}
          </div>
        )}

        {histTab==="history" && (
          <div>
            {!history.length && <div className="dim2 sm">No previous campaigns yet — runs will appear here once complete.</div>}
            {history.length>0 && (
              <div className="tw">
                <table>
                  <thead><tr><th>Name</th><th>Method</th><th>Status</th><th>Sent</th><th>Failed</th><th>Total</th><th>Rate</th><th>Started</th><th>Duration</th></tr></thead>
                  <tbody>
                    {history.map(c=>{
                      const rate = c.total>0 ? Math.round((c.sent/c.total)*100) : 0;
                      const dur = (c.started_at && c.finished_at)
                        ? (() => { const s=Math.round((new Date(c.finished_at)-new Date(c.started_at))/1000); return s<60?`${s}s`:`${Math.floor(s/60)}m ${s%60}s`; })()
                        : "—";
                      const mIcon = {smtp:"📨",api:"🔌",owa:"📮",crm:"🗄️",tunnel:"🔑",isp:"🌐"}[c.method]||"📡";
                      return (
                        <tr key={c.id}>
                          <td>{c.name}</td>
                          <td style={{whiteSpace:"nowrap"}}>{mIcon} {c.method||"smtp"}</td>
                          <td><Bdg t={c.status==="running"?"a":c.status==="done"?"ok":"e"}>{c.status}</Bdg></td>
                          <td className="c-ok">{c.sent}</td>
                          <td className="c-e">{c.failed}</td>
                          <td>{c.total}</td>
                          <td style={{color:rate>80?"var(--ok)":rate>50?"var(--warn)":"var(--err)"}}>{rate}%</td>
                          <td className="dim2 xs">{fmtTime(c.started_at)}</td>
                          <td className="dim2 xs">{dur}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   TAB: COMPOSE
